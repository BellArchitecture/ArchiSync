<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f3f0;--bg2:#ece9e4;--bg3:#e2ddd6;
  --panel:#ffffff;--border:#ddd9d3;--border2:#ccc7bf;
  --text:#2a2520;--text2:#46413b;--text3:#514b44;
  /* Accent unifié sur le brun de marque Archisync (#5c3d1e) pour une seule
     identité visuelle entre le shell et le PV embarqué.
     --accent-ink = texte foncé sur fond clair (--accent-bg) ; --accent-on =
     texte clair sur le brun plein (boutons, pastilles cochées, logo). */
  --accent:#5c3d1e;--accent-bg:#f5ede6;--accent-lt:#e8d5c4;--accent-ink:#2a2520;--accent-on:#ffffff;
  --green:#1a7a4a;--green-bg:#e8f5ee;
  --amber:#c47a00;--amber-bg:#fef3d8;
  --red:#c0392b;--red-bg:#fdecea;
  --purple:#6b3fa0;--purple-bg:#f0ebfa;
  --r:10px;--r2:14px;
  --shadow:0 1px 4px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.05);
  --shadow2:0 2px 8px rgba(0,0,0,.1),0 8px 32px rgba(0,0,0,.08);
  --panel2:#f7f5f2;
  font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text)
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);height:100vh;overflow:hidden;font-family:inherit}
.app{display:flex;height:100vh}
.sidebar{width:238px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-head{padding:14px 14px 10px;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:9px;margin-bottom:4px}
.logo-mark{width:26px;height:26px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0;letter-spacing:-.5px}
.sb-list{flex:1;overflow-y:auto;padding:8px}
.cr-item{padding:8px 10px 8px 6px;border-radius:var(--r);cursor:default;border:1px solid transparent;margin-bottom:4px;transition:all .12s;display:flex;align-items:flex-start;gap:4px}
.cr-item:hover{background:var(--bg2)}
.cr-item>div[onclick]{flex:1;min-width:0;cursor:pointer}
.cr-drag-handle{color:var(--border2);cursor:grab;font-size:14px;line-height:1.6;padding:0 2px;flex-shrink:0;user-select:none;transition:color .15s}
.cr-drag-handle:hover{color:var(--text3)}
.cr-drag-handle:active{cursor:grabbing}
.proj-group{margin-bottom:6px}
.proj-header{display:flex;align-items:center;gap:6px;padding:7px 8px;border-radius:var(--r);cursor:pointer;transition:background .12s}
.proj-header:hover{background:var(--bg2)}
.proj-cr-list{padding-left:10px;border-left:2px solid var(--border);margin:2px 0 2px 12px}
.proj-arch-toggle{width:100%;display:flex;align-items:center;gap:5px;padding:4px 8px 4px 14px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:10px;color:var(--text3);text-align:left;margin-top:2px}
.cr-item.cr-arch{opacity:.6;border-left:3px solid var(--amber)}
.cr-item.active{background:var(--accent-bg);border-color:var(--accent-lt)}
.cr-item-date{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:2px}
.cr-item-proj{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cr-item-sub{font-size:11px;color:var(--text3);margin-top:2px;display:flex;gap:8px;align-items:center}
.sb-foot{padding:10px 14px;border-top:1px solid var(--border)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--panel);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border:1px solid var(--border2);border-radius:var(--r);background:var(--panel);color:var(--text);font-size:12px;cursor:pointer;font-weight:500;font-family:inherit;transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--bg2)}
.btn-p{background:var(--accent);color:var(--accent-on);border-color:var(--accent)}
.btn-p:hover{background:#3d2510;border-color:#3d2510}
.btn-sm{padding:5px 10px;font-size:11.5px}
.btn-g{border:none;background:none;cursor:pointer;font-family:inherit}
.btn-g:hover{background:var(--bg2);border-radius:6px}
.content{flex:1;overflow-y:auto}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.bgreen{background:var(--green-bg);color:var(--green)}
.bamber{background:var(--amber-bg);color:var(--amber)}
.baccent{background:var(--accent-bg);color:var(--accent-ink)}
.bred{background:var(--red-bg);color:var(--red)}
.bgray{background:var(--bg2);color:var(--text3)}
.bpurple{background:var(--purple-bg);color:var(--purple)}
/* CR VIEW */
.cr-header{background:var(--panel);border-bottom:1px solid var(--border);padding:16px 24px}
.cr-meta{display:flex;align-items:flex-start;gap:20px;flex-wrap:wrap}
.section{margin-bottom:20px}
.section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px}
/* Intervenants */
.int-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.int-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px}
.int-lot{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.int-ent{font-size:13px;font-weight:500;margin-bottom:2px}
.int-contact{font-size:11.5px;color:var(--text3)}
/* Remarques */
.lot-block{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.lot-head{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:background .1s}
.lot-head:hover{background:var(--bg2)}
.lot-head-left{display:flex;align-items:center;gap:9px}
.lot-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.lot-title{font-weight:500;font-size:13.5px}
.lot-body{border-top:1px solid var(--border);padding:12px 16px}
.remarque-item{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.remarque-item:last-child{border-bottom:none}
.ri-check{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.ri-check.done{background:var(--accent);border-color:var(--accent);color:var(--accent-on);}
.ri-check.flagged{background:var(--amber-bg);border-color:var(--amber)}
.ri-text{flex:1;font-size:13px;line-height:1.5}
.ri-text.done-text{text-decoration:line-through;color:var(--text3)}
.ri-actions{display:flex;gap:3px;opacity:0;flex-shrink:0;transition:opacity .12s}
.remarque-item:hover .ri-actions{opacity:1}
/* Actions/décisions */
.action-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:7px;transition:border-color .12s}
.action-row:hover{border-color:var(--border2)}
.action-row.done{opacity:.5}
.ar-status{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:600;cursor:pointer}
/* Tabs */
.tabbar{display:flex;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.tab{padding:10px 15px;font-size:12px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;font-family:inherit;white-space:nowrap;transition:color .12s;flex-shrink:0}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:5px}
/* New CR form */
.form-section{background:var(--panel);border:1px solid var(--border);border-radius:var(--r2);padding:18px;margin-bottom:14px}
.form-section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.fi{margin-bottom:12px}
.fi label{display:block;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.fi input,.fi select,.fi textarea{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text);outline:none;font-family:inherit}
.fi input:focus,.fi select:focus,.fi textarea:focus{border-color:var(--accent);background:var(--panel)}
.fi textarea{resize:vertical;min-height:72px}
/* Modal */
.mo-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px)}
.mo-box{background:var(--panel);border-radius:var(--r2);padding:24px;width:480px;max-width:95vw;border:1px solid var(--border);box-shadow:var(--shadow2);max-height:90vh;overflow-y:auto}
.mo-box h3{font-size:15px;font-weight:600;margin-bottom:16px}
.mo-foot{display:flex;gap:7px;margin-top:16px;justify-content:flex-end}
/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:300;white-space:nowrap;display:flex;align-items:center;gap:7px;box-shadow:var(--shadow2);max-width:90vw}
.toast-success{background:var(--green)}
.toast-error{background:var(--red)}
.toast-info{background:var(--text);color:#fff}
.toast-undo{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.5);color:#fff;border-radius:8px;padding:4px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.toast-undo:hover{background:rgba(255,255,255,.3)}
@media (max-width:900px){.toast{bottom:14px;white-space:normal;text-align:center}}
/* Hamburger toggle (hidden on desktop) */
.hamburger{display:none;align-items:center;justify-content:center;width:40px;height:40px;border:1px solid var(--border2);border-radius:var(--r);background:var(--panel);cursor:pointer;flex-shrink:0;margin-right:8px}
.hamburger svg{width:20px;height:20px;stroke:var(--text);stroke-width:2;fill:none;stroke-linecap:round}
#sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:48}
#sidebar-backdrop.show{display:block}
/* ══ MODE EMBARQUÉ (PV affiché dans Archisync via iframe) ══
   On est déjà dans un projet côté Archisync : la barre latérale de PV est
   entièrement retirée. Le contenu occupe toute la largeur. La navigation entre
   CR d'un même projet se fait par l'onglet « Historique PV » ; les utilitaires
   (Nouveau CR, Modèles, Réglages cabinet) sont déplacés dans la barre du haut. */
body.embed .sidebar{display:none}
body.embed .hamburger{display:none}
body.embed #sidebar-backdrop{display:none!important}
#tb-app{display:none}
body.embed #tb-app{display:flex}

/* ══ RESPONSIVE (phone / tablet) ══ */
@media (max-width:900px){
  body{overflow:auto}
  .app{display:block;height:auto;min-height:100vh}
  .sidebar{position:fixed;top:0;left:0;height:100vh;width:280px;max-width:85vw;z-index:49;transform:translateX(-100%);transition:transform .22s ease;box-shadow:var(--shadow2)}
  .sidebar.open{transform:translateX(0)}
  .main{height:auto;min-height:100vh;overflow:visible}
  .content{overflow:visible}
  .hamburger{display:inline-flex}
  .topbar{position:sticky;top:0;z-index:30;height:auto;min-height:52px;padding:8px 12px;flex-wrap:wrap;gap:6px}
  #tb-actions{flex-wrap:wrap}
  .tabbar{position:sticky;top:0;z-index:20}
  .int-grid{grid-template-columns:1fr}
  .mo-box{width:96vw;padding:18px}
  /* Bigger tap targets on touch */
  .btn{padding:9px 14px}
  .btn-sm{padding:8px 12px}
  .ri-actions{opacity:1}
  .ri-check{width:24px;height:24px}
}
@media (max-width:480px){
  .topbar{padding:8px}
  .cr-header{padding:12px 14px}
  #tb-actions .btn-sm{flex:1;justify-content:center}
}
/* Print */
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{background:#fff!important;margin:0;padding:0;font-family:Arial,sans-serif;font-size:10pt;color:#000}
  .app{display:block!important;height:auto!important}
  .sidebar,.topbar,.tabbar,.ri-actions,.btn,.sb-foot,.print-hide{display:none!important}
  .main{display:block!important;overflow:visible!important}
  .content{display:none!important}
  #print-area{display:block!important}
  .pr-page{page-break-after:always}
  .pr-page:last-child{page-break-after:avoid}
}
#print-area{display:none}
/* SVG */
.ico{display:inline-block;width:16px;height:16px;vertical-align:middle;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.ico-lg{width:19px;height:19px}
.ico-sm{width:14px;height:14px}
.ico-xs{width:12px;height:12px}
.sortable-ghost{opacity:.3;background:var(--accent-bg)!important;border-color:var(--accent)!important}
@keyframes spin{to{transform:rotate(360deg)}}
.sort-handle{cursor:grab;user-select:none;display:inline-flex;align-items:center}.sort-handle:active{cursor:grabbing}

/* ══ AUTH ══ */
#auth-overlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column}
#auth-overlay.hidden{display:none}
.auth-box{background:var(--panel);border:1px solid var(--border);border-radius:var(--r2);padding:36px 40px;width:340px;box-shadow:var(--shadow2);text-align:center}
.auth-box .logo-mark{margin:0 auto 16px;width:44px;height:44px;font-size:16px;border-radius:10px}
.auth-error{color:var(--red);font-size:12px;margin-top:8px;min-height:16px}
</style>
</head>

<script>
/* PV — sous-application « comptes-rendus de chantier », 100 % locale (localStorage).
   Pas de backend : la synchronisation se fait au niveau de l'app hôte (Archisync). */
/* ══ UTILS ══ */
function ico(id,cls=''){return`<svg class="ico ${cls}"><use href="#i-${id}"/></svg>`;}
function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
// "dirty" here means: saved (localStorage + Supabase) but NOT yet reflected in
// the last exported PDF. markDirty() persists immediately; the indicator only
// signals that a fresh PDF export would differ from the current data.
// Ensemble des CRs réellement modifiés sur CET appareil et pas encore
// synchronisés. Évite qu'un appareil ayant une copie périmée d'un AUTRE CR
// n'écrase le serveur en repoussant tout le tableau (perte de données).
let _dirtyCRIds = new Set();
function markDirty(crId){
  isDirty=true;
  const d=document.getElementById('dirty-dot');
  if(d)d.style.display='inline-flex';
  // Si on connaît le CR concerné, ne marquer que celui-là ; sinon, repli sur
  // le CR actif (la quasi-totalité des mutations agissent sur le CR ouvert).
  const id = crId || activeCR;
  if(id) _dirtyCRIds.add(id);
  saveCRS(id);
}
function markClean(){isDirty=false;const d=document.getElementById('dirty-dot');if(d)d.style.display='none';}
function toast(msg,color){
  const t=document.getElementById('toast');
  t.className='toast';
  // Accept legacy color arg or a semantic type ('success'|'error'|'info')
  if(color==='error'||color==='var(--red)') t.classList.add('toast-error');
  else if(color==='info'||color==='neutral') t.classList.add('toast-info');
  else if(color&&color.indexOf('--')===-1&&color!=='success') t.style.background=color;
  else t.classList.add('toast-success');
  t.innerHTML='<span>'+e(msg)+'</span>';
  t.style.opacity='1';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.style.opacity='0',2200);
}
/* Undo toast: shows an "Annuler" action for ~5s. onUndo runs if clicked. */
let _undoTimer=null;
function undoToast(msg,onUndo,ms){
  ms=ms||5000;
  const t=document.getElementById('toast');
  t.className='toast toast-info';
  t.style.background='';
  t.innerHTML='<span>'+e(msg)+'</span><button type="button" class="toast-undo" id="toast-undo-btn">Annuler</button>';
  t.style.opacity='1';
  t.style.pointerEvents='auto';
  clearTimeout(_undoTimer);
  clearTimeout(t._timer);
  const btn=document.getElementById('toast-undo-btn');
  if(btn) btn.onclick=function(){
    clearTimeout(_undoTimer);
    t.style.opacity='0';t.style.pointerEvents='none';
    try{onUndo&&onUndo();}catch(err){console.warn(err);}
  };
  _undoTimer=setTimeout(function(){t.style.opacity='0';t.style.pointerEvents='none';},ms);
}
function showModal(html){document.getElementById('modal-root').innerHTML=`<div class="mo-ov" onclick="if(event.target===this)closeModal()"><div class="mo-box" onclick="event.stopPropagation()">${html}</div></div>`;}
function closeModal(){document.getElementById('modal-root').innerHTML='';}
/* ── Mobile off-canvas sidebar ── */
function toggleSidebar(force){
  const sb=document.querySelector('.sidebar');
  const bd=document.getElementById('sidebar-backdrop');
  if(!sb)return;
  const open=(force===undefined)?!sb.classList.contains('open'):!!force;
  sb.classList.toggle('open',open);
  if(bd)bd.classList.toggle('show',open);
}
let uid=100;

/* ══ LOT COLORS ══ */
const LOT_COLORS={
  'MOE':'#7a9db5','INGENIEUR':'#1a7a4a','GEOLOGUE':'#6b3fa0',
  'MACONNERIE':'#c47a00','ELECTRICITE':'#f59f00','PLOMBERIE':'#0891b2',
  'CVC':'#0891b2','MENUISERIE EXT.':'#c47a00','MENUISERIE INT.':'#8a877e',
  'PEINTURE':'#e91e8c','FERRONERIE':'#495057','CARRELAGE':'#c0392b',
  'VOLETS':'#7a9db5','CLIENT':'#c0392b','URBANISME':'#6b3fa0',
  'THERMICIEN':'#e67700','MICROPIEUX':'#1a7a4a','CUISINE':'#c47a00',
  'DEFAULT':'#8a877e'
};
function lotColor(lot){
  for(const k of Object.keys(LOT_COLORS)){if(lot.toUpperCase().includes(k))return LOT_COLORS[k];}
  return LOT_COLORS.DEFAULT;
}
// Centralized color resolver: lot→intervenant→derived
// Couleur sûre : empêche l'injection CSS via une couleur importée (les couleurs
// alimentent des attributs style=). On n'autorise que hex / rgb / var(--…).
function _safeColor(c){c=String(c==null?'':c).trim();if(/^#[0-9a-fA-F]{3,8}$/.test(c))return c;if(/^rgba?\(\s*\d{1,3}\s*,\s*\d{1,3}\s*,\s*\d{1,3}(\s*,\s*(0|1|0?\.\d+))?\s*\)$/.test(c))return c;if(/^var\(--[\w-]+\)$/.test(c))return c;return LOT_COLORS.DEFAULT;}
function getColor(obj, cr){ return _safeColor(_rawColor(obj,cr)); }
function _rawColor(obj, cr){
  if(!cr) return LOT_COLORS.DEFAULT;
  // If it's a lot — get from its linked intervenant
  if(obj && obj.intId !== undefined){
    const int=cr.intervenants.find(function(i){return i.id===obj.intId;});
    if(int) return int.color||lotColor(int.lot);
    return obj.color||lotColor(obj.titre||'');
  }
  // If it's an intervenant
  if(obj && obj.id && obj.lot !== undefined){
    return obj.color||lotColor(obj.lot);
  }
  return LOT_COLORS.DEFAULT;
}

/* ══ DATA ══ */
let CRS = [];
// ── Persistence ──────────────────────────────────────────────────────
// CRs are stored in localStorage under 'plansync_crs'.
// The source code ships no real project data.
// If saved user data exists, it is loaded and no default is injected.
// If no saved data exists, a generic starter project is shown.
(function(){
  try {
    const saved = localStorage.getItem('plansync_crs');
    if(saved){
      const parsed = JSON.parse(saved);
      if(Array.isArray(parsed) && parsed.length > 0){
        CRS = parsed;
        return; // user data loaded — do not inject default
      }
    }
  } catch(e) {
    console.warn('PlanSync: could not load saved CRs:', e);
  }
  // Si l'exemple de démonstration a été supprimé explicitement, ne pas le
  // réinjecter : on laisse l'espace vide (l'utilisateur créera ses propres CR).
  try { if(localStorage.getItem('plansync_demo_deleted')==='1'){ CRS=[]; return; } } catch(e) {}
  // No saved data — inject a clean generic starter project
  CRS = [{
    id:'cr_modele',
    projet:'Projet modèle',
    adresse:'Adresse du chantier',
    date:(function(){var d=new Date();return d.toLocaleDateString('fr-FR');})(),
    dateProchaine:'',
    numero:1,
    redacteur:'Rédacteur',
    statut:'draft',
    intervenants:[
      {id:'im1',lot:'Maîtrise d\'œuvre',entreprise:'Cabinet Architecte',contacts:'Architecte référent',color:'#7a9db5',present:true,convoque:true},
      {id:'im2',lot:'Lot Gros Œuvre',entreprise:'Entreprise GO',contacts:'Chef de chantier',color:'#c47a00',present:true,convoque:true},
      {id:'im3',lot:'Lot Électricité',entreprise:'Entreprise Élec',contacts:'Responsable technique',color:'#f59f00',present:false,convoque:true},
    ],
    lots:[
      {id:'lm1',titre:'Gros Œuvre',ouvert:true,intId:'im2',remarques:[
        {id:'rm1',texte:'Vérifier le ferraillage de la dalle avant coulage.',done:false,flag:true,decision:false,archived:false,createdAt:(function(){var d=new Date();return d.toLocaleDateString('fr-FR');})()},
        {id:'rm2',texte:'Nettoyage de la zone de coffrage effectué.',done:true,flag:false,decision:false,archived:false,createdAt:(function(){var d=new Date();return d.toLocaleDateString('fr-FR');})(),doneAt:(function(){var d=new Date();return d.toLocaleDateString('fr-FR');})()},
      ]},
      {id:'lm2',titre:'Électricité',ouvert:true,intId:'im3',remarques:[
        {id:'rm3',texte:'Réservations pour passage des gaines à confirmer avec l\'architecte.',done:false,flag:false,decision:false,archived:false,createdAt:(function(){var d=new Date();return d.toLocaleDateString('fr-FR');})()},
      ]},
      {id:'lm3',titre:'Coordination générale',ouvert:true,intId:'im1',remarques:[]},
    ],
    actions:[
      {id:'am1',texte:'Transmettre le plan de coffrage mis à jour.',responsable:'Entreprise GO',intId:'im2',echeance:'',done:false},
    ],
  }];
})();

// Repositionne le compteur d'ids au-delà du plus grand suffixe numérique déjà présent,
// pour éviter les collisions d'ids entre sessions (uid repart de 100 à chaque chargement).
(function bumpUid(){
  var max=uid-1;
  function scan(o){
    if(!o||typeof o!=='object')return;
    if(Array.isArray(o)){o.forEach(scan);return;}
    Object.keys(o).forEach(function(k){
      var v=o[k];
      if(k==='id'&&typeof v==='string'){var m=v.match(/(\d+)$/);if(m){var n=parseInt(m[1],10);if(!isNaN(n)&&n>max)max=n;}}
      else if(v&&typeof v==='object')scan(v);
    });
  }
  try{scan(CRS);}catch(e){console.warn('[PV bumpUid]',e);}
  uid=max+1;
})();

loadCROrder();
_loadTombstones();

// Migration: assign projetId to existing CRs grouped by project name
(function migrateProjIds(){
  const nameToId={};
  CRS.forEach(function(cr){
    if(cr.projetId) return;
    const key=(cr.projet||'').trim().toLowerCase();
    if(!nameToId[key]) nameToId[key]='p'+(Math.random().toString(36).slice(2,9));
    cr.projetId=nameToId[key];
  });
  try{ localStorage.setItem('plansync_crs',JSON.stringify(CRS)); }catch(e){}
})();

/* ══ TEMPLATES ══ */
// Load saved templates from localStorage
let TEMPLATES = [];
try {
  const saved = localStorage.getItem('plansync_cr_templates');
  if (saved) TEMPLATES = JSON.parse(saved);
} catch(e) { TEMPLATES = []; }

// Tombstone: persistent list of deleted PV ids — prevents refresh AND a stale
// device's sync from silently re-adding a CR that was deleted elsewhere.
// Previously these expired after 24h, which let a stale device re-insert a
// deleted row once the window passed. Tombstones are now kept indefinitely
// (capped at 500 most-recent entries) and only the in-memory Set is consulted
// for the session; deletions therefore stay deleted across devices.
const _deletedPVIds = new Set();
const _TOMB_MAX = 500;
function _tombstone(crId) {
  _deletedPVIds.add(crId);
  try {
    let saved = JSON.parse(localStorage.getItem('plansync_deleted_ids')||'[]');
    // normalize legacy entries {id,at} and bare strings
    saved = saved.filter(function(x){ return x && (x.id || typeof x==='string'); });
    if(!saved.some(function(x){return (x.id||x)===crId;})) saved.push({id:crId, at:Date.now()});
    // keep only the most recent _TOMB_MAX, never expire by time
    if(saved.length > _TOMB_MAX) saved = saved.slice(saved.length - _TOMB_MAX);
    localStorage.setItem('plansync_deleted_ids', JSON.stringify(saved));
  } catch(e){}
}
function _loadTombstones() {
  try {
    const saved = JSON.parse(localStorage.getItem('plansync_deleted_ids')||'[]');
    saved.forEach(function(x){ _deletedPVIds.add(x.id||x); });
  } catch(e){}
}

// Échec d'écriture localStorage (quota saturé) : prévient l'utilisateur UNE fois
// par session pour ne pas spammer, mais ne pas laisser une perte de données silencieuse.
var _pvSaveFailWarned=false;
function _warnSaveFailed(){
  if(_pvSaveFailWarned)return; _pvSaveFailWarned=true;
  try{ toast('Enregistrement local impossible (stockage saturé). Exportez vos CR et libérez de l\'espace.','error'); }catch(e){}
}
function saveCRS(changedId) {
  const now = new Date().toISOString();
  // Déterminer le CR concerné : explicite, sinon le CR actif.
  const id = changedId || activeCR;
  if(id) _dirtyCRIds.add(id);
  // N'horodater QUE le(s) CR(s) modifié(s) sur cet appareil. Re-stamper tous
  // les CRs ferait gagner un faux "plus récent" à des copies périmées et
  // écraserait le travail des autres au prochain merge/sync.
  if(id){
    const cr=CRS.find(function(c){return c.id===id;});
    if(cr) cr._updatedAt=now;
  }
  // Tout CR déjà marqué sale est aussi (re)horodaté pour rester cohérent.
  CRS.forEach(function(cr){ if(_dirtyCRIds.has(cr.id)) cr._updatedAt=cr._updatedAt||now; });
  // 1. localStorage immédiat (tout le tableau, sans danger en local)
  try { localStorage.setItem('plansync_crs', JSON.stringify(CRS)); }
  catch(e) { console.warn('PlanSync: localStorage save error:', e); _warnSaveFailed(); }
  // 2. Supabase en arrière-plan — uniquement les CRs modifiés ici
  _syncToSupabase();
}
// Forcer la synchro de TOUS les CRs (import, restauration) — usage rare.
function _syncAll(){ CRS.forEach(function(cr){ _dirtyCRIds.add(cr.id); }); _syncToSupabase(); }

/* ══ STOCKAGE LOCAL (ex-Supabase) ══
   PV est désormais 100% local (localStorage). Aucune authentification,
   aucune synchronisation cloud. Les anciennes fonctions de sync Supabase
   restent présentes mais inertes (getSupabase() renvoie null). */
const LEGACY_USER = 'local';
// Identité locale fixe — encore référencée par les lignes techniques __order__.
function currentUserId(){ return LEGACY_USER; }

// Garde d'interface (confort) — l'enforcement réel est dans les politiques RLS.
function guardEdit(crId){
  crId=crId||activeCR;
  if(!canEdit(crId)){ toast('Vous n\'avez pas les droits pour modifier ce CR.','error'); return false; }
  return true;
}
function guardDelete(crId){
  crId=crId||activeCR;
  if(!canDelete(crId)){ toast('Seuls l\'admin et les éditeurs peuvent supprimer.','error'); return false; }
  return true;
}
function guardSettings(crId){
  crId=crId||activeCR;
  if(!canEditSettings(crId)){ toast('Réglages réservés à l\'admin et aux éditeurs.','error'); return false; }
  return true;
}

/* ══ RÔLES (vestige local) ══
   PV étant 100 % local, _myRole reste null → _noRoleModel() accorde tous les droits.
   Les fonctions canEdit/canDelete/… sont conservées (appelées par l'UI) mais
   renvoient toujours vrai en local. */
let _myRole = null;            // toujours null en local
let _myGrantsByCR = new Map(); // crId -> 'editor'|'contributor'|'viewer' (per-CR role)
function isAdmin(){ return _myRole==='admin'; }
// Avant la migration (tables profiles/cr_access absentes), _myRole reste null :
// on n'impose alors aucune restriction d'interface (les RLS ne filtrent pas non
// plus tant qu'elles ne sont pas créées). Dès qu'un rôle existe, on l'applique.

// ── Numérotation des CR (unicité par projet) ────────────────────────────
// Plus haut numéro utilisé dans un projet (hors lignes techniques __order__).
function _maxNumeroInProject(projetId, excludeId){
  return CRS.filter(function(c){
      return c.projetId===projetId && c.id!==excludeId && c.id.indexOf('__order__')!==0;

}


let _supa = null;
let _pendingSync = false;

// PV est local-first : pas de backend. Toutes les fonctions de sync qui
// appellent getSupabase() deviennent ainsi des no-op (elles font « if(!sb) return »).
function getSupabase(){ return null; }

let _crOwners = {}; // cr_id -> user_id (creator/owner), learned from fetch

// Fusion douce de deux versions d'un même CR pour limiter les pertes quand deux
// personnes éditent le MÊME CR presque simultanément. Principe : on part de NOTRE
// version (celle qu'on enregistre) et on ré-injecte les éléments présents côté
// serveur que nous n'avons pas (ajouts de l'autre personne), par identifiant.
// Cela préserve les ajouts des deux côtés. Les modifications d'un MÊME élément
// restent en "dernier qui écrit gagne".
function _mergeCRForSave(mine, server){
  if(!server) return mine;
  function unionById(localArr, serverArr){
    localArr = localArr||[]; serverArr = serverArr||[];
    const seen={}; localArr.forEach(function(x){ if(x&&x.id) seen[x.id]=true; });
    const extra = serverArr.filter(function(x){ return x&&x.id&&!seen[x.id]; });
    return localArr.concat(extra);
  }
  const out = Object.assign({}, mine);
  // Intervenants
  out.intervenants = unionById(mine.intervenants, server.intervenants);
  // Actions
  out.actions = unionById(mine.actions, server.actions);
  // Lots (+ remarques par lot)
  const myLots = mine.lots||[]; const svLots = server.lots||[];
  const svLotById={}; svLots.forEach(function(l){ if(l&&l.id) svLotById[l.id]=l; });
  const myLotIds={}; myLots.forEach(function(l){ if(l&&l.id) myLotIds[l.id]=true; });
  out.lots = myLots.map(function(l){
    const sv=svLotById[l.id];
    if(!sv) return l;
    const m=Object.assign({}, l);
    m.remarques = unionById(l.remarques, sv.remarques);
    return m;
  }).concat(svLots.filter(function(l){ return l&&l.id&&!myLotIds[l.id]; }));
  return out;
}

async function _syncToSupabase(){
  const sb = getSupabase();
  if(!sb) return;
  _pendingSync = true;
  try {
    // Ne pousser QUE les CRs modifiés sur cet appareil (et non tombstonés).
    // Le CR de démonstration 'cr_modele' n'est JAMAIS synchronisé (données fictives).
    const toPush = CRS.filter(function(cr){
      return cr.id!=='cr_modele' && _dirtyCRIds.has(cr.id) && !_deletedPVIds.has(cr.id);
    });
    for(const cr of toPush){
      const ts = cr._updatedAt || new Date().toISOString();
      let error=null;
      if(_crOwners[cr.id]){
        // CR déjà présent sur le serveur → relire d'abord la version serveur et
        // fusionner les ajouts éventuels d'une autre personne, puis UPDATE.
        let payload = cr;
        try{
          const cur = await sb.from('crs').select('data').eq('id', cr.id).maybeSingle();
          if(cur && cur.data && cur.data.data){
            payload = _mergeCRForSave(cr, cur.data.data);
            // Refléter la fusion en local pour rester cohérent à l'écran.
            const li = CRS.findIndex(function(x){return x.id===cr.id;});
            if(li>=0){ payload._updatedAt = ts; CRS[li]=payload; }
          }
        }catch(e){ console.warn('[_syncToSupabase] lecture pré-fusion échouée, push du payload local', cr.id, e); }
        // UPDATE (autorisé éditeur/contributeur). Pas d'upsert : éviterait la
        // policy INSERT réservée à l'admin.
        const r = await sb.from('crs').update({ data: payload, updated_at: ts }).eq('id', cr.id);
        error = r.error;
      } else {
        // Nouveau CR → INSERT (réservé à l'admin par la RLS).
        const r = await sb.from('crs').insert([{ id: cr.id, user_id: currentUserId(), data: cr, updated_at: ts }]);
        error = r.error;
        if(!error) _crOwners[cr.id] = currentUserId();
      }
      if(error){ console.warn('PlanSync: sync error', cr.id, error.message); }
      else { _dirtyCRIds.delete(cr.id); }
    }
  } catch(e) { console.warn('PlanSync: Supabase unreachable:', e.message); }
  finally { _pendingSync = false; }
}

async function _deleteFromSupabase(crId){
  const sb = getSupabase();
  if(!sb) return;
  try {
    // RLS enforces who may delete (admin or editor with a grant).
    await sb.from('crs').delete().eq('id', crId);
  } catch(e) {}
}

async function refreshFromStorage(){
  const sb = getSupabase();
  if(sb){
    // Si un sync est en cours, l'attendre d'abord (max 3s)
    if(_pendingSync){
      await new Promise(function(resolve){setTimeout(resolve, 3000);});
    }
    try {
      // Plus de filtre user_id : les politiques RLS renvoient uniquement les CRs
      // visibles par le membre (admin = tout ; sinon CRs partagés via cr_access).
      let { data, error } = await sb
        .from('crs')
        .select('id, data, updated_at, user_id')
        .order('updated_at', { ascending: false });
      // Filtre client de confort (l'enforcement réel reste côté RLS).
      if(!error && data && !isAdmin() && _myRole!==null){
        data = data.filter(function(row){ return row.id.indexOf('__order__')===0 || canSeeCR(row.id); });
      }
      if(!error && data && data.length){
        // Remove tombstoned rows before merging
        data = data.filter(function(row){return !_deletedPVIds.has(row.id);});
        // Merge: pour chaque CR, prendre la version la plus récente
        // entre Supabase et localStorage (par updated_at)
        // Skip any IDs that were deleted this session (tombstone)
        const localRaw = localStorage.getItem('plansync_crs');
        const localCRS = localRaw ? JSON.parse(localRaw) : [];
        const localMap = {};
        localCRS.forEach(function(cr){ localMap[cr.id] = cr; });

        const merged = [];
        const seenIds = new Set();
        let conflictOnActive = false;

        data.forEach(function(row){
          // The special "__order__*" rows carry sidebar ordering, not a CR.
          if(row.id.indexOf('__order__')===0){
            if(row.id==='__order__'+currentUserId() || row.id==='__order__'){
              if(row.data && Array.isArray(row.data.order)){ CR_ORDER=row.data.order; }
            }
            return;
          }
          if(row.user_id) _crOwners[row.id]=row.user_id;
          const remoteUpdated = new Date(row.updated_at).getTime();
          const local = localMap[row.id];
          const localUpdated = (local && local._updatedAt) ? new Date(local._updatedAt).getTime() : 0;
          if(!local){
            // Aucune copie locale : prendre la version serveur.
            merged.push(row.data);
          } else {
            // Les deux existent : FUSIONNER par identifiant pour ne perdre
            // aucun ajout (tâches/remarques/intervenants/lots) d'un côté ni de
            // l'autre, quel que soit l'horodatage. Base = la version la plus
            // récente ; on ré-injecte les éléments présents dans l'autre.
            let base, other;
            if(localUpdated >= remoteUpdated){ base=local; other=row.data; }
            else { base=row.data; other=local; }
            const mergedCR = _mergeCRForSave(base, other);
            // Conserver l'horodatage le plus récent des deux.
            mergedCR._updatedAt = (localUpdated>=remoteUpdated? (local._updatedAt) : row.updated_at);
            // Si la fusion ajoute du contenu absent côté serveur, re-marquer le
            // CR comme à synchroniser pour que le serveur reçoive l'union.
            try{
              const srv=JSON.stringify(Object.assign({},row.data,{_updatedAt:0}));
              const mrg=JSON.stringify(Object.assign({},mergedCR,{_updatedAt:0}));
              if(srv!==mrg){ _dirtyCRIds.add(row.id); }
            }catch(e){}
            // Si le CR ouvert a un contenu réellement différent côté serveur,
            // signaler (info) — mais on ne perd plus rien grâce à la fusion.
            if(row.id===activeCR && remoteUpdated!==localUpdated){
              try{
                const a=JSON.stringify(Object.assign({},local,{_updatedAt:0}));
                const b=JSON.stringify(Object.assign({},row.data,{_updatedAt:0}));
                if(a!==b) conflictOnActive = true;
              }catch(e){}
            }
            // Si la version locale n'est pas encore synchronisée, la garder sale
            // pour que la fusion reparte vers le serveur.
            if(_dirtyCRIds.has(row.id)){ /* reste à pousser */ }
            merged.push(mergedCR);
          }
          seenIds.add(row.id);
        });

        // Ajouter les CRs locaux qui ne sont pas encore dans Supabase
        localCRS.forEach(function(cr){
          if(!seenIds.has(cr.id)) merged.push(cr);
        });

        CRS = merged;
        try { localStorage.setItem('plansync_crs', JSON.stringify(CRS)); }
        catch(e) { console.warn('PlanSync: merge persist failed', e); _warnSaveFailed(); }
        // Pousser les CRs locaux manquants vers Supabase
        _syncToSupabase();
        if(conflictOnActive){
          // Non-destructive notice: the on-screen CR was updated elsewhere and
          // has been refreshed to the latest version. Surfaced instead of a
          // silent last-write-wins so the user knows their view changed.
          setTimeout(function(){
            toast('Ce CR a été modifié sur un autre appareil — affichage mis à jour.','info');
          },300);
        }
      } else {
        const saved = localStorage.getItem('plansync_crs');
        if(saved) CRS = JSON.parse(saved).filter(function(cr){return !_deletedPVIds.has(cr.id);});
      }
    } catch(e) {
      const saved = localStorage.getItem('plansync_crs');
      if(saved) CRS = JSON.parse(saved).filter(function(cr){return !_deletedPVIds.has(cr.id);});
    }
  } else {
    const saved = localStorage.getItem('plansync_crs');
    if(saved) CRS = JSON.parse(saved);
  }
  // Re-read order + templates + PDF settings
  loadCROrder();
  try {
    const tpl = localStorage.getItem('plansync_cr_templates');
    if(tpl) TEMPLATES = JSON.parse(tpl);
  } catch(e) { console.warn('[PV] modèles CR illisibles — valeurs par défaut', e); }
  try {
    const ps = localStorage.getItem('plansync_pdf_settings');
    if(ps) Object.assign(PDF_SETTINGS, JSON.parse(ps));
  } catch(e) { console.warn('[PV] réglages PDF illisibles — valeurs par défaut', e); }
  // Keep activeCR if still exists
  if(activeCR && !CRS.find(function(c){return c.id===activeCR;})){
    activeCR = CRS.length ? CRS[0].id : null;
  } else if(!activeCR && CRS.length){
    activeCR = CRS[0].id;
  }
  updateSidebarLogo();
  renderList();
  if(activeCR) renderCR();
  else {
    const content = document.getElementById('content');
    if(content) content.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:13px">Sélectionnez un CR ou créez-en un nouveau.</div>';
    const tabbar = document.getElementById('tabbar');
    if(tabbar) tabbar.style.display = 'none';
  }
}

function applyCROrder(list){
  // Sort list by CR_ORDER; unknown ids go to end
  if(!CR_ORDER.length) return list;
  const pos={};
  CR_ORDER.forEach(function(id,i){ pos[id]=i; });
  return list.slice().sort(function(a,b){
    const pa=pos[a.id]!==undefined?pos[a.id]:9999;
    const pb=pos[b.id]!==undefined?pos[b.id]:9999;
    return pa-pb;
  });
}

let activeCR=null;
let activeTab='remarques';
let searchQuery='';
let showHistory=false;

let quickFilter='all'; // all | flag | open | done

// Domaine e-mail du cabinet — conservé uniquement pour dériver le nom du
// cabinet par défaut (voir firmDisplayName). L'authentification Supabase a été
// retirée : PV est local-first.
const LOGIN_DOMAIN = 'bell-architecture.com';

// Appelé une fois la session Supabase établie (connexion ou session restaurée).
/* ══ DÉMARRAGE LOCAL (remplace l'authentification Supabase) ══
   PV démarre directement sur l'éditeur, sans écran de connexion ni réseau.
   Mode embarqué : Archisync passe ?pid=&projet=&adresse= dans l'URL de l'iframe.
   On borne alors la vue au projet courant, et le nom + l'adresse des CR sont
   pilotés par « Informations projet » côté Archisync (source unique de vérité). */
let hostProject = null;     // { id, projet, adresse } transmis par Archisync (mode embarqué)
let hostAnnuaire = [];      // annuaire du projet (Archisync) → intervenants PV

// Un CR appartient-il au projet hôte courant ? (id stable, repli sur le nom)
function _belongsToHost(cr){
  if(!hostProject) return true;
  // id stable des deux côtés → l'id fait foi.
  if(hostProject.id && cr.hostProjId) return cr.hostProjId === hostProject.id;
  // CR hérité/importé sans hostProjId : on n'accepte que si le NOM correspond
  // (insensible à la casse), pour ne jamais mélanger deux projets distincts.
  return (cr.projet||'').trim().toLowerCase() === (hostProject.projet||'').trim().toLowerCase();
}

// Clé de rapprochement annuaire ↔ intervenant (entreprise + lot/métier).
function _intKey(entreprise,lot){ return ((entreprise||'')+'|'+(lot||'')).trim().toLowerCase(); }

// En mode embarqué, la LISTE des intervenants/entreprises est pilotée par
// « Accès & permissions » / « Annuaire du projet » côté Archisync : on ne peut
// ni ajouter, ni supprimer, ni renommer un intervenant depuis PV (on garde la
// présence et la convocation, propres à chaque réunion).
function canManageIntervenants(){ return !hostProject; }
function _intervenantsLockedToast(){
  toast('Les intervenants se gèrent dans « Annuaire & rôles » (Archisync).','info');
}

// Transforme une entrée d'annuaire en intervenant PV (id frais).
function _seedIntervenant(a){
  return { id:'i'+(uid++), srcId:a.srcId||'', lot:a.lot||'', entreprise:a.entreprise||'', contacts:a.contacts||'',
           color:a.color||'', present:false, convoque:true };
}

// Relit l'annuaire déposé par Archisync (au cas où l'Équipe a changé depuis le
// montage de l'iframe). Sans effet hors mode embarqué.
function _reloadHostAnnuaire(){
  if(!hostProject) return;
  try{
    var raw=localStorage.getItem('plansync_host_annuaire');
    if(raw){
      var obj=JSON.parse(raw);
      if(obj && Array.isArray(obj.list) && (!obj.pid || !hostProject.id || obj.pid===hostProject.id)) hostAnnuaire=obj.list;
    }
  }catch(e){ console.warn('[_reloadHostAnnuaire] annuaire localStorage illisible — ignoré', e); }
}

// En ouverture locale (file://), le shell et cette iframe N'ONT PAS le même
// localStorage : l'annuaire écrit par Archisync est invisible ici. Le shell nous
// l'envoie donc aussi par postMessage. On l'applique et on re-fusionne dans le CR ouvert.
function _applyHostAnnuaire(list,pid){
  if(!Array.isArray(list))return;
  if(hostProject && hostProject.id && pid && pid!==hostProject.id) return;
  hostAnnuaire=list;
  try{
    var cr=(typeof activeCR!=='undefined')?CRS.find(function(c){return c.id===activeCR;}):null;
    if(cr && (typeof _belongsToHost!=='function' || _belongsToHost(cr))){
      if(_mergeAnnuaireIntoCR(cr)) saveCRS(cr.id);
    }
  }catch(e){ console.warn('[PV] fusion annuaire échouée', e); }
  // renderCR HORS du try : on ré-affiche toujours, même si la fusion a échoué.
  try{ if(typeof renderCR==='function') renderCR(); }catch(e){ console.warn('[PV] renderCR', e); }
}
window.addEventListener('message',function(e){
  try{
    // n'accepter que les messages du shell parent (rejette aussi e.source null)
    if(!e.source || e.source!==window.parent) return;
    // Défense en profondeur en http(s) : exiger la même origine (en file:// l'origine vaut "null").
    if(location.protocol!=='file:' && e.origin!==location.origin) return;
    var d=e.data;
    if(!d || d.type!=='archisync-annuaire' || !Array.isArray(d.list)) return;
    _applyHostAnnuaire(d.list, d.pid);
  }catch(err){ console.warn('[PV] message annuaire ignoré', err); }
});

// Reflète l'annuaire du projet dans les intervenants du CR : lien 1:1 par id
// (srcId) — ajoute les nouveaux ET met à jour entreprise/lot/contacts/couleur des
// existants. La présence/convocation (propre à la réunion) est conservée, et on
// ne supprime jamais (historique + ajouts manuels préservés). CR archivés figés.
function _mergeAnnuaireIntoCR(cr){
  if(!cr || cr.statut==='archived' || !hostAnnuaire.length) return false;
  let changed=false;
  // Migration : relie d'abord les intervenants hérités (sans srcId) à l'annuaire
  // par entreprise+lot, pour éviter tout doublon lors d'un renommage ultérieur.
  (function backlink(){
    var bySrcId={}; hostAnnuaire.forEach(function(a){ if(a.srcId)bySrcId[a.srcId]=true; });
    var annByKey={}; hostAnnuaire.forEach(function(a){ if(a.srcId)annByKey[_intKey(a.entreprise,a.lot)]=a.srcId; });
    cr.intervenants.forEach(function(iv){
      if(!iv.srcId){ var sid=annByKey[_intKey(iv.entreprise,iv.lot)]; if(sid){ iv.srcId=sid; changed=true; } }
    });
  })();
  const bySrc={}, byKey={};
  cr.intervenants.forEach(function(iv){ if(iv.srcId)bySrc[iv.srcId]=iv; byKey[_intKey(iv.entreprise,iv.lot)]=iv; });
  hostAnnuaire.forEach(function(a){
    if(!a.entreprise && !a.lot) return;
    // Lien prioritaire par srcId (id stable de l'annuaire). On ne rapproche par
    // entreprise+lot QUE pour adopter un intervenant hérité sans srcId — sinon deux
    // personnes partageant entreprise+métier seraient fusionnées par erreur.
    var iv;
    if(a.srcId){ iv=bySrc[a.srcId]; if(!iv){ var cand=byKey[_intKey(a.entreprise,a.lot)]; if(cand && !cand.srcId) iv=cand; } }
    else { iv=byKey[_intKey(a.entreprise,a.lot)]; }
    if(iv){
      // Lien établi → synchronise l'identité depuis l'annuaire (source unique).
      if(a.srcId&&iv.srcId!==a.srcId){ iv.srcId=a.srcId; changed=true; }
      if(iv.entreprise!==(a.entreprise||'')){ iv.entreprise=a.entreprise||''; changed=true; }
      if(iv.lot!==(a.lot||'')){ iv.lot=a.lot||''; changed=true; }
      if(a.contacts&&iv.contacts!==a.contacts){ iv.contacts=a.contacts; changed=true; }
      if(a.color&&iv.color!==a.color){ iv.color=a.color; changed=true; }
    } else {
      var ni=_seedIntervenant(a); cr.intervenants.push(ni);
      if(ni.srcId)bySrc[ni.srcId]=ni; byKey[_intKey(ni.entreprise,ni.lot)]=ni; changed=true;
    }
  });
  return changed;
}

// Crée silencieusement (sans modale) le CR n°1 du projet hôte, pré-rempli avec
// le nom, l'adresse et les intervenants (annuaire) du projet Archisync.
function _autoCreateHostCR(){
  const newCR = {
    id:'cr'+(uid++),
    projetId:'p'+(uid++),
    hostProjId: hostProject.id||'',
    projet: hostProject.projet,
    adresse: hostProject.adresse||'',
    date: new Date().toLocaleDateString('fr-FR'),
    dateProchaine:'',
    numero:1,
    redacteur:'',
    statut:'draft',
    intervenants: hostAnnuaire.map(_seedIntervenant),
    lots:[],
    actions:[],
  };
  CRS.unshift(newCR);
  saveCRS(newCR.id);
  return newCR.id;
}

function bootLocal(){
  // Identité du projet hôte transmise par Archisync via l'URL de l'iframe.
  try{
    const qs = new URLSearchParams(location.search);
    const pj = qs.get('projet');
    if(pj){
      hostProject = { id: qs.get('pid')||'', projet: pj, adresse: qs.get('adresse')||'' };
    }
  }catch(e){}

  if(hostProject){
    document.body.classList.add('embed');
    // Annuaire du projet déposé par Archisync (même origine). On ne l'utilise
    // que s'il correspond bien au projet courant.
    try{
      const raw=localStorage.getItem('plansync_host_annuaire');
      if(raw){
        const obj=JSON.parse(raw);
        if(obj && Array.isArray(obj.list) && (!obj.pid || !hostProject.id || obj.pid===hostProject.id)){
          hostAnnuaire = obj.list;
        }
      }
    }catch(e){}
    // Rattache et synchronise les CR du projet : nom + adresse suivent toujours
    // les « Informations projet » d'Archisync (y compris après un renommage).
    // On fusionne aussi l'annuaire dans les CR non archivés (« saisi une fois,
    // présent partout »).
    let touched = false;
    CRS.forEach(function(cr){
      if(cr.id.indexOf('__order__')===0 || !_belongsToHost(cr)) return;
      if(hostProject.id && cr.hostProjId !== hostProject.id){ cr.hostProjId = hostProject.id; touched = true; }
      if(cr.projet !== hostProject.projet){ cr.projet = hostProject.projet; touched = true; }
      if(hostProject.adresse && cr.adresse !== hostProject.adresse){ cr.adresse = hostProject.adresse; touched = true; }
      if(_mergeAnnuaireIntoCR(cr)) touched = true;
    });
    if(touched) saveCRS();
  }

  updateFavicon();
  updateSidebarLogo();
  // _myRole reste null => _noRoleModel() accorde tous les droits en local.
  renderList();

  // Ouvre directement l'éditeur : on sélectionne le CR du projet, ou on en crée
  // un automatiquement (n°1, pré-rempli) — pas d'écran « Créer un PV ».
  const visible = CRS.filter(function(c){ return c.id.indexOf('__order__')!==0 && _belongsToHost(c); });
  let firstId = (activeCR && visible.find(function(c){return c.id===activeCR;})) ? activeCR
              : (visible.length ? visible[0].id : null);
  if(!firstId && hostProject) firstId = _autoCreateHostCR();
  if(firstId) openCR(firstId);
  maybeShowOnboarding();
}

/* ══ ONBOARDING (première utilisation) ══ */
function maybeShowOnboarding(){
  // Mode embarqué : l'onboarding (présentation cabinet, création de projet) est
  // géré par Archisync — on ne l'affiche jamais dans l'iframe PV.
  if(hostProject){ try{ localStorage.setItem('plansync_onboarded','1'); }catch(e){} return; }
  try{ if(localStorage.getItem('plansync_onboarded')==='1') return; }catch(e){}
  // Only show when the user hasn't created real data yet (starter model only / empty).
  const real=CRS.filter(function(c){return c.id!=='cr_modele';});
  if(real.length>0){ try{localStorage.setItem('plansync_onboarded','1');}catch(e){} return; }
  showOnboarding();
}
function dismissOnboarding(){
  try{ localStorage.setItem('plansync_onboarded','1'); }catch(e){}
  closeModal();
}
