/* ══ SHARED PDF PAGINATION ══ */
// Legacy estimator kept as a fallback hint only. Real pagination now measures
// rendered block heights (see paginate() below) instead of guessing pixels.
function _estimateRmarkHeight(texte, images) {
  const LINE_H = 17;
  const CHARS_PER_LINE = 90;
  const lines = Math.ceil((texte||'').length / CHARS_PER_LINE) || 1;
  let h = lines * LINE_H + 8;
  if (images && images.length) h += Math.ceil(images.length / 3) * 110 + 8;
  return h;
}

// A4 portrait content area at the CSS px scale used by the print stylesheet.
// 210x297mm minus 12mm margins ≈ 186x273mm. At ~3.78px/mm that's ~703x1032px.
// We measure against PDF_PAGE_W and break before PDF_PAGE_H.
const PDF_PAGE_W = 703;   // content width in px (used by the measuring sandbox)
const PDF_PAGE_H = 1020;  // usable content height in px before a page break

// Measure the rendered height of an HTML fragment inside an off-screen A4-width
// sandbox. Returns a number of px. Falls back to a rough estimate if the DOM
// isn't available (should not happen in the browser).
let _measureSandbox = null;
function _measureBlock(html){
  try{
    if(!_measureSandbox){
      _measureSandbox=document.createElement('div');
      _measureSandbox.style.cssText='position:absolute;left:-99999px;top:0;visibility:hidden;'
        +'width:'+PDF_PAGE_W+'px;font-family:Arial,sans-serif;font-size:9pt;color:#000;';
      document.body.appendChild(_measureSandbox);
    }
    _measureSandbox.innerHTML='<div style="font-size:9pt">'+html+'</div>';
    return _measureSandbox.firstChild.offsetHeight || 0;
  }catch(e){ return 0; }
}

function buildPDFPages(cr) {
  const s = PDF_SETTINGS;
  const PAGE_STYLE = 'padding:20px;font-family:Arial,sans-serif;font-size:9pt;color:#000;page-break-after:always';

  function pageHeader(pageNum) {
    const leftCell = s.showLogoLeft
      ? (s.logoLeft
          ? `<td style="width:${s.logoLeftWidth||60}px;border:1px solid #000;padding:4px;text-align:center;vertical-align:middle"><img src="${s.logoLeft}" style="max-width:${(s.logoLeftWidth||60)-8}px;max-height:44px;object-fit:contain;display:block;margin:0 auto"></td>`
          : `<td style="width:${s.logoLeftWidth||60}px;border:1px solid #000;padding:6px;text-align:center;vertical-align:middle"><div style="font-weight:700;font-size:12pt">${e(s.firmName||'PS')}</div>${s.firmSub?`<div style="font-size:6pt;color:#555">${e(s.firmSub)}</div>`:''}</td>`)
      : `<td style="width:${s.logoLeftWidth||60}px;border:1px solid #000;padding:6px"></td>`;
    const rightCell = s.showLogoRight
      ? (s.logoRight
          ? `<td style="width:${s.logoRightWidth||60}px;border:1px solid #000;border-left:none;padding:4px;text-align:center;vertical-align:middle"><img src="${s.logoRight}" style="max-width:${(s.logoRightWidth||60)-8}px;max-height:44px;object-fit:contain;display:block;margin:0 auto"></td>`
          : `<td style="width:${s.logoRightWidth||60}px;border:1px solid #000;border-left:none;padding:6px;text-align:center;vertical-align:middle"><div style="font-weight:700;font-size:12pt">${e(s.firmName||'PS')}</div></td>`)
      : `<td style="width:${s.logoRightWidth||60}px;border:1px solid #000;border-left:none;padding:6px"></td>`;
    return `<table style="width:100%;border-collapse:collapse;margin-bottom:0">
      <tr>${leftCell}
        <td style="padding:8px 16px;border:1px solid #000;border-left:none;text-align:center">
          <div style="font-weight:700;font-size:12pt;letter-spacing:2px">${e(s.headerTitle||'COMPTE RENDU')}</div>
        </td>${rightCell}
      </tr>
    </table>
    <table style="width:100%;border-collapse:collapse;margin-bottom:10px">
      <tr><td colspan="2" style="padding:5px 8px;border:1px solid #000;border-top:none;font-size:9pt"><strong>PROJET : ${e(cr.projet)}</strong>&nbsp;&nbsp;&nbsp;${e(cr.adresse)}</td></tr>
      <tr>
        <td style="padding:5px 8px;border:1px solid #000;border-top:none;font-size:9pt;width:50%"><strong>DATE :</strong> ${e(cr.date)}</td>
        <td style="padding:5px 8px;border:1px solid #000;border-top:none;border-left:none;font-size:9pt"><strong>PROCHAINE RÉUNION :</strong> ${e(fmtMeetingDisplay(cr.dateProchaine)||'—')}</td>
      </tr>
    </table>
    <div style="text-align:right;font-size:7pt;color:#888;margin-bottom:4px">Page ${pageNum} / __TOTAL__</div>`;
  }

  function hexToLight(hex) {
    const h2=(hex||'#ccc').replace('#','');
    if(h2.length<6) return '#f0f0f0';
    const r=parseInt(h2.substr(0,2),16),g=parseInt(h2.substr(2,2),16),b=parseInt(h2.substr(4,2),16);
    return `rgb(${Math.round(r*.2+255*.8)},${Math.round(g*.2+255*.8)},${Math.round(b*.2+255*.8)})`;
  }

  // Collect blocks first, then paginate with measured heights. addBlock keeps
  // its old signature; the second arg is only a fallback hint. keepNext marks a
  // block (e.g. a lot/section header) that must not be the last on a page.
  const blocks = [];
  function addBlock(html, hintH, keepNext) {
    blocks.push({ html: html, hint: hintH||0, keepNext: !!keepNext, sectionBreak:false });
  }
  function flushPage() {
    // Marks a soft section boundary (intervenants / remarques / actions). The
    // packer starts a new page at these boundaries to mirror prior behavior.
    if(blocks.length && !blocks[blocks.length-1].sectionBreak)
      blocks.push({ html:'', hint:0, keepNext:false, sectionBreak:true });
  }

  // The packing routine; called at the end once all blocks are collected.
  function paginate(){
    const pages = [];
    let pageNum = 1;
    let current = [];
    let curH = 0;
    const headerH = _measureBlock(pageHeader(1)) || 150;
    const avail = PDF_PAGE_H - headerH;
    function flush(){
      if(!current.length) return;
      pages.push(`<div class="pr-page" style="${PAGE_STYLE}">${pageHeader(pageNum)}${current.map(function(b){return b.html;}).join('')}</div>`);
      pageNum++; current=[]; curH=0;
    }
    for(let i=0;i<blocks.length;i++){
      const b=blocks[i];
      if(b.sectionBreak){ flush(); continue; }
      if(!b.html) continue;
      let h=_measureBlock(b.html);
      if(!h) h=b.hint||20; // fallback if measurement unavailable
      // If this block won't fit and the page already has content, break first.
      if(curH + h > avail && current.length){ flush(); }
      // keepNext: if a header would land at the very bottom with no room for the
      // following block, push it to the next page so it stays with its content.
      if(b.keepNext && current.length){
        const next=blocks[i+1];
        if(next && !next.sectionBreak){
          let nh=_measureBlock(next.html)||next.hint||20;
          if(curH + h + Math.min(nh,120) > avail) flush();
        }
      }
      // A single block taller than a page: place it alone (it will overflow but
      // won't be split awkwardly mid-content with other blocks).
      current.push(b); curH += h;
    }
    flush();
    return pages;
  }

  // ── Intervenants ──
  const allInts = cr.intervenants;
  const moa = allInts.filter(i=>i.lot.toLowerCase().includes('ouvrage')||i.lot.toLowerCase().includes('moa'));
  const moe = allInts.filter(i=>i.lot.toLowerCase().includes('oeuvre')||i.lot.toLowerCase().includes('moe'));
  const oth = allInts.filter(i=>!moa.includes(i)&&!moe.includes(i));
  const grps = [{label:"MAÎTRISE D'OUVRAGE",rows:moa},{label:"MAÎTRISE D'ŒUVRE",rows:moe},{label:"INTERVENANTS ENTREPRISES",rows:oth}].filter(g=>g.rows.length);

  let intHdr = `<table style="width:100%;border-collapse:collapse;margin-bottom:4px"><tr style="background:#e0e0e0">
    <td colspan="2" style="padding:4px 7px;border:1px solid #000;font-weight:600;font-size:8.5pt">Intervenant / Lot</td>
    <td style="padding:4px 7px;border:1px solid #000;border-left:none;font-weight:600;font-size:8.5pt">Contact</td>
    <td style="padding:4px 7px;border:1px solid #000;border-left:none;font-weight:600;font-size:8.5pt;width:50px;text-align:center">Conv.</td>
    <td style="padding:4px 7px;border:1px solid #000;border-left:none;font-weight:600;font-size:8.5pt;width:50px;text-align:center">Présent</td>
  </tr>`;
  let intRows = '';
  grps.forEach(function(g){
    intRows+=`<tr style="background:#e8e8e8"><td colspan="5" style="padding:4px 7px;border:1px solid #000;border-top:none;font-weight:600;font-size:8pt">${g.label}</td></tr>`;
    g.rows.forEach(function(i){
      intRows+=`<tr>
        <td style="padding:3px 7px;border:1px solid #000;border-top:none;font-size:8pt;font-weight:600;vertical-align:top;width:95px">${e(i.lot.toUpperCase())}</td>
        <td style="padding:3px 7px;border:1px solid #000;border-top:none;border-left:none;font-size:8pt;vertical-align:top">${e(i.entreprise)}</td>
        <td style="padding:3px 7px;border:1px solid #000;border-top:none;border-left:none;font-size:7.5pt;vertical-align:top;white-space:pre-line">${e(i.contacts)}</td>
        <td style="padding:3px 7px;border:1px solid #000;border-top:none;border-left:none;text-align:center;font-size:8.5pt">${i.convoque!==false?'X':''}</td>
        <td style="padding:3px 7px;border:1px solid #000;border-top:none;border-left:none;text-align:center;font-size:8.5pt;font-weight:700">${i.present?'X':''}</td>
      </tr>`;
    });
  });
  addBlock(intHdr+intRows+'</table>', allInts.length*22+50);
  flushPage();

  // ── Remarques par lot ──
  cr.lots.forEach(function(lot){
    const active=lot.remarques.filter(function(r){return !r.archived;});
    const archCnt=lot.remarques.filter(function(r){return r.archived;}).length;
    if(!active.length&&!archCnt)return;
    const col=getColor(lot,cr);
    const bg=hexToLight(col);
    const lotHdr=`<div style="background:${bg};padding:5px 8px;border:1px solid #000;font-weight:700;font-size:9pt;text-transform:uppercase;color:${col};page-break-after:avoid">REMARQUES — ${e(lot.titre.toUpperCase())}</div>`;
    if(!active.length){
      addBlock(lotHdr+`<div style="border:1px solid #000;border-top:none;padding:5px 10px;font-size:8pt;color:#999;font-style:italic">Aucune remarque active.</div>`, 52, true);
    } else {
      // First remark stays with header
      const r0=active[0];
      const r0html=`<div style="padding:3px 0;font-size:9pt;line-height:1.5;border-bottom:1px solid #f0f0f0">- ${e(r0.texte)}</div>`
        +(r0.images&&r0.images.length?`<div style="display:flex;gap:5px;flex-wrap:wrap;margin:3px 0">${r0.images.map(img=>`<div style="display:inline-block"><img src="${img.data}" style="max-width:100px;max-height:80px;object-fit:contain;border:1px solid #ccc;border-radius:2px;display:block">${img.caption?`<div style="font-size:7pt;color:#666">${e(img.caption)}</div>`:''}</div>`).join('')}</div>`:'');
      addBlock(lotHdr+`<div style="border:1px solid #000;border-top:none;padding:5px 10px">${r0html}</div>`, 46+_estimateRmarkHeight(r0.texte,r0.images), true);
      active.slice(1).forEach(function(r){
        const rh=`<div style="border:1px solid #000;border-top:none;padding:4px 10px">- ${e(r.texte)}`
          +(r.images&&r.images.length?`<div style="display:flex;gap:5px;flex-wrap:wrap;margin:3px 0">${r.images.map(img=>`<div style="display:inline-block"><img src="${img.data}" style="max-width:100px;max-height:80px;object-fit:contain;border:1px solid #ccc;border-radius:2px;display:block">${img.caption?`<div style="font-size:7pt;color:#666">${e(img.caption)}</div>`:''}</div>`).join('')}</div>`:'')
          +`</div>`;
        addBlock(rh, _estimateRmarkHeight(r.texte,r.images)+10);
      });
      if(archCnt) addBlock(`<div style="border:1px solid #000;border-top:none;padding:4px 10px;font-size:8pt;color:#999;font-style:italic">Archivés : ${archCnt} point(s) non imprimés</div>`,22);
    }
    addBlock('<div style="height:6px"></div>',6);
  });
  flushPage();

  // ── Actions ──
  if(cr.actions.length){
    let actTable=`<div style="background:#d4d4d4;padding:4px 8px;border:1px solid #000;font-weight:700;font-size:9pt;margin-bottom:0">ACTIONS / DÉCISIONS</div>
    <table style="width:100%;border-collapse:collapse"><tr style="background:#eee">
      <td style="padding:4px 7px;border:1px solid #000;border-top:none;font-weight:600;font-size:8pt;width:25px">N°</td>
      <td style="padding:4px 7px;border:1px solid #000;border-top:none;border-left:none;font-weight:600;font-size:8pt">Action</td>
      <td style="padding:4px 7px;border:1px solid #000;border-top:none;border-left:none;font-weight:600;font-size:8pt;width:95px">Responsable</td>
      <td style="padding:4px 7px;border:1px solid #000;border-top:none;border-left:none;font-weight:600;font-size:8pt;width:75px">Échéance</td>
      <td style="padding:4px 7px;border:1px solid #000;border-top:none;border-left:none;font-weight:600;font-size:8pt;width:52px;text-align:center">Statut</td>
    </tr>`;
    cr.actions.forEach(function(a,ai){
      actTable+=`<tr style="${a.done?'color:#999;text-decoration:line-through':''}">
        <td style="padding:3px 7px;border:1px solid #000;border-top:none;font-size:8pt;text-align:center;vertical-align:top">${ai+1}</td>
        <td style="padding:3px 7px;border:1px solid #000;border-top:none;border-left:none;font-size:8pt;vertical-align:top">${e(a.texte)}${(a.images&&a.images.length)?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:2px">${a.images.map(img=>`<img src="${img.data}" style="max-width:70px;max-height:55px;object-fit:contain;border:1px solid #ccc;border-radius:2px">`).join('')}</div>`:''}</td>
        <td style="padding:3px 7px;border:1px solid #000;border-top:none;border-left:none;font-size:8pt;vertical-align:top">${e(a.responsable)}</td>
        <td style="padding:3px 7px;border:1px solid #000;border-top:none;border-left:none;font-size:8pt;vertical-align:top">${e(a.echeance)}</td>
        <td style="padding:3px 7px;border:1px solid #000;border-top:none;border-left:none;font-size:8pt;text-align:center;vertical-align:top">${a.done?'✓':'En cours'}</td>
      </tr>`;
    });
    actTable+='</table>';
    // Single block so the table never splits a row across a page boundary.
    addBlock(actTable, 52+cr.actions.length*22);
    if(cr.dateProchaine){
      addBlock(`<div style="margin-top:10px;padding:7px;border:1px solid #000;font-size:9pt;text-align:center"><strong>DATE PROCHAINE RÉUNION :</strong> ${e(fmtMeetingDisplay(cr.dateProchaine))}</div>`,38);
    }
    flushPage();
  }

  // Fix __TOTAL__ placeholder with real page count
  const pages = paginate();
  if(_measureSandbox){ try{ _measureSandbox.remove(); }catch(e){} _measureSandbox=null; }
  const total=pages.length;
  return pages.map(function(p){return p.replace(/__TOTAL__/g,String(total));});
}

function exportCR(crId){
  const cr=CRS.find(function(x){return x.id===crId;});
  if(!cr)return;
  toast('Génération du PDF…','info');
  logActivity('pdf_exported','cr',_crLabel(cr),crId);

  const pages=buildPDFPages(cr);
  const fullHTML='<!DOCTYPE html><html><head><meta charset="UTF-8"><style>'
    +'body{font-family:Arial,sans-serif;font-size:9pt;color:#000;margin:0;padding:0}'
    +'table{border-collapse:collapse}'
    +'.pr-page{padding:20px;page-break-after:always}'
    +'.pr-page:last-child{page-break-after:avoid}'
    +'@media print{.pr-page{padding:12mm}}'
    +'</style></head><body>'+pages.join('')+'</body></html>';

  const printArea=document.getElementById('print-area');
  printArea.innerHTML=pages.join('');
  printArea.style.display='block';
  document.getElementById('content').style.display='none';
  document.querySelector('.app').style.display='none';

  markClean();
  savePrintSnapshot(crId);
  window.print();

  setTimeout(function(){
    printArea.style.display='none';
    printArea.innerHTML='';
    document.getElementById('content').style.display='';
    document.querySelector('.app').style.display='flex';
  },1000);
}


function savePrintSnapshot(crId){
  const cr=CRS.find(c=>c.id===crId);
  if(!cr)return;
  const now=new Date();
  const dateStr=now.toLocaleDateString('fr-FR')+' '+now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  // Deep copy the CR state at time of print
  const snapshot={
    id:'snap'+(uid++),
    crId:crId,
    printedAt:dateStr,
    projet:cr.projet,
    date:cr.date,
    numero:cr.numero,
    totalRemarques:cr.lots.flatMap(function(l){return l.remarques;}).length,
    doneRemarques:cr.lots.flatMap(function(l){return l.remarques;}).filter(function(r){return r.archived;}).length,
    totalActions:cr.actions.length,
    doneActions:cr.actions.filter(function(a){return a.done;}).length,
  };
  if(!cr.printHistory) cr.printHistory=[];
  cr.printHistory.unshift(snapshot);
  // Keep max 20 snapshots per CR
  if(cr.printHistory.length>20) cr.printHistory=cr.printHistory.slice(0,20);
  // Show toast after restore
  setTimeout(function(){toast('Export PDF + snapshot enregistré dans l\'historique ✓');},1100);
}

function reExport(crId){exportCR(crId);}

function renameLot(crId,lotId){

function deleteLot(crId,lotId){
  if(!guardDelete(crId))return;
  const cr=CRS.find(c=>c.id===crId);

  const lot=cr.lots.find(l=>l.id===lotId);

function gsCRTab(idx,btn){
  document.querySelectorAll('.gs-tab').forEach((t,i)=>{
    t.style.color=i===idx?'var(--accent-ink)':'var(--text3)';
    t.style.borderBottomColor=i===idx?'var(--accent)':'transparent';

function gsDeleteLot(crId,lotId){
  const cr=CRS.find(c=>c.id===crId);
  if(!cr)return;
  const lot=cr.lots.find(l=>l.id===lotId);
  if(!lot||!confirm('Supprimer le lot "'+lot.titre+'" et ses '+lot.remarques.length+' remarques ?'))return;
  cr.lots=cr.lots.filter(l=>l.id!==lotId);
  openCRSettings(crId);
}
function gsAddLot(crId){
  const cr=CRS.find(c=>c.id===crId);
  if(!cr)return;
  if(!cr.intervenants.length){toast('Ajoutez d\'abord un intervenant','var(--amber)');return;}
  // Use first intervenant by default
  const firstInt=cr.intervenants[0];
  cr.lots.push({id:'l'+(uid++),titre:firstInt.lot,ouvert:true,intId:firstInt.id,remarques:[]});
  openCRSettings(crId);
}
function gsDeleteInt(crId,idx){
  if(!canManageIntervenants()){_intervenantsLockedToast();return;}
  const cr=CRS.find(c=>c.id===crId);
  if(!cr)return;
  const int=cr.intervenants[idx];
  if(!int)return;
  // Check if any lots are linked to this intervenant
  const linked=cr.lots.filter(function(l){return l.intId===int.id;});
  if(linked.length>0){
    if(!confirm('Supprimer "'+( int.entreprise||int.lot)+'" ?\n\nAttention : '+linked.length+' lot(s) lui sont liés ('+linked.map(function(l){return l.titre;}).join(', ')+').\nCes lots seront aussi supprimés.'))return;
    cr.lots=cr.lots.filter(function(l){return l.intId!==int.id;});
  } else {
    if(!confirm('Supprimer "'+(int.entreprise||int.lot)+'" ?'))return;
  }
  cr.intervenants.splice(idx,1);
  openCRSettings(crId);
}
function gsAddInt(crId){
  if(!canManageIntervenants()){_intervenantsLockedToast();return;}
  const cr=CRS.find(c=>c.id===crId);
  if(!cr)return;
  cr.intervenants.push({lot:'Nouveau lot',entreprise:'',contacts:'',present:false});
  // Switch to intervenants tab
  openCRSettings(crId);
  setTimeout(()=>gsCRTab(1,document.querySelectorAll('.gs-tab')[1]),50);
}
function gsDeleteAction(crId,aId){
  const cr=CRS.find(c=>c.id===crId);
  if(cr)cr.actions=cr.actions.filter(a=>a.id!==aId);
  openCRSettings(crId);
  setTimeout(()=>gsCRTab(2,document.querySelectorAll('.gs-tab')[2]),50);
}
function gsAddAction(crId){
  const cr=CRS.find(c=>c.id===crId);
  if(!cr)return;
  cr.actions.push({id:'a'+(uid++),texte:'Nouvelle action',responsable:'',echeance:'',done:false});
  openCRSettings(crId);
  setTimeout(()=>gsCRTab(2,document.querySelectorAll('.gs-tab')[2]),50);
}
function saveSettings(crId){
  const cr=CRS.find(c=>c.id===crId);
  if(!cr)return;
  // Save lots names + intId links
  cr.lots.forEach(lot=>{
    const el=document.getElementById('gs-lot-'+lot.id);
    if(el&&el.value.trim())lot.titre=el.value.trim();
    const intEl=document.getElementById('gs-lot-int-'+lot.id);
    if(intEl&&intEl.value)lot.intId=intEl.value;
    // lot.color is now derived from intervenant — don't save separately
  });
  // Validate: every lot must have an intId
  const orphans=cr.lots.filter(function(l){return !l.intId||!cr.intervenants.find(function(i){return i.id===l.intId;});});
  if(orphans.length){
    toast(orphans.length+' lot(s) sans intervenant — sélectionnez un intervenant pour chaque lot','var(--amber)');
    return;
  }
  // Save intervenants. En mode embarqué, lot/entreprise/contacts appartiennent à
  // l'annuaire (champs en lecture seule) : on ne sauvegarde que la couleur, pour
  // que le verrou tienne même si l'attribut readonly est contourné (devtools).
  var _canIntv=canManageIntervenants();
  cr.intervenants.forEach((int,ii)=>{
    const colorEl=document.getElementById('gs-int-color-'+ii);
    if(colorEl)int.color=colorEl.value;
    if(_canIntv){
      const lot=document.getElementById('gs-int-lot-'+ii);
      const ent=document.getElementById('gs-int-ent-'+ii);
      const contacts=document.getElementById('gs-int-contacts-'+ii);
      if(lot)int.lot=lot.value||int.lot;
      if(ent)int.entreprise=ent.value||'';
      if(contacts)int.contacts=contacts.value||'';
    }
  });
  // Save actions
  cr.actions.forEach(a=>{
    const texte=document.getElementById('gs-a-texte-'+a.id);
    const intEl=document.getElementById('gs-a-int-'+a.id);
    const ech=document.getElementById('gs-a-ech-'+a.id);
    const done=document.getElementById('gs-a-done-'+a.id);
    if(texte&&texte.value.trim())a.texte=texte.value.trim();
    if(intEl){
      a.intId=intEl.value||null;
      const linked=a.intId?cr.intervenants.find(i=>i.id===a.intId):null;
      a.responsable=linked?(linked.entreprise||linked.lot):a.responsable;
    }
    if(ech)a.echeance=ech.value||'';
    if(done)a.done=done.checked;
  });
  closeModal();
  // Stay on intervenants tab so user sees the color change immediately
  activeTab='intervenants';
  renderCR();
  // Reset tab buttons
  setTimeout(function(){
    document.querySelectorAll('.tab').forEach(function(t,i){
      t.classList.toggle('active',i===1);
    });
  },10);
  renderList();
  saveCRS();toast('Tout enregistré ✓');
}

/* ══ ARCHIVE CR ══ */
function toggleArchiveCR(crId){
  const cr=CRS.find(c=>c.id===crId);
  if(!cr)return;
  const isArchived=cr.statut==='archived';
  if(!isArchived){
    if(!confirm(`Archiver "${cr.projet} — ${cr.date}" ?\n\nLe CR sera masqué de la liste principale mais restera accessible dans l'historique.`))return;
    cr.statut='archived';
    saveCRS();
    logActivity('cr_archived','cr',_crLabel(cr),cr.id);
    toast('CR archivé — visible dans l\'historique ✓');
  } else {
    cr.statut='published';
    saveCRS();
    logActivity('cr_unarchived','cr',_crLabel(cr),cr.id);
    toast('CR désarchivé ✓');
  }
  renderList();
  renderCR();
}

async function deleteSinglePV(crId){
  if(!guardDelete(crId))return;
  // Deletes ONE PV by its unique id. Never touches other PVs or projects.
  const cr=CRS.find(function(x){return x.id===crId;});
  if(!cr){return;}
  const pts=cr.lots.reduce(function(s,l){return s+l.remarques.length;},0);
  if(!confirm(
    'Supprimer définitivement ce PV ('+cr.projet+' — n°'+cr.numero+', '+cr.date+') ?\n\n'+
    pts+' point(s), '+cr.actions.length+' action(s).\n\n'+
    'Cette action est irréversible.'
  ))return;
  const pid=cr.projetId;
  const wasActive=(activeCR===crId);
  logActivity('cr_deleted','cr',_crLabel(cr),crId);
  // 1. Tombstone immediately so refresh cannot re-add it
  _tombstone(crId);
  // 2. Remove locally — filter by id only, never by projetId
  CRS=CRS.filter(function(x){return x.id!==crId;});
  saveCRS();
  // 3. Await Supabase delete
  try {
    await _deleteFromSupabase(crId);
  } catch(e) {
    toast('Erreur Supabase : le PV a été supprimé localement mais la synchronisation a échoué.');
  }
  // 4. Fix selection — stay in same project if possible
  if(wasActive){
    const sameProjCRs=CRS.filter(function(x){return x.projetId===pid;});
    if(sameProjCRs.length){
      sameProjCRs.sort(function(a,b){return (b.numero||0)-(a.numero||0);});
      activeCR=sameProjCRs[0].id;
    } else {
      // No PV left in this project — keep project context, show empty state
      activeCR=null;
    }
  }
  renderList();
  if(activeCR){
    renderCR();
  } else if(pid){
    // Project still exists, just has no PVs — show a clean empty state
    const ct=document.getElementById('content');
    if(ct) ct.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text3)">'+
      '<div style="font-size:13px;font-weight:500">Aucun PV dans ce projet.</div>'+
      '<div style="font-size:11px">Créez un nouveau PV pour commencer.</div>'+
      '</div>';
    const tb=document.getElementById('tabbar');
    if(tb) tb.style.display='none';
  }
  toast('PV supprimé ✓');
}

// Save all visible settings field values into CR data (used before drag reorders DOM)
function _saveSettingsFields(crId){
  var cr=CRS.find(c=>c.id===crId);
  if(!cr)return;
  cr.lots.forEach(function(lot){
    var el=document.getElementById('gs-lot-'+lot.id);
    if(el&&el.value.trim())lot.titre=el.value.trim();
    var intEl=document.getElementById('gs-lot-int-'+lot.id);
    if(intEl&&intEl.value)lot.intId=intEl.value;
  });
  cr.intervenants.forEach(function(int,ii){
    var lotEl=document.getElementById('gs-int-lot-'+ii);
    var entEl=document.getElementById('gs-int-ent-'+ii);
    var cEl=document.getElementById('gs-int-contacts-'+ii);
    var colEl=document.getElementById('gs-int-color-'+ii);
    if(lotEl)int.lot=lotEl.value||int.lot;
    if(entEl)int.entreprise=entEl.value||'';
    if(cEl)int.contacts=cEl.value||'';
    if(colEl)int.color=colEl.value;
  });
  cr.actions.forEach(function(a){
    var tEl=document.getElementById('gs-a-texte-'+a.id);
    var iEl=document.getElementById('gs-a-int-'+a.id);
    var eEl=document.getElementById('gs-a-ech-'+a.id);
    var dEl=document.getElementById('gs-a-done-'+a.id);
    if(tEl&&tEl.value.trim())a.texte=tEl.value.trim();
    if(iEl){
      a.intId=iEl.value||null;
      var lk=a.intId?cr.intervenants.find(function(i){return i.id===a.intId;}):null;
      if(lk)a.responsable=lk.entreprise||lk.lot;
    }
    if(eEl)a.echeance=eEl.value||'';
    if(dEl)a.done=dEl.checked;
  });
}

function moveItem(type, crId, fromIdx, dirOrTo, isAbsolute) {
  const cr = CRS.find(c => c.id === crId);
  if (!cr) return;
  const toIdx = isAbsolute ? dirOrTo : fromIdx + dirOrTo;

  // Save all visible field values before reordering
  _saveSettingsFields(crId);

  if (type === 'lot') {
    if (toIdx < 0 || toIdx >= cr.lots.length) return;
    const moved = cr.lots.splice(fromIdx, 1)[0];
    cr.lots.splice(toIdx, 0, moved);
  } else if (type === 'int') {
    if (toIdx < 0 || toIdx >= cr.intervenants.length) return;
    const moved = cr.intervenants.splice(fromIdx, 1)[0];
    cr.intervenants.splice(toIdx, 0, moved);
  } else if (type === 'act') {
    if (toIdx < 0 || toIdx >= cr.actions.length) return;
    const moved = cr.actions.splice(fromIdx, 1)[0];
    cr.actions.splice(toIdx, 0, moved);
  }

  openCRSettings(crId);
  setTimeout(function() {
    const tabIdx = type === 'lot' ? 0 : type === 'int' ? 1 : 2;
    gsCRTab(tabIdx, document.querySelectorAll('.gs-tab')[tabIdx]);
    // Scroll the moved item into view
    const panels = ['gs-p0','gs-p1','gs-p2'];
    const panel = document.getElementById(panels[tabIdx]);
    if (panel) {
      const rows = panel.querySelectorAll('[data-moved]');
      if (rows.length) rows[0].scrollIntoView({block:'nearest'});
    }
  }, 20);
}

/* ══ LIVE COLOR SYNC ══ */
function syncIntColor(crId, ii, color) {
  const cr = CRS.find(c => c.id === crId);
  if (!cr || !cr.intervenants[ii]) return;
  const int = cr.intervenants[ii];

  // 1. Update data immediately
  int.color = color;

  // 2. Update the row border in settings modal
  const picker = document.getElementById('gs-int-color-'+ii);
  if (picker) {
    const card = picker.closest('div[style*="border-left"]');
    if (card) card.style.borderLeftColor = color;
  }

  // 3. Update the intervenant card in main view
  const intCard = document.querySelector('.int-card[data-intidx="'+ii+'"]');
  if (intCard) intCard.style.borderLeftColor = color;

  // 4. Propagate to ALL linked lots
  cr.lots.forEach(function(lot) {
    if (lot.intId === int.id) {
      // Update lot dot in main view
      const lotBlock = document.querySelector('[data-lotid="'+lot.id+'"]');
      if (lotBlock) {
        const dot = lotBlock.querySelector('.lot-dot');
        if (dot) dot.style.background = color;
        const head = lotBlock.querySelector('.lot-head');
        if (head) head.style.borderLeftColor = color;
      }
      // Update lot color picker in settings if open
      const lotPicker = document.getElementById('gs-lot-color-'+lot.id);
      if (lotPicker) {
        lotPicker.value = color;
        const lotRow = lotPicker.closest('div[style*="border-left"]');
        if (lotRow) lotRow.style.borderLeftColor = color;
      }
    }
  });

  // 5. Propagate to ALL linked actions badges
  document.querySelectorAll('[data-intid="'+int.id+'"] .action-badge').forEach(function(el) {
    el.style.background = color+'18';
    el.style.color = color;
  });
}

function syncLotIntervenant(crId, lotId, selectEl) {
  const cr = CRS.find(c => c.id === crId);
  const lot = cr && cr.lots.find(l => l.id === lotId);
  if (!lot) return;
  lot.intId = selectEl.value || null;
  const int = lot.intId ? cr.intervenants.find(i => i.id === lot.intId) : null;
  const color = int ? getColor(int, cr) : '#e03131';
  // Update row border and dot live
  const row = selectEl.closest('div[style*="border-left"]');
  if (row) {
    row.style.borderLeftColor = color;
    const dot = row.querySelector('div[style*="border-radius:50%"]');
    if (dot) dot.style.background = color;
    selectEl.style.borderColor = lot.intId ? 'var(--border2)' : '#e03131';
  }
  // Update lot dot in main view
  const lotBlock = document.querySelector('[data-lotid="'+lotId+'"]');
  if (lotBlock) {
    const d = lotBlock.querySelector('.lot-dot');
    if (d) d.style.background = color;
  }
}

function syncLotColor(crId, lotId, color) {
  // Lot color is now driven by intervenant — this is kept for compatibility only
  const cr = CRS.find(c => c.id === crId);
  const lot = cr && cr.lots.find(l => l.id === lotId);
  if (!lot) return;
  const lotBlock = document.querySelector('[data-lotid="'+lotId+'"]');
  if (lotBlock) {
    const dot = lotBlock.querySelector('.lot-dot');
    if (dot) dot.style.background = color;
  }
}

/* ══ CLONE CR ══ */
function cloneCR(crId){
  const cr=CRS.find(c=>c.id===crId);
  if(!cr)return;
  const pendingOpen=cr.lots.flatMap(l=>l.remarques).filter(r=>!r.done&&!r.archived).length;
  const pendingActions=cr.actions.filter(a=>!a.done).length;
  showModal(`<h3><svg class="ico ico-sm" style="color:var(--accent)"><use href="#i-copy"/></svg> Créer le CR suivant</h3>
    <div style="background:var(--accent-bg);border-radius:var(--r);padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--text2)">
      Reprend la structure complète et reporte automatiquement les
      <strong>${pendingOpen} points non traités</strong> et <strong>${pendingActions} actions non terminées</strong>.
      <br><span style="color:var(--text3)">Les points archivés/classés ne sont pas repris.</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="fi" style="grid-column:1/-1"><label>Nom du projet</label><input id="cl-proj" value="${e(cr.projet)}"></div>
      <div class="fi"><label>Date de la réunion *</label><input type="date" id="cl-date"></div>
      <div class="fi"><label>Date et heure de la prochaine réunion</label><input type="datetime-local" id="cl-datep"></div>
      <div class="fi"><label>N° de CR</label><input type="number" id="cl-num" value="${cr.numero+1}" min="1"></div>
      <div class="fi"><label>Rédacteur</label><input id="cl-red" value="${e(cr.redacteur)}"></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:4px">
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
        <input type="checkbox" id="cl-flags" checked style="width:15px;height:15px">
        Reporter les <strong>${pendingOpen} points non traités</strong> (tous, dont les points à suivre)
      </label>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
        <input type="checkbox" id="cl-actions" checked style="width:15px;height:15px">
        Reporter les <strong>${pendingActions} actions</strong> non terminées
      </label>
    </div>
    <div class="mo-foot">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn btn-p" id="clone-submit-btn" onclick="this.disabled=true;this.textContent='Création…';confirmCloneCR('${crId}')">${ico('copy','ico-sm')} Créer le CR suivant</button>
    </div>`);
  setTimeout(()=>{
    const d=document.getElementById('cl-date');
    if(d) d.valueAsDate=new Date();
  },50);
}

function confirmCloneCR(crId){
  // Guard against double-click / double-call
  if(window._cloningInProgress) return;
  window._cloningInProgress=true;
  setTimeout(function(){window._cloningInProgress=false;},3000);

  const cr=CRS.find(c=>c.id===crId);
  if(!cr){window._cloningInProgress=false;return;}

  // Safe next numero: max within same project + 1
  const projCRs=CRS.filter(function(x){return x.projetId===cr.projetId;});
  const maxNum=projCRs.reduce(function(m,x){return Math.max(m,x.numero||0);},0);
  const safeNextNum=maxNum+1;

  // Check: if a CR with this projetId + numero already exists, abort
  const userNum=parseInt(document.getElementById('cl-num')?.value)||safeNextNum;
  if(CRS.find(function(x){return x.projetId===cr.projetId&&x.numero===userNum&&x.id!==cr.id;})){
    if(!confirm('Un CR n°'+userNum+' existe déjà dans ce projet. Créer quand même avec n°'+(maxNum+1)+' ?')){
      window._cloningInProgress=false;closeModal();return;
    }
  }
  const dateRaw=document.getElementById('cl-date')?.value||'';
  const date=dateRaw?new Date(dateRaw).toLocaleDateString('fr-FR'):new Date().toLocaleDateString('fr-FR');
  const importFlags=document.getElementById('cl-flags')?.checked;
  const importActions=document.getElementById('cl-actions')?.checked;

  // Clone intervenants with new IDs
  const idMap={};
  const newInts=cr.intervenants.map(function(iv){
    const newId='i'+(uid++); idMap[iv.id]=newId;
    return {id:newId,srcId:iv.srcId||'',lot:iv.lot,entreprise:iv.entreprise,contacts:iv.contacts,
            color:iv.color,present:false,convoque:iv.convoque!==false}; // srcId conservé : pas de doublon au prochain merge annuaire
  });

  // Clone lots: keep structure, import all non-treated non-archived points if requested
  const newLots=cr.lots.map(function(lot){
    const remarks=importFlags
      // All non-done non-archived points (flag or not)
      ? lot.remarques.filter(r=>!r.done&&!r.archived).map(r=>({
          id:'r'+(uid++), texte:r.texte, done:false,
          flag:r.flag||false, decision:r.decision||false,
          archived:false, createdAt:date, archivedAt:null, doneAt:null
        }))
      : [];
    return {id:'l'+(uid++), titre:lot.titre, ouvert:true,
            intId:idMap[lot.intId]||null, remarques:remarks};
  });

  // Clone only non-done actions (never archived)
  const newActions=importActions
    ? cr.actions.filter(a=>!a.done).map(a=>({
        id:'a'+(uid++), texte:a.texte,
        intId:idMap[a.intId]||null,
        responsable:a.responsable,
        echeance:'', done:false
      }))
    : [];

  const newCR={
    id:'cr'+(uid++),
    projetId:cr.projetId||('p'+(uid++)),
    hostProjId:(hostProject?hostProject.id:'')||cr.hostProjId||'', // rattachement projet hôte (évite un CR fantôme)
    projet:document.getElementById('cl-proj')?.value?.trim()||cr.projet,
    adresse:cr.adresse,
    date,
    dateProchaine:document.getElementById('cl-datep')?.value||'',
    numero:parseInt(document.getElementById('cl-num')?.value)||safeNextNum,
    redacteur:document.getElementById('cl-red')?.value||cr.redacteur,
    statut:'draft',
    intervenants:newInts,
    lots:newLots,
    actions:newActions,
  };
  CRS.unshift(newCR);
  // Archiver le CR source — il devient historique
  cr.statut = 'archived';
  _dirtyCRIds.add(newCR.id); _dirtyCRIds.add(cr.id);
  saveCRS(newCR.id);
  logActivity('cr_created','cr',_crLabel(newCR)+' (CR suivant)',newCR.id);
  newCR.intervenants.forEach(function(int){if(!int.color)int.color=lotColor(int.lot);});

  closeModal();
  activeCR=newCR.id;
  activeTab='remarques';
  renderList();
  renderCR();
  const importedPts=newLots.reduce((s,l)=>s+l.remarques.length,0);
  const importedAct=newActions.length;
  toast('Nouveau CR créé — '+importedPts+' points non traités et '+importedAct+' actions reportés ✓');
}

  showModal(`<h3>${ico('check','ico-sm')} Convertir en action</h3>

          <option value="">— aucun —</option>${intOptions}
        </select>
      </div>

    </div>
    <label style="display:flex;align-items:center;gap:7px;font-size:13px;cursor:pointer;margin-bottom:4px">
      <input type="checkbox" id="ra-archive" checked style="width:15px;height:15px"> Archiver la remarque une fois convertie
    </label>

      <button class="btn" onclick="closeModal()">Annuler</button>

function confirmRemarkToAction(crId,lotId,rId){
  const cr=CRS.find(c=>c.id===crId);
  const lot=cr?.lots.find(l=>l.id===lotId);
  const r=lot?.remarques.find(x=>x.id===rId);
  if(!r)return;
  const texte=document.getElementById('ra-texte')?.value?.trim()||r.texte;
  const intId=document.getElementById('ra-int')?.value||null;
  const linked=intId?cr.intervenants.find(i=>i.id===intId):null;
  cr.actions.push({
    id:'a'+(uid++), texte,
    intId:intId||null,
    responsable:linked?(linked.entreprise||linked.lot):'',
    echeance:document.getElementById('ra-ech')?.value||'',
    done:false
  });
  if(document.getElementById('ra-archive')?.checked){
    r.done=true; r.flag=false;
    r.archivedAt=new Date().toLocaleDateString('fr-FR');
  }
  closeModal(); renderCR(); renderList();
  toast('Action créée depuis la remarque ✓');
}

/* ══ EXPORT CSV ══ */
function exportCSV(crId){
  const cr=CRS.find(c=>c.id===crId);
  if(!cr)return;

  function esc(s){ return '"'+(s||'').replace(/"/g,'""')+'"'; }

  // Build rows
  const data=[];
  cr.lots.forEach(function(lot){
    const iv=lot.intId?cr.intervenants.find(function(i){return i.id===lot.intId;}):null;
    const intervenant=iv?iv.entreprise||iv.lot:'';
    lot.remarques.forEach(function(r){
      const isClasse=r.done||r.archived;
      data.push({
        lot:     lot.titre,
        iv:      intervenant,
        texte:   r.texte,
        statut:  r.archived?'Archivé':r.done?'Classé':'En cours',
        asuivre: r.flag&&!isClasse?'oui':'',
        createdAt: r.createdAt||'',
        classeAt:  r.archivedAt||r.doneAt||'',
        _done: isClasse,
        _flag: r.flag&&!isClasse
      });
    });
  });

  // Sort: À suivre first, then en cours, then classés — alphabetical by lot within each group
  data.sort(function(a,b){
    // Group: 0=À suivre, 1=En cours, 2=Classé
    const ga=a._flag?0:!a._done?1:2;
    const gb=b._flag?0:!b._done?1:2;
    if(ga!==gb)return ga-gb;
    if(a.lot<b.lot)return -1;if(a.lot>b.lot)return 1;
    return 0;
  });

  const rows=[['Lot','Intervenant','Remarque','Statut','À suivre','Ajouté le','Classé le']];
  data.forEach(function(d){
    rows.push([esc(d.lot),esc(d.iv),esc(d.texte),d.statut,d.asuivre,d.createdAt,d.classeAt]);
  });

  const csv=rows.map(function(r){return r.join(',');}).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='CR_'+cr.projet.replace(/[^a-z0-9]/gi,'_')+'_'+cr.date.replace(/\//g,'-')+'.csv';
  a.click();
  URL.revokeObjectURL(url);
  toast('CSV exporté ✓');
}

function _handlePdfFile(file){
  if(!file)return;
  const maxMB=20;
  if(file.size>maxMB*1024*1024){alert('Fichier trop volumineux (max '+maxMB+' Mo)');return;}
  const isPDF=file.type==='application/pdf'||file.name.toLowerCase().endsWith('.pdf');
  const isImage=file.type.startsWith('image/');
  if(!isPDF&&!isImage){alert('Format non supporté. Utilisez PDF, JPG, PNG ou WebP.');return;}
  _showExtractingModal(file.name);
  if(isPDF){
    _extractPdfText(file).then(function(text){
      _showExtractedText(text, file.name, 'pdf');
    }).catch(function(err){
      _showExtractedText('', file.name, 'pdf', 'Extraction PDF échouée : '+err.message);
    });
  } else {
    // Image — try AI extraction, fallback to manual
    const reader=new FileReader();
    reader.onload=function(e){
      _extractImageText(e.target.result, file.name, file.type);
    };
    reader.readAsDataURL(file);
  }
}

// Extract text from PDF using PDF.js (CDN, loaded as module)
async function _extractPdfText(file){
  // PDF.js 4.x loaded as module — access via global or dynamic import
  let pdfjsLib=window.pdfjsLib;
  if(!pdfjsLib){
    // Try dynamic import from CDN
    try{
      const mod=await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs');
      pdfjsLib=mod;
      window.pdfjsLib=mod;
    }catch(err){
      throw new Error('PDF.js non disponible. Vérifiez votre connexion internet.');
    }
  }
  if(pdfjsLib.GlobalWorkerOptions){
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs';
  }
  const arrayBuffer=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:arrayBuffer}).promise;
  let fullText='';
  for(let i=1;i<=pdf.numPages;i++){
    const page=await pdf.getPage(i);
    const content=await page.getTextContent();
    const pageText=content.items.map(function(it){return it.str;}).join(' ');
    if(pageText.trim())fullText+='--- Page '+i+' ---\n'+pageText+'\n\n';
  }
  return fullText.trim();
}

// Image — try Claude API for OCR, fall back to manual
function _extractImageText(dataUrl, name, mimeType){

      max_tokens:4000,
      messages:[{
        role:'user',
        content:[
          {type:'image',source:{type:'base64',media_type:mimeType,data:dataUrl.split(',')[1]}},
          {type:'text',text:'Extrait tout le texte visible de cette image de compte rendu de chantier. Conserve la structure (titres, listes, tableaux). Réponds uniquement avec le texte extrait, sans commentaire.'}
        ]
      }]
    })
  })
  .then(function(r){return r.json();})
  .then(function(data){
    const text=(data.content&&data.content[0]&&data.content[0].text)||'';
    if(text&&text.length>10){

    } else {
      _showExtractedText('', name, 'image', 'OCR non disponible pour cette image.');
    }
  })

// Step 5 — create the CR from parsed data
function _createImportedCR(parsed){
  // Read user-edited header fields
  const projet=(document.getElementById('pi-projet')||{value:parsed.projet||'CR importé'}).value.trim()||'CR importé';
  const addr=(document.getElementById('pi-addr')||{value:parsed.adresse||''}).value||'';
  const date=(document.getElementById('pi-date')||{value:parsed.date||''}).value||'';
  const datep=(document.getElementById('pi-datep')||{value:parsed.dateProchaine||''}).value||'';
  const red=(document.getElementById('pi-red')||{value:parsed.redacteur||''}).value||'';
  const num=parseInt((document.getElementById('pi-num')||{value:1}).value)||CRS.length+1;

  // Build intervenants with unique IDs
  const idMap={};
  const intervenants=(parsed.intervenants||[]).map(function(iv){
    const id='i'+(uid++);
    idMap[iv.lot]=id;
    idMap[iv.entreprise||'']=id;
    return {
      id:id,
      lot:iv.lot||'Intervenant',
      entreprise:iv.entreprise||'',
      contacts:iv.contacts||'',
      color:lotColor(iv.lot||''),
      present:false,
      convoque:true
    };
  });

  // Build lots
  const lots=(parsed.lots||[]).map(function(lot){
    // Try to link to an intervenant by label
    const intId=idMap[lot.intLabel||'']||idMap[lot.titre||'']||(intervenants.length?intervenants[0].id:null);
    return {
      id:'l'+(uid++),
      titre:lot.titre||'Lot',
      ouvert:true,
      intId:intId||null,
      remarques:(lot.remarques||[]).map(function(txt){
        return {
          id:'r'+(uid++),
          texte:String(txt),
          done:false,
          flag:false,
          decision:false,
          archived:false,
          createdAt:date||new Date().toLocaleDateString('fr-FR')
        };
      })
    };
  });

  // Add "À classer" lot for unclassified content
  const nonClasse=parsed.nonClasse||[];
  if(nonClasse.length){
    // Add a generic intervenant if none exist
    let aClasId=intervenants.length?intervenants[0].id:null;
    if(!aClasId){
      aClasId='i'+(uid++);
      intervenants.push({id:aClasId,lot:'Importé',entreprise:'',contacts:'',color:lotColor('DEFAULT'),present:false,convoque:false});
    }
    lots.push({
      id:'l'+(uid++),
      titre:'À classer',
      ouvert:true,
      intId:aClasId,
      remarques:nonClasse.map(function(txt){
        return {id:'r'+(uid++),texte:String(txt),done:false,flag:false,decision:false,archived:false,createdAt:date||new Date().toLocaleDateString('fr-FR')};
      })
    });
  }

  // Build actions
  const actions=(parsed.actions||[]).map(function(a){
    const texte=typeof a==='string'?a:(a.texte||String(a));
    const resp=typeof a==='object'?(a.responsable||''):'';
    return {
      id:'a'+(uid++),
      texte:texte,
      responsable:resp,
      intId:null,
      echeance:typeof a==='object'?(a.echeance||''):'',
      done:false
    };
  });

  const newCR={
    id:'cr'+(uid++),
    projetId:'p'+(uid++),
    hostProjId:(hostProject?hostProject.id:'')||'', // rattachement projet hôte

/* ══ BACKUP / RESTORE ══ */
function exportData(){
  const backup={
    version:1,
    exportedAt:new Date().toISOString(),
    crs:CRS,
    templates:TEMPLATES,
    pdfSettings:PDF_SETTINGS,
  };
  const json=JSON.stringify(backup,null,2);
  const blob=new Blob([json],{type:'application/json;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  const d=new Date();
  const stamp=d.getFullYear()+''+String(d.getMonth()+1).padStart(2,'0')+''+String(d.getDate()).padStart(2,'0');
  a.download='plansync_backup_'+stamp+'.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Sauvegarde exportée ✓');
}

function importData(){
  const input=document.createElement('input');
  input.type='file';
  input.accept='.json,application/json';
  input.onchange=function(e){
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=function(ev){
      let backup;
      try{
        backup=JSON.parse(ev.target.result);
      }catch(err){
        alert('Fichier JSON invalide — impossible de lire les données.');
        return;
      }
      // Validate structure
      if(!backup||!Array.isArray(backup.crs)){
        alert('Format de sauvegarde non reconnu (clé "crs" manquante).');
        return;
      }
      const incomingCRs=backup.crs.length;
      const existingCRs=CRS.length;
      // Build confirmation message
      let msg='Importer '+incomingCRs+' CR(s)';
      if(backup.templates&&backup.templates.length) msg+=', '+backup.templates.length+' modèle(s)';
      msg+=' depuis ce fichier ?\n\n';
      if(existingCRs>0){
        msg+='Choisir une option :\n';
        msg+='- OK → Fusionner (ajouter sans supprimer les existants)\n';
        msg+='- Annuler → Ne pas importer';
        // Offer overwrite via separate confirm
        const choice=confirm(msg);
        if(!choice)return;
        // Ask if overwrite
        const overwrite=confirm(
          'Remplacer TOUTES les données existantes ?\n\n'+
          '- OK → Remplacer ('+existingCRs+' CR(s) actuels seront perdus)\n'+
          '- Annuler → Fusionner (ajouter sans supprimer)'
        );
        if(overwrite){
          _applyImport(backup, true);
        } else {
          _applyImport(backup, false);
        }
      } else {
        if(!confirm(msg+'Continuer ?'))return;
        _applyImport(backup, true);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function _applyImport(backup, replace){
  if(replace){
    CRS=Array.isArray(backup.crs)?backup.crs:[];
    TEMPLATES=Array.isArray(backup.templates)?backup.templates:TEMPLATES;
    if(backup.pdfSettings&&typeof backup.pdfSettings==='object'){
      Object.assign(PDF_SETTINGS,backup.pdfSettings);
    }
  } else {
    // Merge CRs: skip those with same id
    if(Array.isArray(backup.crs)){
      const existingIds=new Set(CRS.map(function(c){return c.id;}));
      const added=backup.crs.filter(function(c){return !existingIds.has(c.id);});
      CRS=CRS.concat(added);
    }
    // Merge templates: skip same name
    if(Array.isArray(backup.templates)){
      const existingNames=new Set(TEMPLATES.map(function(t){return t.name;}));
      backup.templates.forEach(function(t){
        if(!existingNames.has(t.name))TEMPLATES.push(t);
      });
    }
  }
  // Persist everything (import complet : pousser tous les CRs)
  _syncAll();
  try { localStorage.setItem('plansync_crs', JSON.stringify(CRS)); }catch(e){}
  saveTemplatesToStorage();
  savePdfSettings();
  updateSidebarLogo();
  activeCR=CRS.length?CRS[0].id:null;
  renderList();
  if(activeCR)renderCR();
  toast('Import terminé — '+CRS.length+' CR(s) chargés ✓');
}

function toggleSortLots(crId){
  lotsSortedByFlags=!lotsSortedByFlags;
  const cr=CRS.find(c=>c.id===crId);
  if(!cr)return;
  if(lotsSortedByFlags){
    cr.lots.sort(function(a,b){
      const fa=a.remarques.filter(r=>r.flag&&!r.done).length;
      const fb=b.remarques.filter(r=>r.flag&&!r.done).length;
      return fb-fa; // most flags first
    });

  } else {
    toast('Tri original rétabli — réouvrez les Réglages pour réorganiser');
  }
  renderCR();
}

// Aucun nom de cabinet réel n'est codé en dur dans ce fichier partagé.
function firmNameFromDomain(){
  try{
    const host=(LOGIN_DOMAIN||'').split('@').pop().trim();
    const base=(host.split('.')[0]||'').trim();
    if(!base) return '';
    return base.split(/[-_]+/).filter(Boolean)
      .map(function(w){return w.charAt(0).toUpperCase()+w.slice(1);})
      .join(' ');
  }catch(e){ return ''; }
}
function firmDisplayName(){
  const fn=((PDF_SETTINGS&&PDF_SETTINGS.firmName)||'').trim();
  if(fn && fn!=='PlanSync') return fn;          // réglage explicite du cabinet
  return firmNameFromDomain() || 'PlanSync';    // dérivé du domaine, sinon repli
}
function firmInitials(){
  const ini=firmDisplayName().split(/\s+/).map(function(w){return w[0]||'';})
    .filter(Boolean).slice(0,2).join('').toUpperCase();

}

let _menuOpen=null;
// Referme et range tout menu actuellement détaché dans le body.
function _cleanupFloatingMenus(){
  const list=document.querySelectorAll('body > [data-floating-menu="1"]');
  for(let i=0;i<list.length;i++){
    const n=list[i];
    n.removeAttribute('data-floating-menu');
    n.style.display='none';
    n.style.position=''; n.style.top=''; n.style.left=''; n.style.right=''; n.style.bottom='';
    // Remettre dans la ligne d'origine si elle existe encore, sinon laisser
    // orphelin (sera collecté) — un nouveau menu est recréé au prochain rendu.
    if(n.__origParent && n.__origParent.isConnected){
      try{ n.__origParent.appendChild(n); }catch(_){}
    }
    n.__origParent=null;
  }
}
function toggleRemarqueMenu(e,id){
  e.stopPropagation();
  const already=(_menuOpen===id);
  closeAllMenus();
  if(already) return; // un second clic referme
  const el=document.getElementById(id);
  if(!el) return;
  const btn=(e.currentTarget||e.target);
  const br=btn.getBoundingClientRect();
  // Détacher le menu vers le body : un parent avec opacity<1 (lignes "traité")
  // ou un conteneur défilant le piégerait/masquerait sinon.
  el.__origParent=el.parentNode;
  el.setAttribute('data-floating-menu','1');
  document.body.appendChild(el);
  el.style.position='fixed';
  el.style.visibility='hidden';
  el.style.display='block';
  el.style.top='0px'; el.style.left='0px'; el.style.right='auto'; el.style.bottom='auto';
  const mw=el.offsetWidth||190, mh=el.offsetHeight||200;
  const vw=window.innerWidth||document.documentElement.clientWidth;
  const vh=window.innerHeight||document.documentElement.clientHeight;
  const pad=8;
  let left=br.right-mw;
  if(left<pad) left=pad;
  if(left+mw>vw-pad) left=vw-pad-mw;
  let top=br.bottom+4;
  if(top+mh>vh-pad){
    const above=br.top-4-mh;
    top = (above>=pad) ? above : Math.max(pad, vh-pad-mh);
  }
  el.style.left=left+'px';
  el.style.top=top+'px';
  el.style.visibility='';
  _menuOpen=id;
}
function closeAllMenus(){
  _cleanupFloatingMenus();
  _menuOpen=null;
}

/* ══ LATE ACTIONS DETECTION ══ */
function isLate(echeance){
  if(!echeance||echeance==='Immédiat')return false;
  const parts=echeance.split('/');
  if(parts.length!==3)return false;
  const d=new Date(parseInt(parts[2]),parseInt(parts[1])-1,parseInt(parts[0]));
  return d<new Date();
}
function isSoon(echeance){
  if(!echeance||echeance==='Immédiat')return false;
  const parts=echeance.split('/');
  if(parts.length!==3)return false;
  const d=new Date(parseInt(parts[2]),parseInt(parts[1])-1,parseInt(parts[0]));
  const diff=(d-new Date())/(1000*60*60*24);
  return diff>=0&&diff<=7;
}

  // so the spinner actually paints.
  showModal('<div style="display:flex;flex-direction:column;align-items:center;gap:14px;padding:24px 10px">'
    +'<div style="width:26px;height:26px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite"></div>'
    +'<div style="font-size:13px;color:var(--text2);font-weight:500">Préparation du PDF…</div></div>');
  setTimeout(function(){ _buildPreviewPDF(crId); }, 30);
}
function _buildPreviewPDF(crId){
  const cr=CRS.find(function(x){return x.id===crId;});
  if(!cr){ closeModal(); return; }

  const pages=buildPDFPages(cr);
  const fullHTML='<!DOCTYPE html><html><head><meta charset="UTF-8"><style>'
    +'body{font-family:Arial,sans-serif;font-size:9pt;color:#000;margin:0;padding:0}'
    +'table{border-collapse:collapse}'
    +'.pr-page{padding:20px}'
    +'@media print{.pr-page{padding:12mm;page-break-after:always}}'
    +'</style></head><body>'+pages.join('')+'</body></html>';

  window._pdfPreviewHTML=fullHTML;
  window._pdfPreviewCrId=crId;
  window._pdfZoom=1.0;
  window._pdfPages=pages;
  window._pdfCurrentPage=0;

  // Build modal
  const totalPages=pages.length;
  const modalHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;background:var(--bg2);padding:8px 12px;border-radius:var(--r);border:1px solid var(--border)">
      <div style="display:flex;align-items:center;gap:6px">
        <button class="btn btn-sm" onclick="pdfViewPage(-1)" title="Page précédente">◀</button>
        <span id="pdf-page-counter" style="font-size:11px;color:var(--text3);min-width:80px;text-align:center">Page 1 / ${totalPages}</span>
        <button class="btn btn-sm" onclick="pdfViewPage(1)" title="Page suivante">▶</button>
        <button class="btn btn-sm" onclick="pdfZoom(-0.15)" title="Zoom −">−</button>
        <button class="btn btn-sm" onclick="pdfZoom(0.15)" title="Zoom +">+</button>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm" onclick="downloadPreviewHTML('${crId}')">
          <svg class="ico ico-xs"><use href="#i-download"/></svg> HTML
        </button>
        <button class="btn btn-p btn-sm" onclick="printFromPreview('${crId}')">
          <svg class="ico ico-xs"><use href="#i-printer"/></svg> Imprimer / Enregistrer en PDF
        </button>
        <button class="btn btn-sm" onclick="closeModal()">Fermer</button>
      </div>
    </div>
    <div id="pdf-viewer-container" style="background:var(--text);border-radius:var(--r);overflow:auto;height:72vh;display:flex;flex-direction:column;align-items:center;padding:16px;gap:16px">
    </div>`;

  document.getElementById('modal-root').innerHTML=`<div class="mo-ov" onclick="if(event.target===this)closeModal()">
    <div onclick="event.stopPropagation()" style="background:var(--panel);border-radius:var(--r2);padding:20px;width:min(900px,97vw);max-height:95vh;overflow-y:auto;box-shadow:var(--shadow2);border:1px solid var(--border)">
      ${modalHTML}
    </div>
  </div>`;

  setTimeout(function(){
    const container=document.getElementById('pdf-viewer-container');
    if(!container)return;
    const A4_W=794,A4_H=1123;

    function updateCounter(){
      const counter=document.getElementById('pdf-page-counter');
      if(counter) counter.textContent='Page '+(window._pdfCurrentPage+1)+' / '+window._pdfPages.length;
    }

    function renderPages(){
      container.innerHTML='';
      const zoom=window._pdfZoom||1;
      window._pdfPages.forEach(function(pageHTML){
        const wrapper=document.createElement('div');
        wrapper.className='pdf-page-wrapper';
        wrapper.style.cssText='background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.4);border-radius:2px;width:'+Math.round(A4_W*zoom)+'px;min-height:'+Math.round(A4_H*zoom)+'px;overflow:hidden;flex-shrink:0;position:relative;margin:0 auto';
        const inner=document.createElement('div');
        inner.style.cssText='transform:scale('+zoom+');transform-origin:top left;width:'+A4_W+'px;min-height:'+A4_H+'px;font-family:Arial,sans-serif;font-size:9pt;color:#000;padding:20px;box-sizing:border-box';
        inner.innerHTML=pageHTML;
        wrapper.appendChild(inner);
        container.appendChild(wrapper);
      });
      updateCounter();
    }

    window.pdfViewPage=function(dir){
      const total=window._pdfPages.length;
      window._pdfCurrentPage=Math.max(0,Math.min(total-1,(window._pdfCurrentPage||0)+dir));
      const wrappers=container.querySelectorAll('.pdf-page-wrapper');
      if(wrappers[window._pdfCurrentPage]) wrappers[window._pdfCurrentPage].scrollIntoView({behavior:'smooth',block:'start'});
      updateCounter();
    };
    window.pdfZoom=function(delta){
      window._pdfZoom=Math.max(0.4,Math.min(2,(window._pdfZoom||1)+delta));
      renderPages();
    };
    renderPages();
  },50);
}


function printFromPreview(crId){
  const html=window._pdfPreviewHTML;
  if(!html){exportCR(crId);return;}
  markClean();
  savePrintSnapshot(crId||window._pdfPreviewCrId);
  const w=window.open('','_blank','width=900,height=700');
  if(w){w.document.write(html);w.document.close();setTimeout(function(){w.print();},400);}
}

function downloadPreviewHTML(crId){
  const html=window._pdfPreviewHTML;
  if(!html)return;
  const cr=CRS.find(c=>c.id===crId);
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='CR_'+(cr?cr.projet.replace(/[^a-z0-9]/gi,'_'):'export')+'_'+(cr?cr.date.replace(/\//g,'-'):'')+'.html';
  a.click();
  URL.revokeObjectURL(url);
  toast('Fichier HTML téléchargé ✓');
}

/* ══ IMAGES ══ */
function openAddImage(crId, lotId, rId){
  const cr=CRS.find(c=>c.id===crId);
  const lot=cr?.lots.find(l=>l.id===lotId);
  const r=lot?.remarques.find(x=>x.id===rId);
  if(!r)return;
  if(!r.images)r.images=[];
  showModal(`<h3 style="margin-bottom:14px">Ajouter une image</h3>
    <div class="fi"><label>Image (JPG, PNG, GIF…)</label>
      <input type="file" id="img-file" accept="image/*" style="font-size:12px">
    </div>
    <div class="fi"><label>Légende (optionnel)</label>
      <input id="img-caption" placeholder="Ex: Vue façade nord" style="width:100%">
    </div>
    <div class="mo-foot">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn btn-p" onclick="confirmAddImage('${crId}','${lotId}','${rId}')">Ajouter</button>
    </div>`);
}

function confirmAddImage(crId,lotId,rId){
  const file=document.getElementById('img-file')?.files?.[0];
  const caption=document.getElementById('img-caption')?.value?.trim()||'';
  if(!file){alert('Choisissez une image');return;}
  const reader=new FileReader();
  reader.onload=function(e){
    const cr=CRS.find(c=>c.id===crId);
    const lot=cr?.lots.find(l=>l.id===lotId);
    const r=lot?.remarques.find(x=>x.id===rId);
    if(!r)return;
    if(!r.images)r.images=[];
    r.images.push({id:'img'+(uid++),data:e.target.result,caption:caption,name:file.name});
    closeModal();markDirty();renderCR();
    toast('Image ajoutée');
  };
  reader.readAsDataURL(file);
}

function deleteImage(crId,lotId,rId,imgId){
  if(!guardDelete(crId))return;
  const cr=CRS.find(c=>c.id===crId);
  const lot=cr?.lots.find(l=>l.id===lotId);
  const r=lot?.remarques.find(x=>x.id===rId);
  if(!r||!r.images)return;
  const idx=r.images.findIndex(i=>i.id===imgId);
  if(idx<0)return;
  if(!confirm('Supprimer définitivement ? Cette action est irréversible.'))return;
  const removed=r.images[idx];
  r.images.splice(idx,1);
  markDirty();renderCR();
  undoToast('Image supprimée',function(){
    const r2=CRS.find(c=>c.id===crId)?.lots.find(l=>l.id===lotId)?.remarques.find(x=>x.id===rId);
    if(!r2)return;
    if(!r2.images)r2.images=[];
    r2.images.splice(Math.min(idx,r2.images.length),0,removed);
    markDirty();renderCR();
  });
}

function renderImageGrid(images,deleteFn){
  if(!images||!images.length)return '';
  return `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">`+
    images.map(img=>`
      <div style="position:relative;border-radius:6px;overflow:hidden;border:1px solid var(--border)">
        <img src="${img.data}" style="width:90px;height:70px;object-fit:cover;display:block" title="${e(img.caption||img.name)}">
        ${img.caption?`<div style="padding:2px 5px;font-size:9px;color:var(--text3);background:var(--bg2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px">${e(img.caption)}</div>`:''}
        <button onclick="${deleteFn}('${img.id}')" style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,.5);border:none;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1">x</button>
      </div>`).join('')+
  `</div>`;
}

function renderImageGridPDF(images){
  if(!images||!images.length)return '';
  return `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;page-break-inside:avoid">`+
    images.map(img=>`<div style="display:inline-block">
      <img src="${img.data}" style="max-width:120px;max-height:100px;object-fit:contain;border:1px solid #ccc;border-radius:4px;display:block">
      ${img.caption?`<div style="font-size:7pt;color:#666;margin-top:2px;max-width:120px">${e(img.caption)}</div>`:''}
    </div>`).join('')+

}

/* ══ INIT ══ */

// Initialize color + auto-link lots to intervenants
CRS.forEach(function(cr){
  // Init colors on intervenants
  cr.intervenants.forEach(function(int){
    if(!int.color) int.color = lotColor(int.lot);
  });
  // Auto-link lots that don't have intId yet, by matching names
  cr.lots.forEach(function(lot){
    if(!lot.intId){
      const match = cr.intervenants.find(function(iv){
        const l=lot.titre.toLowerCase(), iv2=iv.lot.toLowerCase();
        return l.includes(iv2)||iv2.includes(l)||
          (iv.entreprise&&(l.includes(iv.entreprise.toLowerCase())||iv.entreprise.toLowerCase().includes(l)));
      });
      if(match) lot.intId=match.id;
    }
    // Lot inherits color from linked intervenant
    if(lot.intId){
      const iv=cr.intervenants.find(function(i){return i.id===lot.intId;});
      // lot color is derived via getColor() — no need to copy
    }
    // Initialize createdAt on existing remarques (use CR date as fallback)
    lot.remarques.forEach(function(r){
      if(!r.createdAt) r.createdAt=cr.date||'—';
      // Migrate: if done but not archived, keep as done (strikethrough)
      if(r.done&&r.archived===undefined) r.archived=false;
    });
  });
  // Actions inherit color from linked intervenant
  cr.actions.forEach(function(a){
    if(!a.intId){
      // Try to auto-link by matching responsable name
      const match=cr.intervenants.find(function(iv){
        return iv.entreprise&&a.responsable&&
          (iv.entreprise.toLowerCase().includes(a.responsable.toLowerCase())||
           a.responsable.toLowerCase().includes(iv.entreprise.toLowerCase()));
      });
      if(match) a.intId=match.id;
    }
  });
});
