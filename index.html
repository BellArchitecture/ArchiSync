        +'<div style="display:flex;flex-direction:column;gap:10px">'
          +'<button class="btn btn-g" style="justify-content:flex-start;text-align:left;height:auto;padding:11px 13px;flex-direction:column;align-items:flex-start;gap:3px" onclick="confirmImport(\'merge\')">'
            +'<span style="font-weight:600;font-size:13px"><svg class="ico ico-xs" style="margin-right:5px"><use href="#i-plus"/></svg>Fusionner (recommandé)</span>'
            +'<span style="font-size:11.5px;color:var(--text3);line-height:1.4">Ajoute les projets importés aux vôtres. Vos données locales ne sont jamais écrasées ; un projet en doublon est ajouté en copie.</span>'
          +'</button>'
          +'<button class="btn btn-g" style="justify-content:flex-start;text-align:left;height:auto;padding:11px 13px;flex-direction:column;align-items:flex-start;gap:3px" onclick="confirmImport(\'replace\')">'
            +'<span style="font-weight:600;font-size:13px;color:var(--red)"><svg class="ico ico-xs" style="margin-right:5px"><use href="#i-trash"/></svg>Remplacer tout</span>'

  inp.click();

var _pendingImport=null;
function confirmImport(mode){
  var data=_pendingImport;if(!data)return;
  if(mode==='replace'){
    confirmModal({
      title:'Remplacer toutes les données',
      body:'Cela <strong>supprimera définitivement</strong> les projets actuels de cet appareil. Cette application est votre seule copie : exportez une sauvegarde avant de continuer.',
      confirmLabel:'Remplacer et importer',
      extraLabel:'Exporter d\'abord',
      extraAction:function(){exportData();},
      onConfirm:function(){applyImport(data,'replace');}
    });
  } else {
    applyImport(data,'merge');
  }
}
function importGenId(prefix){return (prefix||'imp')+'_'+Date.now().toString(36)+'_'+(uid++).toString(36);}
// Liste des objets porteurs de blobs dans un projet (docs, pv, et PDF du suivi).
function projBlobItems(p){
  var arr=[];var d=p.docs_data||{};
  ['plans','contrats','factures','photos','admin'].forEach(function(k){(d[k]||[]).forEach(function(it){if(it)arr.push(it);});});
  (p.pv||[]).forEach(function(it){if(it)arr.push(it);});
  return arr;
}
// Réattribue de nouveaux identifiants de blobs à un projet importé pour ne jamais
// écraser les octets locaux existants (clés globales dans BLOBS/IndexedDB).
function remapImportedBlobs(p,blobsSrc){
  blobsSrc=blobsSrc||{};
  function move(oldId,prefix){
    if(!oldId)return oldId;
    var nid=importGenId(prefix);
    if(blobsSrc[oldId]){BLOBS[nid]=blobsSrc[oldId];try{BlobDB.put(nid,blobsSrc[oldId]);}catch(e){}}
    return nid;
  }
  projBlobItems(p).forEach(function(it){
    it.id=move(it.id,'d');
    if(Array.isArray(it.versions))it.versions.forEach(function(ver){if(ver)ver.blobId=move(ver.blobId,'v');});
  });
  (p.suivi||[]).forEach(function(g){(g.devis||[]).forEach(function(dv){
    if(dv.devisPdf&&dv.devisPdf.blobId)dv.devisPdf.blobId=move(dv.devisPdf.blobId,'sp');
    (dv.factures||[]).forEach(function(f){if(f.facturePdf&&f.facturePdf.blobId)f.facturePdf.blobId=move(f.facturePdf.blobId,'sp');});
  });});
  // PDF signés du CCTP et du contrat (+ avenants) : sans remap, deux projets importés
  // partageraient le même blobId et la suppression de l'un effacerait le PDF de l'autre.
  if(p.cctp&&p.cctp.pdf&&p.cctp.pdf.blobId)p.cctp.pdf.blobId=move(p.cctp.pdf.blobId,'cctppdf');
  if(p.cctp&&Array.isArray(p.cctp.additifs))p.cctp.additifs.forEach(function(a){if(a.pdf&&a.pdf.blobId)a.pdf.blobId=move(a.pdf.blobId,'cadpdf');});
  if(p.dpgf&&p.dpgf.pdf&&p.dpgf.pdf.blobId)p.dpgf.pdf.blobId=move(p.dpgf.pdf.blobId,'dgpdf');
  if(p.contrat){
    if(p.contrat.pdf&&p.contrat.pdf.blobId)p.contrat.pdf.blobId=move(p.contrat.pdf.blobId,'ctpdf');
    (p.contrat.avenants||[]).forEach(function(a){if(a.pdf&&a.pdf.blobId)a.pdf.blobId=move(a.pdf.blobId,'avpdf');});
  }
  if(p.paliers&&Array.isArray(p.paliers.list))p.paliers.list.forEach(function(pl){(pl.annexes||[]).forEach(function(a){if(a.blobId)a.blobId=move(a.blobId,'plxpdf');});});
}
// ── Garde de sécurité d'import ────────────────────────────────────────────────
// Tous les identifiants créés par l'app sont alphanumériques (uid++, Date.now,
// importGenId). Le rendu interpole ces ids bruts dans des gestionnaires
// onclick="fn('<id>')". Une sauvegarde malveillante pourrait y glisser une
// apostrophe et injecter du JS (XSS stocké). On refuse donc tout import dont un
// champ identifiant contient autre chose que [A-Za-z0-9_-]. Aucune sauvegarde
// légitime n'est concernée (ids internes uniquement).
// Caractères qui pourraient « casser » un identifiant interpolé dans onclick="fn('<id>')"
// (apostrophe, antislash) ou dans un attribut HTML id="…"/value="…" (guillemet, chevrons,
// accent grave, caractères de contrôle). On autorise « : » « . » « / » etc. car des champs
// d'identité légitimes en contiennent (ex. authorId = "mbr:xxx") et ne posent aucun risque.
var UNSAFE_ID_RE=/['"\\<>`\x00-\x1f]/;
function idValueSafe(v){return typeof v!=='string'||!v||(!UNSAFE_ID_RE.test(v)&&v.length<=200);}
function importIdsSafe(node,depth){
  if(depth>60||node==null)return true;
  if(Array.isArray(node)){for(var i=0;i<node.length;i++){if(!importIdsSafe(node[i],depth+1))return false;}return true;}
  if(typeof node!=='object')return true;
  for(var k in node){
    if(!Object.prototype.hasOwnProperty.call(node,k))continue;
    var v=node[k];
    // Clés porteuses d'identifiant : « id », « creator », et tout « *Id » (folderId, planId, memberId, srcId, intId…).
    if((k==='id'||k==='creator'||/Id$/.test(k)) && !idValueSafe(v))return false;
    // Tableaux d'identifiants (participants d'une note privée).
    if(k==='participants' && Array.isArray(v)){for(var j=0;j<v.length;j++){if(!idValueSafe(v[j]))return false;}}
    if(v&&typeof v==='object'){if(!importIdsSafe(v,depth+1))return false;}
  }
  return true;
}
// Champs de profil acceptés à l'import (évite d'injecter des propriétés arbitraires dans USER).
var IMPORT_USER_FIELDS=['prenom','nom','firm','email','color','initiales','role'];
function applyImport(data,mode){
  mode=mode||'replace';
  // Refuse une sauvegarde dont un identifiant est non conforme (anti-injection onclick).
  if(!importIdsSafe(data.projs,0)){toastErr('Sauvegarde refusée : identifiants non valides (fichier corrompu ou non fiable).');return;}
  if(data.blobs&&typeof data.blobs==='object'){
    var badBlob=Object.keys(data.blobs).some(function(k){return !idValueSafe(k);});
    if(badBlob){toastErr('Sauvegarde refusée : références de fichiers non valides.');return;}
  }
  // N'accepte que des champs de profil connus.
  function safeUser(u){var o={};if(u&&typeof u==='object')IMPORT_USER_FIELDS.forEach(function(f){if(typeof u[f]!=='undefined')o[f]=u[f];});return o;}
  // Des octets de fichiers sont importés : invalide le cache de la sauvegarde automatique.
  try{if(typeof BackupFS!=='undefined'&&BackupFS.markBlobsDirty)BackupFS.markBlobsDirty();}catch(e){}
  try{
    if(mode==='replace'){
      if(data.user&&typeof data.user==='object'){Object.assign(USER,safeUser(data.user));saveUSER();}
      PROJS=data.projs;
      PROJS.forEach(function(p){try{normalizeProject(p);}catch(er){console.warn('[applyImport] normalizeProject',er);}if(p.planFolders)PROJ_PLAN_FOLDERS[p.id]=p.planFolders;});
      if(data.blobs&&typeof data.blobs==='object'){
        Object.keys(data.blobs).forEach(function(k){
          var bv=data.blobs[k];
          if(typeof bv==='string'&&/^data:/.test(bv)){BLOBS[k]=bv;try{BlobDB.put(k,bv);}catch(e){}}
        });
      }
      savePROJS();
      PROJ=null;VIEW='projets';closeModal();
      renderBanner();renderSB();renderMain();renderUserFooter();
      toast('Sauvegarde importée (remplacement)');
      refreshStorageInfo();
      return;
    }
    // ── Fusion non destructive ──
    var existingIds={};PROJS.forEach(function(p){existingIds[p.id]=p;});
    var added=0,copies=0,skipped=0;
    (data.projs||[]).forEach(function(incoming){
      var ex=existingIds[incoming.id];
      if(!ex){
        // Nouveau projet : re-clé les blobs (peut entrer en collision avec des ids locaux d'autres projets).
        remapImportedBlobs(incoming,data.blobs);
        try{normalizeProject(incoming);}catch(er){console.warn('[applyImport] normalizeProject',er);}
        if(incoming.planFolders)PROJ_PLAN_FOLDERS[incoming.id]=incoming.planFolders;
        PROJS.push(incoming);added++;
      } else if(JSON.stringify(ex)===JSON.stringify(incoming)){
        skipped++; // identique : rien à faire (les octets locaux existent déjà)
      } else {
        // Doublon d'id avec contenu différent : on garde les deux (jamais d'écrasement du local).
        var copy=JSON.parse(JSON.stringify(incoming));
        copy.id=importGenId('proj');
        copy.name=(copy.name||'Projet')+' (importé)';
        remapImportedBlobs(copy,data.blobs);
        (copy.membres||[]).forEach(normalizeMbr);
        if(copy.planFolders)PROJ_PLAN_FOLDERS[copy.id]=copy.planFolders;
        PROJS.push(copy);copies++;
      }
    });
    savePROJS();
    PROJ=null;VIEW='projets';closeModal();
    renderBanner();renderSB();renderMain();renderUserFooter();
    var parts=[];if(added)parts.push(added+' ajouté'+(added>1?'s':''));if(copies)parts.push(copies+' en copie');if(skipped)parts.push(skipped+' identique'+(skipped>1?'s':''));
    toast('Fusion terminée : '+(parts.join(', ')||'aucun changement'));
    refreshStorageInfo();
  }catch(err){toastErr('Échec de l\'import.');}
}

/* ══ ONBOARDING PREMIÈRE UTILISATION ══ */
// "Vraies données" = au moins un projet non-démo, OU un nom d'utilisateur renseigné.
function hasRealData(){
  if(USER&&(USER.prenom||USER.nom||USER.firm))return true;
  return PROJS.some(function(p){return p&&p.id&&p.id.indexOf('demo')!==0;});

/* ══ SYNCHRONISATION DES PROJETS (SUPABASE) — Phase 2 ════════════════════════
   Écriture via la fonction save_project (SECURITY DEFINER, contrôle serveur).
   Lecture via la policy RLS (select). Chaque projet synchronisé porte _sbId
   (uuid de la ligne). Le local reste le cache hors-ligne ; l'export JSON reste
   une sauvegarde. Le projet de démonstration n'est jamais envoyé. */
var _supaSuppressSync=false, _sbSyncTimers={}, _sbProjectsLoaded=false, _companyMode=false, _supaUid=null;
function projectCloudData(p){var c=JSON.parse(JSON.stringify(p));delete c._sbId;delete c._sbUpdated;delete c.myAccessRole;return c;}
// Back-fill des champs attendus par l'UI : un projet venu du cloud (ou minimal) ne
// doit jamais faire planter le rendu sur un champ manquant.
function normalizeProject(p){
  if(!p||typeof p!=='object')return p;
  if(!Array.isArray(p.avs))p.avs=[];
  if(!Array.isArray(p.membres))p.membres=[];
  if(!Array.isArray(p.audit))p.audit=[];
  if(!Array.isArray(p.pv))p.pv=[];
  if(!Array.isArray(p.suivi))p.suivi=[];
  if(!Array.isArray(p.ints))p.ints=[];
  if(!Array.isArray(p.milestones))p.milestones=[];
  if(!Array.isArray(p.chantier))p.chantier=[];
  if(!p.opts||typeof p.opts!=='object')p.opts={};
  if(!p.cctp||typeof p.cctp!=='object')p.cctp={intro:'',sections:[]};
  try{if(typeof cctpEnsure==='function')cctpEnsure(p);}catch(e){console.warn('[normalizeProject] cctpEnsure',e);}
  try{if(typeof dpgfEnsure==='function')dpgfEnsure(p);}catch(e){console.warn('[normalizeProject] dpgfEnsure',e);}
  try{if(typeof ctEnsure==='function')ctEnsure(p);}catch(e){console.warn('[normalizeProject] ctEnsure',e);}
  try{if(typeof palEnsure==='function')palEnsure(p);}catch(e){console.warn('[normalizeProject] palEnsure',e);}
  try{if(typeof hrEnsure==='function')hrEnsure(p);}catch(e){console.warn('[normalizeProject] hrEnsure',e);}
  try{if(typeof ensureSuivi==='function')ensureSuivi(p);}catch(e){console.warn('[normalizeProject] ensureSuivi',e);}
  try{if(typeof ensurePrechiffrage==='function')ensurePrechiffrage(p);}catch(e){console.warn('[normalizeProject] ensurePrechiffrage',e);}
  // Couleurs issues du cloud : neutralise toute valeur CSS non conforme (anti-injection style).
  try{if(p.color)p.color=sanitizeColor(p.color);if(p.bg)p.bg=sanitizeColor(p.bg);}catch(e){}
  if(!p.docs_data||typeof p.docs_data!=='object')p.docs_data={};
  ['plans','contrats','factures','photos','admin'].forEach(function(k){if(!Array.isArray(p.docs_data[k]))p.docs_data[k]=[];});
  if(!p.name)p.name='Projet';
  if(!p.phase)p.phase='Études';
  if(!p.type)p.type='maison';
  if(!p.color)p.color='#5c3d1e';
  if(!p.bg)p.bg='#f5ede6';
  (p.membres||[]).forEach(function(m){try{normalizeMbr(m);}catch(e){try{console.warn('[normalizeProject] membre ignoré',m&&m.id,e);}catch(_){}}});
  // avs (initiales pour la pile d'avatars) dérivées des membres si absentes.
  if(!p.avs.length&&p.membres.length)p.avs=p.membres.slice(0,3).map(function(m){return m.ini||((m.name||'?')[0]||'?').toUpperCase();});
  // Migration : harmonise les couleurs des groupes de checkliste sur la palette terre (brun de marque).
  try{migrateCLColors(p.clTree);}catch(e){console.warn('[migrateCLColors]',e);}
  return p;
}
// Couleurs des phases de checkliste : dégradé terre cohérent avec le brun de marque (#5c3d1e).
// Vérifié WCAG AA (texte ≥4.5:1 sur blanc). Clé = id de groupe (les ids sont stables).
var CL_GROUP_COLORS={depot:'#5c3d1e',exe:'#7c5230',chantier:'#9c5e27',finition:'#8c601f',therm:'#7a6040',geo:'#6b5035'};
function migrateCLColors(tree){
  if(!Array.isArray(tree))return;
  tree.forEach(function(n){
    if(n&&n.id&&CL_GROUP_COLORS[n.id])n.color=CL_GROUP_COLORS[n.id];
    if(n&&n.children)migrateCLColors(n.children);
  });
}
var _supaLoadInFlight=null, _sbLoadFailed=false;
function supaLoadProjects(){
  if(!isSignedIn())return Promise.resolve();
  if(_supaLoadInFlight)return _supaLoadInFlight; // collapse les appels concurrents
  // Persiste toute édition en attente AVANT d'écraser les slots PROJS avec les données
  // du cloud. Si l'enregistrement échoue (stockage saturé — savePROJS a déjà prévenu),
  // on annule le chargement pour ne pas perdre la saisie non sauvegardée en mémoire.
  try{ if(flushSave()===false) return Promise.resolve(); }catch(e){}
  var C=null,roleByPid={};
  _supaLoadInFlight=supaClient().then(function(c){C=c; _supaUid=_supaUser?_supaUser.id:null;
    // Profil (mode entreprise) + rôles d'accès par projet, en parallèle des projets.
    return Promise.all([
      c.from('projects').select('id,name,data,updated_at,owner'),
      c.from('project_members').select('project_id,access_role'),
      c.from('profiles').select('account_type,can_create_projects')
    ]);
  }).then(function(rs){
     var pr=rs[0], mem=rs[1], prof=rs[2];
     if(pr.error)throw pr.error;
     (mem.data||[]).forEach(function(m){roleByPid[m.project_id]=m.access_role;});
     _companyMode = !!(prof.data&&prof.data[0]&&prof.data[0].account_type==='company');
     (pr.data||[]).forEach(function(row){
       var data=row.data||{}; if(!data.id)data.id=row.id; data._sbId=row.id; data._sbUpdated=row.updated_at;
       // Sécurité : un projet cloud avec des identifiants non conformes (injection possible
       // dans les gestionnaires onclick) est ignoré — mêmes règles que l'import de fichier.
       if(typeof importIdsSafe==='function' && !importIdsSafe(data,0)){ try{toastErr('Un projet en ligne a été ignoré (identifiants non valides).');}catch(e){} return; }
       // Rôle effectif : propriétaire => admin ; sinon rôle d'adhésion (défaut lecture).
       data.myAccessRole = (row.owner===_supaUid) ? 'admin' : (roleByPid[row.id] || 'lecture');
       normalizeProject(data);
       var i=PROJS.findIndex(function(p){return (p._sbId&&p._sbId===row.id)||(p.id&&p.id===data.id);});
       if(i>=0)PROJS[i]=data; else PROJS.push(data);
       if(data.planFolders)PROJ_PLAN_FOLDERS[data.id]=data.planFolders;
     });
     // En mode entreprise : on retire le projet de démonstration (l'entreprise ne voit que son projet).
     if(_companyMode){ for(var k=PROJS.length-1;k>=0;k--){ if(isDemoProj(PROJS[k]))PROJS.splice(k,1); } }
     // Re-pointe le projet ouvert vers son nouvel objet (le slot PROJS a été remplacé) pour
     // éviter un PROJ orphelin dont les éditions ne seraient plus sérialisées par savePROJS().
     if(PROJ){var _np=PROJS.find(function(p){return (PROJ._sbId&&p._sbId===PROJ._sbId)||(p.id&&p.id===PROJ.id);});if(_np)PROJ=_np;}
     _sbProjectsLoaded=true; _sbLoadFailed=false;
     _supaSuppressSync=true; try{savePROJS();}finally{_supaSuppressSync=false;}
     renderSB();renderMain();updateAuthUI();
     return (pr.data||[]).length;
   }).catch(function(e){_sbLoadFailed=true;toastErr('Chargement en ligne impossible : '+(e&&e.message?e.message:'erreur')+' — synchronisation suspendue.');})
   .then(function(r){_supaLoadInFlight=null;return r;});
}
var _sbBlobsSwept={}, _sbPushRetried={};
function supaPushProject(p,isRetry){
  if(!isSignedIn()||!p||isDemoProj(p))return Promise.resolve(false);
  var wasNew=!p._sbId;
  return supaClient().then(function(c){return c.rpc('save_project',{p_id:p._sbId||null,p_name:p.name||'Projet',p_data:projectCloudData(p)});})
   .then(function(r){
     if(r.error)throw r.error;
     if(r.data){p._sbId=r.data.id;p._sbUpdated=r.data.updated_at;_supaSuppressSync=true;try{savePROJS();}finally{_supaSuppressSync=false;}}
     // Balaye les octets une seule fois par projet (les nouveaux fichiers sont déjà gérés par setBlob).
     if((wasNew||!_sbBlobsSwept[p._sbId])&&p._sbId){_sbBlobsSwept[p._sbId]=true;try{supaUploadProjectBlobs(p);}catch(e){}}
     _sbPushRetried[p.id]=false; _supaSetSyncState('ok');return true;
   }).catch(function(e){
     _supaSetSyncState('err');
     // Signale clairement (le local est sauvé, mais PAS en ligne) — évite un faux sentiment de synchro.
     if(!isRetry){try{toastErr('Synchronisation en ligne échouée — réessai automatique. Vos données restent locales.');}catch(_){}
       if(!_sbPushRetried[p.id]){_sbPushRetried[p.id]=true;setTimeout(function(){if(isSignedIn())supaPushProject(p,true);},30000);}}
     return false;
   });
}
function supaQueueSync(p){
  if(!isSignedIn()||!p||isDemoProj(p))return;
  if(!_sbProjectsLoaded||_sbLoadFailed)return; // ne pas pousser le local par-dessus le cloud tant qu'on n'a pas chargé
  var key=p.id; if(_sbSyncTimers[key])clearTimeout(_sbSyncTimers[key]);
  _supaSetSyncState('pending');
  _sbSyncTimers[key]=setTimeout(function(){delete _sbSyncTimers[key];supaPushProject(p);},2500);
}
function supaImportLocal(){
  if(!isSignedIn()){toastErr('Connectez-vous d\'abord.');return;}
  var locals=PROJS.filter(function(p){return p&&!p._sbId&&!isDemoProj(p);});
  if(!locals.length){toast('Aucun projet local à importer (déjà synchronisés ou démo).');return;}
  toast('Import de '+locals.length+' projet(s)…');
  var done=0,fail=0;
  Promise.all(locals.map(function(p){return supaPushProject(p).then(function(ok){ok?done++:fail++;});}))
   .then(function(){toast(done+' projet(s) importé(s) en ligne'+(fail?(' · '+fail+' échec(s)'):''));if(_supaUser)openAuthModal('account');});
}
function _supaSetSyncState(s){try{var el=document.getElementById('sync-stamp');if(el)el.textContent=(s==='ok'?'Synchronisé ✓':(s==='pending'?'Synchronisation…':(s==='err'?'Échec de synchro (réessai au prochain enregistrement)':'')));}catch(e){}}

/* ── Codes d'accès entreprise (Phase 4, côté propriétaire) ──────────────────── */
function _genAccessCode(){var al='ABCDEFGHJKMNPQRSTUVWXYZ23456789';function rnd(n){try{var a=new Uint32Array(1);crypto.getRandomValues(a);return a[0]%n;}catch(_){return Math.floor(Math.random()*n);}}function blk(){var s='';for(var i=0;i<4;i++)s+=al[rnd(al.length)];return s;}return blk()+'-'+blk();}
function supaLoadAccessCodes(){
  if(!isSignedIn()||!PROJ||!PROJ._sbId)return Promise.resolve([]);
  return supaClient().then(function(c){return c.from('access_codes').select('code,access_role,email,used_by,used_at,created_at').eq('project_id',PROJ._sbId);})
   .then(function(r){return r.error?[]:(r.data||[]);}).catch(function(){return [];});
}
function supaCreateAccessCode(role){
  if(!isSignedIn()){toastErr('Connectez-vous en ligne.');return;}
  if(!PROJ||!PROJ._sbId){toastErr('Synchronisez d\'abord ce projet en ligne (Compte en ligne → Importer).');return;}
  var code=_genAccessCode();
  var uid=_supaUid||(_supaUser&&_supaUser.id);
  supaClient().then(function(c){return c.from('access_codes').insert({code:code,project_id:PROJ._sbId,access_role:role||'lecture',created_by:uid});})
   .then(function(r){if(r.error)throw r.error;toast('Code créé : '+code);_renderAccessCodes();})
   .catch(function(e){toastErr('Création du code impossible : '+(e&&e.message?e.message:'erreur'));});
}
function supaRevokeAccessCode(code){
  if(!isSignedIn()||!can('manageAccess'))return;
  supaClient().then(function(c){return c.from('access_codes').delete().eq('code',code);})
   .then(function(r){if(r.error)throw r.error;toast('Code révoqué');_renderAccessCodes();})
   .catch(function(){toastErr('Révocation impossible.');});
}
function openAccessCodesModal(){
  if(!isSignedIn()){toastErr('Connectez-vous en ligne (pastille « Local » → Compte en ligne) pour gérer les codes.');return;}
  if(!PROJ||!PROJ._sbId){toastErr('Ce projet n\'est pas encore en ligne. Importez-le : Compte en ligne → « Importer mes projets locaux ».');return;}
  showModal('<h3 style="display:flex;align-items:center;gap:8px"><svg class="ico ico-sm" style="color:var(--blue)" aria-hidden="true"><use href="#i-lock"/></svg>Codes d\'accès entreprise</h3>'
    +'<div id="ac-host" style="min-height:60px">Chargement…</div>'
    +'<div class="mo-foot" style="margin-top:12px"><button class="btn" onclick="closeModal()">Fermer</button></div>');
  _renderAccessCodes();
}
function _renderAccessCodes(){
  var host=document.getElementById('ac-host'); if(!host)return;
  supaLoadAccessCodes().then(function(codes){
    host=document.getElementById('ac-host'); if(!host)return;
    var rows=codes.length?codes.map(function(c){
      var used=!!c.used_by;
      return '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px">'
        +'<div style="flex:1;min-width:0"><div style="font-family:ui-monospace,monospace;font-weight:700;font-size:15px;letter-spacing:1.5px">'+e(c.code)+'</div>'
        +'<div style="font-size:11px;color:var(--text3)">'+e((ACCESS_RL&&ACCESS_RL[c.access_role])||c.access_role)+' · '+(used?'<span style="color:var(--green)">utilisé</span>':'non utilisé')+'</div></div>'
        +'<button class="btn btn-g btn-sm" aria-label="Copier le code '+e(c.code)+'" onclick="(navigator.clipboard&&navigator.clipboard.writeText(\''+e(jsq(c.code))+'\'));toast(\'Code copié\')">Copier</button>'
        +'<button class="btn btn-g btn-sm" style="color:var(--red)" aria-label="Révoquer le code '+e(c.code)+'" onclick="supaRevokeAccessCode(\''+e(jsq(c.code))+'\')" title="Révoquer">'+ico('trash','ico-xs')+'</button>'
      +'</div>';
    }).join(''):'<div style="font-size:12px;color:var(--text3);padding:6px 0 10px">Aucun code pour l\'instant.</div>';
    host.innerHTML='<div style="font-size:11.5px;color:var(--text3);line-height:1.5;margin-bottom:10px">Donnez un code à une entreprise. Elle créera un compte via l\'onglet « Entreprise (code) » et accédera à <strong>ce projet uniquement, en lecture seule</strong>.</div>'
      +'<button class="btn btn-p btn-sm" style="margin-bottom:12px" onclick="supaCreateAccessCode(\'lecture\')"><svg class="ico ico-xs" style="margin-right:4px" aria-hidden="true"><use href="#i-plus"/></svg>Générer un code (lecture seule)</button>'
      +rows;
  });
}

/* ══ FICHIERS → SUPABASE STORAGE — Phase 3 ════════════════════════════════════
   Les octets (PDF/photos) sont stockés dans le bucket 'project-files' au chemin
   {sbProjectId}/{docId}. IndexedDB reste le cache principal ; l'envoi est « best
   effort » (un échec ne casse rien, le fichier reste local) ; le téléchargement
   n'a lieu qu'en cas d'absence locale (ex. nouvel appareil). */
var _sbBlobUploaded={}, _sbBlobQueue=[], _sbUploadRunning=false, _supaSuppressBlobUp=false;
// Résout l'_sbId du projet propriétaire d'un blob (doc / pv / pdf de suivi).
function _blobProjectSbId(blobId){
  // Source unique : projAllBlobIds couvre docs_data + pv + PDF de suivi + CCTP signé.
  for(var i=0;i<PROJS.length;i++){var p=PROJS[i];if(!p)continue;if(projAllBlobIds(p).indexOf(blobId)>=0)return p._sbId||null;}
  return null;
}
function supaQueueBlobUpload(blobId){
  if(!isSignedIn()||!blobId||_supaSuppressBlobUp||_sbBlobUploaded[blobId])return;
  if(!_blobProjectSbId(blobId))return; // projet non synchronisé : réessai à la synchro projet
  if(_sbBlobQueue.indexOf(blobId)<0)_sbBlobQueue.push(blobId);
  _supaRunBlobQueue();
}
function _supaRunBlobQueue(){
  if(_sbUploadRunning||!_sbBlobQueue.length)return;
  _sbUploadRunning=true; var blobId=_sbBlobQueue.shift();
  supaUploadBlob(blobId).then(function(){_sbUploadRunning=false;_supaRunBlobQueue();},function(){_sbUploadRunning=false;_supaRunBlobQueue();});
}
function supaUploadBlob(blobId){
  var sbId=_blobProjectSbId(blobId); if(!sbId)return Promise.resolve(false);
  var getUrl=BLOBS[blobId]?Promise.resolve(BLOBS[blobId]):((BlobDB.has&&BlobDB.has(blobId))?BlobDB.get(blobId):Promise.resolve(null));
  return getUrl.then(function(dataUrl){
    if(!dataUrl)return false;
    return fetch(dataUrl).then(function(r){return r.blob();}).then(function(blob){
      return supaClient().then(function(c){return c.storage.from('project-files').upload(sbId+'/'+blobId,blob,{upsert:true,contentType:blob.type||'application/octet-stream'});});
    }).then(function(r){if(r.error)throw r.error;_sbBlobUploaded[blobId]=true;return true;});
  }).catch(function(){
    // Échec d'envoi d'un fichier : ne pas laisser croire qu'il est en ligne (il reste local).
    _supaSetSyncState('err');
    if(!_sbBlobUpWarned){_sbBlobUpWarned=true;try{toastErr('Certains fichiers n\'ont pas pu être envoyés en ligne — réessai automatique.');}catch(e){}}
    return false;
  });
}
var _sbBlobUpWarned=false;
function supaDownloadBlob(blobId){
  var sbId=_blobProjectSbId(blobId); if(!sbId)return Promise.resolve(null);
  return supaClient().then(function(c){return c.storage.from('project-files').download(sbId+'/'+blobId);})
   .then(function(r){ if(r.error||!r.data)return null;
     return new Promise(function(res){var fr=new FileReader();fr.onload=function(){res(fr.result);};fr.onerror=function(){res(null);};fr.readAsDataURL(r.data);});
   }).then(function(dataUrl){
     if(dataUrl){_supaSuppressBlobUp=true;BLOBS[blobId]=dataUrl;try{BlobDB.put(blobId,dataUrl);}catch(e){}_supaSuppressBlobUp=false;_sbBlobUploaded[blobId]=true;}
     return dataUrl;
   }).catch(function(e){console.warn('[supaDownloadBlob] échec',blobId,e);return null;});
}
// Envoie en arrière-plan tous les octets d'un projet (après import/synchro).
function supaUploadProjectBlobs(p){
  if(!isSignedIn()||!p||!p._sbId||isDemoProj(p))return;
  projAllBlobIds(p).forEach(supaQueueBlobUpload);
}

// Réamorce le compteur d'ids au-delà des ids déjà persistés (format prefixe+chiffres,
// ex. "cs1042") pour éviter toute collision d'identifiants après rechargement.
(function seedUid(){
  try{
    var max=uid;
    var scan=function(o,d){
      if(d>40||o==null)return;
      if(Array.isArray(o)){for(var i=0;i<o.length;i++)scan(o[i],d+1);return;}
      if(typeof o!=='object')return;
      for(var k in o){ if(!Object.prototype.hasOwnProperty.call(o,k))continue; var v=o[k];
        if((k==='id'||/Id$/.test(k))&&typeof v==='string'){var m=v.match(/^[A-Za-z]+(\d{3,})$/);if(m){var n=parseInt(m[1],10);if(n>=1000&&n<1e9&&n>max)max=n;}}
        if(v&&typeof v==='object')scan(v,d+1);
      }
    };
    scan(PROJS,0);
    if(max>=uid)uid=max+1;
  }catch(e){}
})();

// Demande un stockage persistant pour réduire l'éviction silencieuse des
// fichiers (IndexedDB) — surtout sur Safari/iOS (ITP). Sans effet de bord si
// refusé ; n'altère jamais les données.
(function requestPersistentStorage(){
  try{
    if(navigator.storage && navigator.storage.persist && navigator.storage.persisted){
      navigator.storage.persisted().then(function(already){
        if(!already){ navigator.storage.persist().catch(function(){}); }
      }).catch(function(){});
    }
  }catch(e){}
})();
// Charge uniquement l'index des clés persistées (léger, ne bloque pas le premier paint).
// Les octets de chaque document sont chargés paresseusement à la première consultation
// (voir viewDoc → BlobDB.get), ce qui évite de tout charger en mémoire au démarrage.

      }
    }catch(e){}
  });
}catch(e){}
