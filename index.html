// Attributs à coller sur l'élément de ligne : clic droit + glisser-déposer.
// canDrag : autorisé seulement si droits d'édition (items pour fichier, folders pour dossier) et non archivé.
function rowAttrs(ref){
  var j=encodeURIComponent(JSON.stringify(ref));
  var permOk=ref.type==='folder'?can('folders'):can('items');
  var canDrag=permOk&&!ref.archived;
  var a=' oncontextmenu="rowMenuFromContext(event,\''+j+'\')"';

      +' ondragstart="rowDragStart(event,\''+j+'\')"'
      +' ondragend="rowDragEnd(event)"';
  }

}

/* ── Glisser-déposer ── */
var _dragRef=null;
function rowDragStart(ev,refJson){
  _dragRef=JSON.parse(decodeURIComponent(refJson));
  try{ev.dataTransfer.effectAllowed='move';ev.dataTransfer.setData('text/plain',_dragRef.id);}catch(e){}
  if(ev.currentTarget&&ev.currentTarget.classList)ev.currentTarget.classList.add('dragging-row');
  closeRowMenu();
}
function rowDragEnd(ev){
  if(ev.currentTarget&&ev.currentTarget.classList)ev.currentTarget.classList.remove('dragging-row');
  Array.prototype.forEach.call(document.querySelectorAll('.drop-target'),function(el){el.classList.remove('drop-target');});
  _dragRef=null;
}
// Validité d'un dépôt de _dragRef sur la cible destRef.
function dropAllowed(destRef){
  if(!_dragRef)return false;
  // même famille/aire seulement
  if(_dragRef.kind!==destRef.kind)return false;
  if(_dragRef.kind==='area'&&_dragRef.area!==destRef.area)return false;
  var destFolderId=destRef.type==='root'?null:destRef.id;
  if(_dragRef.type==='folder'){
    var forb=forbiddenMoveTargets(_dragRef);
    if(destFolderId&&forb[destFolderId])return false; // dans lui-même / descendant
  }
  return true;
}
function rowDragOver(ev,el){
  if(!_dragRef)return;
  var destRef=JSON.parse(decodeURIComponent(el.getAttribute('data-dropref')||'%7B%7D'));
  if(!dropAllowed(destRef))return;
  ev.preventDefault();try{ev.dataTransfer.dropEffect='move';}catch(e){}
  el.classList.add('drop-target');
}
function rowDragLeave(ev,el){el.classList.remove('drop-target');}
function rowDrop(ev,el,refJson){
  ev.preventDefault();ev.stopPropagation();
  el.classList.remove('drop-target');
  if(!_dragRef){return;}
  var destRef=JSON.parse(decodeURIComponent(refJson));
  if(!dropAllowed(destRef)){
    if(_dragRef&&_dragRef.type==='folder'){toast('Impossible de déplacer un dossier dans lui-même',{type:'warn'});}
    return;
  }
  var src=_dragRef;_dragRef=null;
  performMove(src,destRef.type==='root'?null:destRef.id);
}
// Attributs de cible de dépôt, avec data-dropref pour dragover.
function dropAttrs(destRef){
  var j=encodeURIComponent(JSON.stringify(destRef));
  return ' data-dropref="'+j+'" ondragover="rowDragOver(event,this)" ondragleave="rowDragLeave(event,this)" ondrop="rowDrop(event,this,\''+j+'\')"';
}

// Détermine le type d'aperçu à partir du mimeType, du fileName ou du champ legacy "type".
function fileKind(it){
  const mt=(it.mimeType||'').toLowerCase();
  const fn=(it.fileName||it.title||'').toLowerCase();
  if(mt.indexOf('pdf')>=0||/\.pdf$/.test(fn)||it.type==='pdf')return 'pdf';
  if(/^image\//.test(mt)||/\.(jpg|jpeg|png|webp|gif)$/.test(fn)||it.type==='img')return 'img';
  return 'other';
}
function fileTypeLabel(it){
  const k=fileKind(it);
  if(k==='pdf')return 'PDF';
  if(k==='img')return 'Image';
  if(it.mimeType)return it.mimeType;
  return 'Fichier';
}
function findAreaItem(area,id){const cfg=AREA_CFG[area];if(!cfg)return null;return cfg.items(PROJ).find(function(x){return x.id===id;});}

function viewFile(area,id){

  viewDoc(it);
}
// Visionneuse générique : accepte n'importe quel objet document {fileName/title,fileUrl,mimeType,type}.
function viewDoc(it){
  if(!it)return;
  _lastViewedDoc=it;
  const name=it.fileName||it.title||it.titre||'Document';
  try{logAudit('Document consulté',name+' · sur cet appareil','eye');}catch(e){}
  const kind=fileKind(it);
  let url=getBlob(it);
  // Chargement paresseux : octets non présents en session mais persistés dans IndexedDB.
  if(!url&&it.id&&BlobDB.has(it.id)){
    renderViewerLoading(it,name,kind);
    BlobDB.get(it.id).then(function(bytes){
      if(bytes){BLOBS[it.id]=bytes;}
      // Ne ré-affiche que si la visionneuse est toujours ouverte sur ce document.
      if(_lastViewedDoc===it)renderViewerBody(it,name,kind);
    });
    return;
  }
  // Absent localement mais connecté : tente de récupérer les octets depuis le stockage en ligne.
  if(!url&&it.id&&typeof isSignedIn==='function'&&isSignedIn()){
    renderViewerLoading(it,name,kind);
    supaDownloadBlob(it.id).then(function(){ if(_lastViewedDoc===it)renderViewerBody(it,name,kind); });
    return;
  }
  renderViewerBody(it,name,kind);
}

// Aperçu PDF : Chrome/Edge bloquent le rendu d'un <iframe src="data:…pdf">.
// On convertit donc le data-URL en Blob URL (compatible tous navigateurs), et
// on libère l'URL à la fermeture/au changement de document.
var _viewerBlobUrl=null;
function _revokeViewerBlob(){ if(_viewerBlobUrl){try{URL.revokeObjectURL(_viewerBlobUrl);}catch(e){} _viewerBlobUrl=null;} }
function dataUrlToBlobUrl(dataUrl){
  try{
    var i=dataUrl.indexOf(','); if(i<0)return dataUrl;
    var mime=(dataUrl.slice(5,i).split(';')[0])||'application/octet-stream';
    var bin=atob(dataUrl.slice(i+1)); var len=bin.length; var arr=new Uint8Array(len);
    for(var k=0;k<len;k++)arr[k]=bin.charCodeAt(k);
    return URL.createObjectURL(new Blob([arr],{type:mime}));
  }catch(e){ return dataUrl; }
}

  const html='<div class="vw-ov" onclick="if(event.target===this)closeViewer()">'

function ensureConvs(p){ if(p&&!Array.isArray(p.conversations))p.conversations=[]; return p?p.conversations:[]; }
function convById(id){ if(!id||id==='__project__')return null; return ensureConvs(PROJ).find(function(c){return c.id===id;}); }
function convMessages(id){ if(id==='__project__')return projMessages(PROJ); var c=convById(id); if(c&&!Array.isArray(c.messages))c.messages=[]; return c?c.messages:[]; }
function convReads(id){ if(id==='__project__')return projMsgReads(PROJ); var c=convById(id); if(c&&(!c.reads||typeof c.reads!=='object'))c.reads={}; return c?c.reads:{}; }
function convUnread(id,idn){ var last=convReads(id)[idn]||''; return convMessages(id).filter(function(m){return m.authorId!==idn&&(m.date||'')>last;}).length; }
// Conversations visibles par l'identité courante : le forum projet + les fils
// privés où elle est participante (le propriétaire/admin voit tout).
function visibleConvs(){
  var vm=viewer(); var myMid=vm?vm.id:null; var me=currentIdentityId();
  var out=[{id:'__project__'}];
  ensureConvs(PROJ).forEach(function(c){
    // Propriétaire (pas d'aperçu) : voit tout. Sinon : créateur ou participant.
    if(!vm || c.creator===me || (myMid&&(c.participants||[]).indexOf(myMid)>=0)) out.push(c);
  });
  return out;
}
function convTitle(c){
  if(!c||c.id==='__project__')return 'Projet (tous)';
  if(c.title)return c.title;
  var names=(c.participants||[]).map(function(mid){var m=getMembresForProj(PROJ).find(function(x){return x.id===mid;});return m?(m.name||m.ent):null;}).filter(Boolean);
  return names.length?names.join(', '):'Conversation';
}
function messagerieBadge(){
  if(!PROJ)return ''; var me=currentIdentityId();
  var n=visibleConvs().reduce(function(s,c){return s+convUnread(c.id,me);},0);
  return n>0?('<span class="nb" style="background:var(--red);color:#fff">'+n+'</span>'):'';
}

/* Gestion clavier globale : Échap ferme la couche du dessus ; Tab piège le focus dans la modale/visionneuse ouverte. */
document.addEventListener('keydown',function(ev){
  // Activation clavier des contrôles personnalisés (div role=button/checkbox/switch + tabindex) :
  // les vrais <button>/<a> gèrent déjà Entrée/Espace nativement.
  if(ev.key==='Enter'||ev.key===' '||ev.key==='Spacebar'){
    var el=document.activeElement;
    if(el&&el.getAttribute){
      var role=el.getAttribute('role');
      var tag=el.tagName;
      // Limité à checkbox/switch (nos bascules personnalisées) : les role="button" possèdent
      // déjà leur propre gestionnaire clavier — évite une double activation.
      if((role==='checkbox'||role==='switch')&&el.getAttribute('tabindex')!==null&&tag!=='INPUT'&&tag!=='SELECT'&&tag!=='TEXTAREA'){
        ev.preventDefault();el.click();return;
      }
    }
  }
  var viewerRoot=document.getElementById('viewer-root');
  var modalRoot=document.getElementById('modal-root');
  var viewerOpen=viewerRoot&&viewerRoot.innerHTML.trim();
  var modalOpen=modalRoot&&modalRoot.innerHTML.trim();
  if(ev.key==='Escape'){
    // Ordre de priorité : visionneuse > modale > popover « Local » > tiroir mobile.
    if(viewerOpen){closeViewer();ev.preventDefault();return;}
    if(modalOpen){closeModal();ev.preventDefault();return;}
    if(document.getElementById('locality-pop')){closeLocalityInfo();ev.preventDefault();return;}
    if(document.body.classList.contains('nav-open')){closeMobileNav();var mb=document.getElementById('mnav-btn');if(mb)try{mb.focus();}catch(e){}ev.preventDefault();return;}
    return;
  }
  var locPop=document.getElementById('locality-pop');
  if(ev.key==='Tab'&&(viewerOpen||modalOpen||locPop)){
    var container=viewerOpen?viewerRoot.querySelector('.vw-box'):(modalOpen?modalRoot.querySelector('.mo-box'):locPop);
    if(!container)return;
    var f=_focusables(container);
    if(!f.length){ev.preventDefault();container.focus();return;}
    var first=f[0],last=f[f.length-1];
    if(ev.shiftKey&&document.activeElement===first){ev.preventDefault();last.focus();}
    else if(!ev.shiftKey&&document.activeElement===last){ev.preventDefault();first.focus();}
    else if(!container.contains(document.activeElement)){ev.preventDefault();first.focus();}
  }
});

/* ── PV : application « Comptes-rendus de chantier » embarquée (ex-ArchiPV) ──
   PV est une sous-app locale (PV/index.html) montée en iframe. On masque le
   bouton « + » de la topbar (création gérée dans l'iframe) et le sélecteur de
   phase (pv retiré de PHASE_VIEWS). On transmet l'identité du projet (id stable
   + nom + adresse) via l'URL, et l'annuaire du projet via localStorage, pour
   que les CR héritent des « Informations projet » / « Annuaire » d'Archisync. */
// Construit l'annuaire {pid,list} transmis à la sous-app PV depuis le projet courant.
function pvBuildAnnuaire(p){
  if(!p)return null;
  var list=getMembresForProj(p).map(function(m){
    return {
      srcId: m.id||'',                 // id stable de l'annuaire → lien 1:1 avec l'intervenant PV
      entreprise: m.ent||'',
      lot: m.metier||roleLabel(m.role)||'Intervenant',
      contacts: [m.name,m.tel].filter(Boolean).join(' — '),
      color: m.color||''
    };
  });
  return {pid:p.id||'',list:list};
}
// Envoie l'annuaire à l'iframe PV (postMessage : fonctionne en file:// ET http).
function pvPostAnnuaire(annuaire){
  if(!annuaire)return;
  var fr=document.getElementById('pv-frame');
  if(!fr||!fr.contentWindow)return;
  var origin=(location.protocol==='http:'||location.protocol==='https:')?location.origin:'*';
  try{fr.contentWindow.postMessage({type:'archisync-annuaire',pid:annuaire.pid,list:annuaire.list},origin);}catch(e){console.warn('[pvPostAnnuaire]',e);}
}
// La sous-app PV peut redemander l'annuaire (bouton « Synchroniser », utile en file://).
if(typeof window!=='undefined'&&!window._pvAnnuaireReqWired){
  window._pvAnnuaireReqWired=true;
  window.addEventListener('message',function(ev){
    // N'accepter que les messages provenant de l'iframe PV (source faisant autorité ;
    // l'origine vaut "null" en file:// donc le contrôle de source est le garde-fou principal).
    var fr=document.getElementById('pv-frame');
    if(!fr||ev.source!==fr.contentWindow)return;
    if(location.protocol!=='file:'&&ev.origin!==location.origin)return;
    try{ if(ev.data&&ev.data.type==='archisync-request-annuaire'&&PROJ) pvPostAnnuaire(pvBuildAnnuaire(PROJ)); }catch(e){console.warn('[shell] req annuaire',e);}
  });
}
function renderPV(){
  setTB('file-check','var(--blue)','PV — Comptes-rendus de chantier',(PROJ?PROJ.name:''),''); // btnL vide => bouton « + » masqué
  setTabs(null);
  let q='', annuaire=null;
  if(PROJ){
    q='?'+new URLSearchParams({pid:PROJ.id||'',projet:PROJ.name||'',adresse:PROJ.address||''}).toString();
    // Annuaire du projet → intervenants PV (saisi une fois, propagé partout).
    try{
      annuaire=pvBuildAnnuaire(PROJ);
      localStorage.setItem('plansync_host_annuaire',JSON.stringify(annuaire));
    }catch(e){console.warn('[renderPV] annuaire',e);}
  }
  // Cache-buster : garantit que l'iframe charge toujours la dernière version du PV
  // (sinon le navigateur sert un PV/index.html en cache) et que la réconciliation
  // des intervenants depuis l'annuaire se rejoue à chaque ouverture.
  // IMPORTANT : seulement en http(s). En file:// un paramètre de requête sur l'URL
  // de l'iframe empêche le chargement du fichier dans certains navigateurs (Safari)
  // → la sous-app PV reste blanche. On ne l'ajoute donc pas en ouverture locale.
  if(location.protocol==='http:'||location.protocol==='https:') q += (q?'&':'?')+'_ts='+Date.now();
  document.getElementById('content').innerHTML=
    '<iframe id="pv-frame" src="PV/index.html'+q+'" title="PV — Comptes-rendus de chantier" '+
    'style="width:100%;height:100%;border:0;display:block;background:var(--bg)"></iframe>';
  // En ouverture locale (file://), la sous-app PV n'a PAS accès au même localStorage
  // que le shell → l'annuaire écrit ci-dessus est invisible. On le transmet donc aussi
  // par postMessage (fonctionne en file:// ET http) pour que les intervenants s'affichent.
  if(annuaire){
    var _fr=document.getElementById('pv-frame');
    var _send=function(){pvPostAnnuaire(annuaire);};
    if(_fr){_fr.addEventListener('load',function(){_send();setTimeout(_send,250);});}
    setTimeout(_send,600); // filet de sécurité si l'événement load a déjà eu lieu
  }
}

// Combien d'intervenants du PROJET COURANT utilisent un rôle — pour avertir avant suppression.
function roleUsageCount(key){
  if(!PROJ)return 0;
  var n=0;
  (PROJ.membres||[]).forEach(function(m){if(m.role===key)n++;});
  return n;
}

    return '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid var(--border)">'
      +'<input id="rl-'+key+'" value="'+e(label)+'" '+(locked?'':'')+' style="flex:1;padding:7px 9px;border:1px solid var(--border2);border-radius:7px;font-size:12.5px;background:var(--bg);color:var(--text);outline:none;font-family:inherit" aria-label="Nom du rôle">'
      +'<span style="font-size:10.5px;color:var(--text3);white-space:nowrap;min-width:64px;text-align:right">'+(used>0?used+' intervenant'+(used>1?'s':''):'non utilisé')+'</span>'
      +(locked
        ? '<span title="Rôle requis — non supprimable" style="width:28px;display:inline-flex;justify-content:center;color:var(--border2)"><svg class="ico ico-xs"><use href="#i-lock"/></svg></span>'
        : '<button class="btn btn-g btn-sm" onclick="deleteRole(\''+key+'\')" title="Supprimer ce rôle" style="padding:5px"><svg class="ico ico-xs"><use href="#i-trash"/></svg></button>')
    +'</div>';
  }).join('');

  var html='<h3><svg class="ico ico-sm" style="vertical-align:-2px;margin-right:6px"><use href="#i-settings"/></svg>Gérer les rôles de projet</h3>'
    +'<div style="font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:6px">'
      +'Renommez un rôle, supprimez ceux que vous n\'utilisez pas, ou ajoutez-en. Ces rôles sont propres à ce projet.'
    +'</div>'
    +'<div id="rl-list" style="margin-bottom:10px">'+rows+'</div>'
    +'<div style="display:flex;gap:8px;align-items:flex-end;border-top:1px solid var(--border);padding-top:12px">'
      +'<div class="fi" style="flex:1;margin:0"><label>Nouveau rôle</label><input id="rl-new" placeholder="Ex: Bureau de contrôle, Géotechnicien…" onkeydown="if(event.key===\'Enter\')addRole()"></div>'

    +'</div>'
    +'<div class="mo-foot">'
      +'<button class="btn" onclick="closeModal()">Annuler</button>'
      +'<button class="btn btn-p" onclick="saveRolesManager()"><svg class="ico ico-sm"><use href="#i-save"/></svg> Enregistrer</button>'
    +'</div>';
  showModal(html);

function addRole(){
  var inp=document.getElementById('rl-new');
  if(!inp)return;
  var label=(inp.value||'').trim();
  if(!label){toastErr('Saisissez un nom de rôle.');return;}
  // Refus des doublons de libellé (insensible à la casse).
  var exists=Object.values(RL).some(function(l){return l.toLowerCase()===label.toLowerCase();});
  if(exists){toastErr('Ce rôle existe déjà.');return;}
  var key=roleKeyFromLabel(label);
  RL[key]=label;
  saveRoles();
  openRolesManager(); // re-render le modal avec le nouveau rôle
  toast('Rôle ajouté');
}
function deleteRole(key){
  if(key==='project_admin')return; // garde-fou
  var used=roleUsageCount(key);
  var doDelete=function(){
    // Réaffecte les intervenants du PROJET COURANT vers « Lecteur » pour ne pas casser RL[m.role].
    if(used>0&&PROJ){(PROJ.membres||[]).forEach(function(m){if(m.role===key)m.role='viewer';});}
    delete RL[key];saveRoles();
    openRolesManager();
    if(PROJ&&(VIEW==='membres'||VIEW==='intervenants'))renderMain();
    toast('Rôle supprimé');
  };
  if(used>0){
    confirmModal({
      title:'Supprimer ce rôle',
      body:'<strong>'+e(RL[key])+'</strong> est attribué à <strong>'+used+' intervenant'+(used>1?'s':'')+'</strong>. '
          +'En le supprimant, ces intervenants passeront au rôle <strong>« Lecteur »</strong>. Continuer ?',
      confirmLabel:'Supprimer le rôle',
      danger:true,
      onConfirm:doDelete
    });
  }else{doDelete();}
}
function saveRolesManager(){
  // Applique les renommages saisis dans les champs.
  var changed=false;
  Object.keys(RL).slice().forEach(function(key){
    var inp=document.getElementById('rl-'+key);
    if(!inp)return;
    var v=(inp.value||'').trim();
    if(!v){return;} // on ignore un champ vidé (on ne supprime pas via vidage)
    if(v!==RL[key]){RL[key]=v;changed=true;}
  });
  saveRoles();
  closeModal();
  if(PROJ)renderMain();
  renderSB();
  toast(changed?'Rôles enregistrés':'Aucune modification');
}

// Sert à montrer visuellement l'effet du rôle ; l'utilisateur peut ensuite affiner.
const ACCESS_PERM_PRESETS={
  admin:        {voir:true, dl:true, import:true, publier:true, contrats:true, admin:true},
  architecte:   {voir:true, dl:true, import:true, publier:true, contrats:true, admin:false},
  collaborateur:{voir:true, dl:true, import:true, publier:false,contrats:false,admin:false},
  lecture:      {voir:true, dl:false,import:false,publier:false,contrats:false,admin:false}
};
function setMemberAccess(id,role){
  if(!can('manageAccess'))return denyMsg();
  const m=getMembresForProj(PROJ).find(function(x){return x.id===id;});if(!m)return;
  normalizeMbr(m);
  m.accessRole=role;
  // Applique les droits par défaut du rôle à la rangée d'icônes pour rendre le lien évident.
  const preset=ACCESS_PERM_PRESETS[role];
  if(preset){Object.keys(preset).forEach(function(k){m.perms[k]=preset[k];});}
  savePROJS();
  logAudit('Permissions modifiées',(m.name||'Intervenant')+' → '+((typeof ACCESS_RL!=='undefined'&&ACCESS_RL[role])||role),'lock');
  renderMain(); // re-render : la rangée de permissions reflète le nouveau rôle
  toast('Rôle d\'accès appliqué — permissions mises à jour');
}
function removeAccessMember(id){
  if(!can('manageAccess'))return denyMsg();
  const m=getMembresForProj(PROJ).find(function(x){return x.id===id;});if(!m)return;
  // Sécurité : on retire seulement le rôle d'accès (on ne supprime pas le membre ni ses données).
  const prev=m.accessRole;
  m.accessRole='lecture';savePROJS();renderMain();
  toast('Accès réduit à « Lecture seule »',{undo:function(){m.accessRole=prev;savePROJS();renderMain();toast('Accès rétabli');}});
}

// Ouvre l'écran fusionné en dépliant la fiche de l'intervenant ciblé.
function openMemberAccess(id){curMbr=id;curMbrPending=true;nav('membres');}

function toggleMbr(id){curMbr=curMbr===id?null:id;renderMain();}
function togglePerm(mid,k){if(!can('manageAccess'))return denyMsg();var m=getMembresForProj(PROJ).find(function(x){return x.id===mid;});if(m){normalizeMbr(m);m.perms[k]=!m.perms[k];savePROJS();}renderMain();}
function toggleDoss(mid,f){if(!can('manageAccess'))return denyMsg();var m=getMembresForProj(PROJ).find(function(x){return x.id===mid;});if(m){normalizeMbr(m);m.dossiers[f]=!m.dossiers[f];savePROJS();}renderMain();}

/* ── Arborescence d'accès par sous-dossier (écran « Annuaire & rôles ») ── */
function accessAreaCode(label){for(var k in AREA_TO_FLIST){if(AREA_TO_FLIST[k]===label)return k;}return null;}
// Cycle d'un override de sous-dossier : Hérité → Accès → Bloqué → Hérité.
function cycleFolderAccess(mid,fid){
  if(!can('manageAccess'))return denyMsg();
  var m=getMembresForProj(PROJ).find(function(x){return x.id===mid;}); if(!m)return; normalizeMbr(m);
  var cur=m.folderAccess[fid];
  if(cur===undefined)m.folderAccess[fid]=true; else if(cur===true)m.folderAccess[fid]=false; else delete m.folderAccess[fid];
  savePROJS(); renderMain();
}
function _accStateBtn(m,area,fid){
  var has=(m.folderAccess&&m.folderAccess[fid]!==undefined), ex=has&&!!m.folderAccess[fid];
  var resolved=memberSeesFolder(m,area,fid);
  var label=has?(ex?'Accès':'Bloqué'):('Hérité · '+(resolved?'accès':'bloqué'));
  var col=has?(ex?'var(--green)':'var(--red)'):'var(--text3)';
  return '<button class="btn btn-sm" style="min-width:124px;justify-content:center;font-size:11px;color:'+col+'" onclick="cycleFolderAccess(\''+m.id+'\',\''+fid+'\')" title="Cliquer pour changer (Hérité / Accès / Bloqué)">'+label+'</button>';
}
function accessFolderRows(m,area,nodes,depth){
  var out='';
  (nodes||[]).forEach(function(n){
    if(n.archived)return;
    out+='<div class="fold-row" style="padding-left:'+(8+depth*16)+'px">'
      +'<svg class="ico ico-sm" style="color:var(--text3);flex-shrink:0"><use href="#i-folder"/></svg>'
      +'<span style="flex:1;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="'+e(n.name)+'">'+e(n.name)+'</span>'
      +_accStateBtn(m,area,n.id)
    +'</div>';
    var kids=(area==='plans')?(n.children||[]):areaChildFolders(PROJ,area,n.id);
    if(kids&&kids.length)out+=accessFolderRows(m,area,kids,depth+1);
  });
  return out;
}
function accessTreeHTML(m){
  if(!PROJ)return ''; normalizeMbr(m);
  return FLIST.map(function(label){
    var area=accessAreaCode(label); if(!area)return '';
    var head='<div class="fold-row" style="background:var(--bg2);border-radius:6px;margin-top:6px">'
      +'<svg class="ico ico-sm" style="color:var(--text3);flex-shrink:0"><use href="#i-folder"/></svg>'
      +'<span style="flex:1;font-weight:600;font-size:12px">'+label+'</span>'
      +'<div class="tog '+(m.dossiers[label]?'on':'')+'" role="switch" tabindex="0" aria-checked="'+(m.dossiers[label]?'true':'false')+'" aria-label="Accès à l\'espace '+e(label)+'" onclick="toggleDoss(\''+m.id+'\',\''+label+'\')">'+(m.dossiers[label]?'<svg class="ico" style="width:10px;height:10px" aria-hidden="true"><use href="#i-check"/></svg>':'')+'</div>'
      +'<span style="font-size:11px;color:var(--text3);min-width:44px;text-align:right">'+(m.dossiers[label]?'Accès':'Bloqué')+'</span>'
    +'</div>';
    var nodes=(area==='plans')?(PROJ.planFolders||[]):areaChildFolders(PROJ,area,null);
    return head+accessFolderRows(m,area,nodes,1);
  }).join('');
}

function saveMbr(mid){
  if(!can('manageAccess'))return denyMsg(); // seul le propriétaire / admin modifie les fiches
  var m=getMembresForProj(PROJ).find(function(x){return x.id===mid;});
  if(!m)return;
  var g=function(id){var el=document.getElementById(id);return el?el.value:'';};
  m.name=g('mf-name-'+mid)||m.name;
  m.metier=g('mf-metier-'+mid)||m.metier;
  m.ent=g('mf-ent-'+mid);
  m.tel=g('mf-tel-'+mid);
  m.note=g('mf-note-'+mid);
  m.role=g('mf-role-'+mid)||m.role;
  m.email=g('mf-email-'+mid)||m.email;
  // Update initials from name
  var parts=m.name.trim().split(' ');
  m.ini=(parts[0]?parts[0][0]:'')+(parts[1]?parts[1][0]:'');
  m.ini=m.ini.toUpperCase();
  curMbr=null;
  savePROJS();
  renderMbrs();
  toast('Fiche mise à jour ✓');
}

function removeMbr(mid){
  if(!can('manageAccess'))return denyMsg();
  var list=getMembresForProj(PROJ);
  var idx=list.findIndex(function(x){return x.id===mid;});
  if(idx<0)return;
  var m=list[idx];
  confirmModal({
    title:'Retirer cet intervenant',
    body:'Retirer <strong>'+e(m.name||'cet intervenant')+'</strong> du projet ? Vous pourrez annuler juste après.',
    confirmLabel:'Retirer',
    onConfirm:function(){
      var removed=list.splice(idx,1)[0];
      var pos=idx;
      curMbr=null;savePROJS();renderMain();
      toast('Intervenant retiré',{undo:function(){list.splice(pos,0,removed);savePROJS();renderMain();toast('Intervenant rétabli');}});
    }
  });
}

function inviteMbr(){
  if(!can('manageAccess'))return denyMsg();
  var name=document.getElementById('inv-name')?.value?.trim();
  var email=document.getElementById('inv-e')?.value?.trim()||'';
  // Le nom est requis (l'email reste facultatif : aucun email n'est envoyé).
  if(!name){
    var el=document.getElementById('inv-name');
    if(el){el.classList.add('fi-error');el.focus();}
    toastErr('Le nom du participant est requis.');
    return;
  }
  var metier=document.getElementById('inv-metier')?.value||'Autre';
  var ent=document.getElementById('inv-ent')?.value?.trim()||'—';
  var role=document.getElementById('inv-r')?.value||'viewer';
  var parts=name.split(' ');
  var ini=((parts[0]?parts[0][0]:'')+(parts[1]?parts[1][0]:'')).toUpperCase()||name.slice(0,2).toUpperCase();
  var COLORS=['#2d4ef5','#1a7a4a','#c47a00','#6b3fa0','#c0392b','#0891b2'];
  var col=COLORS[getMembresForProj(PROJ).length%COLORS.length];
  getMembresForProj(PROJ).push({
    id:'m'+(uid++),ini,name,email,ent,role,metier,tel:'',note:'',color:col,
    perms:{voir:true,dl:role!=='client_viewer',import:false,publier:false,contrats:role==='client_viewer',admin:false},
    dossiers:{Plans:true,'Contrats & Devis':false,Factures:false,'Photos chantier':false,'Admin':false}
  });
  // Réinitialise le formulaire

/* ══ DOSSIER « INTERVENANTS » (Documents du projet) ══ */
// Tous les documents du projet, toutes zones confondues (lecture seule ici).
function allProjectDocs(p){
  if(!p)return[];
  var dd=p.docs_data||{};
  var groups=[
    {area:'Plans',list:dd.plans},{area:'Contrats & Devis',list:dd.contrats},
    {area:'Factures',list:dd.factures},{area:'Photos chantier',list:dd.photos},
    {area:'Documents admin',list:dd.admin},{area:'PV',list:p.pv}
  ];
  var out=[];
  groups.forEach(function(g){(g.list||[]).forEach(function(d){if(!d.archived)out.push({area:g.area,d:d});});});
  return out;
}
// Documents liés à un intervenant : correspondance sur le champ « Entreprise / intervenant »
// (doc.ent) avec l'entreprise ou le nom du membre. Pas de nouveau modèle de données.
function docsForMember(p,m){
  var keys=[m.ent,m.name].filter(function(x){return x&&x!=='—';}).map(function(x){return x.trim().toLowerCase();});
  if(!keys.length)return[];
  return allProjectDocs(p).filter(function(row){
    var ent=(row.d.ent||'').trim().toLowerCase();
    return ent&&keys.indexOf(ent)>=0;
  });
}

/* ══ PLU ══ */

// Noms des champs standard (clés uniquement — valeurs toujours saisies par l'utilisateur)
const PLU_STD_KEYS=['Zone PLU','Emprise au sol','Hauteur max','Recul façade','Retrait latéral','Biotope','Stationnement','Risques'];

// Initialise PROJ.plu si absent, avec champs vides (jamais les valeurs démo).
function pluEnsure(){
  if(!PROJ)return;
  if(!PROJ.plu){
    var fields={};
    PLU_STD_KEYS.forEach(function(k){fields[k]='';});
    PROJ.plu={fields:fields,notes:'',sources:[],updatedAt:''};
  }
  // Rétro-compat : garantit que les trois clés existent sur un plu partiel
  if(!PROJ.plu.fields)PROJ.plu.fields={};
  if(typeof PROJ.plu.notes!=='string')PROJ.plu.notes='';
  if(!Array.isArray(PROJ.plu.sources))PROJ.plu.sources=[];
}

function pluFilledCount(){
  if(!PROJ||!PROJ.plu)return 0;
  var f=PROJ.plu.fields;
  return Object.keys(f).filter(function(k){return (f[k]||'').trim()!=='';}).length;
}
function pluTotalFields(){
  if(!PROJ||!PROJ.plu)return PLU_STD_KEYS.length;
  return Object.keys(PROJ.plu.fields).length||PLU_STD_KEYS.length;
}

function savePLU(){
  if(!PROJ)return;
  pluEnsure();
  // Lire tous les champs réglementaires visibles
  var f=PROJ.plu.fields;
  Object.keys(f).forEach(function(k){
    var el=document.getElementById('plu-f-'+pluFieldId(k));
    if(el)f[k]=el.value;
  });
  // Notes
  var nt=document.getElementById('plu-notes');
  if(nt)PROJ.plu.notes=nt.value;
  PROJ.plu.updatedAt=new Date().toISOString();
  savePROJS();
  toast('Pré-étude enregistrée ✓');
  renderPLU(); // re-render pour mettre à jour la jauge de complétude
}

// Clé CSS-safe à partir du nom de champ
function pluFieldId(k){return k.replace(/[^a-zA-Z0-9]/g,'_');}

function addPluCustomField(){
  if(!can('items'))return denyMsg();
  promptModal('Nouveau champ','Nom du champ','',function(label){
    pluEnsure();
    if(PROJ.plu.fields.hasOwnProperty(label)){toast('Ce champ existe déjà.');return;}
    PROJ.plu.fields[label]='';
    savePROJS();
    renderPLU();
    // Focus the new field
    setTimeout(function(){
      var el=document.getElementById('plu-f-'+pluFieldId(label));
      if(el)el.focus();
    },60);
  });
}

function deletePluField(label){
  if(!can('items'))return denyMsg();
  if(PLU_STD_KEYS.indexOf(label)>=0){toast('Les champs standard ne peuvent pas être supprimés.',{type:'warn'});return;}
  pluEnsure();
  confirmModal({
    title:'Supprimer ce champ',
    body:'Supprimer le champ « <strong>'+e(label)+'</strong> » et sa valeur ?',
    confirmLabel:'Supprimer',
    onConfirm:function(){
      var val=PROJ.plu.fields[label];
      delete PROJ.plu.fields[label];
      savePROJS();renderPLU();
      toast('Champ supprimé',{undo:function(){PROJ.plu.fields[label]=val;savePROJS();renderPLU();toast('Champ rétabli');}});
    }
  });
}

    +'</div>'

      +'<button class="btn" onclick="closeModal()">Annuler</button>'
      +'<button class="btn btn-p" onclick="savePluFinding('+(editIdx!=null?editIdx:'null')+')"><svg class="ico ico-sm"><use href="#i-save"/></svg> Enregistrer</button>'
    +'</div>'
  );
  setTimeout(function(){var el=document.getElementById('pf-text');if(el)el.focus();},40);
}

function savePluFinding(editIdx){
  pluEnsure();
  var text=(document.getElementById('pf-text')?.value||'').trim();
  if(!text){
    var el=document.getElementById('pf-text');
    if(el){el.classList.add('fi-error');el.focus();}
    toast('Le contenu est requis.');return;
  }
  var entry={
    text:text,
    source:(document.getElementById('pf-source')?.value||'').trim(),
    origin:document.getElementById('pf-origin')?.value||'manuel',
    date:new Date().toLocaleDateString('fr-FR')
  };
  if(editIdx!=null&&editIdx>=0){
    PROJ.plu.sources[editIdx]=entry;
  } else {
    PROJ.plu.sources.push(entry);
  }
  PROJ.plu.updatedAt=new Date().toISOString();
  savePROJS();
  closeModal();
  renderPLU();

var _modalPrevFocus=null;
function _focusables(container){
  if(!container)return [];
  return Array.prototype.slice.call(container.querySelectorAll(
    'a[href],button:not([disabled]),input:not([disabled]),select:not([disabled]),textarea:not([disabled]),[tabindex]:not([tabindex="-1"])'
  )).filter(function(el){return el.offsetParent!==null||el===document.activeElement;});
}
function showModal(html){
  // mémorise le focus courant pour le restaurer à la fermeture
  _modalPrevFocus=document.activeElement;
  // Nom accessible de la boîte de dialogue : texte du premier titre (h1/h2/h3) du contenu.
  var lbl='';try{var mh=String(html).match(/<h[1-3][^>]*>([\s\S]*?)<\/h[1-3]>/i);if(mh)lbl=mh[1].replace(/<[^>]*>/g,'').replace(/\s+/g,' ').trim();}catch(e){}
  var ariaLbl=lbl?(' aria-label="'+e(lbl)+'"'):'';
  document.getElementById('modal-root').innerHTML=`<div class="mo-ov" onclick="if(event.target===this)closeModal()"><div class="mo-box" role="dialog" aria-modal="true"${ariaLbl} tabindex="-1" onclick="event.stopPropagation()">${html}</div></div>`;
  // place le focus dans la modale (premier champ ou la boîte)
  setTimeout(function(){
    var box=document.querySelector('#modal-root .mo-box');if(!box)return;
    var f=_focusables(box);
    (f[0]||box).focus();
  },30);
}
function closeModal(){
  document.getElementById('modal-root').innerHTML='';
  // restaure le focus sur l'élément déclencheur
  if(_modalPrevFocus&&typeof _modalPrevFocus.focus==='function'){try{_modalPrevFocus.focus();}catch(e){}}
  _modalPrevFocus=null;
}
// Remplace les prompt() natifs par une modale légère.
// callback(val) reçoit la valeur saisie (trimée), ou n'est pas appelé si annulé.
function promptModal(title,placeholder,defaultVal,callback){
  var cbKey='_pmcb'+(uid++);
  window[cbKey]=function(){
    var val=(document.getElementById('pm-inp').value||'').trim();
    if(!val){document.getElementById('pm-inp').classList.add('fi-error');document.getElementById('pm-inp').focus();return;}

    +'<div class="fi" style="margin-bottom:4px"><input id="pm-inp" value="'+e(defaultVal||'')+'" placeholder="'+e(placeholder||'')+'" onkeydown="if(event.key===\'Enter\')'+cbKey+'()"></div>'
    +'<div class="mo-foot"><button class="btn" onclick="closeModal()">Annuler</button><button class="btn btn-p" onclick="'+cbKey+'()">Valider</button></div>'
  );

/* Confirmation générique (remplace confirm()). 
   opts = {title, body, confirmLabel, danger:true, onConfirm:function} */
function confirmModal(opts){
  opts=opts||{};
  var cbKey='_cfcb'+(uid++);
  window[cbKey]=function(){delete window[cbKey];closeModal();if(typeof opts.onConfirm==='function')opts.onConfirm();};
  var danger=opts.danger!==false; // par défaut, action destructive (accent rouge)
  // Hiérarchie visuelle : « Annuler » neutre, action de confirmation mise en avant.
  // Destructif => accent rouge ; sinon => bouton primaire (btn-p).
  var confirmCls=danger?'btn':'btn btn-p';
  var confirmStyle=danger?'background:var(--red);color:#fff;border-color:var(--red)':'';
  // Action secondaire optionnelle (ex. « Exporter d'abord ») : exécute son rappel
  // sans fermer la modale, pour que l'utilisateur puisse ensuite confirmer.
  var extraBtn='';
  if(opts.extraLabel&&typeof opts.extraAction==='function'){
    var exKey='_cfex'+(uid++);
    window[exKey]=function(){opts.extraAction();};

  }
  showModal(''
    +'<h3 style="display:flex;align-items:center;gap:8px"><svg class="ico ico-sm" style="color:'+(danger?'var(--red)':'var(--amber)')+'"><use href="#i-warning"/></svg>'+e(opts.title||'Confirmer')+'</h3>'
    +'<p style="font-size:12.5px;color:var(--text2);line-height:1.5;margin-bottom:4px">'+(opts.body||'')+'</p>'
    +'<div class="mo-foot"><button class="btn" onclick="closeModal()">Annuler</button>'+extraBtn
    +'<button class="'+confirmCls+'" style="'+confirmStyle+'" onclick="'+cbKey+'()">'+e(opts.confirmLabel||'Confirmer')+'</button></div>'
  );
}
// Analyse tolérante d'une date saisie (jj/mm/aaaa, mm/aaaa, aaaa-mm-jj). Renvoie un Date ou null.
function parseAnyDate(str){
  if(!str)return null;str=String(str).trim();if(!str||str==='—')return null;
  var m;
  if((m=str.match(/^(\d{4})-(\d{2})-(\d{2})$/)))return new Date(+m[1],+m[2]-1,+m[3]);
  if((m=str.match(/^(\d{2})\/(\d{2})\/(\d{4})$/)))return new Date(+m[3],+m[2]-1,+m[1]);
  if((m=str.match(/^(\d{2})\/(\d{4})$/)))return new Date(+m[2],+m[1]-1,1);
  if((m=str.match(/^(\d{4})$/)))return new Date(+m[1],0,1);
  var d=new Date(str);return isNaN(d.getTime())?null:d;
}
function daysBetween(a,b){return Math.round((a.getTime()-b.getTime())/86400000);}
// Génère les notifications réelles à partir des données de tous les projets.
function computeNotifsRaw(){
  var out=[];var now=new Date();now.setHours(0,0,0,0);
  (PROJS||[]).forEach(function(p){
    if(!p||p.archived)return;
    // Quand un projet est ouvert, la cloche ne montre que ses alertes (pas la démo,
    // pas les autres projets). En vue globale (PROJ null), on agrège tous les projets.
    if(PROJ&&p.id!==PROJ.id)return;
    var pn=p.name||'Projet';
    // 1) Livraison proche / dépassée
    var dl=parseAnyDate(p.livraison);
    if(dl){
      var dd=daysBetween(dl,now);
      if(dd<0)out.push({level:'red',proj:p.id,view:'info',key:'liv:'+p.id,urg:30+(-dd),text:pn+' — livraison dépassée depuis '+(-dd)+' jour'+((-dd)>1?'s':'')+'.'});
      else if(dd<=30)out.push({level:'amber',proj:p.id,view:'info',key:'liv:'+p.id,urg:30-dd,text:pn+' — livraison dans '+dd+' jour'+(dd>1?'s':'')+'.'});
    }
    // 2 & 3) Suivi financier
    var reste=0,hasSuivi=false;
    (p.suivi||[]).forEach(function(g){
      (g.devis||[]).forEach(function(d){
        hasSuivi=true;
        var ht=suiviNum(d.prixHT),tva=suiviNum(d.tva),ttc=ht*(1+tva/100);
        var fac=(d.factures||[]).reduce(function(s,f){return s+suiviNum(f.montant);},0);
        reste+=Math.max(0,ttc-fac);
        // Devis non signé ancien (> 21 jours)
        if(!d.signe&&ttc>0){
          var dde=parseAnyDate(d.dateDevis);
          if(dde){var age=daysBetween(now,dde);if(age>21)out.push({level:'amber',proj:p.id,view:'suivi',key:'devis:'+p.id+':'+d.id,urg:age,text:pn+' — devis non signé depuis '+age+' jours'+(d.article?' ('+d.article+')':'')+'.'});}
        }
        // Facture émise non payée (> 30 jours)
        (d.factures||[]).forEach(function(f){
          if(f.dateFacture&&!f.datePaiement){
            var df=parseAnyDate(f.dateFacture);
            if(df){var fa=daysBetween(now,df);if(fa>30)out.push({level:'red',proj:p.id,view:'suivi',key:'fact:'+p.id+':'+f.id,urg:fa,text:pn+' — facture impayée depuis '+fa+' jours'+(f.refFacture?' (n° '+f.refFacture+')':'')+'.'});}
          }
        });
      });
    });
    // Reste à facturer > 0 et livraison proche/dépassée
    if(hasSuivi&&reste>0&&dl&&daysBetween(dl,now)<=30){
      out.push({level:'amber',proj:p.id,view:'suivi',key:'reste:'+p.id,urg:Math.max(0,30-daysBetween(dl,now)),text:pn+' — reste à facturer '+suiviEuro(reste)+' à l\'approche de la livraison.'});
    }
    // 4) Plans diffusés non confirmés au-delà du seuil (déclaratif, par plan).
    (getDocsForProj(p).plans||[]).forEach(function(d){
      if(d.archived)return;
      var stale=planStaleRecipients(p,d,now);
      if(stale.length){
        var maxAge=stale.reduce(function(a,s){return Math.max(a,s.ageDays);},0);
        out.push({level:'amber',proj:p.id,view:'diffusion',key:'plandist:'+p.id+':'+d.id,urg:maxAge,
          text:pn+' — '+stale.length+' intervenant'+(stale.length>1?'s n\'ont':' n\'a')+' pas confirmé la lecture du plan « '+(d.title||d.fileName||'plan')+' » depuis '+maxAge+' jours.'});
      }
    });
  });
  return out;
}
// État "ignoré" des notifications : {key:urg}. Réapparaît si la situation empire (urg augmente).
function notifDismissed(){try{var v=Store.get('plansync_notif_dismissed');return v?JSON.parse(v):{};}catch(e){return {};}}

function computeNotifs(){

}

    +'<div class="mo-foot">'+(anyDismissed?'<button class="btn btn-g" onclick="restoreNotifs()">Réafficher les ignorées</button>':'')+'<button class="btn btn-p" onclick="closeModal()">Fermer</button></div>');

    +'<div id="srch-res" style="max-height:340px;overflow-y:auto;font-size:13px"></div>'

function doSearch(q){
  var out=document.getElementById('srch-res');if(!out)return;
  q=(q||'').trim().toLowerCase();
  if(q.length<2){out.innerHTML='<div style="color:var(--text3);padding:8px 0">Saisissez au moins 2 caractères.</div>';return;}
  var hits=[];

  if(PROJ){
    // Docs : plans, contrats+factures, photos, admin
    var d=getDocsForProj(PROJ);
    function scanDocs(arr,areaLabel,areaView){
      (arr||[]).forEach(function(it){
        var t=(it.title||it.fileName||'').toLowerCase();
        if(t.indexOf(q)>=0)hits.push({group:'Documents',label:it.title||it.fileName,sub:areaLabel,view:areaView,ico:'pdf',fn:function(){closeModal();nav(areaView);}});
      });
    }
    scanDocs(d.plans,'Plans','plans');
    scanDocs((d.contrats||[]).concat(d.factures||[]),'Contrats & Devis','contrats');
    scanDocs(d.photos,'Photos chantier','photos');
    scanDocs(d.admin,'Documents admin','admin');
    // PV
    (PROJ.pv||[]).forEach(function(it){
      var t=(it.titre||it.fileName||'').toLowerCase();
      if(t.indexOf(q)>=0)hits.push({group:'Documents',label:it.titre||it.fileName,sub:'PV / Réception',ico:'check-list',fn:function(){closeModal();nav('pv');}});
    });
    // Dossiers — Plans (arborescence) + aires Contrats / Photos / PV
    (function(){
      function scanPlanTree(nodes){
        (nodes||[]).forEach(function(f){
          if((f.name||'').toLowerCase().indexOf(q)>=0)hits.push({group:'Dossiers',label:f.name,sub:'Plans',ico:'folder',fn:function(){closeModal();nav('plans');}});
          scanPlanTree(f.children);
        });
      }
      scanPlanTree(PROJ.planFolders||getPlanFolders(PROJ.id));
      var AF=(typeof areaFolders==='function')?areaFolders(PROJ):{};
      [['contrats','Contrats & Devis'],['photos','Photos chantier'],['pv','PV / Réception']].forEach(function(pair){
        (AF[pair[0]]||[]).forEach(function(f){
          if((f.name||'').toLowerCase().indexOf(q)>=0)hits.push({group:'Dossiers',label:f.name,sub:pair[1],ico:'folder',fn:(function(v){return function(){closeModal();nav(v);};})(pair[0])});
        });
      });
    })();
    // Checklistes — libellés et tags d'éléments (navigue vers l'onglet du groupe)
    (function(){
      var tree=(PROJ.clTree&&PROJ.clTree.length)?PROJ.clTree:((clTree&&clTree.length)?clTree:buildCL(PROJ));
      var tops=tree||[];
      function topIdFor(nodeId){
        for(var i=0;i<tops.length;i++){if(allCLN([tops[i]]).some(function(x){return x.id===nodeId;}))return tops[i].id;}
        return tops.length?tops[0].id:null;

        (n.items||[]).forEach(function(it){
          if(it.arch)return;
          if(((it.l||'')+' '+(it.tag||'')).toLowerCase().indexOf(q)>=0){
            var tab=topIdFor(n.id);
            hits.push({group:'Checklistes',label:it.l,sub:n.label||'Checkliste',ico:'check-list',fn:(function(t){return function(){closeModal();nav('checklists');if(t){clTab=t;renderCL();}};})(tab)});
          }
        });
      });
    })();
    // Suivi des dépenses — groupes, devis, factures
    (PROJ.suivi||[]).forEach(function(g){
      if((g.nom||'').toLowerCase().indexOf(q)>=0)hits.push({group:'Suivi des dépenses',label:g.nom,sub:'Groupe',ico:'receipt',fn:function(){closeModal();nav('suivi');}});
      (g.devis||[]).forEach(function(dv){
        if(((dv.article||'')+' '+(dv.entreprise||'')+' '+(dv.refDevis||'')).toLowerCase().indexOf(q)>=0)hits.push({group:'Suivi des dépenses',label:dv.article||dv.refDevis||'Devis',sub:'Devis'+(dv.entreprise?' — '+dv.entreprise:''),ico:'receipt',fn:function(){closeModal();nav('suivi');}});
        (dv.factures||[]).forEach(function(fa){
          if(((fa.refFacture||'')+' '+(fa.libelle||'')).toLowerCase().indexOf(q)>=0)hits.push({group:'Suivi des dépenses',label:fa.libelle||fa.refFacture||'Facture',sub:'Facture',ico:'receipt',fn:function(){closeModal();nav('suivi');}});
        });
      });
    });
    // Intervenants / annuaire
    getMembresForProj(PROJ).forEach(function(m){
      var t=(m.name+' '+m.email+' '+m.ent+' '+(m.metier||'')).toLowerCase();
      if(t.indexOf(q)>=0)hits.push({group:'Intervenants',label:m.name,sub:(m.metier||RL[m.role]||'Intervenant')+' — '+m.ent,ico:'users',fn:function(){closeModal();nav('membres');}});
    });
    // Recherche inter-projets (option) : matches principaux des autres projets.
    if(window._searchAll){
      PROJS.forEach(function(op){if(op&&!op.archived&&op.id!==PROJ.id)searchProjectExtra(op,q,hits,'Autres projets');});
    }
  } else {
    // Vue projets : noms de projets…
    PROJS.filter(function(p){return !p.archived;}).forEach(function(p){
      var t=(p.name+' '+(p.client||'')+' '+(p.address||'')).toLowerCase();
      if(t.indexOf(q)>=0)hits.push({group:'Projets',label:p.name,sub:p.client||p.address||'',ico:'building',fn:function(){closeModal();openProj(p.id);}});
    });
    // …et contenu (documents, intervenants, contrats/factures) de tous les projets.
    PROJS.forEach(function(p){if(p&&!p.archived)searchProjectExtra(p,q,hits,'Documents & contacts');});
  }

  if(!hits.length){out.innerHTML='<div style="color:var(--text3);padding:8px 0">Aucun résultat pour <strong>'+e(q)+'</strong>.</div>';return;}
  // Regroupement par type, dans un ordre stable, en conservant l'index global pour fn().
  var ORDER=['Documents','Dossiers','Checklistes','Suivi des dépenses','Intervenants','Projets','Documents & contacts','Autres projets'];
  var shown=hits.slice(0,60);
  var byGroup={};shown.forEach(function(h,i){var g=h.group||'Autres';(byGroup[g]=byGroup[g]||[]).push(i);});
  var groups=Object.keys(byGroup).sort(function(a,b){var ia=ORDER.indexOf(a),ib=ORDER.indexOf(b);return (ia<0?99:ia)-(ib<0?99:ib);});
  out.innerHTML=groups.map(function(g){
    return '<div style="font-size:10.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:10px 0 4px">'+e(g)+' ('+byGroup[g].length+')</div>'
      +byGroup[g].map(function(i){var h=shown[i];
        return '<div onclick="SEARCH_HITS['+i+'].fn()" style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r);cursor:pointer;margin-bottom:2px" onmouseenter="this.style.background=\'var(--bg2)\'" onmouseleave="this.style.background=\'\'">'
          +'<svg class="ico ico-sm" style="color:var(--blue);flex-shrink:0"><use href="#i-'+h.ico+'"/></svg>'
          +'<div style="min-width:0"><div style="font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+e(h.label)+'</div>'
          +'<div style="font-size:11px;color:var(--text3)">'+e(h.sub)+'</div></div>'
        +'</div>';
      }).join('');
  }).join('');
  window.SEARCH_HITS=shown;
}
/* toast(message) — succès par défaut.
   toast(message, opts) où opts = {type:'success'|'error'|'warn'|'info', undo:function, duration:ms}
   Les erreurs/avertissements sont visuellement distincts (rouge/ambre). */
var _toastTimer=null;
function toast(msg,opts){
  opts=opts||{};
  const t=document.getElementById('toast');if(!t)return;
  if(_toastTimer){clearTimeout(_toastTimer);_toastTimer=null;}
  t.className='toast';
  const type=opts.type||'success';
  // Erreurs annoncées immédiatement par les lecteurs d'écran ; le reste reste « poli ».
  t.setAttribute('aria-live',type==='error'?'assertive':'polite');
  t.setAttribute('role',type==='error'?'alert':'status');
  if(type==='error')t.classList.add('t-err');
  else if(type==='warn')t.classList.add('t-warn');
  else if(type==='info')t.classList.add('t-info');
  let inner=(type==='error'?'<svg class="ico ico-sm" aria-hidden="true"><use href="#i-warning"/></svg>'
            :type==='warn'?'<svg class="ico ico-sm" aria-hidden="true"><use href="#i-warning"/></svg>'
            :type==='success'?'<svg class="ico ico-sm" aria-hidden="true"><use href="#i-check"/></svg>':'')
            +'<span>'+e(msg)+'</span>';
  let dur=opts.duration||(type==='error'?3600:type==='warn'?3000:2200);
  if(typeof opts.undo==='function'){
    var ukey='_undo'+(uid++);
    window[ukey]=function(){delete window[ukey];t.style.opacity='0';if(_toastTimer){clearTimeout(_toastTimer);_toastTimer=null;}opts.undo();};
    inner+='<button class="toast-undo" onclick="'+ukey+'()">Annuler</button>';
    dur=Math.max(dur,5000);
  }
  t.innerHTML=inner;
  t.style.opacity='1';
  _toastTimer=setTimeout(function(){t.style.opacity='0';_toastTimer=null;},dur);
}
function toastErr(msg,opts){opts=opts||{};opts.type='error';return toast(msg,opts);}

/* ══ INFO PROJET ══ */
// Affiche, sous chaque métier prévu (coché), les intervenants réels qui ont ce métier.
// Le rattachement se fait sur le champ « Métier / Fonction » de l'intervenant.
// Les intervenants dont le métier ne correspond à aucun métier coché sont listés
// dans « Autres intervenants ». Relié à « Accès & permissions » via le bouton Gérer.
function renderInfoPeople(p){
  var members=getMembresForProj(p)||[];
  // Normalise un libellé de métier pour comparaison souple.
  var norm=function(s){return (s||'').trim().toLowerCase();};
  var chips=(p.ints||[]); // métiers cochés
  if(!members.length){
    return '<div style="font-size:12px;color:var(--text3);padding:6px 0">Aucun intervenant pour l\'instant. Cliquez sur « Gérer » pour en ajouter.</div>';
  }
  var personRow=function(m){
    var roleLbl=roleLabel(m.role);
    return '<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;border:1px solid var(--border);border-radius:7px;background:var(--bg)">'
      +'<div class="av" style="width:24px;height:24px;font-size:9px;background:'+m.color+'18;color:'+m.color+';flex-shrink:0">'+e(m.ini||'?')+'</div>'
      +'<div style="flex:1;min-width:0">'
        +'<span style="font-size:12px;font-weight:500">'+e(m.name||'—')+'</span>'
        +(m.ent&&m.ent!=='—'?'<span style="font-size:10.5px;color:var(--text3)"> · '+e(m.ent)+'</span>':'')
      +'</div>'
      +'<span style="font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:20px;background:'+m.color+'18;color:'+m.color+';flex-shrink:0">'+e(roleLbl)+'</span>'
    +'</div>';
  };
  var used={}; // ids déjà rattachés à un métier
  var blocks='';
  chips.forEach(function(metier){
    var people=members.filter(function(m){return norm(m.metier)===norm(metier);});
    people.forEach(function(m){used[m.id]=true;});
    blocks+='<div style="margin-bottom:10px">'
      +'<div style="display:flex;align-items:center;gap:7px;margin-bottom:5px">'
        +'<span style="font-size:11.5px;font-weight:600;color:var(--text2)">'+e(metier)+'</span>'
        +'<span style="font-size:10px;color:var(--text3)">'+(people.length?people.length+' intervenant'+(people.length>1?'s':''):'aucun intervenant')+'</span>'
      +'</div>';
    if(people.length){
      blocks+='<div style="display:flex;flex-direction:column;gap:5px">'+people.map(personRow).join('')+'</div>';
    }else{
      blocks+='<div style="font-size:11px;color:var(--text3);padding:2px 0 0 2px">Aucun intervenant rattaché — invitez-en un depuis « Gérer ».</div>';
    }
    blocks+='</div>';
  });
  // Intervenants restants (métier non listé dans les chips, ou MOA/client/etc.)
  var others=members.filter(function(m){return !used[m.id];});
  if(others.length){
    blocks+='<div style="margin-bottom:4px;border-top:1px solid var(--border);padding-top:10px">'
      +'<div style="font-size:11.5px;font-weight:600;color:var(--text2);margin-bottom:5px">Autres intervenants <span style="font-size:10px;color:var(--text3);font-weight:400">('+others.length+')</span></div>'
      +'<div style="display:flex;flex-direction:column;gap:5px">'+others.map(personRow).join('')+'</div>'
    +'</div>';
  }
  if(!chips.length&&!others.length){
    return '<div style="font-size:12px;color:var(--text3);padding:6px 0">Cochez un métier ci-dessus, puis ajoutez des intervenants depuis « Gérer ».</div>';
  }
  return blocks||'<div style="font-size:12px;color:var(--text3);padding:6px 0">Aucun métier coché.</div>';
}

function saveInfo(opts){
  opts=opts||{};
  if(!PROJ)return false;
  const p=PROJ;
  const name=document.getElementById('inf-name')?.value?.trim();
  if(!name){toast('Le nom est requis');return false;}
  // Validation : la livraison ne peut pas précéder le début (valeurs ISO comparables).
  const svRaw=(document.getElementById('inf-start')?.value||'').trim();
  const lvRaw=(document.getElementById('inf-livr')?.value||'').trim();
  if(svRaw&&lvRaw&&lvRaw<svRaw){
    toast('La date de livraison ne peut pas précéder la date de début.',{type:'warn'});
    var le=document.getElementById('inf-livr');if(le){le.style.borderColor='var(--red)';le.focus();}
    return false;
  }
  const addr=(document.getElementById('inf-addr')?.value?.trim()||'');
  const city=(document.getElementById('inf-city')?.value?.trim()||'');
  p.name=name;
  // Champs d'adresse séparés persistés ; on dérive l'affichage combiné (p.address).
  p.addr=addr;p.city=city;
  p.address=[addr,city].filter(Boolean).join(', ');
  p.client=document.getElementById('inf-client')?.value?.trim()||p.client;
  p.clientEmail=document.getElementById('inf-cemail')?.value?.trim()||'';
  p.clientTel=document.getElementById('inf-ctel')?.value?.trim()||'';
  p.ref=document.getElementById('inf-ref')?.value?.trim()||'';
  // Changement de phase : journalisé comme via le bandeau supérieur (cohérence audit).
  var newPhase=document.getElementById('inf-phase')?.value||p.phase;
  var oldPhase=p.phase;
  p.phase=newPhase;
  if(oldPhase!==newPhase)logAudit('Phase modifiée',(oldPhase?oldPhase+' → ':'')+newPhase,'edit');
  // Avancement : champ manuel facultatif. Vide => calcul automatique (override effacé).
  const progRaw=(document.getElementById('inf-prog')?.value||'').trim();
  if(progRaw===''){
    p.progressManual='';
  }else{
    const prog=parseInt(progRaw,10);
    p.progressManual=isNaN(prog)?'':Math.min(100,Math.max(0,prog));
  }
  const surf=document.getElementById('inf-surf')?.value?.trim();
  p.surface=surf?surf+' m²':p.surface;
  p.budget=document.getElementById('inf-budget')?.value?.trim()||p.budget;
  if(svRaw)p.start=fromISO(svRaw);
  if(lvRaw)p.livraison=fromISO(lvRaw);
  if(infoType)p.type=infoType;
  const ints=[];
  document.querySelectorAll('#inf-ints .chip.on').forEach(c=>{if(c.dataset.int)ints.push(c.dataset.int);});
  if(ints.length)p.ints=ints;
  ['zone_sismique','zone_inondable','monument_historique'].forEach(k=>{const el=document.getElementById('inf-'+k);if(el)p.opts[k]=el.checked;});
  // Rebuild CL tree if type/intervenants changed
  clTree=buildCL(p);
  infoType=null;
  savePROJS();
  _infoDirty=false;
  if(opts.noRender)return true;
  renderSB();renderInfo();
  toast('Modifications enregistrées ✓');
  return true;
}

// Tous les ids de blobs portés par un projet (documents + versions + PDF du suivi).
function projAllBlobIds(p){
  var ids=[];
  projBlobItems(p).forEach(function(it){
    if(it&&it.id)ids.push(it.id);
    if(it&&Array.isArray(it.versions))it.versions.forEach(function(v){if(v&&v.blobId)ids.push(v.blobId);});
  });
  (p.suivi||[]).forEach(function(g){(g.devis||[]).forEach(function(dv){
    if(dv.devisPdf&&dv.devisPdf.blobId)ids.push(dv.devisPdf.blobId);
    (dv.factures||[]).forEach(function(f){if(f.facturePdf&&f.facturePdf.blobId)ids.push(f.facturePdf.blobId);});
  });});
  if(p.cctp&&p.cctp.pdf&&p.cctp.pdf.blobId)ids.push(p.cctp.pdf.blobId);
  if(p.cctp&&Array.isArray(p.cctp.additifs))p.cctp.additifs.forEach(function(a){if(a.pdf&&a.pdf.blobId)ids.push(a.pdf.blobId);});
  if(p.dpgf&&p.dpgf.pdf&&p.dpgf.pdf.blobId)ids.push(p.dpgf.pdf.blobId);
  if(p.contrat){
    if(p.contrat.pdf&&p.contrat.pdf.blobId)ids.push(p.contrat.pdf.blobId);
    (p.contrat.avenants||[]).forEach(function(a){if(a.pdf&&a.pdf.blobId)ids.push(a.pdf.blobId);});
  }
  if(p.paliers&&Array.isArray(p.paliers.list))p.paliers.list.forEach(function(pl){(pl.annexes||[]).forEach(function(a){if(a.blobId)ids.push(a.blobId);});});
  return ids;
}
function deleteProj(id){
  const p=PROJS.find(x=>x.id===id);if(!p)return;
  confirmModal({
    title:'Supprimer définitivement le projet',
    body:'Suppression définitive de « <strong>'+e(p.name)+'</strong> » et de tous ses documents. Cette application est votre seule copie : exportez une sauvegarde avant de continuer.',
    confirmLabel:'Supprimer définitivement',
    extraLabel:'Exporter d\'abord',
    extraAction:function(){exportData();},
    onConfirm:function(){
      const idx=PROJS.findIndex(x=>x.id===id);
      if(idx===-1)return;
      // Suppression en ligne (si synchronisé) AVANT de retirer localement — sinon le projet
      // réapparaîtrait à la prochaine connexion. RLS n'autorise que le propriétaire.
      try{if(p._sbId&&typeof isSignedIn==='function'&&isSignedIn()){var sb=p._sbId;
        supaClient().then(function(c){return c.from('projects').delete().eq('id',sb);}).catch(function(er){console.warn('[deleteProject] suppression en ligne échouée',er);toastErr('Projet retiré de cet appareil — la suppression en ligne a échoué, il peut réapparaître à la reconnexion.');});}}catch(e){}
      // Libère les octets (IndexedDB + mémoire) pour ne pas laisser de blobs orphelins.
      projAllBlobIds(p).forEach(function(bid){try{delete BLOBS[bid];BlobDB.del(bid);}catch(e){}});
      try{delete PROJ_PLAN_FOLDERS[p.id];}catch(e){}
      PROJS.splice(idx,1);
      savePROJS();
      _infoDirty=false;
      PROJ=null;VIEW='projets';
      renderSB();renderMain();
      try{refreshStorageInfo();}catch(e){}
      toast('Projet supprimé');
    }
  });
}
// Rassemble les octets d'un projet ({id:dataURL}), en récupérant au besoin ceux qui
// ne sont pas encore en mémoire depuis IndexedDB (chargement paresseux).
function collectProjectBlobs(p){
  var ids=projAllBlobIds(p),out={},missing=[];
  ids.forEach(function(id){ if(!id)return; if(BLOBS[id])out[id]=BLOBS[id]; else if(BlobDB.has(id))missing.push(id); });
  if(!missing.length)return Promise.resolve(out);
  return Promise.all(missing.map(function(id){
    return BlobDB.get(id).then(function(b){if(b){out[id]=b;BLOBS[id]=b;}}).catch(function(er){console.warn('[collectProjectBlobs] fichier illisible',id,er);});
  })).then(function(){return out;});
}
// Exporte un seul projet au format de sauvegarde standard (réimportable).
function exportProject(id){
  var p=PROJS.find(function(x){return x.id===id;});if(!p)return;
  collectProjectBlobs(p).then(function(blobs){
    try{
      var payload={_format:'plansync-cr',_version:1,exportedAt:new Date().toISOString(),user:USER,projs:[p],blobs:blobs};
      var json=JSON.stringify(payload,null,2);
      var blob=new Blob([json],{type:'application/json'});
      var url=URL.createObjectURL(blob);
      var slug=((p.name||'projet').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,40))||'projet';
      var a=document.createElement('a');
      a.href=url;a.download='plansync-'+slug+'-'+new Date().toISOString().slice(0,10)+'.json';
      document.body.appendChild(a);a.click();
      setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},100);
      toast('Projet exporté');
    }catch(e){toastErr('Échec de l\'export du projet.');}
  });
}
// Duplique un projet : copie profonde, nouvel id, octets recopiés sous de nouvelles
// clés (remapImportedBlobs) pour ne jamais partager de blob avec l'original.
function duplicateProject(id){
  var p=PROJS.find(function(x){return x.id===id;});if(!p)return;
  collectProjectBlobs(p).then(function(blobs){
    try{
      var copy=JSON.parse(JSON.stringify(p));
      copy.id=importGenId('proj');
      copy.name=(copy.name||'Projet')+' (copie)';
      copy.archived=false;
      remapImportedBlobs(copy,blobs);
      (copy.membres||[]).forEach(normalizeMbr);
      if(copy.planFolders)PROJ_PLAN_FOLDERS[copy.id]=copy.planFolders;
      PROJS.push(copy);
      savePROJS();
      try{refreshStorageInfo();}catch(e){}
      toast('Projet dupliqué');
      openProj(copy.id);
    }catch(e){toastErr('Échec de la duplication.');}
  });
}

function loadDemoProject(){
  // Un seul projet de démonstration possible : si un existe déjà, on l'ouvre.
  var existing=PROJS.find(function(p){return isDemoProj(p);});
  if(existing){toast('Le projet de démonstration existe déjà');openProj(existing.id);return;}
  const demo=buildDemoProject();
  PROJS.push(demo);
  PROJ_PLAN_FOLDERS[demo.id]=demo.planFolders; // miroir mémoire pour la vue Plans
  savePROJS();
  renderProjets();
  toast('Projet de démonstration créé');
}

let npType=null;
function selNPType(id,el){
  npType=id;
  document.querySelectorAll('#np-type-grid .tc-card').forEach(function(c){c.classList.remove('sel');});
  el.classList.add('sel');
}

function createProj(){
  const name=document.getElementById('np-name')?.value?.trim();
  if(!name){
    var el=document.getElementById('np-name');
    if(el){el.classList.add('fi-error');el.focus();}
    toastErr('Le nom du projet est requis.');
    return;
  }
  const type=npType||'maison'; // default to maison if none selected

  const addr=document.getElementById('np-addr')?.value?.trim()||'';
  const city=document.getElementById('np-city')?.value?.trim()||'';
  const address=[addr,city].filter(Boolean).join(', ');
  const client=document.getElementById('np-client')?.value?.trim()||'—';
  const clientEmail=document.getElementById('np-cemail')?.value?.trim()||'';
  const clientTel=document.getElementById('np-ctel')?.value?.trim()||'';
  const ref=document.getElementById('np-ref')?.value?.trim()||'';
  const surf=document.getElementById('np-surf')?.value?.trim()||'—';
  const budget=document.getElementById('np-budget')?.value?.trim()||'—';
  const livrRaw=document.getElementById('np-livr')?.value||'';
  const livraison=livrRaw.trim()?fromISO(livrRaw.trim()):'—';

  // Collect intervenants
  const ints=['Architecte'];
  document.querySelectorAll('#np-ints .chip.on').forEach(c=>{
    const v=c.dataset.int;if(v&&!ints.includes(v))ints.push(v);
  });

  const COLORS=['#5c3d1e','#1a7a4a','#c47a00','#6b3fa0','#c0392b','#0891b2'];
  const BGS=['#f5ede6','#e8f5ee','#fef3d8','#f0ebfa','#fdecea','#e0f2fe'];
  const ci=PROJS.length%COLORS.length;

  const today=new Date();
  const todayStr=`${String(today.getDate()).padStart(2,'0')}/${String(today.getMonth()+1).padStart(2,'0')}/${today.getFullYear()}`;
  const startRaw=document.getElementById('np-start')?.value?.trim()||'';
  const startDate=startRaw?fromISO(startRaw):todayStr;
  // Validation : la livraison ne peut pas précéder le début (valeurs ISO comparables).
  if(startRaw&&livrRaw.trim()&&livrRaw.trim()<startRaw){
    toast('La date de livraison ne peut pas précéder la date de début.',{type:'warn'});
    var le=document.getElementById('np-livr');if(le){le.style.borderColor='var(--red)';le.focus();}
    return;
  }

  const newP={
    id:'proj'+(uid++),
    name,address,addr,city,client,
    clientEmail,clientTel,ref,
    type:type,ints,
    opts:{zone_sismique:false,zone_inondable:false,monument_historique:false},
    phase:'Études',
    color:COLORS[ci],bg:BGS[ci],
    docs:0,progress:0,
    budget,surface:surf?surf+' m²':'—',
    start:startDate,livraison,
    avs:['SM'],
  };
  newP.docs_data={plans:[],contrats:[],factures:[],photos:[],admin:[]};
  newP.membres=[];
  // Dossiers de plans pré-remplis selon le type choisi (fallback standard).
  var folderTpl=PLAN_FOLDERS_TEMPLATES[type]||PLAN_FOLDERS_TEMPLATES.standard;
  newP.planFolders=JSON.parse(JSON.stringify(folderTpl));
  newP.ent_folders={};
  PROJS.push(newP);
  savePROJS();
  npType=null;
  closeModal();
  renderSB();
  openProj(newP.id);
  toast('Projet "'+name+'" créé ✓');
}

// Estimation de l'espace de stockage utilisé (IndexedDB + localStorage), affichée
// dans le popover « Local » pour avertir avant saturation (photos volumineuses).
var _storageInfoTxt='';
var _storagePct=null;
function storageBarHTML(){
  // Barre de jauge (rendue dans le popover). Mise à jour par refreshStorageInfo().
  return '<div id="storage-info" style="font-size:11px;color:var(--text3);margin-top:6px">'+e(_storageInfoTxt||'Calcul du stockage…')+'</div>'
    +'<div style="height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-top:5px"><div id="storage-bar" style="height:100%;width:'+(_storagePct||0)+'%;background:'+(_storagePct>=80?'var(--red)':(_storagePct>=60?'var(--amber)':'var(--green)'))+';transition:width .3s"></div></div>'
    +'<div id="storage-warn" style="display:'+(_storagePct>=80?'block':'none')+';font-size:11px;color:var(--red);margin-top:6px">Stockage presque plein — exportez une sauvegarde puis archivez d\'anciens projets pour libérer de l\'espace.</div>';
}
function refreshStorageInfo(){
  try{
    if(navigator.storage&&navigator.storage.estimate){
      navigator.storage.estimate().then(function(est){
        var used=est.usage||0,quota=est.quota||0;
        var pct=quota?Math.round(used/quota*100):0;
        _storagePct=pct;
        _storageInfoTxt='Stockage utilisé : '+fmtFileSize(used)+(quota?' / '+fmtFileSize(quota)+' ('+pct+'%)':'');
        var el=document.getElementById('storage-info');if(el)el.textContent=_storageInfoTxt;
        var bar=document.getElementById('storage-bar');if(bar){bar.style.width=pct+'%';bar.style.background=(pct>=80?'var(--red)':(pct>=60?'var(--amber)':'var(--green)'));}
        var warn=document.getElementById('storage-warn');if(warn)warn.style.display=(quota&&pct>=80)?'block':'none';
        // Bannière non bloquante sur la vue Projets quand l'espace dépasse ~80 %.
        var sb=document.getElementById('storage-banner');
        if(quota&&pct>=80){ if(!sb)injectStorageBanner(pct); }
        else if(sb){ sb.remove(); }
      }).catch(function(){});
    }
  }catch(e){}
}
// Insère une bannière d'alerte stockage (réutilise le style de la bannière d'export).

  var host=document.getElementById('proj-banner-host');if(!host)return;

    +'<div style="flex:1;min-width:0;font-size:12px;color:var(--text2);line-height:1.4">Stockage local utilisé à '+pct+'%. Exportez une sauvegarde et archivez d\'anciens projets pour éviter toute perte.</div>'
    +'<button class="btn btn-p btn-sm" onclick="exportData()"><svg class="ico ico-xs" style="margin-right:3px"><use href="#i-download"/></svg>Exporter</button>'

// Suivi de la dernière sauvegarde (manuelle OU automatique vers un dossier).

function markBackup(method){try{Store.set('plansync_last_backup',JSON.stringify({at:Date.now(),method:method||'manuel'}));}catch(e){}try{Store.set('plansync_last_export',String(Date.now()));}catch(e){} try{if(typeof updateBackupIndicator==='function')updateBackupIndicator();}catch(e){}}
function getLastBackup(){
  try{var v=Store.get('plansync_last_backup');if(v){var o=JSON.parse(v);if(o&&o.at)return o;}}catch(e){}
  // Rétro-compat : ancien suivi d'export seul.
  try{var lx=Store.get('plansync_last_export');if(lx){var n=parseInt(lx,10);if(!isNaN(n))return{at:n,method:'manuel'};}}catch(e){}

function visibleChipWrap(){
  var wraps=document.querySelectorAll('.locality-chip-wrap');
  for(var i=0;i<wraps.length;i++){var r=wraps[i].getBoundingClientRect();if(r.width>0&&r.height>0)return wraps[i];}
  return wraps[0]||null;
}
function setChipExpanded(state){
  var chips=document.querySelectorAll('.locality-chip');
  for(var i=0;i<chips.length;i++)chips[i].setAttribute('aria-expanded',state?'true':'false');
}
function openLocalityInfo(){
  var wrap=visibleChipWrap();if(!wrap)return;
  if(document.getElementById('locality-pop'))return; // déjà ouvert
  var ov=document.createElement('div');ov.className='locality-overlay';ov.id='locality-overlay';ov.onclick=closeLocalityInfo;
  document.body.appendChild(ov);
  wrap.insertAdjacentHTML('beforeend',localityPopHTML());
  setChipExpanded(true);
  markLocalitySeen();
  clearLocalityCue(); // l'utilisateur a vu le rappel : on retire l'indice passif
  // Repositionne le popover pour qu'il ne déborde jamais de l'écran (mobile notamment).
  positionLocalityPop(wrap);
  refreshStorageInfo();
  // Déplace le focus dans le popover (Échap le referme — voir le gestionnaire clavier global).
  var first=document.querySelector('#locality-pop button');if(first)try{first.focus();}catch(e){}
}
// Ajuste le décalage horizontal du popover et de sa flèche pour rester dans la fenêtre.
function positionLocalityPop(wrap){
  var pop=document.getElementById('locality-pop');if(!pop||!wrap)return;
  // Par défaut le popover est aligné à droite de la pastille (right:0).
  var margin=8;
  var wr=wrap.getBoundingClientRect();
  var pr=pop.getBoundingClientRect();
  // Bord gauche du popover s'il reste aligné à droite de la pastille :
  var leftIfRightAligned=wr.right-pr.width;
  if(leftIfRightAligned<margin){
    // Débordement à gauche : on bascule sur un alignement à gauche borné à la marge.
    var newLeft=Math.max(margin, wr.left); // suit la pastille mais sans sortir
    // S'assure aussi de ne pas déborder à droite.
    if(newLeft+pr.width>window.innerWidth-margin)newLeft=Math.max(margin,window.innerWidth-margin-pr.width);
    pop.style.right='auto';
    pop.style.left=(newLeft-wr.left)+'px'; // relatif au wrap (position:relative)
    // Replace la flèche au-dessus du centre de la pastille.
    var arrowLeft=(wr.left+wr.width/2)-newLeft-5;
    pop.style.setProperty('--arrow-left',Math.max(8,arrowLeft)+'px');
    pop.classList.add('lp-left');
  }
}
function closeLocalityInfo(){
  var pop=document.getElementById('locality-pop');if(pop)pop.remove();
  var ov=document.getElementById('locality-overlay');if(ov)ov.remove();
  setChipExpanded(false);
  // Rends le focus à la pastille déclencheuse (parcours clavier cohérent).
  var chip=document.querySelector('.locality-chip');if(chip)try{chip.focus();}catch(e){}
}
function toggleLocalityInfo(ev){
  if(ev){ev.stopPropagation();}

}
// Indice passif sur la pastille « Local » au premier passage : pas d'ouverture

// le rappel en cliquant la pastille quand il le souhaite.
function applyLocalityCue(){try{document.body.classList.add('locality-unseen');}catch(e){}}
function clearLocalityCue(){try{document.body.classList.remove('locality-unseen');}catch(e){}}
// Conservé pour compatibilité (anciens appels d'init).
function renderBanner(){
  if(localitySeen()){clearLocalityCue();return;}
  // N'affiche l'indice qu'une fois l'onboarding terminé (sinon il est masqué dessous).
  var onb=document.getElementById('onb-root');
  if(onb&&onb.innerHTML.trim())return;
  applyLocalityCue();
  // Retire l'indice après un court délai même sans clic, pour qu'il ne se répète pas
  // indéfiniment et reste discret ; le rappel reste accessible via la pastille.
  setTimeout(function(){clearLocalityCue();try{markLocalitySeen();}catch(e){}},12000);
}

/* ══ EXPORT / IMPORT JSON ══ */
// Construit la charge utile de sauvegarde (profil + projets + octets de fichiers).
// Réutilisée par l'export manuel ET la sauvegarde automatique vers un dossier.
function makeBackupPayload(blobs){return {_format:'plansync-cr',_version:1,exportedAt:new Date().toISOString(),user:USER,projs:PROJS,blobs:blobs||{}};}
// Récupère l'ensemble des octets persistés (IndexedDB) fusionnés avec la session.
function gatherBackupBlobs(cb){
  var finish=function(allBlobs){
    var merged={};
    if(allBlobs&&typeof allBlobs==='object')Object.keys(allBlobs).forEach(function(k){if(allBlobs[k])merged[k]=allBlobs[k];});
    Object.keys(BLOBS).forEach(function(k){if(BLOBS[k])merged[k]=BLOBS[k];}); // la session prime
    cb(merged);
  };
  try{
    if(BlobDB.available()){BlobDB.getAllAsObject().then(finish).catch(function(){finish(null);});}
    else finish(null);
  }catch(e){finish(null);}
}
function buildBackupPayload(cb){ gatherBackupBlobs(function(merged){cb(makeBackupPayload(merged));}); }
// Exporte profil + projets (et octets de fichiers en mémoire) dans un fichier JSON téléchargeable.
function exportData(){
  buildBackupPayload(function(payload){
    try{
      var json=JSON.stringify(payload,null,2);
      var blob=new Blob([json],{type:'application/json'});
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');
      var stamp=new Date().toISOString().slice(0,10);
      a.href=url;a.download='plansync-sauvegarde-'+stamp+'.json';
      document.body.appendChild(a);a.click();
      setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},100);
      markBackup('manuel');
      var b=document.getElementById('export-banner');if(b)b.remove();
      toast('Sauvegarde exportée');
    }catch(err){toastErr('Échec de l\'export.');}
  });
}
/* ══ SAUVEGARDE AUTOMATIQUE VERS UN DOSSIER (File System Access API) ══
   Sur navigateurs compatibles (Chrome/Edge/Brave…), l'utilisateur choisit une
   fois un dossier ; l'app y écrit silencieusement une sauvegarde horodatée après
   chaque modification importante (anti-perte hors application). Le handle de
   dossier est persisté dans IndexedDB ; au redémarrage on revalide l'autorisation.
   Navigateurs non compatibles (Safari/Firefox) : repli sur l'export manuel + rappel. */
var BackupFS=(function(){
  var DB='plansync_backupfs', STORE='kv', _db=null, _open=null;
  var _idbOK=(typeof indexedDB!=='undefined'&&indexedDB);
  var supported=(typeof window!=='undefined' && 'showDirectoryPicker' in window);
  var _handle=null, _connected=false, _needReconnect=false, _folder='';
  var _timer=null, _writing=false, _again=false;
  // Cache des octets de fichiers : éviter de relire/ré-encoder TOUT le stockage IndexedDB
  // à chaque sauvegarde automatique (coûteux sur un projet avec beaucoup de PDF/photos).
  // On ne relit l'IDB que lorsqu'un fichier a réellement changé (drapeau « dirty »).
  var _blobCache=null, _blobsDirty=true;
  function blobsForAuto(cb){
    if(!_blobsDirty && _blobCache){cb(_blobCache);return;}
    gatherBackupBlobs(function(merged){_blobCache=merged||{};_blobsDirty=false;cb(_blobCache);});
  }

  function open(){
    if(!_idbOK)return Promise.resolve(null);
    if(_db)return Promise.resolve(_db);
    if(_open)return _open;
    _open=new Promise(function(res){
      try{var r=indexedDB.open(DB,1);
        r.onupgradeneeded=function(){var db=r.result;if(!db.objectStoreNames.contains(STORE))db.createObjectStore(STORE);};
        r.onsuccess=function(){_db=r.result;res(_db);};
        r.onerror=function(){_idbOK=false;res(null);};
      }catch(e){_idbOK=false;res(null);}
    });
    return _open;
  }
  function idb(mode){return open().then(function(db){if(!db)return null;try{return db.transaction(STORE,mode).objectStore(STORE);}catch(e){return null;}});}
  function idbGet(k){return idb('readonly').then(function(s){if(!s)return null;return new Promise(function(res){try{var r=s.get(k);r.onsuccess=function(){res(r.result||null);};r.onerror=function(){res(null);};}catch(e){res(null);}});});}
  function idbSet(k,v){return idb('readwrite').then(function(s){if(!s)return false;return new Promise(function(res){try{var r=s.put(v,k);r.onsuccess=function(){res(true);};r.onerror=function(){res(false);};}catch(e){res(false);}});});}
  function idbDel(k){return idb('readwrite').then(function(s){if(!s)return false;return new Promise(function(res){try{var r=s.delete(k);r.onsuccess=function(){res(true);};r.onerror=function(){res(false);};}catch(e){res(false);}});});}

  function queryPerm(h){try{return h.queryPermission?h.queryPermission({mode:'readwrite'}):Promise.resolve('denied');}catch(e){return Promise.resolve('denied');}}
  function reqPerm(h){try{return h.requestPermission?h.requestPermission({mode:'readwrite'}):Promise.resolve('denied');}catch(e){return Promise.resolve('denied');}}

  function init(){
    if(!supported)return Promise.resolve();
    return idbGet('dirHandle').then(function(h){
      if(!h)return;
      _handle=h;_folder=h.name||'';
      return queryPerm(h).then(function(p){ if(p==='granted')_connected=true; else _needReconnect=true; });
    }).catch(function(){
      // Échec de la revalidation : ne pas rester silencieusement « non sauvegardé ».
      // On signale qu'une reconnexion est nécessaire (sécurité = pas de faux sentiment de protection).
      if(_handle)_needReconnect=true;
    }).then(function(){updateBackupIndicator&&updateBackupIndicator();});
  }
  function connect(){
    if(!supported){toastErr('Ce navigateur ne gère pas la sauvegarde automatique. Utilisez « Exporter » / « Restaurer ».');return Promise.resolve(false);}
    return window.showDirectoryPicker({id:'plansync-backup',mode:'readwrite'}).then(function(h){
      if(!h)return false;
      return reqPerm(h).then(function(p){
        if(p!=='granted'){toastErr('Autorisation du dossier refusée.');return false;}
        _handle=h;_folder=h.name||'';_connected=true;_needReconnect=false;
        return idbSet('dirHandle',h).then(function(stored){
          if(!stored){try{toastErr('Dossier connecté, mais la connexion n\'a pas pu être mémorisée — vous devrez la réactiver au prochain chargement.');}catch(e){}}
          return writeNow(true);
        }).then(function(ok){if(ok){refresh();toast('Sauvegarde automatique activée ✓');}return ok;});
      });
    }).catch(function(e){if(e&&e.name==='AbortError')return false;toastErr('Connexion du dossier impossible.');return false;});
  }
  function reconnect(){
    if(!_handle)return connect();
    return reqPerm(_handle).then(function(p){
      if(p==='granted'){_connected=true;_needReconnect=false;return writeNow(true).then(function(ok){if(ok){refresh();toast('Sauvegarde reconnectée ✓');}return ok;});}
      toastErr('Autorisation refusée.');return false;
    }).catch(function(){toastErr('Reconnexion impossible.');return false;});
  }
  function disconnect(){_handle=null;_connected=false;_needReconnect=false;_folder='';return idbDel('dirHandle').catch(function(){}).then(function(){refresh();toast('Sauvegarde automatique désactivée');});}

  function fname(){return 'plansync-sauvegarde-'+new Date().toISOString().slice(0,10)+'.json';}
  function writeNow(showToast){
    return new Promise(function(resolve){
      if(!_connected||!_handle){resolve(false);return;}
      blobsForAuto(function(blobs){
        var payload=makeBackupPayload(blobs);
        var json;try{json=JSON.stringify(payload);}catch(e){resolve(false);return;}
        var writable=null;
        _handle.getFileHandle(fname(),{create:true})
          .then(function(fh){return fh.createWritable();})
          .then(function(w){writable=w;return w.write(new Blob([json],{type:'application/json'})).then(function(){return w.close();});})
          .then(function(){markBackup('auto');refresh();if(showToast)toast('Sauvegardé dans « '+(_folder||'le dossier')+' »');resolve(true);})
          .catch(function(){
            // Abandonne le flux d'écriture pour ne pas laisser de fichier verrouillé / partiel.
            if(writable){try{writable.abort();}catch(e){}}
            _connected=false;_needReconnect=true;refresh();
            // Toujours signaler la perte de la sauvegarde auto, même en arrière-plan (évite un faux
            // sentiment de protection : l'utilisateur doit savoir qu'il n'est plus sauvegardé).
            try{toastErr('Sauvegarde automatique interrompue — rouvrez « Local » pour reconnecter le dossier.');}catch(e){}
            resolve(false);
          });
      });
    });
  }
  // Sauvegarde différée (anti-rafale) déclenchée par savePROJS lorsqu'un dossier est connecté.
  function schedule(){
    if(!_connected)return;
    if(_timer)clearTimeout(_timer);
    _timer=setTimeout(function(){
      _timer=null;if(_writing){_again=true;return;}_writing=true;
      var done=function(){_writing=false;if(_again){_again=false;schedule();}};
      writeNow(false).then(done,done); // garantit la réinitialisation de _writing même en cas de rejet
    },8000); // 8 s : coalesce les rafales de frappe en une seule écriture
  }
  function refresh(){try{updateBackupIndicator();}catch(e){}try{rerenderLocalityPop();}catch(e){}}
  function status(){return {supported:supported,connected:_connected,needReconnect:_needReconnect,folder:_folder};}
  // À appeler quand un fichier (octets) a été ajouté/modifié : force une relecture IDB au prochain backup.
  function markBlobsDirty(){_blobsDirty=true;_blobCache=null;}
  return {init:init,connect:connect,reconnect:reconnect,disconnect:disconnect,saveNow:function(){return writeNow(true);},schedule:schedule,status:status,supported:supported,markBlobsDirty:markBlobsDirty};
})();

// Ouvre le sélecteur de fichier puis demande confirmation avant de remplacer les données.

    var file=ev.target.files&&ev.target.files[0];if(!file)return;
