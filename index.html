<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlanSync CR — Bell Architecture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── ICONS inline via SVG sprite – no CDN needed ── */
:root{
  --bg:#f5f3f0;--bg2:#ece9e4;--bg3:#e2ddd6;
  --panel:#ffffff;--panel2:#f7f5f2;
  --border:#ddd9d3;--border2:#ccc7bf;
  --text:#2a2520;--text2:#4a4540;--text3:#8a8178;
  --blue:#5c3d1e;--blue-bg:#f5ede6;--blue-lt:#e8d5c4;
  --green:#1a7a4a;--green-bg:#e8f5ee;
  --amber:#c47a00;--amber-bg:#fef3d8;
  --red:#c0392b;--red-bg:#fdecea;
  --purple:#6b3fa0;--purple-bg:#f0ebfa;
  --r:10px;--r2:14px;
  --shadow:0 1px 4px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.05);
  --shadow2:0 2px 8px rgba(0,0,0,.1),0 8px 32px rgba(0,0,0,.08);
  font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text)
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);overflow:hidden;height:100vh;font-family:inherit}

/* ── SVG icon helper ── */
.ico{display:inline-block;width:16px;height:16px;vertical-align:middle;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.ico-lg{width:19px;height:19px}
.ico-sm{width:14px;height:14px}
.ico-xs{width:12px;height:12px}

/* ── LAYOUT ── */
.app{display:flex;height:100vh}
.sidebar{width:238px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── SIDEBAR ── */
.sb-head{padding:13px 12px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{display:flex;align-items:center;gap:9px;margin-bottom:11px}
.logo-mark{width:26px;height:26px;background:var(--blue);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;letter-spacing:-.5px;flex-shrink:0}
.logo-name{font-size:15px;font-weight:600;letter-spacing:-.3px}
.proj-pill{display:flex;align-items:center;gap:7px;background:var(--bg2);border-radius:var(--r);padding:7px 9px;cursor:pointer;border:1px solid transparent;width:100%;text-align:left;font-family:inherit;transition:border-color .15s}
.proj-pill:hover{border-color:var(--border2)}
.pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pp-name{font-size:12.5px;font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pp-type{font-size:10px;color:var(--text3);background:var(--panel);border-radius:4px;padding:1px 5px;flex-shrink:0}

.sb-body{flex:1;overflow-y:auto;display:flex;flex-direction:column}

/* Project list in sidebar */
.sb-proj-list{padding:8px 8px 0}
.sb-proj-hd{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;padding:6px 6px 4px;display:flex;align-items:center;justify-content:space-between}
.proj-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--r);cursor:pointer;transition:all .12s;border:1px solid transparent;margin-bottom:3px}
.proj-item:hover{background:var(--bg2);border-color:var(--border)}
.proj-item.active-proj{background:var(--blue-bg);border-color:var(--blue-lt)}
.proj-item-dot{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.proj-item-info{flex:1;min-width:0}
.proj-item-name{font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-item-sub{font-size:10.5px;color:var(--text3);margin-top:1px;display:flex;align-items:center;gap:5px}
.proj-prog{width:36px;height:3px;border-radius:2px;background:var(--bg3);overflow:hidden;flex-shrink:0}
.proj-prog-fill{height:100%;border-radius:2px}

/* Nav sections */
.sb-nav{padding:4px 8px}
.nl{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;padding:10px 6px 4px}
.ni{display:flex;align-items:center;gap:8px;padding:6.5px 8px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);border:none;background:none;width:100%;text-align:left;font-family:inherit;transition:all .12s;margin-bottom:1px}
.ni:hover{background:var(--bg2);color:var(--text)}
.ni.active{background:var(--blue-bg);color:var(--blue);font-weight:500}
.ni-ico{width:22px;display:flex;justify-content:center;flex-shrink:0}
.nb{font-size:9.5px;padding:1.5px 5px;border-radius:8px;background:var(--bg2);color:var(--text3);margin-left:auto}
.nb.ok{background:var(--green-bg);color:var(--green)}

.sb-foot{padding:8px 7px;border-top:1px solid var(--border);flex-shrink:0}
.av{display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:11px;font-weight:600;flex-shrink:0}

/* ── TOPBAR ── */
.topbar{background:var(--panel);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.tb-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.tb-right{display:flex;gap:6px;align-items:center;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border:1px solid var(--border2);border-radius:var(--r);background:var(--panel);color:var(--text);font-size:12px;cursor:pointer;font-weight:500;font-family:inherit;transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--bg2)}
.btn-p{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-p:hover{background:#3d2510;border-color:#3d2510}
.btn-sm{padding:5px 10px;font-size:11.5px}
.btn-g{border-color:transparent;background:transparent}
.btn-g:hover{background:var(--bg2)}
.notif-w{position:relative}
.notif-dot{position:absolute;top:-3px;right:-3px;width:15px;height:15px;background:#e03131;color:#fff;border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}

/* ── TICKER ── */


/* ── TABBAR ── */
.tabbar{display:flex;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.tab{padding:10px 15px;font-size:12px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit;transition:color .12s;flex-shrink:0}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto}
.pad{padding:18px 22px}

/* ── BADGES ── */
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
.bgreen{background:var(--green-bg);color:var(--green)}
.bamber{background:var(--amber-bg);color:var(--amber)}
.bblue{background:var(--blue-bg);color:var(--blue)}
.bred{background:var(--red-bg);color:var(--red)}
.bpurple{background:var(--purple-bg);color:var(--purple)}
.bgray{background:var(--bg2);color:var(--text3)}
.vpill{font-size:10px;padding:2px 6px;background:var(--blue-bg);color:var(--blue);border-radius:5px;font-weight:500;font-family:'DM Mono',monospace}
.tag{font-size:10px;padding:1.5px 6px;border-radius:4px;margin-left:5px}
.tred{background:var(--red-bg);color:var(--red)}.tamber{background:var(--amber-bg);color:var(--amber)}
.tblue{background:var(--blue-bg);color:var(--blue)}.tgreen{background:var(--green-bg);color:var(--green)}
.tpurple{background:var(--purple-bg);color:var(--purple)}.tgray{background:var(--bg2);color:var(--text3)}

/* ── PROJECT CARDS (main view) ── */
.proj-cards{display:flex;flex-direction:column;gap:10px}
.pcard{background:var(--panel);border:1px solid var(--border);border-radius:var(--r2);padding:20px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.pcard:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.pcard.activep{border-color:var(--blue);border-width:1.5px}
.prog-bar{height:4px;border-radius:2px;background:var(--bg2);overflow:hidden;margin-top:5px}
.prog-fill{height:100%;border-radius:2px}
.meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;border-top:1px solid var(--border);padding-top:13px;margin-top:2px}
.meta-n{font-size:20px;font-weight:600;letter-spacing:-.3px}
.meta-l{font-size:10px;color:var(--text3);margin-top:1px}
.av-stack{display:flex}
.av-sm{width:24px;height:24px;border-radius:50%;border:2px solid var(--panel);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;margin-left:-5px}
.av-sm:first-child{margin-left:0}

/* ── DOC LIST ── */
.doc-row{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;margin-bottom:7px;cursor:pointer;transition:all .12s}
.doc-row:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.doc-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── DETAIL PANEL ── */
.detail-panel{width:0;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width .25s}
.detail-panel.open{width:356px}
.dp-head{padding:13px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.dp-body{flex:1;overflow-y:auto;padding:15px}
.dp-foot{padding:10px 15px;border-top:1px solid var(--border);display:flex;gap:7px;flex-shrink:0}
.fi{margin-bottom:12px}
.fi label{display:block;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.fi input,.fi select,.fi textarea{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:8px;font-size:12.5px;background:var(--bg);color:var(--text);outline:none;font-family:inherit;transition:border-color .12s}
.fi input:focus,.fi select:focus,.fi textarea:focus{border-color:var(--blue);background:var(--panel)}
.fi textarea{resize:vertical;min-height:64px}
.fi-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sec-hd{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:15px 0 8px;padding-top:13px;border-top:1px solid var(--border)}
.sec-hd:first-child{margin-top:0;padding-top:0;border-top:none}
.v-row{display:flex;align-items:center;gap:7px;padding:7px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:5px;font-size:12px}
.v-row.cur{border-color:var(--blue);background:var(--blue-bg)}

/* ── MEMBRES ── */
.mem-row{display:flex;align-items:center;gap:11px;background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .12s}
.mem-row:hover{border-color:var(--border2)}
.perm-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-top:10px}
.pi{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s}
.pi.on{background:var(--green-bg);color:var(--green)}
.pi.off{background:var(--bg2);color:var(--text3)}
.fold-row{display:flex;align-items:center;gap:9px;padding:7px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:5px;font-size:12px}
.tog{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s}
.tog.on{background:var(--blue);border-color:var(--blue);color:#fff}

/* ── CHECKLISTS ── */
.cl-group{background:var(--panel);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:10px;overflow:hidden}
.cl-item{display:flex;align-items:flex-start;gap:9px;padding:9px 14px;border-bottom:1px solid var(--border);transition:background .1s}
.cl-item:last-child{border-bottom:none}
.cl-item:hover{background:var(--bg2)}
.cl-chk{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;margin-top:1.5px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.cl-chk.done{background:var(--blue);border-color:var(--blue)}
.cl-chk.arch{background:var(--bg2);border-style:dashed;opacity:.5}
.cl-act{display:flex;gap:3px;opacity:0;transition:opacity .12s;flex-shrink:0}
.cl-item:hover .cl-act{opacity:1}
.add-row{padding:8px 14px;border-top:1px solid var(--border);display:flex;gap:6px;background:var(--bg)}
.add-row input{flex:1;padding:6px 9px;border:1px solid var(--border2);border-radius:7px;font-size:12px;background:var(--panel);color:var(--text);outline:none;font-family:inherit}
.add-row input:focus{border-color:var(--blue)}
.sum-bar{display:flex;gap:14px;background:var(--bg2);border-radius:var(--r);padding:11px 14px;margin-bottom:12px;align-items:center;border:1px solid var(--border)}

/* ── AUDIT ── */
.aud-row{display:flex;gap:10px;margin-bottom:7px}
.aud-ic{width:32px;height:32px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--border)}
.aud-card{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:9px 13px}

/* ── PLU ── */
.plu-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.plu-f{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px}

/* ── MODAL ── */
.mo-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px)}
.mo-box{background:var(--panel);border-radius:var(--r2);padding:24px;width:460px;border:1px solid var(--border);box-shadow:var(--shadow2);max-height:90vh;overflow-y:auto}
.mo-box h3{font-size:15px;font-weight:600;margin-bottom:16px}
.mo-foot{display:flex;gap:7px;margin-top:16px;justify-content:flex-end}
/* ── Visionneuse de documents ── */
.vw-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(2px)}
.vw-box{background:var(--panel);border-radius:var(--r2);width:min(960px,94vw);height:min(88vh,900px);display:flex;flex-direction:column;border:1px solid var(--border);box-shadow:var(--shadow2);overflow:hidden}
.vw-head{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.vw-body{flex:1;min-height:0;background:var(--bg2);display:flex;align-items:center;justify-content:center;overflow:auto}
.vw-body iframe{width:100%;height:100%;border:none;background:#fff}
.vw-body img{max-width:100%;max-height:100%;object-fit:contain;display:block}
@media(max-width:560px){.vw-box{width:100vw;height:100vh;border-radius:0;max-height:none}}
/* ── Vue en colonnes (Plans) ── */
.col-wrap{display:flex;overflow-x:auto;overflow-y:hidden;height:100%}
.col{width:240px;min-width:220px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.col-list{flex:1;overflow-y:auto;padding:6px}
.col-row{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;cursor:pointer;font-size:12.5px;color:var(--text2);margin-bottom:2px}
.col-row:hover{background:var(--bg2)}
.col-row.sel{background:var(--blue-bg);color:var(--blue);font-weight:500}
.col-hd{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;padding:8px 9px 4px}
@media(max-width:760px){.col-wrap{overflow-x:hidden;height:auto;min-height:60vh}.col{width:100%;min-width:0;border-right:none}.col:not(:last-child){display:none}.col-list{min-height:50vh}}
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.tc-card{border:1px solid var(--border);border-radius:var(--r);padding:11px 7px;cursor:pointer;text-align:center;transition:all .12s}
.tc-card:hover{border-color:var(--border2)}
.tc-card.sel{border-color:var(--blue);border-width:1.5px;background:var(--blue-bg)}
.chip-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.chip{padding:3px 9px;border:1px solid var(--border2);border-radius:20px;font-size:11.5px;cursor:pointer;transition:all .12s;font-family:inherit}
.chip:hover{border-color:var(--blue);color:var(--blue)}
.chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200;white-space:nowrap;box-shadow:var(--shadow2)}

/* ── Mobile ── */
@media(max-width:600px){
  .app{flex-direction:column}
  .sidebar{width:100%;min-width:0;height:auto;max-height:42vh;border-right:none;border-bottom:1px solid var(--border);flex-direction:column;flex-shrink:0}
  .sb-head{display:none}
  /* Le corps de la sidebar et la nav projet deviennent des bandes horizontales défilables */
  .sb-body{flex:0 0 auto;overflow-y:hidden}
  .sb-nav{display:flex;flex-direction:row;flex-wrap:nowrap;gap:5px;padding:7px 8px;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch}
  .sb-proj-list{padding:7px 8px}
  /* Libellés de groupe : séparateurs discrets dans la bande horizontale */
  .sb-nav .nl{display:flex;align-items:center;padding:0 2px 0 6px;margin:0;font-size:8.5px;flex-shrink:0;border-left:1px solid var(--border);align-self:stretch;max-width:56px;line-height:1.05}
  .sb-nav > .nl:first-child{border-left:none}
  /* Boutons de nav : pastilles compactes en colonne (icône + libellé court) */
  .sb-nav .ni{flex-direction:column;gap:3px;width:auto;min-width:62px;max-width:88px;padding:7px 8px;text-align:center;font-size:10.5px;flex-shrink:0;white-space:normal;line-height:1.1;border:1px solid var(--border);background:var(--panel);margin-bottom:0}
  .sb-nav .ni.active{background:var(--blue-bg)}
  .sb-nav .ni-ico{width:auto}
  .sb-nav .ni .nb{display:none}
  .sb-foot{flex-direction:row;gap:6px;padding:7px 8px;border-top:1px solid var(--border);overflow-x:auto;align-items:center;flex-shrink:0}
  .main{flex:1;min-height:0;overflow-y:auto}
  #topbar{padding:10px 12px;gap:8px;flex-wrap:wrap}
  #topbar #main-btn{flex-shrink:0}
  .pad{padding:12px}
  .proj-grid{grid-template-columns:1fr!important}
  /* En-tête "Mes projets" : le titre prend toute la largeur, les boutons passent dessous */
  .proj-hd > div[style*="flex:1"]{flex:1 1 100%!important;order:-1}
  .proj-hd .btn{flex:1 1 auto}
  /* Carte projet : les 6 métriques s'empilent en 3 colonnes au lieu de déborder */
  .pcard-metrics{grid-template-columns:repeat(3,1fr)!important;gap:10px 4px!important}
  .pcard-metrics > div{padding-right:0!important}
  .pcard-head{flex-direction:column!important}
  .pcard-actions{flex-direction:row!important;align-items:center!important;width:100%;justify-content:space-between!important}
  .doc-row{flex-direction:column;gap:4px;align-items:flex-start}
}
</style>
</head>
<body>

<!-- SVG ICONS (all inline, no CDN) -->
<svg style="display:none" id="icons">
<symbol id="i-grid" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></symbol>

function icoC(id,col,cls=''){return`<svg class="ico ${cls}" style="color:${col}" aria-hidden="true"><use href="#i-${id}"/></svg>`;}

/* ══ DATA ══ */
const PT=[
  {id:'maison',ico:'home',name:'Maison individuelle',desc:'PC / PCMI'},

  {id:'extension',ico:'extend',name:'Extension',desc:'Existant'},

];

const RL={project_admin:'Admin projet',editor:'Éditeur',external_contractor:'Entreprise ext.',client_viewer:'Client',viewer:'Lecteur'};
// Rôles d'accès applicatifs (gestion des dossiers/documents). Séparés de RL pour ne pas casser l'existant.
const ACCESS_RL={admin:'Admin projet',architecte:'Architecte',collaborateur:'Collaborateur',lecture:'Lecture seule'};
// Permissions par rôle d'accès.
const ACCESS_PERMS={
  admin:       {folders:true, items:true, archive:true, manageAccess:true},
  architecte:  {folders:true, items:true, archive:true, manageAccess:true},
  collaborateur:{folders:false,items:true, archive:false,manageAccess:false},
  lecture:     {folders:false,items:false,archive:false,manageAccess:false}
};
// Rôle de l'utilisateur courant pour le projet ouvert (par défaut Admin projet).
let currentAccessRole='admin';
function setCurrentAccessRole(r){if(ACCESS_RL[r])currentAccessRole=r;}
function can(action){const p=ACCESS_PERMS[currentAccessRole]||ACCESS_PERMS.lecture;return !!p[action];}
function denyMsg(){toast('Vous n\'avez pas les droits pour cette action.');}
// Bouton désactivé avec infobulle si droit manquant.
function permBtn(action,html,onclick,extraCls,extraStyle){
  const ok=can(action);
  const cls='btn '+(extraCls||'')+(ok?'':' is-disabled');
  const handler=ok?onclick:'denyMsg()';
  const title=ok?'':'Vous n\'avez pas les droits pour cette action.';
  return '<button class="'+cls+'" onclick="'+handler+'" title="'+title+'" style="'+(extraStyle||'')+(ok?'':'opacity:.5;cursor:not-allowed')+'">'+html+'</button>';
}
const METIERS=[];
const PI_IC={voir:'eye',dl:'download',import:'upload',publier:'check',contrats:'invoice',admin:'settings'};

let PROJS=[];

/* ══ PERSISTANCE LOCALE ══ */
function savePROJS(){
  try{localStorage.setItem('plansync_projs',JSON.stringify(PROJS));}
  catch(e){console.warn('PlanSync CR: save error',e);}
}
// Compte des projets avec pluriel français correct.
function projCount(){return PROJS.filter(function(p){return !p.archived;}).length;}
function projCountLabel(){const n=projCount();return n+(n>1?' projets':' projet');}
function projActifsLabel(){const n=projCount();return n===0?'Aucun projet pour l\'instant — créez votre premier projet':(n+(n>1?' projets actifs':' projet actif'));}
function loadPROJS(){
  try{
    const saved=localStorage.getItem('plansync_projs');
    if(saved&&saved!=='null'){
      const parsed=JSON.parse(saved);
      if(parsed&&parsed.length){PROJS=parsed;return;}
    }
  }catch(e){}
  // Aucun projet sauvegardé : on charge un projet de démonstration complet
  // (données neutres) pour pouvoir tester tous les outils immédiatement.
  const demo=buildDemoProject('demo');
  PROJ_PLAN_FOLDERS[demo.id]=demo.planFolders;
  PROJS=[demo];
}

const PROJ_PLAN_FOLDERS={};

function getPlanFolders(projId){
  const p=PROJS.find(x=>x.id===projId);
  if(p){
    // Persistance dans le projet (rétro-compat : initialise depuis le modèle si absent).
    if(!Array.isArray(p.planFolders)){
      if(PROJ_PLAN_FOLDERS[projId]){p.planFolders=PROJ_PLAN_FOLDERS[projId];}
      else{const tpl=(PLAN_FOLDERS_TEMPLATES[p.type])||PLAN_FOLDERS_TEMPLATES.standard;p.planFolders=JSON.parse(JSON.stringify(tpl));}
    }
    PROJ_PLAN_FOLDERS[projId]=p.planFolders; // garde le miroir en mémoire
    return p.planFolders;
  }
  if(!PROJ_PLAN_FOLDERS[projId]){
    const tpl=PLAN_FOLDERS_TEMPLATES.standard;
    PROJ_PLAN_FOLDERS[projId]=JSON.parse(JSON.stringify(tpl));
  }
  return PROJ_PLAN_FOLDERS[projId];
}
function savePlanFolders(projId){const p=PROJS.find(x=>x.id===projId);if(p)p.planFolders=PROJ_PLAN_FOLDERS[projId];savePROJS();}
function getEntFolders(projId){

}

function setTabs(tabs,activeId){
  const tb=document.getElementById('tabbar');

  tb.style.display='flex';
  tb.innerHTML=tabs.map(t=>`<button class="tab ${t.id===activeId?'active':''}" title="${e(t.label)}" onclick="switchTab('${t.id}',this)" style="${t.id===activeId&&t.color?'color:'+t.color+';border-bottom-color:'+t.color:''}">
    <svg class="ico ico-sm" style="vertical-align:-2px;margin-right:4px"><use href="#i-${t.ico}"/></svg>${t.label}
  </button>`).join('');
}
function switchTab(id,btn){
  document.querySelectorAll('.tabbar .tab').forEach(t=>{t.classList.remove('active');t.style.color='';t.style.borderBottomColor='';});
  btn.classList.add('active');
  if(id==='pt-docs'||id==='pt-info'){renderPlansContent(id);return;}
  clTab=id;
  const node=findCLN(id);if(node){btn.style.color=node.color;btn.style.borderBottomColor=node.color;}
  renderCLContent();
}

/* ══ PLANS — folder tree + docs ══ */
function renderPlans(){
  if(!PROJ)return;
  setTB('pdf','var(--blue)','Plans',PROJ.name,'Importer','upload');
  setTabs([
    {id:'pt-docs',label:'Documents',ico:'pdf',color:'var(--blue)'},
    {id:'pt-info',label:'Informations projet',ico:'settings',color:'var(--blue)'},
  ],'pt-docs');
  renderPlansContent('pt-docs');
}

function renderPlansContent(tab){
  if(tab==='pt-info'){renderProjInfoPanel();return;}
  if(planArch){renderPlansArchives();return;}
  if(planView==='colonnes'){renderPlansColumns();return;}
  const projId=PROJ.id;
  const folders=getPlanFolders(projId);
  const docs=(getDocsForProj(PROJ).plans||[]).filter(function(d){return !d.archived;});

  // Build folder tree HTML
  function folderTreeHTML(nodes,depth){
    if(!nodes||!nodes.length)return '';
    return nodes.filter(function(f){return !f.archived;}).map(function(f){
      var isActive=activePlanFolder&&activePlanFolder.id===f.id;
      var sub=f.children&&f.children.length?'<div style="padding-left:14px">'+folderTreeHTML(f.children,depth+1)+'</div>':'';
      return '<div>'
        +'<div style="display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:12.5px;'+(isActive?'background:var(--blue-bg);color:var(--blue);font-weight:500':'color:var(--text2)')+'" onclick="selectPlanFolder(\''+f.id+'\',\''+e(f.name)+'\')">'
          +'<svg class="ico ico-sm" style="flex-shrink:0"><use href="#i-folder"/></svg>'
          +'<span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+f.name+'</span>'
          +'<button onclick="event.stopPropagation();renamePlanFolder(\''+f.id+'\',\''+e(f.name)+'\',\''+projId+'\')" style="background:none;border:none;cursor:pointer;opacity:.5;padding:2px" title="Renommer"><svg class="ico" style="width:11px;height:11px"><use href="#i-edit"/></svg></button>'
          +'<button onclick="event.stopPropagation();addPlanSubfolder(\''+f.id+'\',\''+projId+'\')" style="background:none;border:none;cursor:pointer;opacity:.5;padding:2px" title="Sous-dossier"><svg class="ico" style="width:11px;height:11px"><use href="#i-plus"/></svg></button>'
          +'<button onclick="event.stopPropagation();archivePlanFolder(\''+projId+'\',\''+f.id+'\')" style="background:none;border:none;cursor:pointer;opacity:.5;padding:2px;color:var(--amber)" title="Archiver"><svg class="ico" style="width:11px;height:11px"><use href="#i-archive"/></svg></button>'
        +'</div>'
        +sub
      +'</div>';
    }).join('');
  }

  // Docs du dossier actif ; sinon "Général" = docs sans dossier (ou dossier inexistant)
  const allFolderIds=flatPlanFolders(folders).map(function(x){return x.node.id;});
  var shownDocs=activePlanFolder
    ?docs.filter(function(d){return d.folder===activePlanFolder.id;})
    :docs.filter(function(d){return !d.folder||allFolderIds.indexOf(d.folder)<0;});
  const headerLabel=activePlanFolder?activePlanFolder.name:'Général';
  const headerFolderId=activePlanFolder?activePlanFolder.id:'';

  document.getElementById('content').innerHTML=
    '<div style="display:flex;flex-direction:column;height:100%;min-height:60vh">'
    +planViewToggle()
    +'<div style="display:flex;flex:1;min-height:0;overflow:hidden">'

      // Left: folder tree
      +'<div style="width:220px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden">'
        +'<div style="padding:10px 10px 6px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0">'
          +'<span style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Structure</span>'
          +'<div style="display:flex;gap:3px">'
            +'<button class="btn btn-g btn-sm" onclick="addPlanFolder(\''+projId+'\')" title="Nouveau dossier" style="padding:3px 6px"><svg class="ico ico-xs"><use href="#i-plus"/></svg></button>'
            +'<button class="btn btn-g btn-sm" onclick="openTemplateModal(\''+projId+'\')" title="Utiliser un modèle" style="padding:3px 6px;font-size:10px">Modèle</button>'
          +'</div>'
        +'</div>'
        +'<div style="flex:1;overflow-y:auto;padding:6px 8px">'
          +(folders.length
            ?folderTreeHTML(folders,0)
            :'<div style="padding:16px 8px;font-size:12px;color:var(--text3);text-align:center">Aucun dossier.<br>Cliquez + ou choisissez un modèle.</div>'
          )
        +'</div>'
      +'</div>'

      // Right: docs
      +'<div style="flex:1;overflow-y:auto;padding:16px 20px">'
        +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-shrink:0">'
            +'<svg class="ico ico-sm" style="color:var(--blue)"><use href="#i-folder"/></svg>'
            +'<span style="font-weight:500;font-size:14px">'+e(headerLabel)+'</span>'
            +'<label class="btn btn-p btn-sm" style="margin-left:auto;cursor:pointer">'
              +'<svg class="ico ico-xs"><use href="#i-upload"/></svg> Importer un PDF'
              +'<input type="file" accept=".pdf,application/pdf" multiple style="display:none" onchange="addDocToFolder(event,\''+headerFolderId+'\',\''+projId+'\')">'
            +'</label>'
          +'</div>'
        +(shownDocs.length
          ?shownDocs.map(function(d){
            return '<div class="doc-row" onclick="viewPlanDoc(\''+d.id+'\')">'
              +'<div class="doc-icon" style="background:'+d.color+'18"><svg class="ico" style="color:'+d.color+';width:17px;height:17px"><use href="#i-pdf"/></svg></div>'
              +'<div style="flex:1;min-width:0">'
                +'<div style="font-weight:500;font-size:13px">'+d.title+'</div>'
                +'<div style="font-size:11px;color:var(--text3);margin-top:2px;display:flex;gap:8px"><span class="vpill">v'+d.v+'</span><span>'+d.size+'</span><span>'+d.date+'</span></div>'
              +'</div>'
              +'<span class="badge '+(SB_CLS[d.status]||'bgray')+'">'+(SL[d.status]||d.status)+'</span>'
              +permBtn('archive','<svg class="ico ico-xs"><use href="#i-archive"/></svg>','event.stopPropagation();archivePlanDoc(\''+d.id+'\')','btn-sm btn-g','margin-left:6px;color:var(--amber);')
            +'</div>';
          }).join('')
          :('<div style="text-align:center;padding:48px 0;color:var(--text3)"><svg class="ico" style="width:36px;height:36px;margin:0 auto 10px;display:block"><use href="#i-folder"/></svg>Aucun plan ici. Importez un PDF ou créez un sous-dossier pour commencer.</div>')
        )
      +'</div>'
    +'</div>'
    +'</div>';
}

/* ── Bascule de vue Plans (Liste / Colonnes) ── */
function planViewToggle(){
  function btn(v,label){const on=!planArch&&planView===v;return '<button class="btn btn-sm '+(on?'btn-p':'btn-g')+'" onclick="setPlanView(\''+v+'\')" style="font-size:11.5px">'+label+'</button>';}
  const archBtn='<button class="btn btn-sm '+(planArch?'btn-p':'btn-g')+'" onclick="planShowArch()" style="font-size:11.5px;margin-left:6px"><svg class="ico ico-xs" style="vertical-align:-2px;margin-right:3px"><use href="#i-archive"/></svg>Archives</button>';
  return '<div style="display:flex;align-items:center;gap:6px;padding:8px 14px;border-bottom:1px solid var(--border);height:44px;flex-shrink:0">'
    +'<span style="font-size:10.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-right:2px">Affichage</span>'
    +btn('liste','Liste')+btn('colonnes','Colonnes')+archBtn
    +'</div>';
}
function setPlanView(v){
  planArch=false;
  planView=v;try{localStorage.setItem('plansync_plan_view',v);}catch(e){}
  if(v==='colonnes'){planColPath=[];planColDoc=null;}
  renderPlansContent('pt-docs');
}

/* ── Vue en colonnes (type Finder) ── */
function findPlanNode(nodes,id){
  for(var i=0;i<nodes.length;i++){if(nodes[i].id===id)return nodes[i];if(nodes[i].children){var r=findPlanNode(nodes[i].children,id);if(r)return r;}}
  return null;
}
function planColSelect(level,id){
  // tronque le chemin au niveau cliqué puis ajoute le dossier choisi
  planColPath=planColPath.slice(0,level);planColPath.push(id);planColDoc=null;
  renderPlansContent('pt-docs');
}
function planColOpenDoc(id){planColDoc=id;renderPlansContent('pt-docs');viewPlanDoc(id);}
function renderPlansColumns(){
  const projId=PROJ.id;
  const roots=getPlanFolders(projId);
  const docs=getDocsForProj(PROJ).plans||[];
  // Construit les colonnes successives selon planColPath.
  const cols=[];
  let levelNodes=roots;
  cols.push({nodes:levelNodes,selId:planColPath[0]||null,level:0});
  for(let i=0;i<planColPath.length;i++){
    const node=findPlanNode(roots,planColPath[i]);
    if(!node)break;
    cols.push({nodes:node.children||[],selId:planColPath[i+1]||null,level:i+1,parent:node});
  }
  // dossier sélectionné = dernier du chemin (pour import / actions)
  const curId=planColPath.length?planColPath[planColPath.length-1]:null;
  const curNode=curId?findPlanNode(roots,curId):null;

  function colHTML(col){
    const folders=(col.nodes||[]).filter(function(f){return !f.archived;});
    const colDocs=col.parent?docs.filter(function(d){return d.folder===col.parent.id&&!d.archived;}):[];
    let h='<div class="col"><div class="col-list">';
    h+='<div class="col-hd">Dossiers</div>';
    if(folders.length){
      h+=folders.map(function(f){
        const sel=col.selId===f.id;
        const hasKids=(f.children||[]).some(function(c){return !c.archived;});
        return '<div class="col-row '+(sel?'sel':'')+'" onclick="planColSelect('+col.level+',\''+f.id+'\')">'
          +'<svg class="ico ico-sm" style="flex-shrink:0"><use href="#i-folder"/></svg>'
          +'<span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+e(f.name)+'</span>'
          +permBtn('folders','<svg class="ico ico-xs"><use href="#i-archive"/></svg>','event.stopPropagation();archivePlanFolder(\''+projId+'\',\''+f.id+'\')','btn-sm btn-g','padding:2px 5px;color:var(--amber);margin-right:4px;')
          +(hasKids?'<svg class="ico" style="width:11px;height:11px;color:var(--text3)"><use href="#i-chevron-right"/></svg>':'')
        +'</div>';
      }).join('');
    }else{h+='<div style="font-size:11px;color:var(--text3);padding:4px 9px">Aucun dossier</div>';}
    if(col.parent){
      h+='<div class="col-hd" style="margin-top:6px">Fichiers</div>';
      if(colDocs.length){
        h+=colDocs.map(function(d){
          const sel=planColDoc===d.id;
          return '<div class="col-row '+(sel?'sel':'')+'" onclick="planColOpenDoc(\''+d.id+'\')">'
            +'<svg class="ico ico-sm" style="color:var(--blue);flex-shrink:0"><use href="#i-pdf"/></svg>'
            +'<span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+e(d.title)+'</span>'
            +permBtn('archive','<svg class="ico ico-xs"><use href="#i-archive"/></svg>','event.stopPropagation();archivePlanDoc(\''+d.id+'\')','btn-sm btn-g','padding:2px 5px;color:var(--amber);margin-right:4px;')
            +'<span class="vpill" style="flex-shrink:0">PDF</span>'
          +'</div>';
        }).join('');
      }else{h+='<div style="font-size:11px;color:var(--text3);padding:4px 9px">Aucun fichier</div>';}
    }
    h+='</div></div>';
    return h;
  }

  // Barre d'actions (chemin + actions sur le dossier courant)
  const pathLabel=planColPath.map(function(id){const n=findPlanNode(roots,id);return n?n.name:'';}).filter(Boolean).join(' / ')||'Racine';
  let actions='<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:8px 14px;border-bottom:1px solid var(--border);flex-shrink:0">'
    +'<span style="font-size:11.5px;color:var(--text3);margin-right:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+e(pathLabel)+'</span>'
    +permBtn('folders','<svg class="ico ico-xs" style="margin-right:3px"><use href="#i-plus"/></svg>Nouveau dossier',(curNode?'addPlanSubfolder(\''+curId+'\',\''+projId+'\')':'addPlanFolder(\''+projId+'\')'),'btn-g btn-sm');
  if(curNode){
    actions+=permBtn('folders','<svg class="ico ico-xs" style="margin-right:3px"><use href="#i-edit"/></svg>Renommer','renamePlanFolder(\''+curId+'\',\''+e(curNode.name)+'\',\''+projId+'\')','btn-g btn-sm');
    actions+=(can('items')
      ?'<label class="btn btn-g btn-sm" style="cursor:pointer"><svg class="ico ico-xs" style="margin-right:3px"><use href="#i-upload"/></svg>Importer un PDF<input type="file" accept=".pdf,application/pdf" multiple style="display:none" onchange="addDocToFolder(event,\''+curId+'\',\''+projId+'\')"></label>'
      :permBtn('items','<svg class="ico ico-xs" style="margin-right:3px"><use href="#i-upload"/></svg>Importer un PDF','','btn-g btn-sm'));
  }
  actions+='</div>';

  document.getElementById('content').innerHTML=
    '<div style="display:flex;flex-direction:column;height:100%;min-height:60vh">'
    +planViewToggle()
    +actions
    +'<div class="col-wrap" style="flex:1;min-height:0">'+cols.map(colHTML).join('')+'</div>'
    +'</div>';
}

function selectPlanFolder(id,name){activePlanFolder={id,name};renderPlansContent('pt-docs');}

/* ── Archives Plans (dossiers + fichiers) ── */
function planFolderDescIds(roots,id){
  // collecte l'id du dossier et tous ses sous-dossiers (récursif)
  const out=[];const node=findPlanNode(roots,id);if(!node)return out;
  (function walk(n){out.push(n.id);(n.children||[]).forEach(walk);})(node);
  return out;
}
function archivePlanFolder(projId,id){
  if(!can('folders'))return denyMsg();
  const roots=getPlanFolders(projId);const node=findPlanNode(roots,id);if(!node)return;
  const ids=planFolderDescIds(roots,id);const now=new Date().toLocaleDateString('fr-FR');
  node.archived=true;node.archivedAt=now;
  // archive aussi les fichiers contenus dans ce dossier et ses sous-dossiers
  (getDocsForProj(PROJ).plans||[]).forEach(function(d){if(ids.indexOf(d.folder)>=0&&!d.archived){d.archived=true;d.archivedAt=now;}});
  if(activePlanFolder&&ids.indexOf(activePlanFolder.id)>=0)activePlanFolder=null;
  if(planColPath.some(function(p){return ids.indexOf(p)>=0;}))planColPath=[];
  savePlanFolders(projId);renderPlansContent('pt-docs');toast('Dossier archivé');
}
function restorePlanFolder(projId,id){
  if(!can('folders'))return denyMsg();
  const roots=getPlanFolders(projId);const node=findPlanNode(roots,id);if(!node)return;
  node.archived=false;node.archivedAt='';
  savePlanFolders(projId);renderPlansContent('pt-docs');toast('Dossier restauré');
}
function archivePlanDoc(id){
  if(!can('archive'))return denyMsg();
  const d=(getDocsForProj(PROJ).plans||[]).find(function(x){return x.id===id;});if(!d)return;
  d.archived=true;d.archivedAt=new Date().toLocaleDateString('fr-FR');
  savePROJS();renderPlansContent('pt-docs');toast('Fichier archivé');
}
function restorePlanDoc(id){
  if(!can('archive'))return denyMsg();
  const d=(getDocsForProj(PROJ).plans||[]).find(function(x){return x.id===id;});if(!d)return;
  d.archived=false;d.archivedAt='';
  savePROJS();renderPlansContent('pt-docs');toast('Fichier restauré');
}
function planShowActive(){planArch=false;renderPlansContent('pt-docs');}
function planShowArch(){planArch=true;renderPlansContent('pt-docs');}
// liste à plat de tous les dossiers archivés (avec chemin lisible)
function flatPlanFolders(nodes,prefix,acc){
  acc=acc||[];prefix=prefix||'';
  (nodes||[]).forEach(function(f){
    const path=prefix?prefix+' / '+f.name:f.name;
    acc.push({node:f,path:path});
    flatPlanFolders(f.children,path,acc);
  });
  return acc;
}
function renderPlansArchives(){
  const projId=PROJ.id;
  const roots=getPlanFolders(projId);
  const docs=getDocsForProj(PROJ).plans||[];
  const archFolders=flatPlanFolders(roots).filter(function(x){return x.node.archived;});
  const archDocs=docs.filter(function(d){return d.archived;});
  let body='<div class="pad" style="display:flex;flex-direction:column;gap:8px">';
  if(!archFolders.length&&!archDocs.length){
    body+='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:36px 16px;color:var(--text3)">'
      +'<svg class="ico" style="width:32px;height:32px;color:var(--border2);margin-bottom:10px"><use href="#i-archive"/></svg>'
      +'<div style="font-size:14px;font-weight:500;color:var(--text2)">Aucun élément archivé.</div>'
      +'</div>';
  }else{
    if(archFolders.length)body+='<div style="font-size:10.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:2px 0 6px">Dossiers</div>';
    body+=archFolders.map(function(x){
      return '<div class="aud-card" style="display:flex;align-items:center;gap:10px;padding:11px 14px;border:1px solid var(--border);border-radius:var(--r)">'
        +'<svg class="ico ico-sm" style="color:var(--blue);flex-shrink:0"><use href="#i-folder"/></svg>'
        +'<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500">'+e(x.path)+'</div>'
        +(x.node.archivedAt?'<div style="font-size:11px;color:var(--text3);margin-top:2px">archivé le '+e(x.node.archivedAt)+'</div>':'')
        +'</div>'
        +permBtn('folders','<svg class="ico ico-xs" style="margin-right:3px"><use href="#i-refresh"/></svg>Restaurer','restorePlanFolder(\''+projId+'\',\''+x.node.id+'\')','btn-sm btn-g')
      +'</div>';
    }).join('');
    if(archDocs.length)body+='<div style="font-size:10.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:12px 0 6px">Fichiers</div>';
    body+=archDocs.map(function(d){
      return '<div class="aud-card" style="display:flex;align-items:center;gap:10px;padding:11px 14px;border:1px solid var(--border);border-radius:var(--r)">'
        +'<svg class="ico ico-sm" style="color:var(--blue);flex-shrink:0"><use href="#i-pdf"/></svg>'
        +'<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500">'+e(d.title)+'</div>'

function addPlanFolder(projId){
  if(!can('folders'))return denyMsg();
  var name=prompt('Nom du dossier :','Nouveau dossier');
  if(!name)return;
  var id='pf'+(uid++);
  getPlanFolders(projId).push({id,name,children:[]});
  savePlanFolders(projId);
  renderPlansContent('pt-docs');
}

function addPlanSubfolder(parentId,projId){
  if(!can('folders'))return denyMsg();
  var name=prompt('Nom du sous-dossier :','Sous-dossier');
  if(!name)return;
  function addSub(nodes){
    for(var i=0;i<nodes.length;i++){
      if(nodes[i].id===parentId){nodes[i].children.push({id:'pf'+(uid++),name,children:[]});return true;}
      if(nodes[i].children&&addSub(nodes[i].children))return true;
    }
    return false;
  }
  addSub(getPlanFolders(projId));
  savePlanFolders(projId);
  renderPlansContent('pt-docs');
}

function renamePlanFolder(id,current,projId){
  if(!can('folders'))return denyMsg();
  var name=prompt('Renommer :',current);
  if(!name)return;
  function rename(nodes){
    for(var i=0;i<nodes.length;i++){
      if(nodes[i].id===id){nodes[i].name=name;return;}
      if(nodes[i].children)rename(nodes[i].children);
    }
  }
  rename(getPlanFolders(projId));
  if(activePlanFolder&&activePlanFolder.id===id)activePlanFolder.name=name;
  savePlanFolders(projId);
  renderPlansContent('pt-docs');
}

function addDocToFolder(evt,folderId,projId){
  if(!can('items')){evt.target.value='';return denyMsg();}
  const files=evt.target.files;
  if(!files||!files.length)return;
  const p=PROJS.find(x=>x.id===projId)||PROJ;
  if(!p){evt.target.value='';return;}
  if(!p.docs_data)p.docs_data={plans:[],contrats:[],factures:[],photos:[],admin:[]};
  // Validation : uniquement des PDF.
  const arr=Array.from(files);
  const nonPdf=arr.some(function(f){return !(f.type==='application/pdf'||/\.pdf$/i.test(f.name));});
  if(nonPdf){evt.target.value='';toast('Veuillez sélectionner un fichier PDF.');return;}
  let pending=arr.length;
  arr.forEach(function(file){
    const reader=new FileReader();
    reader.onload=function(){
      p.docs_data.plans.push({
        id:'d'+(uid++),title:file.name.replace(/\.[^.]+$/,''),folder:folderId,v:1,
        size:(file.size/1048576).toFixed(2)+' Mo',date:new Date().toLocaleDateString('fr-FR'),
        status:'draft',color:'#2d4ef5',type:'pdf',rem:'',tags:'',sigD:'',sigB:'',montant:'',variante:'',
        fileName:file.name,mimeType:file.type||'application/pdf',fileUrl:reader.result,createdAt:new Date().toISOString(),
        projectId:projId,area:'plans',folderId:folderId,archived:false
      });
      pending--;
      if(pending<=0){savePROJS();toast('PDF importé');if(VIEW==='plans')renderPlansContent('pt-docs');}
    };
    reader.onerror=function(){pending--;toast('Erreur de lecture du fichier');};
    reader.readAsDataURL(file);
  });
  evt.target.value='';
}

function isAreaView(v){return!!AREA_CFG[v];}
function areaFolders(p){if(!p)return[];if(!p.areaFolders||typeof p.areaFolders!=='object')p.areaFolders={};return p.areaFolders;}

// Migration douce + modèle imbriqué.
// Dossiers : {id,name,parentId,archived,archivedAt,createdAt,sortOrder}. parentId=null -> racine.
function areaEnsure(p,area){
  if(!p)return null;const cfg=AREA_CFG[area];if(!cfg)return null;
  const af=areaFolders(p);
  if(area==='pv'&&Array.isArray(p.folders)&&p.folders.length&&!af.pv){af.pv=p.folders;} // reprise ancien champ PV
  // Fusion : récupère les anciens dossiers "factures" dans l'aire "contrats" (Devis / Facture), une seule fois.
  if(area==='contrats'&&Array.isArray(af.factures)&&af.factures.length&&!p._facturesMerged){
    if(!Array.isArray(af.contrats))af.contrats=[];
    af.factures.forEach(function(f){
      if(f.id&&f.id.indexOf('fgen_')===0)return; // on ne reprend pas le "Général" des factures
      if(!af.contrats.some(function(x){return x.id===f.id;}))af.contrats.push(f);
    });
    p._facturesMerged=true;
  }
  if(!Array.isArray(af[area])||!af[area].length){af[area]=[{id:'fgen_'+area,name:'Général',parentId:null,createdAt:new Date().toISOString(),sortOrder:0}];}
  // Normalise les anciens dossiers plats -> ajoute parentId/sortOrder manquants.
  af[area].forEach(function(f,i){if(typeof f.parentId==='undefined')f.parentId=null;if(typeof f.sortOrder!=='number')f.sortOrder=i;});
  cfg.ensureItems(p);
  const def=af[area][0].id;
  const validIds={};af[area].forEach(function(f){validIds[f.id]=true;});
  // Rattache au "Général" tout item sans dossier OU pointant vers un dossier absent de cette aire
  // (cas des factures fusionnées dans "Devis / Facture" : leur ancien folderId n'existe pas ici).
  cfg.items(p).forEach(function(it){if(!it.folderId||!validIds[it.folderId])it.folderId=def;if(typeof it.archived!=='boolean')it.archived=false;});
  if(area==='pv')p.folders=af.pv;
  return p;
}
function areaFolderById(p,area,id){const af=areaFolders(p)[area]||[];return af.find(function(f){return f.id===id;});}
function areaChildFolders(p,area,parentId){return (areaFolders(p)[area]||[]).filter(function(f){return (f.parentId||null)===(parentId||null);}).sort(function(a,b){return (a.sortOrder||0)-(b.sortOrder||0);});}
function areaDescendantIds(p,area,id){ // tous les sous-dossiers (récursif), id inclus
  const out=[id];const all=areaFolders(p)[area]||[];
  (function walk(pid){all.forEach(function(f){if((f.parentId||null)===pid){out.push(f.id);walk(f.id);}});})(id);
  return out;
}
function curFolderId(){return areaPath.length?areaPath[areaPath.length-1]:null;}

function renderAreaBrowser(area){

  });

  let head='<div class="pad" style="padding-bottom:0">'
    +'<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:12px;min-height:22px">'+crumbs+'</div>'
    +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px">';
  if(cur){
    head+='<button class="btn btn-g btn-sm" onclick="areaUp(\''+area+'\')"><svg class="ico ico-xs" style="margin-right:3px"><use href="#i-arrow-left"/></svg>Retour</button>'
      +permBtn('folders','<svg class="ico ico-xs" style="margin-right:3px"><use href="#i-edit"/></svg>Renommer','renameAreaFolder(\''+area+'\',\''+cur+'\')','btn-g btn-sm')
      +permBtn('folders','<svg class="ico ico-xs" style="margin-right:3px"><use href="#i-archive"/></svg>Archiver le dossier','archiveAreaFolder(\''+area+'\',\''+cur+'\')','btn-g btn-sm','color:var(--amber);');
  }
  head+=permBtn('items','<svg class="ico ico-xs" style="margin-right:3px"><use href="#i-plus"/></svg>Nouveau '+cfg.itemLabel,'newAreaItem(\''+area+'\')','btn-g btn-sm');
  head+='</div>'
    +'<div class="tabbar" style="display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:12px">'
      +'<button class="tab '+(!areaArch?'active':'')+'" onclick="areaShowActive(\''+area+'\')" style="'+(!areaArch?'color:'+cfg.color+';border-bottom-color:'+cfg.color:'')+'">Actifs</button>'
      +'<button class="tab '+(areaArch?'active':'')+'" onclick="areaShowArch(\''+area+'\')" style="'+(areaArch?'color:'+cfg.color+';border-bottom-color:'+cfg.color:'')+'"><svg class="ico ico-xs" style="vertical-align:-2px;margin-right:4px"><use href="#i-archive"/></svg>Archives'+(arcCount?' ('+arcCount+')':'')+'</button>'
    +'</div>';

  let body='';
  // En-tête section dossiers
  if(children.length)body+='<div style="font-size:10.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:2px 0 6px">Dossiers</div>';
  // Lignes dossiers
  body+=children.map(function(f){
    const sub=areaChildFolders(PROJ,area,f.id).filter(function(x){return !x.archived;}).length;
    const inItems=cfg.items(PROJ).filter(function(v){return v.folderId===f.id&&!v.archived;}).length;
    const meta=[];if(sub)meta.push(sub+' dossier(s)');if(inItems)meta.push(inItems+' élément(s)');

    return '<div class="aud-card" '+(areaArch?'':'onclick="enterAreaFolder(\''+area+'\',\''+f.id+'\')"')+' style="display:flex;align-items:center;gap:10px;padding:11px 14px;border:1px solid var(--border);border-radius:var(--r);'+(areaArch?'':'cursor:pointer')+'">'
      +'<svg class="ico ico-sm" style="color:'+cfg.color+';flex-shrink:0"><use href="#i-folder"/></svg>'

  // En-tête section fichiers
  if(items.length)body+='<div style="font-size:10.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:'+(children.length?'12px':'2px')+' 0 6px">Fichiers</div>';
  // Lignes items (cliquables -> visionneuse)
  body+=items.map(function(v){
    const ft=fileKind(v);
    const voirBtn='<button class="btn btn-sm btn-g" onclick="event.stopPropagation();viewFile(\''+area+'\',\''+v.id+'\')" title="Aperçu"><svg class="ico ico-xs" style="margin-right:3px"><use href="#i-eye"/></svg>Voir</button>';
    const actBtn=areaArch
      ?(permBtn('archive','<svg class="ico ico-xs" style="margin-right:3px"><use href="#i-refresh"/></svg>Restaurer','event.stopPropagation();restoreAreaItem(\''+area+'\',\''+v.id+'\')','btn-sm btn-g')
        +permBtn('archive','<svg class="ico ico-xs" style="margin-right:3px"><use href="#i-trash"/></svg>Supprimer définitivement','event.stopPropagation();deleteAreaItem(\''+area+'\',\''+v.id+'\')','btn-sm btn-g','margin-left:4px;color:var(--red);'))
      :permBtn('archive','<svg class="ico ico-xs" style="margin-right:3px"><use href="#i-archive"/></svg>Archiver','event.stopPropagation();archiveAreaItem(\''+area+'\',\''+v.id+'\')','btn-sm btn-g','color:var(--amber);');
    return '<div class="aud-card" onclick="viewFile(\''+area+'\',\''+v.id+'\')" style="display:flex;align-items:center;gap:10px;padding:11px 14px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer">'
      +'<svg class="ico ico-sm" style="color:'+cfg.color+';flex-shrink:0"><use href="#i-'+(ft==='img'?'photo':(ft==='pdf'?'pdf':'file'))+'"/></svg>'
      +'<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500">'+e(cfg.title(v)||'')+'</div>'
      +'<div style="font-size:11px;color:var(--text3);margin-top:2px">'+e(cfg.sub(v)||'')+(v.archived&&v.archivedAt?' · archivé le '+e(v.archivedAt):'')+'</div></div>'
      +'<div style="display:flex;align-items:center;gap:4px;flex-shrink:0">'+voirBtn+actBtn+'</div>'

  if(!children.length&&!items.length){
    const msg=areaArch?'Aucun élément archivé dans ce dossier.':'Aucun élément dans ce dossier.';
    body='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:36px 16px;color:var(--text3)">'

      +'<div style="font-size:14px;font-weight:500;color:var(--text2);margin-bottom:4px">'+msg+'</div>'
      +(!areaArch?permBtn('folders','<svg class="ico ico-sm" style="margin-right:4px"><use href="#i-plus"/></svg>Nouveau dossier','newAreaFolder(\''+area+'\')','btn-p btn-sm','margin-top:8px;'):'')
      +'</div>';
  }else{
    body='<div style="display:flex;flex-direction:column;gap:8px">'+body+'</div>';
  }
  document.getElementById('content').innerHTML=head+body+'</div>';
}

function areaGoRoot(area){areaPath=[];areaArch=false;renderMain();}

/* ── actions dossiers (imbriqués) ── */
function newAreaFolder(area,parentId){
  if(!can('folders'))return denyMsg();
  areaEnsure(PROJ,area);
  const pid=(typeof parentId!=='undefined')?parentId:curFolderId();
  window.__nfParent=pid||null;
  showModal('<h3>Nouveau dossier</h3>'
    +'<div class="fi"><label>Nom du dossier</label><input id="nf-name" placeholder="Ex: 01 - Gros oeuvre, NBR, 03 - Situation…"></div>'
    +'<div class="mo-foot"><button class="btn" onclick="closeModal()">Annuler</button><button class="btn btn-p" onclick="saveNewAreaFolder(\''+area+'\')">Créer</button></div>');
}
function saveNewAreaFolder(area){
  if(!can('folders'))return denyMsg();
  const name=(document.getElementById('nf-name')?.value||'').trim();if(!name)return;
  const af=areaFolders(PROJ)[area];
  const pid=window.__nfParent||null;
  const sibs=af.filter(function(f){return (f.parentId||null)===pid;});
  af.push({id:'fld'+Date.now(),name:name,parentId:pid,createdAt:new Date().toISOString(),sortOrder:sibs.length,archived:false});
  if(area==='pv')PROJ.folders=areaFolders(PROJ).pv;
  savePROJS();closeModal();renderMain();toast('Dossier créé');
}
function renameAreaFolder(area,id){
  if(!can('folders'))return denyMsg();
  const f=areaFolderById(PROJ,area,id||curFolderId());if(!f)return;
  window.__rfId=f.id;
  showModal('<h3>Renommer le dossier</h3>'
    +'<div class="fi"><label>Nom</label><input id="rf-name" value="'+e(f.name)+'"></div>'
    +'<div class="mo-foot"><button class="btn" onclick="closeModal()">Annuler</button><button class="btn btn-p" onclick="saveRenameAreaFolder(\''+area+'\')">Enregistrer</button></div>');
}
function saveRenameAreaFolder(area){
  if(!can('folders'))return denyMsg();
  const f=areaFolderById(PROJ,area,window.__rfId);if(!f)return;
  const name=(document.getElementById('rf-name')?.value||'').trim();if(!name)return;
  f.name=name;savePROJS();closeModal();renderMain();toast('Dossier renommé');
}
function archiveAreaFolder(area,id){
  if(!can('folders'))return denyMsg();
  const cfg=AREA_CFG[area];const fid=id||curFolderId();const f=areaFolderById(PROJ,area,fid);if(!f)return;
  if((f.parentId||null)===null&&areaChildFolders(PROJ,area,null).filter(function(x){return !x.archived;}).length<=1){toast('Impossible d\'archiver le dernier dossier racine');return;}
  const ids=areaDescendantIds(PROJ,area,fid);const now=new Date().toLocaleDateString('fr-FR');
  // Archive le dossier, ses sous-dossiers et leurs items (données conservées).
  (areaFolders(PROJ)[area]||[]).forEach(function(x){if(ids.indexOf(x.id)>=0&&!x.archived){x.archived=true;x.archivedAt=now;}});
  cfg.items(PROJ).forEach(function(v){if(ids.indexOf(v.folderId)>=0&&!v.archived){v.archived=true;v.archivedAt=now;}});
  if(area==='pv')PROJ.folders=areaFolders(PROJ).pv;
  // remonte si on était dans le dossier archivé
  const pos=areaPath.indexOf(fid);if(pos>=0)areaPath=areaPath.slice(0,pos);
  areaArch=false;savePROJS();renderMain();toast('Dossier archivé');
}
function restoreAreaFolder(area,id){
  if(!can('folders'))return denyMsg();
  const f=areaFolderById(PROJ,area,id);if(!f)return;
  f.archived=false;f.archivedAt='';
  // réactive le parent s'il était archivé pour garder la cohérence du chemin
  let p=f.parentId;while(p){const pf=areaFolderById(PROJ,area,p);if(pf&&pf.archived){pf.archived=false;pf.archivedAt='';}p=pf?pf.parentId:null;}
  savePROJS();renderMain();toast('Dossier restauré');
}

/* ── suppression définitive (uniquement depuis les archives) ── */
// Retire physiquement un item de son tableau source (pv / docs_data.*), en gérant l'aire fusionnée Devis/Facture.
function removeItemPhysically(area,id){
  if(area==='pv'){if(Array.isArray(PROJ.pv))PROJ.pv=PROJ.pv.filter(function(x){return x.id!==id;});return;}
  const d=getDocsForProj(PROJ);
  if(area==='contrats'){
    if(Array.isArray(d.contrats))d.contrats=d.contrats.filter(function(x){return x.id!==id;});
    if(Array.isArray(d.factures))d.factures=d.factures.filter(function(x){return x.id!==id;});
    return;
  }
  if(Array.isArray(d[area]))d[area]=d[area].filter(function(x){return x.id!==id;});
}
function deleteAreaItem(area,id){
  if(!can('archive'))return denyMsg();
  const cfg=AREA_CFG[area];const v=cfg.items(PROJ).find(function(x){return x.id===id;});if(!v)return;
  if(!v.archived){toast('Seuls les éléments archivés peuvent être supprimés');return;}
  showModal('<h3>Supprimer définitivement</h3>'
    +'<p style="font-size:12.5px;color:var(--text2);margin-bottom:4px">Supprimer définitivement cet élément ? Cette action est irréversible.</p>'
    +'<div class="mo-foot"><button class="btn" onclick="closeModal()">Annuler</button><button class="btn" style="background:var(--red);color:#fff;border-color:var(--red)" onclick="confirmDeleteAreaItem(\''+area+'\',\''+id+'\')">Supprimer définitivement</button></div>');
}
function confirmDeleteAreaItem(area,id){
  if(!can('archive'))return denyMsg();
  const cfg=AREA_CFG[area];const v=cfg.items(PROJ).find(function(x){return x.id===id;});if(!v||!v.archived){closeModal();return;}
  removeItemPhysically(area,id);
  savePROJS();closeModal();renderMain();toast('Élément supprimé définitivement');
}
function deleteAreaFolder(area,id){
  if(!can('folders'))return denyMsg();
  const f=areaFolderById(PROJ,area,id);if(!f)return;
  if(!f.archived){toast('Seuls les dossiers archivés peuvent être supprimés');return;}
  // Option sûre : bloquer si le dossier contient encore des sous-dossiers ou items (archivés ou non).
  const cfg=AREA_CFG[area];
  const hasChild=(areaFolders(PROJ)[area]||[]).some(function(x){return (x.parentId||null)===f.id;});
  const hasItems=cfg.items(PROJ).some(function(v){return v.folderId===f.id;});
  if(hasChild||hasItems){toast('Ce dossier contient encore des éléments archivés.');return;}
  showModal('<h3>Supprimer définitivement</h3>'
    +'<p style="font-size:12.5px;color:var(--text2);margin-bottom:4px">Supprimer définitivement ce dossier ? Cette action est irréversible.</p>'
    +'<div class="mo-foot"><button class="btn" onclick="closeModal()">Annuler</button><button class="btn" style="background:var(--red);color:#fff;border-color:var(--red)" onclick="confirmDeleteAreaFolder(\''+area+'\',\''+id+'\')">Supprimer définitivement</button></div>');
}
function confirmDeleteAreaFolder(area,id){
  if(!can('folders'))return denyMsg();
  const f=areaFolderById(PROJ,area,id);if(!f||!f.archived){closeModal();return;}
  const cfg=AREA_CFG[area];
  // Re-vérifie l'absence de contenu au moment de la confirmation (sécurité).
  const hasChild=(areaFolders(PROJ)[area]||[]).some(function(x){return (x.parentId||null)===f.id;});
  const hasItems=cfg.items(PROJ).some(function(v){return v.folderId===f.id;});
  if(hasChild||hasItems){closeModal();toast('Ce dossier contient encore des éléments archivés.');return;}
  areaFolders(PROJ)[area]=(areaFolders(PROJ)[area]||[]).filter(function(x){return x.id!==id;});
  if(area==='pv')PROJ.folders=areaFolders(PROJ).pv;
  savePROJS();closeModal();renderMain();toast('Dossier supprimé définitivement');
}

/* ══ VISIONNEUSE DE DOCUMENTS (PDF, images, fallback) ══ */
// Détermine le type d'aperçu à partir du mimeType, du fileName ou du champ legacy "type".
function fileKind(it){
  const mt=(it.mimeType||'').toLowerCase();
  const fn=(it.fileName||it.title||'').toLowerCase();
  if(mt.indexOf('pdf')>=0||/\.pdf$/.test(fn)||it.type==='pdf')return 'pdf';
  if(/^image\//.test(mt)||/\.(jpg|jpeg|png|webp|gif)$/.test(fn)||it.type==='img')return 'img';
  return 'other';
}
function fileTypeLabel(it){
  const k=fileKind(it);
  if(k==='pdf')return 'PDF';
  if(k==='img')return 'Image';
  if(it.mimeType)return it.mimeType;
  return 'Fichier';
}
function findAreaItem(area,id){const cfg=AREA_CFG[area];if(!cfg)return null;return cfg.items(PROJ).find(function(x){return x.id===id;});}

function viewFile(area,id){
  const it=findAreaItem(area,id);if(!it)return;
  viewDoc(it);
}
// Visionneuse générique : accepte n'importe quel objet document {fileName/title,fileUrl,mimeType,type}.
function viewDoc(it){
  if(!it)return;
  const name=it.fileName||it.title||'Document';
  const kind=fileKind(it);
  const url=it.fileUrl||'';
  let bodyHtml;
  if(kind==='pdf'&&url){
    bodyHtml='<iframe title="Aperçu PDF" src="'+url+'"></iframe>';
  }else if(kind==='img'&&url){
    bodyHtml='<img alt="'+e(name)+'" src="'+url+'">';
  }else{
    const isPdf=(kind==='pdf');
    const msg=isPdf?'Aperçu PDF indisponible.':'Aperçu non disponible pour ce type de fichier.';
    bodyHtml='<div style="text-align:center;padding:32px 20px;color:var(--text3)">'
      +'<svg class="ico" style="width:36px;height:36px;color:var(--border2);margin-bottom:12px"><use href="#i-'+(isPdf?'pdf':'file')+'"/></svg>'
      +'<div style="font-size:14px;font-weight:500;color:var(--text2);margin-bottom:4px">'+e(name)+'</div>'
      +'<div style="font-size:12px;margin-bottom:14px">Type : '+e(fileTypeLabel(it))+'</div>'
      +'<div style="font-size:12.5px;color:var(--text2);margin-bottom:16px">'+msg+'</div>'
      +(url?'<a class="btn btn-p btn-sm" href="'+url+'" download="'+e(name)+'" target="_blank" rel="noopener"><svg class="ico ico-xs" style="margin-right:4px"><use href="#i-download"/></svg>Télécharger</a>':'<div style="font-size:11px;color:var(--text3)">Aucun fichier joint.</div>')
      +'</div>';
  }
  const dlBtn=url
    ?'<a class="btn btn-g btn-sm" href="'+url+'" download="'+e(name)+'" target="_blank" rel="noopener"><svg class="ico ico-xs" style="margin-right:3px"><use href="#i-download"/></svg>Télécharger</a>'
    :'';
  const html='<div class="vw-ov" onclick="if(event.target===this)closeViewer()">'
    +'<div class="vw-box" onclick="event.stopPropagation()">'
      +'<div class="vw-head">'
        +'<svg class="ico ico-sm" style="color:var(--blue);flex-shrink:0"><use href="#i-'+(kind==='img'?'photo':(kind==='pdf'?'pdf':'file'))+'"/></svg>'
        +'<div style="flex:1;min-width:0"><div style="font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+e(name)+'</div>'
        +'<div style="font-size:11px;color:var(--text3)">'+e(fileTypeLabel(it))+'</div></div>'
        +dlBtn
        +'<button class="btn btn-g btn-sm" onclick="closeViewer()" style="margin-left:4px"><svg class="ico ico-xs" style="margin-right:3px"><use href="#i-x"/></svg>Fermer</button>'
      +'</div>'
      +'<div class="vw-body">'+bodyHtml+'</div>'
    +'</div></div>';
  document.getElementById('viewer-root').innerHTML=html;
}
function viewPlanDoc(id){const d=(getDocsForProj(PROJ).plans||[]).find(function(x){return x.id===id;});if(d)viewDoc(d);}
function closeViewer(){document.getElementById('viewer-root').innerHTML='';}
document.addEventListener('keydown',function(ev){if(ev.key==='Escape'&&document.getElementById('viewer-root')&&document.getElementById('viewer-root').innerHTML)closeViewer();});

function toggleMbr(id){curMbr=curMbr===id?null:id;renderMbrs();}
function togglePerm(mid,k){var m=getMembresForProj(PROJ).find(function(x){return x.id===mid;});if(m)m.perms[k]=!m.perms[k];renderMbrs();}
function toggleDoss(mid,f){var m=getMembresForProj(PROJ).find(function(x){return x.id===mid;});if(m)m.dossiers[f]=!m.dossiers[f];renderMbrs();}

function saveMbr(mid){
  var m=getMembresForProj(PROJ).find(function(x){return x.id===mid;});
  if(!m)return;
  var g=function(id){var el=document.getElementById(id);return el?el.value:'';};
  m.name=g('mf-name-'+mid)||m.name;
  m.metier=g('mf-metier-'+mid)||m.metier;
  m.ent=g('mf-ent-'+mid);
  m.tel=g('mf-tel-'+mid);
  m.note=g('mf-note-'+mid);
  m.role=g('mf-role-'+mid)||m.role;
  m.email=g('mf-email-'+mid)||m.email;
  // Update initials from name
  var parts=m.name.trim().split(' ');
  m.ini=(parts[0]?parts[0][0]:'')+(parts[1]?parts[1][0]:'');
  m.ini=m.ini.toUpperCase();
  curMbr=null;
  renderMbrs();
  toast('Fiche mise à jour ✓');
}

function removeMbr(mid){
  if(!confirm('Retirer ce membre du projet ?'))return;
  getMembresForProj(PROJ).splice(getMembresForProj(PROJ).findIndex(function(x){return x.id===mid;}),1);
  curMbr=null;renderMbrs();toast('Membre retiré');
}

function inviteMbr(){
  var email=document.getElementById('inv-e')?.value?.trim();
  if(!email){alert('Email requis');return;}
  var name=document.getElementById('inv-name')?.value?.trim()||email;
  var metier=document.getElementById('inv-metier')?.value||'Autre';
  var ent=document.getElementById('inv-ent')?.value?.trim()||'—';
  var role=document.getElementById('inv-r')?.value||'viewer';
  var parts=name.split(' ');
  var ini=((parts[0]?parts[0][0]:'')+(parts[1]?parts[1][0]:'')).toUpperCase()||email.slice(0,2).toUpperCase();
  var COLORS=['#2d4ef5','#1a7a4a','#c47a00','#6b3fa0','#c0392b','#0891b2'];
  var col=COLORS[getMembresForProj(PROJ).length%COLORS.length];
  getMembresForProj(PROJ).push({
    id:'m'+(uid++),ini,name,email,ent,role,metier,tel:'',note:'',color:col,
    perms:{voir:true,dl:role!=='client_viewer',import:false,publier:false,contrats:role==='client_viewer',admin:false},
    dossiers:{Plans:true,'Contrats & Devis':false,Factures:false,'Photos chantier':false,'Admin':false}
  });
  // Clear invite form
  ['inv-e','inv-name','inv-ent'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
  toast('Invitation envoyée à '+name);
  renderMbrs();
}

let infoType=null;
function selInfoType(id,el){
  infoType=id;
  document.querySelectorAll('#inf-type-grid .tc-card').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
}

function saveInfo(){
  if(!PROJ)return;
  const p=PROJ;
  const name=document.getElementById('inf-name')?.value?.trim();
  if(!name){toast('Le nom est requis');return;}
  const addr=(document.getElementById('inf-addr')?.value?.trim()||'');
  const city=(document.getElementById('inf-city')?.value?.trim()||'');
  p.name=name;
  p.address=[addr,city].filter(Boolean).join(', ');
  p.client=document.getElementById('inf-client')?.value?.trim()||p.client;
  p.clientEmail=document.getElementById('inf-cemail')?.value?.trim()||'';
  p.clientTel=document.getElementById('inf-ctel')?.value?.trim()||'';
  p.ref=document.getElementById('inf-ref')?.value?.trim()||'';
  p.phase=document.getElementById('inf-phase')?.value||p.phase;
  const prog=parseInt(document.getElementById('inf-prog')?.value||'0');
  p.progress=Math.min(100,Math.max(0,isNaN(prog)?p.progress:prog));
  const surf=document.getElementById('inf-surf')?.value?.trim();
  p.surface=surf?surf+' m²':p.surface;
  p.budget=document.getElementById('inf-budget')?.value?.trim()||p.budget;
  const sv=document.getElementById('inf-start')?.value;if(sv!=null)p.start=sv.trim();
  const lv=document.getElementById('inf-livr')?.value;if(lv!=null)p.livraison=lv.trim();
  if(infoType)p.type=infoType;
  const ints=[];
  document.querySelectorAll('#inf-ints .chip.on').forEach(c=>{if(c.dataset.int)ints.push(c.dataset.int);});
  if(ints.length)p.ints=ints;
  ['zone_sismique','zone_inondable','monument_historique'].forEach(k=>{const el=document.getElementById('inf-'+k);if(el)p.opts[k]=el.checked;});
  // Rebuild CL tree if type/intervenants changed
  clTree=buildCL(p);
  infoType=null;
  renderSB();renderInfo();
  toast('Modifications enregistrées ✓');
}

function archiveProj(){
  if(!PROJ)return;
  if(!confirm(`Archiver "${PROJ.name}" ? Le projet sera grisé mais restera accessible.`))return;
  PROJ.archived=true;
  savePROJS();
  renderSB();renderInfo();
  toast('Projet archivé');
}
function unarchiveProj(id){
  const p=PROJS.find(x=>x.id===id);if(!p)return;
  p.archived=false;
  savePROJS();
  if(PROJ?.id===id){renderSB();renderInfo();}
  else{renderSB();renderMain();}
  toast('Projet désarchivé ✓');
}
function deleteProj(id){
  if(!confirm('Supprimer définitivement ce projet ? Cette action est irréversible.'))return;
  const idx=PROJS.findIndex(x=>x.id===id);
  if(idx===-1)return;
  PROJS.splice(idx,1);
  savePROJS();
  PROJ=null;VIEW='projets';
  renderSB();renderMain();
  toast('Projet supprimé');
}

function gsTab(btn,idx){
  document.querySelectorAll('.gs-tab').forEach(function(t,i){
    t.style.color=i===idx?'var(--blue)':'var(--text3)';
    t.style.borderBottomColor=i===idx?'var(--blue)':'transparent';
  });
  document.querySelectorAll('.gs-panel').forEach(function(p,i){
    p.style.display=i===idx?'block':'none';
  });
}
