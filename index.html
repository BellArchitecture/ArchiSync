<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlanSync CR — Bell Architecture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── ICONS inline via SVG sprite – no CDN needed ── */
:root{
  --bg:#f5f3f0;--bg2:#ece9e4;--bg3:#e2ddd6;
  --panel:#ffffff;--panel2:#f7f5f2;
  --border:#ddd9d3;--border2:#ccc7bf;
  --text:#2a2520;--text2:#4a4540;--text3:#655e57;
  --blue:#5c3d1e;--blue-bg:#f5ede6;--blue-lt:#e8d5c4;  /* couleur marque / accent UI */
  --accent-blue:#2d4ef5;                                 /* couleur icônes Plans/PDF */
  --green:#1a7a4a;--green-bg:#e8f5ee;
  --amber:#c47a00;--amber-bg:#fef3d8;
  --red:#c0392b;--red-bg:#fdecea;
  --purple:#6b3fa0;--purple-bg:#f0ebfa;
  --r:10px;--r2:14px;
  --shadow:0 1px 4px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.05);
  --shadow2:0 2px 8px rgba(0,0,0,.1),0 8px 32px rgba(0,0,0,.08);
  font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text)
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);overflow:hidden;height:100vh;font-family:inherit}

/* ── SVG icon helper ── */
.ico{display:inline-block;width:16px;height:16px;vertical-align:middle;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.ico-lg{width:19px;height:19px}
.ico-sm{width:14px;height:14px}
.ico-xs{width:12px;height:12px}

/* ── LAYOUT ── */
.app{display:flex;height:100vh}
.sidebar{width:238px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── SIDEBAR ── */
.sb-head{padding:13px 12px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{display:flex;align-items:center;gap:9px;margin-bottom:11px}
.logo-mark{width:26px;height:26px;background:var(--blue);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;letter-spacing:-.5px;flex-shrink:0}
.logo-name{font-size:15px;font-weight:600;letter-spacing:-.3px}
.proj-pill{display:flex;align-items:center;gap:7px;background:var(--bg2);border-radius:var(--r);padding:7px 9px;cursor:pointer;border:1px solid transparent;width:100%;text-align:left;font-family:inherit;transition:border-color .15s}
.proj-pill:hover{border-color:var(--border2)}
.pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pp-name{font-size:12.5px;font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pp-type{font-size:10px;color:var(--text3);background:var(--panel);border-radius:4px;padding:1px 5px;flex-shrink:0}

.sb-body{flex:1;overflow-y:auto;display:flex;flex-direction:column}

/* Project list in sidebar */
.sb-proj-list{padding:8px 8px 0}
.sb-proj-hd{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;padding:6px 6px 4px;display:flex;align-items:center;justify-content:space-between}
.proj-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--r);cursor:pointer;transition:all .12s;border:1px solid transparent;margin-bottom:3px}
.proj-item:hover{background:var(--bg2);border-color:var(--border)}
.proj-item.active-proj{background:var(--blue-bg);border-color:var(--blue-lt)}
.proj-item-dot{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.proj-item-info{flex:1;min-width:0}
.proj-item-name{font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-item-sub{font-size:10.5px;color:var(--text3);margin-top:1px;display:flex;align-items:center;gap:5px}
.proj-prog{width:36px;height:3px;border-radius:2px;background:var(--bg3);overflow:hidden;flex-shrink:0}
.proj-prog-fill{height:100%;border-radius:2px}

/* Nav sections */
.sb-nav{padding:4px 8px}
.nl{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;padding:10px 6px 4px}
.ni{display:flex;align-items:center;gap:8px;padding:6.5px 8px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);border:none;background:none;width:100%;text-align:left;font-family:inherit;transition:all .12s;margin-bottom:1px}
.ni:hover{background:var(--bg2);color:var(--text)}
.ni.active{background:var(--blue-bg);color:var(--blue);font-weight:500}
.ni-ico{width:22px;display:flex;justify-content:center;flex-shrink:0}
.nb{font-size:9.5px;padding:1.5px 5px;border-radius:8px;background:var(--bg2);color:var(--text3);margin-left:auto}
.nb.ok{background:var(--green-bg);color:var(--green)}

.sb-foot{padding:8px 7px;border-top:1px solid var(--border);flex-shrink:0}
.av{display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:11px;font-weight:600;flex-shrink:0}

/* ── TOPBAR ── */
.topbar{background:var(--panel);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.tb-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.tb-right{display:flex;gap:6px;align-items:center;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border:1px solid var(--border2);border-radius:var(--r);background:var(--panel);color:var(--text);font-size:12px;cursor:pointer;font-weight:500;font-family:inherit;transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--bg2)}
.btn-p{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-p:hover{background:#3d2510;border-color:#3d2510}
.btn-sm{padding:5px 10px;font-size:11.5px}
.btn-g{border-color:transparent;background:transparent}
.btn-g:hover{background:var(--bg2)}
.notif-w{position:relative}
/* Pastille de notification : n'afficher que s'il existe au moins une notification.
   Aucune source de notifications n'existe pour l'instant, donc la pastille reste masquée. */
.notif-dot{position:absolute;top:-3px;right:-3px;width:15px;height:15px;background:#e03131;color:#fff;border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}

/* ── TICKER ── */


/* ── TABBAR ── */
.tabbar{display:flex;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.tab{padding:10px 15px;font-size:12px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit;transition:color .12s;flex-shrink:0}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto}
.pad{padding:18px 22px}

/* ── BADGES ── */
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
.bgreen{background:var(--green-bg);color:var(--green)}
.bamber{background:var(--amber-bg);color:var(--amber)}
.bblue{background:var(--blue-bg);color:var(--blue)}
.bred{background:var(--red-bg);color:var(--red)}
.bpurple{background:var(--purple-bg);color:var(--purple)}
.bgray{background:var(--bg2);color:var(--text3)}
.vpill{font-size:10px;padding:2px 6px;background:var(--blue-bg);color:var(--blue);border-radius:5px;font-weight:500;font-family:'DM Mono',monospace}
.tag{font-size:10px;padding:1.5px 6px;border-radius:4px;margin-left:5px}
.tred{background:var(--red-bg);color:var(--red)}.tamber{background:var(--amber-bg);color:var(--amber)}
.tblue{background:var(--blue-bg);color:var(--blue)}.tgreen{background:var(--green-bg);color:var(--green)}
.tpurple{background:var(--purple-bg);color:var(--purple)}.tgray{background:var(--bg2);color:var(--text3)}

/* ── PROJECT CARDS (main view) ── */
.proj-cards{display:flex;flex-direction:column;gap:10px}
.pcard{background:var(--panel);border:1px solid var(--border);border-radius:var(--r2);padding:20px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.pcard:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.pcard.activep{border-color:var(--blue);border-width:1.5px}
.prog-bar{height:4px;border-radius:2px;background:var(--bg2);overflow:hidden;margin-top:5px}
.prog-fill{height:100%;border-radius:2px}
.meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;border-top:1px solid var(--border);padding-top:13px;margin-top:2px}
.meta-n{font-size:20px;font-weight:600;letter-spacing:-.3px}
.meta-l{font-size:10px;color:var(--text3);margin-top:1px}
.av-stack{display:flex}
.av-sm{width:24px;height:24px;border-radius:50%;border:2px solid var(--panel);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;margin-left:-5px}
.av-sm:first-child{margin-left:0}

/* ── DOC LIST ── */
.doc-row{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;margin-bottom:7px;cursor:pointer;transition:all .12s}
.doc-row:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.doc-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── DETAIL PANEL ── */
.detail-panel{width:0;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width .25s}
.detail-panel.open{width:356px}
.dp-head{padding:13px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.dp-body{flex:1;overflow-y:auto;padding:15px}
.dp-foot{padding:10px 15px;border-top:1px solid var(--border);display:flex;gap:7px;flex-shrink:0}
.fi{margin-bottom:12px}
.fi label{display:block;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.fi input,.fi select,.fi textarea{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:8px;font-size:12.5px;background:var(--bg);color:var(--text);outline:none;font-family:inherit;transition:border-color .12s}
.fi input:focus,.fi select:focus,.fi textarea:focus{border-color:var(--blue);background:var(--panel)}
.fi-error{border-color:var(--red)!important;background:var(--red-bg)!important}
.fi textarea{resize:vertical;min-height:64px}
.fi-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sec-hd{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:15px 0 8px;padding-top:13px;border-top:1px solid var(--border)}
.sec-hd:first-child{margin-top:0;padding-top:0;border-top:none}
.v-row{display:flex;align-items:center;gap:7px;padding:7px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:5px;font-size:12px}
.v-row.cur{border-color:var(--blue);background:var(--blue-bg)}

/* ── MEMBRES ── */
.mem-row{display:flex;align-items:center;gap:11px;background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .12s}
.mem-row:hover{border-color:var(--border2)}
.perm-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-top:10px}
.pi{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s}
.pi.on{background:var(--green-bg);color:var(--green)}
.pi.off{background:var(--bg2);color:var(--text3)}
.fold-row{display:flex;align-items:center;gap:9px;padding:7px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:5px;font-size:12px}
.tog{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s}
.tog.on{background:var(--blue);border-color:var(--blue);color:#fff}

/* ── CHECKLISTS ── */
.cl-group{background:var(--panel);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:10px;overflow:hidden}
.cl-item{display:flex;align-items:flex-start;gap:9px;padding:9px 14px;border-bottom:1px solid var(--border);transition:background .1s}
.cl-item:last-child{border-bottom:none}
.cl-item:hover{background:var(--bg2)}
.cl-chk{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;margin-top:1.5px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.cl-chk.done{background:var(--blue);border-color:var(--blue)}
.cl-chk.arch{background:var(--bg2);border-style:dashed;opacity:.5}
.cl-act{display:flex;gap:3px;opacity:0;transition:opacity .12s;flex-shrink:0}
.cl-item:hover .cl-act{opacity:1}
.add-row{padding:8px 14px;border-top:1px solid var(--border);display:flex;gap:6px;background:var(--bg)}
.add-row input{flex:1;padding:6px 9px;border:1px solid var(--border2);border-radius:7px;font-size:12px;background:var(--panel);color:var(--text);outline:none;font-family:inherit}
.add-row input:focus{border-color:var(--blue)}
.sum-bar{display:flex;gap:14px;background:var(--bg2);border-radius:var(--r);padding:11px 14px;margin-bottom:12px;align-items:center;border:1px solid var(--border)}

/* ── AUDIT ── */
.aud-row{display:flex;gap:10px;margin-bottom:7px}
.aud-ic{width:32px;height:32px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--border)}
.aud-card{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:9px 13px}

/* ── PLU ── */
.plu-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.plu-f{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px}

/* ── MODAL ── */
.mo-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px)}
.mo-box{background:var(--panel);border-radius:var(--r2);padding:24px;width:460px;border:1px solid var(--border);box-shadow:var(--shadow2);max-height:90vh;overflow-y:auto}
.mo-box h3{font-size:15px;font-weight:600;margin-bottom:16px}
.mo-foot{display:flex;gap:7px;margin-top:16px;justify-content:flex-end}
/* ── Visionneuse de documents ── */
.vw-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(2px)}
.vw-box{background:var(--panel);border-radius:var(--r2);width:min(960px,94vw);height:min(88vh,900px);display:flex;flex-direction:column;border:1px solid var(--border);box-shadow:var(--shadow2);overflow:hidden}
.vw-head{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.vw-body{flex:1;min-height:0;background:var(--bg2);display:flex;align-items:center;justify-content:center;overflow:auto}
.vw-body iframe{width:100%;height:100%;border:none;background:#fff}
.vw-body img{max-width:100%;max-height:100%;object-fit:contain;display:block}
@media(max-width:560px){.vw-box{width:100vw;height:100vh;border-radius:0;max-height:none}}
/* ── Vue en colonnes (Plans) ── */
.col-wrap{display:flex;overflow-x:auto;overflow-y:hidden;height:100%}
.col{width:240px;min-width:220px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.col-list{flex:1;overflow-y:auto;padding:6px}
.col-row{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;cursor:pointer;font-size:12.5px;color:var(--text2);margin-bottom:2px}
.col-row:hover{background:var(--bg2)}
.col-row.sel{background:var(--blue-bg);color:var(--blue);font-weight:500}
.col-hd{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;padding:8px 9px 4px}
@media(max-width:760px){.col-wrap{overflow-x:hidden;height:auto;min-height:60vh}.col{width:100%;min-width:0;border-right:none}.col:not(:last-child){display:none}.col-list{min-height:50vh}}
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.tc-card{border:1px solid var(--border);border-radius:var(--r);padding:11px 7px;cursor:pointer;text-align:center;transition:all .12s}
.tc-card:hover{border-color:var(--border2)}
.tc-card.sel{border-color:var(--blue);border-width:1.5px;background:var(--blue-bg)}
.chip-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.chip{padding:3px 9px;border:1px solid var(--border2);border-radius:20px;font-size:11.5px;cursor:pointer;transition:all .12s;font-family:inherit}
.chip:hover{border-color:var(--blue);color:var(--blue)}
.chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:300;white-space:nowrap;box-shadow:var(--shadow2);display:flex;align-items:center;gap:7px;max-width:90vw}
/* Variantes visuelles distinctes : succès (vert), erreur (rouge), avertissement (ambre) */
.toast.t-err{background:var(--red)}
.toast.t-warn{background:var(--amber)}
.toast.t-info{background:var(--text)}
/* Action « Annuler » optionnelle dans le toast */
.toast .toast-undo{pointer-events:auto;cursor:pointer;background:rgba(255,255,255,.22);border:none;color:#fff;font-family:inherit;font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:14px;margin-left:2px}
.toast .toast-undo:hover{background:rgba(255,255,255,.34)}

/* ── BANDEAU DONNÉES LOCALES / DÉMO ── */
/* Info « stockage local » : pastille compacte dans la barre + popover (n'occupe plus
   d'espace vertical permanent comme l'ancien bandeau). */
#locality-pop{position:absolute;top:calc(100% + 8px);right:0;width:268px;max-width:78vw;background:var(--panel);border:1px solid var(--border2);border-radius:var(--r2);box-shadow:0 8px 28px rgba(60,45,30,.16);padding:14px;z-index:160;font-size:12px;line-height:1.5;color:var(--text2)}
#locality-pop:before{content:"";position:absolute;top:-6px;right:14px;width:11px;height:11px;background:var(--panel);border-left:1px solid var(--border2);border-top:1px solid var(--border2);transform:rotate(45deg)}
#locality-pop.lp-left:before{right:auto;left:var(--arrow-left,14px)}
#locality-pop .lp-title{display:flex;align-items:center;gap:6px;font-weight:600;color:var(--text);font-size:12.5px;margin-bottom:6px}
#locality-pop .lp-actions{display:flex;gap:6px;margin-top:12px;align-items:center}
.locality-overlay{position:fixed;inset:0;z-index:155;background:transparent}
/* ── Menu d'actions de ligne (« … » / clic droit) ── */
.row-menu-overlay{position:fixed;inset:0;z-index:200;background:transparent}
.row-menu{position:fixed;min-width:184px;max-width:80vw;background:var(--panel);border:1px solid var(--border2);border-radius:var(--r2);box-shadow:0 8px 28px rgba(60,45,30,.18);padding:5px;z-index:201;font-size:12.5px;color:var(--text2)}
.row-menu button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:none;border:none;cursor:pointer;font-family:inherit;font-size:12.5px;color:var(--text);padding:7px 9px;border-radius:7px;line-height:1.2}
.row-menu button:hover,.row-menu button:focus{background:var(--bg2);outline:none}
.row-menu button .ico{width:14px;height:14px;flex-shrink:0;color:var(--text3)}
.row-menu button.danger{color:var(--red)}
.row-menu button.danger .ico{color:var(--red)}
.row-menu .rm-div{height:1px;background:var(--border);margin:4px 6px}
.row-dots{background:none;border:1px solid transparent;cursor:pointer;padding:3px 5px;border-radius:6px;display:flex;align-items:center;color:var(--text3);flex-shrink:0}
.row-dots:hover,.row-dots:focus{background:var(--bg2);color:var(--text);outline:none}
.row-dots .ico{width:15px;height:15px}
/* Cible de dépôt (glisser-déposer façon Finder) */
.drop-target{outline:2px dashed var(--blue)!important;outline-offset:-2px;background:var(--blue-bg)!important}
.dragging-row{opacity:.45}
/* Arbre du sélecteur « Déplacer… » */
.move-tree{max-height:46vh;overflow:auto;border:1px solid var(--border);border-radius:var(--r);padding:4px;margin:6px 0 2px}
.move-tree .mt-row{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:12.5px;color:var(--text)}
.move-tree .mt-row:hover{background:var(--bg2)}
.move-tree .mt-row.sel{background:var(--blue-bg);color:var(--blue);font-weight:600}
.move-tree .mt-row.disabled{opacity:.4;cursor:not-allowed}
.move-tree .mt-row .ico{width:14px;height:14px;flex-shrink:0;color:var(--text3)}
/* Indice passif (premier passage) : pastille discrète + brève pulsation, sans bloquer
   l'interaction ni voler le focus. Piloté par la classe racine .locality-unseen pour
   survivre aux re-rendus des en-têtes. Disparaît dès l'ouverture du popover. */
.locality-unseen .locality-chip{position:relative;animation:localityPulse 2.4s ease-out 3}
.locality-unseen .locality-chip:after{content:"";position:absolute;top:-2px;right:-2px;width:8px;height:8px;border-radius:50%;background:var(--blue);border:1.5px solid var(--panel)}
@keyframes localityPulse{0%{box-shadow:0 0 0 0 rgba(92,61,30,.35)}70%{box-shadow:0 0 0 7px rgba(92,61,30,0)}100%{box-shadow:0 0 0 0 rgba(92,61,30,0)}}
@media(prefers-reduced-motion:reduce){.locality-unseen .locality-chip{animation:none}}

/* ── ÉCRAN ONBOARDING ── */
.onb-ov{position:fixed;inset:0;background:rgba(245,243,240,.96);display:flex;align-items:center;justify-content:center;z-index:250;padding:20px}
.onb-box{background:var(--panel);border:1px solid var(--border);border-radius:var(--r2);box-shadow:var(--shadow2);width:min(440px,95vw);padding:26px 24px}

/* ── Mobile ── */
@media(max-width:600px){
  .app{flex-direction:column}
  .sidebar{width:100%;min-width:0;height:auto;max-height:42vh;border-right:none;border-bottom:1px solid var(--border);flex-direction:column;flex-shrink:0}
  .sb-head{display:none}
  /* Le corps de la sidebar et la nav projet deviennent des bandes horizontales défilables */
  .sb-body{flex:0 0 auto;overflow-y:hidden}
  .sb-nav{display:flex;flex-direction:row;flex-wrap:nowrap;gap:5px;padding:7px 8px;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch}
  .sb-proj-list{padding:7px 8px}
  /* Libellés de groupe : séparateurs discrets dans la bande horizontale */
  .sb-nav .nl{display:flex;align-items:center;padding:0 2px 0 6px;margin:0;font-size:8.5px;flex-shrink:0;border-left:1px solid var(--border);align-self:stretch;max-width:56px;line-height:1.05}
  .sb-nav > .nl:first-child{border-left:none}
  /* Boutons de nav : pastilles compactes en colonne (icône + libellé court) */
  .sb-nav .ni{flex-direction:column;gap:3px;width:auto;min-width:62px;max-width:88px;padding:7px 8px;text-align:center;font-size:10.5px;flex-shrink:0;white-space:normal;line-height:1.1;border:1px solid var(--border);background:var(--panel);margin-bottom:0}
  .sb-nav .ni.active{background:var(--blue-bg)}
  .sb-nav .ni-ico{width:auto}
  .sb-nav .ni .nb{display:none}
  .sb-foot{flex-direction:row;gap:6px;padding:7px 8px;border-top:1px solid var(--border);overflow-x:auto;align-items:center;flex-shrink:0}
  .main{flex:1;min-height:0;overflow-y:auto}
  #topbar{padding:10px 12px;gap:8px;flex-wrap:wrap}
  #topbar #main-btn{flex-shrink:0}
  .pad{padding:12px}
  .proj-grid{grid-template-columns:1fr!important}
  /* En-tête "Mes projets" : le titre prend toute la largeur, les boutons passent dessous */
  .proj-hd > div[style*="flex:1"]{flex:1 1 100%!important;order:-1}
  .proj-hd .btn{flex:1 1 auto}
  /* Carte projet : les 6 métriques s'empilent en 3 colonnes au lieu de déborder */
  .pcard-metrics{grid-template-columns:repeat(3,1fr)!important;gap:10px 4px!important}
  .pcard-metrics > div{padding-right:0!important}
  .pcard-head{flex-direction:column!important}
  .pcard-actions{flex-direction:row!important;align-items:center!important;width:100%;justify-content:space-between!important}
  .doc-row{flex-direction:column;gap:4px;align-items:flex-start}
  /* Plans : empiler la structure (bande courte) au-dessus du volet documents pleine largeur */
  .plan-2pane{flex-direction:column!important}
  .plan-struct{width:100%!important;max-height:32vh;border-right:none!important;border-bottom:1px solid var(--border)}
  .plan-docs{padding:12px!important}
  /* Évite le rognage du bouton Importer : l'en-tête peut passer à la ligne */
  .plan-docs > div:first-child .btn{margin-left:0!important}
  /* Stockage local : sur mobile la pastille se réduit à l'icône cadenas. */
  .locality-chip-lbl{display:none}
  .locality-chip{padding:5px 6px!important}
}
/* Tablette / écran partagé / petit portable : la tête de carte passe en colonne
   pour que les actions (« Ouvrir », avatars) ne chevauchent plus les dates.
   Les métriques se reflowent déjà via auto-fit/minmax. */
@media(min-width:601px) and (max-width:820px){
  .pcard-head{flex-direction:column!important;gap:12px!important}
  .pcard-actions{flex-direction:row!important;align-items:center!important;width:100%;justify-content:space-between!important;align-self:auto!important}
}
</style>
</head>

          <div style="font-weight:600;font-size:15px;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="tb-title">Mes projets</div>

      </div>

        <div class="locality-chip-wrap" style="position:relative;display:flex">

            <svg class="ico" style="width:14px;height:14px;color:var(--blue)" aria-hidden="true"><use href="#i-lock"/></svg>

          </button>
        </div>
        <div id="phase-picker" style="display:none;align-items:center;gap:6px" title="Phase d'avancement du projet">
          <span style="font-size:11px;color:var(--text3);white-space:nowrap">Phase :</span>
          <select id="phase-select" aria-label="Phase du projet" onchange="quickPhase(this.value)" style="padding:5px 9px;border:1px solid var(--border2);border-radius:var(--r);font-size:12px;font-weight:500;background:var(--panel);color:var(--text);outline:none;cursor:pointer;font-family:inherit">
            <option>Études</option><option>Permis</option><option>Chantier</option>
            <option>Réception</option><option>Livré</option><option>En pause</option>
          </select>
        </div>
        <div class="notif-w">
          <button class="btn btn-g btn-sm" aria-label="Notifications" onclick="showNotifs()"><svg class="ico" style="width:15px;height:15px"><use href="#i-bell"/></svg></button>

        <div class="notif-w">
          <button class="btn btn-g btn-sm" aria-label="Rechercher" onclick="openSearch()" title="Rechercher dans le projet"><svg class="ico" style="width:15px;height:15px"><use href="#i-search"/></svg></button>
        </div>
        <button class="btn btn-p btn-sm" id="main-btn" onclick="mainAction()">
          <svg class="ico ico-sm" id="main-btn-ico"><use href="#i-plus"/></svg>
          <span id="main-btn-lbl">Nouveau projet</span>
        </button>
      </div>
    </div>
    <div class="tabbar" id="tabbar" style="display:none"></div>
    <div style="display:flex;flex:1;overflow:hidden">
      <div class="content" id="content" style="flex:1"></div>
      <!-- DETAIL PANEL -->
      <div class="detail-panel" id="dp">
        <div class="dp-head">
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="dp-title">—</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px" id="dp-sub">—</div>
          </div>
          <button class="btn btn-g btn-sm" aria-label="Fermer le panneau" onclick="closeDP()"><svg class="ico ico-sm" aria-hidden="true"><use href="#i-x"/></svg></button>

  }catch(e){ ok=false; }
  return {
    available:function(){return ok;},
    get:function(key){
      // La copie en mémoire fait foi pendant la session (couvre les échecs d'écriture).
      if(key in mem)return mem[key];
      if(ok){try{var v=window.localStorage.getItem(key);if(v!=null)mem[key]=v;return v;}catch(e){ok=false;}}
      return null;
    },
    set:function(key,val){

      if(ok){
        try{window.localStorage.setItem(key,val);return true;}
        catch(e){return false;}
      }
      return false; // pas de stockage persistant disponible
    },
    remove:function(key){
      delete mem[key];
      if(ok){try{window.localStorage.removeItem(key);}catch(e){}}
    }
  };
}());

// DOCS est géré par projet (proj.docs_data), chargé depuis localStorage
// Structure: {plans:[], contrats:[], factures:[], photos:[], admin:[]}
// Les octets des fichiers importés (data URL) vivent en mémoire dans BLOBS,
// indexés par id de doc, ET sont persistés dans IndexedDB (BlobDB) — le
// localStorage ne pouvant pas tenir des fichiers binaires à l'échelle.
// L'export/import JSON continue d'embarquer les octets (autoportant).
var BLOBS={};

/* ── BlobDB : stockage IndexedDB des octets de fichiers (data URL), par id de doc ── */
var BlobDB=(function(){
  var DB_NAME='plansync_blobs';
  var STORE='blobs';
  var _db=null, _open=null, _ok=(typeof indexedDB!=='undefined'&&indexedDB);
  var _keys=Object.create(null); // index léger des ids persistés (chargé au démarrage, sans les octets)
  function open(){
    if(!_ok)return Promise.resolve(null);
    if(_db)return Promise.resolve(_db);
    if(_open)return _open;
    _open=new Promise(function(resolve){
      try{
        var req=indexedDB.open(DB_NAME,1);
        req.onupgradeneeded=function(){
          var db=req.result;
          if(!db.objectStoreNames.contains(STORE))db.createObjectStore(STORE);
        };
        req.onsuccess=function(){_db=req.result;resolve(_db);};
        req.onerror=function(){_ok=false;resolve(null);};
      }catch(e){_ok=false;resolve(null);}
    });
    return _open;
  }
  function tx(mode){
    return open().then(function(db){
      if(!db)return null;
      try{return db.transaction(STORE,mode).objectStore(STORE);}catch(e){return null;}
    });
  }
  return {
    available:function(){return !!_ok;},
    // True si l'id est connu comme persisté (d'après l'index de clés chargé au démarrage).
    has:function(id){return !!(id&&_keys[id]);},
    put:function(id,url){
      if(!id||!url)return Promise.resolve(false);
      return tx('readwrite').then(function(store){
        if(!store)return false;
        return new Promise(function(resolve){
          try{var r=store.put(url,id);r.onsuccess=function(){_keys[id]=1;resolve(true);};r.onerror=function(){resolve(false);};}
          catch(e){resolve(false);}
        });
      });
    },
    del:function(id){
      if(!id)return Promise.resolve(false);
      delete _keys[id];
      return tx('readwrite').then(function(store){
        if(!store)return false;
        return new Promise(function(resolve){
          try{var r=store.delete(id);r.onsuccess=function(){resolve(true);};r.onerror=function(){resolve(false);};}
          catch(e){resolve(false);}
        });
      });
    },
    // Récupère les octets d'un seul document (chargement paresseux à la première consultation).
    get:function(id){
      if(!id)return Promise.resolve(null);
      return tx('readonly').then(function(store){
        if(!store)return null;
        return new Promise(function(resolve){
          try{var r=store.get(id);r.onsuccess=function(){resolve(r.result||null);};r.onerror=function(){resolve(null);};}
          catch(e){resolve(null);}
        });
      });
    },
    // Charge uniquement l'index des clés (léger) — ne bloque pas le premier paint avec les octets.
    loadKeys:function(){
      return open().then(function(db){
        if(!db)return;
        return new Promise(function(resolve){
          try{
            var store=db.transaction(STORE,'readonly').objectStore(STORE);
            var kr=store.getAllKeys?store.getAllKeys():null;
            if(kr){
              kr.onsuccess=function(){var ks=kr.result||[];for(var i=0;i<ks.length;i++)_keys[ks[i]]=1;resolve();};
              kr.onerror=function(){resolve();};
            }else{
              var cur=store.openKeyCursor?store.openKeyCursor():store.openCursor();
              cur.onsuccess=function(){var c=cur.result;if(c){_keys[c.key]=1;c.continue();}else resolve();};
              cur.onerror=function(){resolve();};
            }
          }catch(e){resolve();}
        });
      });
    },
    // Tous les octets persistés sous forme d'objet {id:url} — pour un export JSON complet.
    getAllAsObject:function(){
      return open().then(function(db){
        if(!db)return {};
        return new Promise(function(resolve){
          try{
            var store=db.transaction(STORE,'readonly').objectStore(STORE);
            var keysReq=store.getAllKeys?store.getAllKeys():null;
            var valsReq=store.getAll?store.getAll():null;
            if(keysReq&&valsReq){
              var keys=null,vals=null,out={};
              keysReq.onsuccess=function(){keys=keysReq.result;finish();};
              valsReq.onsuccess=function(){vals=valsReq.result;finish();};
              keysReq.onerror=valsReq.onerror=function(){resolve({});};
              function finish(){if(keys==null||vals==null)return;for(var i=0;i<keys.length;i++){if(keys[i]&&vals[i])out[keys[i]]=vals[i];}resolve(out);}
            }else{
              var out2={};var cur=store.openCursor();
              cur.onsuccess=function(){var c=cur.result;if(c){out2[c.key]=c.value;c.continue();}else resolve(out2);};
              cur.onerror=function(){resolve({});};
            }
          }catch(e){resolve({});}
        });
      });
    },
    // Charge tous les octets connus dans BLOBS (conservé pour compatibilité / cas particuliers).
    loadAll:function(){
      return open().then(function(db){
        if(!db)return;
        return new Promise(function(resolve){
          try{
            var store=db.transaction(STORE,'readonly').objectStore(STORE);
            var keysReq=store.getAllKeys?store.getAllKeys():null;
            var valsReq=store.getAll?store.getAll():null;
            if(keysReq&&valsReq){
              var keys=null,vals=null;
              keysReq.onsuccess=function(){keys=keysReq.result;finish();};
              valsReq.onsuccess=function(){vals=valsReq.result;finish();};
              keysReq.onerror=valsReq.onerror=function(){resolve();};
              function finish(){
                if(keys==null||vals==null)return;
                for(var i=0;i<keys.length;i++){if(keys[i]&&vals[i]){_keys[keys[i]]=1;if(!(keys[i] in BLOBS))BLOBS[keys[i]]=vals[i];}}
                resolve();
              }
            }else{
              // Repli : curseur (navigateurs anciens sans getAll).
              var cur=store.openCursor();
              cur.onsuccess=function(){var c=cur.result;if(c){_keys[c.key]=1;if(!(c.key in BLOBS))BLOBS[c.key]=c.value;c.continue();}else resolve();};
              cur.onerror=function(){resolve();};
            }
          }catch(e){resolve();}
        });
      });
    }
  };
}());

// Enregistre les octets en mémoire ET (best-effort) dans IndexedDB pour survivre au rechargement.
// Si l'écriture échoue (quota dépassé, mode privé…), on garde les octets en session et on
// prévient discrètement l'utilisateur que le fichier ne sera pas conservé hors ligne.
function setBlob(id,url){
  if(!id||!url)return Promise.resolve(false);
  BLOBS[id]=url;
  try{
    return BlobDB.put(id,url).then(function(okWrite){
      if(!okWrite&&BlobDB.available()){
        try{toast('Fichier trop volumineux pour être conservé hors ligne');}catch(e){}
      }
      return okWrite;
    });
  }catch(e){return Promise.resolve(false);}
}

// Appelé au chargement (loadPROJS), à l'ouverture d'un projet (renderMbrs),
// et à chaque invitation — évite les TypeError sur m.perms[k] / m.dossiers[f].
function normalizeMbr(m){
  if(!m)return;
  if(!m.perms)m.perms={};
  var defP={voir:true,dl:m.role!=='client_viewer',import:false,publier:false,contrats:m.role==='client_viewer',admin:false};
  Object.keys(defP).forEach(function(k){if(m.perms[k]===undefined)m.perms[k]=defP[k];});
  if(!m.dossiers)m.dossiers={};
  var defD={Plans:true,'Contrats & Devis':false,Factures:false,'Photos chantier':false,'Admin':false};
  Object.keys(defD).forEach(function(k){if(m.dossiers[k]===undefined)m.dossiers[k]=defD[k];});
}

function flatCL(n){return(n.items||[]).concat(...(n.children||[]).map(c=>flatCL(c)));}
function allCLN(list,acc=[]){if(!list)return acc;list.forEach(n=>{acc.push(n);allCLN(n.children,acc);});return acc;}
function findCLN(id){return allCLN(clTree).find(n=>n.id===id);}

/* ── Avancement (Task 2) ──
   Calculé par défaut à partir des checklistes (éléments cochés / total, hors archivés).
   p.progressManual (optionnel) sert d'override manuel : s'il est renseigné, il prime.
   On ne touche jamais à p.progress hérité — il reste dans les données. */
function clStatsForProj(p){
  if(!p)return{done:0,total:0};
  // Utilise l'arbre stocké du projet, sinon l'arbre par défaut (sans le persister).
  const tree=(p.clTree&&p.clTree.length)?p.clTree:buildCL(p);
  const items=allCLN(tree).flatMap(n=>(n.items||[]).filter(i=>!i.arch));
  return{done:items.filter(i=>i.done).length,total:items.length};
}
function autoProgress(p){
  const s=clStatsForProj(p);
  return s.total>0?Math.round(s.done/s.total*100):0;
}
// Vrai si l'utilisateur a saisi un avancement manuel.
function hasManualProgress(p){
  return p&&p.progressManual!=null&&p.progressManual!=='';
}
// Avancement affiché : override manuel si présent, sinon calcul automatique.
function effProgress(p){
  if(hasManualProgress(p)){
    const v=parseInt(p.progressManual,10);
    return isNaN(v)?autoProgress(p):Math.min(100,Math.max(0,v));
  }
  return autoProgress(p);
}

function setTabs(tabs,activeId){
  const tb=document.getElementById('tabbar');

  tb.style.display='flex';
  tb.innerHTML=tabs.map(t=>`<button class="tab ${t.id===activeId?'active':''}" title="${e(t.label)}" onclick="switchTab('${t.id}',this)" style="${t.id===activeId&&t.color?'color:'+t.color+';border-bottom-color:'+t.color:''}">
    <svg class="ico ico-sm" style="vertical-align:-2px;margin-right:4px"><use href="#i-${t.ico}"/></svg>${t.label}

function switchTab(id,btn){
  document.querySelectorAll('.tabbar .tab').forEach(t=>{t.classList.remove('active');t.style.color='';t.style.borderBottomColor='';});
  btn.classList.add('active');
  if(id==='pt-docs'||id==='pt-info'){renderPlansContent(id);return;}
  clTab=id;
  const node=findCLN(id);if(node){btn.style.color=node.color;btn.style.borderBottomColor=node.color;}
  renderCLContent();
}

  if(VIEW==='projets'){openNewProj();return;}

            +[['Documents',(typeof p.docs==='number'?p.docs:(p.docs_data?((p.docs_data.plans||[]).length+(p.docs_data.contrats||[]).length+(p.docs_data.factures||[]).length+(p.docs_data.photos||[]).length+(p.docs_data.admin||[]).length+((p.pv||[]).length)):0)),p.color],['Intervenants',(Array.isArray(p.membres)?p.membres.length:(p.membres||0)),p.color],['Budget',p.budget,p.color],['Surface',p.surface,'var(--text)'],['Début',p.start,'var(--text)'],['Livraison',p.livraison,'var(--text)']].map(function(row,i){

/* ══ PLANS — folder tree + docs ══ */
function renderPlans(){
  if(!PROJ)return;
  setTB('pdf','var(--blue)','Plans',PROJ.name,'Importer','upload');
  setTabs([
    {id:'pt-docs',label:'Documents',ico:'pdf',color:'var(--blue)'},
    {id:'pt-info',label:'Informations projet',ico:'settings',color:'var(--blue)'},
  ],'pt-docs');
  renderPlansContent('pt-docs');
}

function renderPlansContent(tab){
  if(tab==='pt-info'){renderProjInfoPanel();return;}
  if(planArch){renderPlansArchives();return;}
  if(planView==='colonnes'){renderPlansColumns();return;}
  const projId=PROJ.id;
  const roots=getPlanFolders(projId);
  const docsAll=getDocsForProj(PROJ).plans||[];
  // Navigateur façon "aires" : fil d'Ariane + cartes dossiers/fichiers.
  // purge le chemin des dossiers disparus/archivés
  planListPath=planListPath.filter(function(id){const n=findPlanNode(roots,id);return n&&!n.archived;});
  const cur=planListPath.length?planListPath[planListPath.length-1]:null;
  const curNode=cur?findPlanNode(roots,cur):null;
  const levelFolders=(cur?(curNode?curNode.children||[]:[]):roots).filter(function(f){return !f.archived;});
  // fichiers du niveau courant : ceux dont d.folder === dossier courant ; à la racine, les non classés
  const levelDocs=docsAll.filter(function(d){
    if(d.archived)return false;
    if(cur)return d.folder===cur;
    const all=flatPlanFolders(roots).map(function(x){return x.node.id;});
    return !d.folder||all.indexOf(d.folder)<0;
  });
  const listPath=planListPath.map(function(id){const n=findPlanNode(roots,id);return n?n.name:'';}).filter(Boolean).join(' › ');
  // sous-titre = compte à la racine, chemin dans un dossier
  const rootFoldersCount=roots.filter(function(f){return !f.archived;}).length;
  const allDocsCount=docsAll.filter(function(d){return !d.archived;}).length;
  setTB(cur?'folder':'pdf','var(--blue)','Plans',(cur?listPath:(rootFoldersCount+' '+(rootFoldersCount>1?'dossiers':'dossier')+' · '+allDocsCount+' '+(allDocsCount>1?'éléments':'élément'))),'','folder');
  setTabs(null);

  // Fil d'Ariane
  let crumbs='<button class="crumb" onclick="planListGoRoot()"'+dropAttrs({kind:'plan',type:'root',projId:projId})+' style="background:none;border:none;cursor:pointer;color:'+(cur?'var(--text3)':'var(--blue)')+';font-size:12px;font-weight:600;font-family:inherit;padding:2px 4px;border-radius:5px">Plans</button>';
  planListPath.forEach(function(id,i){
    const n=findPlanNode(roots,id);if(!n)return;
    const isLast=(i===planListPath.length-1);
    crumbs+='<span style="color:var(--text3);font-size:11px;margin:0 2px">/</span>'
      +'<button class="crumb" onclick="planListGoTo('+i+')"'+dropAttrs({kind:'plan',type:'folder',id:id,projId:projId})+' style="background:none;border:none;cursor:pointer;color:'+(isLast?'var(--blue)':'var(--text3)')+';font-size:12px;font-weight:'+(isLast?'600':'500')+';font-family:inherit;padding:2px 4px;border-radius:5px">'+e(n.name)+'</button>';
  });

  // Compte visible dans l'en-tête de contenu (le sous-titre topbar peut passer inaperçu).
  const lvlFoldersN=levelFolders.length, lvlDocsN=levelDocs.length;
  const countParts=[];
  countParts.push(lvlFoldersN+' '+(lvlFoldersN>1?'dossiers':'dossier'));
  countParts.push(lvlDocsN+' '+(lvlDocsN>1?'fichiers':'fichier'));
  const countChip='<span class="badge bgray" style="font-weight:500">'+countParts.join(' · ')+'</span>';

  let head='<div class="pad" style="padding-bottom:0">'
    +planViewToggle()
    +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;min-height:22px">'+crumbs+countChip+'</div>'
    +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px">';
  if(cur){
    head+='<button class="btn btn-g btn-sm" onclick="planListUp()"><svg class="ico ico-xs" style="margin-right:3px"><use href="#i-arrow-left"/></svg>Retour</button>'
      +permBtn('folders','<svg class="ico ico-xs" style="margin-right:3px"><use href="#i-edit"/></svg>Renommer','renamePlanFolder(\''+cur+'\',\''+e(curNode.name)+'\',\''+projId+'\')','btn-g btn-sm')
      +permBtn('folders','<svg class="ico ico-xs" style="margin-right:3px"><use href="#i-archive"/></svg>Archiver le dossier','archivePlanFolder(\''+projId+'\',\''+cur+'\')','btn-g btn-sm','color:var(--amber);')
      +permBtn('folders','<svg class="ico ico-xs" style="margin-right:3px"><use href="#i-trash"/></svg>Supprimer le dossier','deletePlanFolder(\''+projId+'\',\''+cur+'\')','btn-g btn-sm','color:var(--red);');
  }
  head+=permBtn('folders','<svg class="ico ico-xs" style="margin-right:3px"><use href="#i-plus"/></svg>Nouveau dossier',(cur?'addPlanSubfolder(\''+cur+'\',\''+projId+'\')':'addPlanFolder(\''+projId+'\')'),'btn-g btn-sm');
  if(!cur){head+=permBtn('folders','<svg class="ico ico-xs" style="margin-right:3px"><use href="#i-folder"/></svg>Modèle','openTemplateModal(\''+projId+'\')','btn-g btn-sm');}
  head+=(can('items')
    ?'<label class="btn btn-g btn-sm" style="cursor:pointer"><svg class="ico ico-xs" style="margin-right:3px"><use href="#i-upload"/></svg>Importer un PDF<input type="file" accept=".pdf,application/pdf" multiple style="display:none" onchange="addDocToFolder(event,\''+(cur||'')+'\',\''+projId+'\')"></label>'
    :permBtn('items','<svg class="ico ico-xs" style="margin-right:3px"><use href="#i-upload"/></svg>Importer un PDF','','btn-g btn-sm'));
  head+='</div>';

  let body='';
  if(levelFolders.length)body+='<div style="font-size:10.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:2px 0 6px">Dossiers</div>';
  body+=levelFolders.map(function(f){
    const sub=(f.children||[]).filter(function(x){return !x.archived;}).length;
    const inItems=docsAll.filter(function(d){return d.folder===f.id&&!d.archived;}).length;
    const meta=[];if(sub)meta.push(sub+' dossier(s)');if(inItems)meta.push(inItems+' élément(s)');
    const ref={kind:'plan',type:'folder',id:f.id,projId:projId,archived:false};
    return '<div class="aud-card" onclick="planListEnter(\''+f.id+'\')"'+rowAttrs(ref)+dropAttrs({kind:'plan',type:'folder',id:f.id,projId:projId}) +' style="display:flex;align-items:center;gap:10px;padding:11px 14px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer">'
      +'<svg class="ico ico-sm" style="color:var(--blue);flex-shrink:0"><use href="#i-folder"/></svg>'
      +'<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="'+e(f.name)+'">'+e(f.name)+'</div>'
      +(meta.length?'<div style="font-size:11px;color:var(--text3);margin-top:2px">'+meta.join(' · ')+'</div>':'')
      +'</div>'
      +'<div style="display:flex;align-items:center;flex-shrink:0">'+dotsBtn(ref)+'<svg class="ico" style="width:11px;height:11px;color:var(--text3);margin-left:6px"><use href="#i-arrow-right"/></svg></div>'
    +'</div>';
  }).join('');

  if(levelDocs.length)body+='<div style="font-size:10.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:'+(levelFolders.length?'12px':'2px')+' 0 6px">Fichiers</div>';
  body+=levelDocs.map(function(d){
    const ref={kind:'plan',type:'file',id:d.id,archived:false};
    return '<div class="aud-card" onclick="viewPlanDoc(\''+d.id+'\')"'+rowAttrs(ref)+' style="display:flex;align-items:center;gap:10px;padding:11px 14px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer">'
      +'<svg class="ico ico-sm" style="color:var(--blue);flex-shrink:0"><use href="#i-pdf"/></svg>'
      +'<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="'+e(d.title)+'">'+e(d.title)+'</div>'
      +'<div style="font-size:11px;color:var(--text3);margin-top:2px">v'+d.v+' · '+e(d.size||'')+' · '+e(d.date||'')+'</div></div>'
      +'<div style="display:flex;align-items:center;gap:4px;flex-shrink:0">'+dotsBtn(ref)+'</div>'
    +'</div>';
  }).join('');

  if(!levelFolders.length&&!levelDocs.length){
    body='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:36px 16px;color:var(--text3)">'
      +'<svg class="ico" style="width:32px;height:32px;color:var(--border2);margin-bottom:10px"><use href="#i-folder"/></svg>'
      +'<div style="font-size:14px;font-weight:500;color:var(--text2);margin-bottom:4px">Aucun plan ici. Importez un PDF ou créez un sous-dossier pour commencer.</div>'
      +'</div>';
  }else{
    body='<div style="display:flex;flex-direction:column;gap:8px">'+body+'</div>';
  }
  document.getElementById('content').innerHTML=head+body+'</div>';
}

/* ── navigation Liste Plans (façon navigateur) ── */
function planListEnter(id){planListPath.push(id);renderPlansContent('pt-docs');}
function planListUp(){planListPath.pop();renderPlansContent('pt-docs');}
function planListGoRoot(){planListPath=[];renderPlansContent('pt-docs');}
function planListGoTo(idx){planListPath=planListPath.slice(0,idx+1);renderPlansContent('pt-docs');}

/* ── Bascule de vue Plans (Liste / Colonnes) ── */
function planViewToggle(){
  function btn(v,label){const on=!planArch&&planView===v;return '<button class="btn btn-sm '+(on?'btn-p':'btn-g')+'" onclick="setPlanView(\''+v+'\')" style="font-size:11.5px">'+label+'</button>';}
  const archBtn='<button class="btn btn-sm '+(planArch?'btn-p':'btn-g')+'" onclick="planShowArch()" style="font-size:11.5px;margin-left:6px"><svg class="ico ico-xs" style="vertical-align:-2px;margin-right:3px"><use href="#i-archive"/></svg>Archives</button>';
  return '<div style="display:flex;align-items:center;gap:6px;padding:8px 14px;border-bottom:1px solid var(--border);height:44px;flex-shrink:0">'
    +'<span style="font-size:10.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-right:2px">Affichage</span>'
    +btn('liste','Liste')+btn('colonnes','Colonnes')+archBtn
    +'</div>';
}
function setPlanView(v){
  planArch=false;
  planView=v;Store.set('plansync_plan_view',v);
  if(v==='colonnes'){planColPath=[];planColDoc=null;}
  if(v==='liste'){planListPath=[];}
  renderPlansContent('pt-docs');
}
// Bascule compacte Plans (intégrée dans la barre d'actions de la vue Colonnes)
function planViewToggleInline(){
  function btn(v,label){const on=!planArch&&planView===v;return '<button class="btn btn-sm '+(on?'btn-p':'btn-g')+'" onclick="setPlanView(\''+v+'\')" style="font-size:11.5px">'+label+'</button>';}
  // Archives placée juste après la bascule, comme en vue Liste (position cohérente).
  var archBtn='<button class="btn btn-sm '+(planArch?'btn-p':'btn-g')+'" onclick="planShowArch()" style="font-size:11.5px;margin-left:6px"><svg class="ico ico-xs" style="vertical-align:-2px;margin-right:3px"><use href="#i-archive"/></svg>Archives</button>';
  return btn('liste','Liste')+btn('colonnes','Colonnes')+archBtn;
}

/* ── Vue en colonnes (type Finder) ── */
function findPlanNode(nodes,id){
  for(var i=0;i<nodes.length;i++){if(nodes[i].id===id)return nodes[i];if(nodes[i].children){var r=findPlanNode(nodes[i].children,id);if(r)return r;}}
  return null;
}
function planColSelect(level,id){
  // tronque le chemin au niveau cliqué puis ajoute le dossier choisi
  planColPath=planColPath.slice(0,level);planColPath.push(id);planColDoc=null;
  renderPlansContent('pt-docs');
}
function planColOpenDoc(id){planColDoc=id;renderPlansContent('pt-docs');viewPlanDoc(id);}
function renderPlansColumns(){
  const projId=PROJ.id;
  const roots=getPlanFolders(projId);
  const docs=getDocsForProj(PROJ).plans||[];
  // Construit les colonnes successives selon planColPath.
  const cols=[];
  let levelNodes=roots;
  cols.push({nodes:levelNodes,selId:planColPath[0]||null,level:0});
  for(let i=0;i<planColPath.length;i++){
    const node=findPlanNode(roots,planColPath[i]);
    if(!node)break;
    cols.push({nodes:node.children||[],selId:planColPath[i+1]||null,level:i+1,parent:node});
  }
  // dossier sélectionné = dernier du chemin (pour import / actions)
  const curId=planColPath.length?planColPath[planColPath.length-1]:null;
  const curNode=curId?findPlanNode(roots,curId):null;

  function colHTML(col){
    const folders=(col.nodes||[]).filter(function(f){return !f.archived;});
    const colDocs=col.parent?docs.filter(function(d){return d.folder===col.parent.id&&!d.archived;}):[];
    let h='<div class="col"><div class="col-list">';
    h+='<div class="col-hd">Dossiers</div>';
    if(folders.length){
      h+=folders.map(function(f){
        const sel=col.selId===f.id;
        const hasKids=(f.children||[]).some(function(c){return !c.archived;});
        const ref={kind:'plan',type:'folder',id:f.id,projId:projId,archived:false};
        return '<div class="col-row '+(sel?'sel':'')+'" onclick="planColSelect('+col.level+',\''+f.id+'\')"'+rowAttrs(ref)+dropAttrs({kind:'plan',type:'folder',id:f.id,projId:projId})+'>'
          +'<svg class="ico ico-sm" style="flex-shrink:0"><use href="#i-folder"/></svg>'
          +'<span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+e(f.name)+'</span>'
          +dotsBtn(ref)

/* ── Archives Plans (dossiers + fichiers) ── */
function planFolderDescIds(roots,id){
  // collecte l'id du dossier et tous ses sous-dossiers (récursif)
  const out=[];const node=findPlanNode(roots,id);if(!node)return out;
  (function walk(n){out.push(n.id);(n.children||[]).forEach(walk);})(node);
  return out;
}
function archivePlanFolder(projId,id){
  if(!can('folders'))return denyMsg();
  const roots=getPlanFolders(projId);const node=findPlanNode(roots,id);if(!node)return;
  const ids=planFolderDescIds(roots,id);const now=new Date().toLocaleDateString('fr-FR');
  // mémorise l'état pour l'annulation
  const changedFolders=[];const changedDocs=[];
  (function walk(n){if(!n.archived){changedFolders.push(n);}(n.children||[]).forEach(walk);})(node);
  node.archived=true;node.archivedAt=now;
  // archive aussi les fichiers contenus dans ce dossier et ses sous-dossiers
  (getDocsForProj(PROJ).plans||[]).forEach(function(d){if(ids.indexOf(d.folder)>=0&&!d.archived){d.archived=true;d.archivedAt=now;changedDocs.push(d);}});
  if(activePlanFolder&&ids.indexOf(activePlanFolder.id)>=0)activePlanFolder=null;
  if(planColPath.some(function(p){return ids.indexOf(p)>=0;}))planColPath=[];
  savePlanFolders(projId);renderPlansContent('pt-docs');
  toast('Dossier archivé',{undo:function(){
    node.archived=false;node.archivedAt='';
    changedFolders.forEach(function(n){n.archived=false;n.archivedAt='';});
    changedDocs.forEach(function(d){d.archived=false;d.archivedAt='';});
    savePlanFolders(projId);renderPlansContent('pt-docs');toast('Dossier restauré');
  }});
}
function restorePlanFolder(projId,id){
  if(!can('folders'))return denyMsg();
  const roots=getPlanFolders(projId);const node=findPlanNode(roots,id);if(!node)return;
  node.archived=false;node.archivedAt='';
  savePlanFolders(projId);renderPlansContent('pt-docs');toast('Dossier restauré');
}

// liste à plat de tous les dossiers archivés (avec chemin lisible)
function flatPlanFolders(nodes,prefix,acc){
  acc=acc||[];prefix=prefix||'';
  (nodes||[]).forEach(function(f){
    const path=prefix?prefix+' / '+f.name:f.name;
    acc.push({node:f,path:path});
    flatPlanFolders(f.children,path,acc);
  });
  return acc;
}

    body+=archFolders.map(function(x){

        +'</div>'

      +'</div>';
    }).join('');
    if(archDocs.length)body+='<div style="font-size:10.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:12px 0 6px">Fichiers</div>';

        +permBtn('archive','<svg class="ico ico-xs" style="margin-right:3px"><use href="#i-refresh"/></svg>Restaurer','restorePlanDoc(\''+d.id+'\')','btn-sm btn-g')

function addPlanSubfolder(parentId,projId){
  if(!can('folders'))return denyMsg();
  promptModal('Nouveau sous-dossier','Nom du sous-dossier','Sous-dossier',function(name){
    function addSub(nodes){
      for(var i=0;i<nodes.length;i++){
        if(nodes[i].id===parentId){nodes[i].children.push({id:'pf'+(uid++),name,children:[]});return true;}
        if(nodes[i].children&&addSub(nodes[i].children))return true;
      }
      return false;
    }
    addSub(getPlanFolders(projId));
    savePlanFolders(projId);
    renderPlansContent('pt-docs');
  });
}

function renamePlanFolder(id,current,projId){
  if(!can('folders'))return denyMsg();
  promptModal('Renommer le dossier','Nouveau nom',current,function(name){
    function rename(nodes){
      for(var i=0;i<nodes.length;i++){
        if(nodes[i].id===id){nodes[i].name=name;return;}
        if(nodes[i].children)rename(nodes[i].children);
      }
    }
    rename(getPlanFolders(projId));
    if(activePlanFolder&&activePlanFolder.id===id)activePlanFolder.name=name;
    savePlanFolders(projId);
    renderPlansContent('pt-docs');
  });
}

// Formate une taille de fichier (octets) : Ko en dessous de 1 Mo, sinon Mo.
// Évite l'affichage trompeur « 0.00 Mo » pour les petits fichiers.
function fmtFileSize(bytes){
  if(!bytes||bytes<0)return '0 Ko';
  if(bytes<1048576){
    var ko=bytes/1024;
    return (ko<10?ko.toFixed(1):Math.round(ko))+' Ko';
  }
  return (bytes/1048576).toFixed(2)+' Mo';
}
function addDocToFolder(evt,folderId,projId){
  if(!can('items')){evt.target.value='';return denyMsg();}
  const files=evt.target.files;
  if(!files||!files.length)return;
  const p=PROJS.find(x=>x.id===projId)||PROJ;
  if(!p){evt.target.value='';return;}
  if(!p.docs_data)p.docs_data={plans:[],contrats:[],factures:[],photos:[],admin:[]};
  // Validation : uniquement des PDF.
  const arr=Array.from(files);
  const nonPdf=arr.some(function(f){return !(f.type==='application/pdf'||/\.pdf$/i.test(f.name));});
  if(nonPdf){evt.target.value='';toast('Veuillez sélectionner un fichier PDF.');return;}
  let pending=arr.length;
  arr.forEach(function(file){
    const reader=new FileReader();
    reader.onload=function(){
      var docId='d'+(uid++);
      setBlob(docId,reader.result); // octets en mémoire uniquement (hors localStorage)
      p.docs_data.plans.push({
        id:docId,title:file.name.replace(/\.[^.]+$/,''),folder:folderId,v:1,
        size:fmtFileSize(file.size),date:new Date().toLocaleDateString('fr-FR'),
        status:'draft',color:'#2d4ef5',type:'pdf',rem:'',tags:'',sigD:'',sigB:'',montant:'',variante:'',
        fileName:file.name,mimeType:file.type||'application/pdf',createdAt:new Date().toISOString(),
        projectId:projId,area:'plans',folderId:folderId,archived:false
      });
      pending--;
      if(pending<=0){savePROJS();toast('PDF importé');if(VIEW==='plans')renderPlansContent('pt-docs');}
    };
    reader.onerror=function(){pending--;toast('Erreur de lecture du fichier');};
    reader.readAsDataURL(file);
  });
  evt.target.value='';
}

function openDP(folder,id){

  detDoc=id;detFolder=folder;
  document.getElementById('dp-title').textContent=d.title;

  let h=`<div class="sec-hd">Informations générales</div>`;

  h+=fi('Entreprise / intervenant','text','dp-e',d.ent||'','Ex: Entreprise Dupré & Fils');
  h+=fiS('Statut','dp-s',['draft','issued','signed','superseded'],d.status,SL);
  h+=fiS('Catégorie','dp-c',['plan','devis','contrat','avenant','facture','photo','admin','autre'],d.cat);
  if(isDoc)h+=fiS('Discipline','dp-d',['','Architectural','Structural','MEP','Landscape','Admin'],d.disc);
  h+=fi('Date du document','date','dp-dt',toISO(d.date));
  if(isFin){
    h+=`<div class="sec-hd">Données financières</div>`;
    h+=`<div class="fi-2">${fi('Montant HT','text','dp-m',d.montant||'','148 500 €')}${fi('Variante / option','text','dp-v',d.variante||'','Variante A…')}</div>`;
    h+=`<div class="sec-hd">Signature</div>`;
    h+=`<div class="fi-2">${fi('Date de signature','date','dp-sd',toISO(d.sigD||''))}${fi('Signataire(s)','text','dp-sb',d.sigB||'','Nom du signataire')}</div>`;
  }
  h+=`<div class="sec-hd">Remarques & tags</div>`;
  h+=fiTA('Remarques','dp-r',d.rem||'','Observations, conditions…');
  h+=fi('Tags (virgule)','text','dp-tg',d.tags||'','structure, fondation');
  h+=`<div class="sec-hd">Versions</div>`;
  Array.from({length:d.v},(_,i)=>d.v-i).forEach(v=>{
    h+=`<div class="v-row ${v===d.v?'cur':''}">

      <span style="flex:1;font-size:12px">${v===d.v?'Version actuelle':'Archivée'}</span>
      <span class="badge ${v===d.v?'bgreen':'bgray'}" style="font-size:9px">${v===d.v?'Courante':'Archivée'}</span>
      <button class="btn btn-sm btn-g" style="padding:2px 7px" onclick="toast('Télécharger v${v}')"><svg class="ico ico-xs"><use href="#i-download"/></svg></button>
    </div>`;
  });
  h+=`<div style="margin-top:10px"><button class="btn btn-g" style="width:100%;justify-content:center" onclick="toast('Importer une nouvelle version')"><svg class="ico ico-sm"><use href="#i-upload"/></svg> Nouvelle version</button></div>`;
  document.getElementById('dp-body').innerHTML=h;
  document.getElementById('dp').classList.add('open');
}
function saveDP(){
  if(!detDoc||!detFolder)return;
  const docs=getDocsForProj(PROJ);const d=(docs[detFolder]||[]).find(x=>x.id===detDoc);if(!d)return;
  const g=id=>{const el=document.getElementById(id);return el?el.value:'';};
  d.title=g('dp-t')||d.title;d.ent=g('dp-e');d.status=g('dp-s')||d.status;d.cat=g('dp-c')||d.cat;
  if(document.getElementById('dp-d'))d.disc=g('dp-d');
  const dv=g('dp-dt');if(dv)d.date=fromISO(dv);
  if(document.getElementById('dp-m'))d.montant=g('dp-m');
  if(document.getElementById('dp-v'))d.variante=g('dp-v');
  if(document.getElementById('dp-sd')){const sv=g('dp-sd');d.sigD=sv?fromISO(sv):'';}
  if(document.getElementById('dp-sb'))d.sigB=g('dp-sb');
  d.rem=g('dp-r');d.tags=g('dp-tg');
  document.getElementById('dp-title').textContent=d.title;
  document.getElementById('dp-sub').textContent=SL[d.status]||d.status;
  savePROJS();renderDocs(detFolder);toast('Modifications enregistrées ✓');
}
function closeDP(){document.getElementById('dp').classList.remove('open');detDoc=null;detFolder=null;}
function fi(label,type,id,val,ph=''){return`<div class="fi"><label>${label}</label><input type="${type}" id="${id}" value="${e(val)}" placeholder="${ph}"></div>`;}
function fiS(label,id,opts,val,labels={}){return`<div class="fi"><label>${label}</label><select id="${id}">${opts.map(o=>`<option value="${o}" ${o===val?'selected':''}>${labels[o]||o||'—'}</option>`).join('')}</select></div>`;}
function fiTA(label,id,val,ph=''){return`<div class="fi"><label>${label}</label><textarea id="${id}" placeholder="${ph}">${e(val)}</textarea></div>`;}
function toISO(fr){if(!fr||fr.includes('-'))return fr;const p=fr.split('/');return p.length===3?`${p[2]}-${p[1]}-${p[0]}`:fr;}
// Validation légère du champ date : accepte jj/mm/aaaa ou mm/aaaa (vide autorisé).
function validateDateField(el){
  if(!el)return;const v=(el.value||'').trim();
  if(!v){el.style.borderColor='';return;}
  const ok=/^(\d{2}\/\d{2}\/\d{4}|\d{2}\/\d{4})$/.test(v);
  if(ok){el.style.borderColor='';}
  else{el.style.borderColor='var(--red)';toast('Format attendu : jj/mm/aaaa');}
}
function fromISO(iso){if(!iso||iso.includes('/'))return iso;const p=iso.split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:iso;}
function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

/* ══ CHECKLISTS ══ */
function renderCL(){
  if(!clTree)return;
  setTB('hat','#854d0e','Espace architecte — Checklistes',PROJ?.name||'','Ajouter','plus');

  setTabs(tabs,clTab);

}
function renderCLContent(){
  const node=findCLN(clTab)||clTree[0];if(!node)return;
  const vis=flatCL(node).filter(i=>clArch||!i.arch);
  const done=vis.filter(i=>i.done&&!i.arch).length,total=vis.filter(i=>!i.arch).length,pct=total?Math.round(done/total*100):0;
  let html=`<div class="pad">
    <div class="sum-bar">
      <div style="text-align:center"><div style="font-size:20px;font-weight:600;color:${node.color}">${done}</div><div style="font-size:10px;color:var(--text3)">Complétés</div></div>
      <div style="text-align:center"><div style="font-size:20px;font-weight:600;color:var(--text3)">${total-done}</div><div style="font-size:10px;color:var(--text3)">Restants</div></div>
      <div style="flex:1"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="font-weight:500">${node.label}</span><span>${pct}%</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${node.color}"></div></div></div>
      <button class="btn btn-g btn-sm" onclick="clArch=!clArch;renderCLContent()" title="${clArch?'Masquer archivés':'Voir archivés'}"><svg class="ico ico-sm"><use href="#i-archive"/></svg></button>
    </div>
    ${clGH(node,true)}`;
  if(node.children&&node.children.length){
    node.children.forEach(child=>{
      const cd=child.items.filter(i=>i.done&&!i.arch).length,ct=child.items.filter(i=>!i.arch).length;
      html+=`<div style="margin-top:14px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <svg class="ico ico-sm" style="color:${child.color}"><use href="#i-${child.ico}"/></svg>
          <span style="font-weight:500;font-size:13px">${child.label}</span>
          <span class="badge ${cd===ct&&ct>0?'bgreen':'bgray'}" style="font-size:9px">${cd}/${ct}</span>
        </div>${clGH(child,false)}</div>`;
    });
  }
  html+=`</div>`;
  document.getElementById('content').innerHTML=html;
}
function clGH(node,addRow){
  const vis=(node.items||[]).filter(i=>clArch||!i.arch);
  let h=`<div class="cl-group">`;
  vis.forEach(it=>{
    const archBtn=`<button class="btn btn-g btn-sm" onclick="archCL('${it.id}')" title="${it.arch?'Restaurer':'Archiver'}"><svg class="ico ico-xs"><use href="#i-${it.arch?'check-list':'archive'}"/></svg></button>`;
    const editBtn=permBtn('items',`<svg class="ico ico-xs"><use href="#i-edit"/></svg>`  ,`editCL('${it.id}')` ,'btn-g btn-sm','');
    const delBtn =permBtn('items',`<svg class="ico ico-xs" style="color:var(--red)"><use href="#i-trash"/></svg>`,`deleteCL('${it.id}')` ,'btn-g btn-sm','');
    h+=`<div class="cl-item" style="${it.arch?'opacity:.4':''}">
      <div class="cl-chk ${it.done&&!it.arch?'done':it.arch?'arch':''}" onclick="toggleCL('${it.id}')">
        ${it.done&&!it.arch?`<svg class="ico" style="width:10px;height:10px;color:#fff"><use href="#i-check"/></svg>`:''}
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;color:${it.done&&!it.arch?'var(--text3)':'var(--text)'};text-decoration:${it.done&&!it.arch?'line-through':'none'}">
          ${it.l}${it.tag?`<span class="tag ${TCL[it.tc]||'tgray'}">${it.tag}</span>`:''}
        </div>
        ${it.n?`<div style="font-size:11px;color:var(--text3);margin-top:2px">${it.n}</div>`:''}
      </div>
      <div class="cl-act">
        ${archBtn}${editBtn}${delBtn}
      </div>
    </div>`;
  });
  if(addRow)h+=`<div class="add-row"><input type="text" placeholder="Ajouter un élément…" id="qa-${node.id}" onkeydown="if(event.key==='Enter')quickCL('${node.id}')"><button class="btn btn-p btn-sm" onclick="quickCL('${node.id}')">Ajouter</button></div>`;
  h+=`</div>`;return h;
}
function toggleCL(iid){allCLN(clTree).forEach(n=>{const it=(n.items||[]).find(i=>i.id===iid);if(it&&!it.arch)it.done=!it.done;});if(PROJ)PROJ.clTree=clTree;savePROJS();renderCLContent();renderSB();}
function archCL(iid){allCLN(clTree).forEach(n=>{const it=(n.items||[]).find(i=>i.id===iid);if(it){it.arch=!it.arch;if(it.arch)it.done=false;}});if(PROJ)PROJ.clTree=clTree;savePROJS();renderCLContent();renderSB();}
function quickCL(nid){const inp=document.getElementById('qa-'+nid);if(!inp||!inp.value.trim())return;const n=findCLN(nid);if(!n)return;n.items.push({id:'u'+(uid++),l:inp.value.trim(),n:'',tag:'',tc:'gray',done:false,arch:false});inp.value='';if(PROJ)PROJ.clTree=clTree;savePROJS();renderCLContent();renderSB();toast('Élément ajouté');}
function openAddCL(){showModal(`<h3>Ajouter un élément</h3><div class="fi"><label>Libellé</label><input id="ac-l" placeholder="Description…"></div><div class="fi"><label>Note</label><input id="ac-n" placeholder="Optionnel"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fi"><label>Tag</label><input id="ac-tag" placeholder="Obligatoire"></div><div class="fi"><label>Couleur</label><select id="ac-tc">${TC_KEYS.map(c=>`<option value="${c}">${TC_LABELS[c]}</option>`).join('')}</select></div></div><div class="fi"><label>Dossier</label><select id="ac-p">${allCLN(clTree).map(n=>`<option value="${n.id}" ${n.id===clTab?'selected':''}>${n.label}</option>`).join('')}</select></div><div class="mo-foot"><button class="btn" onclick="closeModal()">Annuler</button><button class="btn btn-p" onclick="saveCL()">Ajouter</button></div>`);}

function saveEditCL(iid){
  var l=(document.getElementById('ec-l')?.value||'').trim();
  if(!l){var el=document.getElementById('ec-l');if(el){el.classList.add('fi-error');el.focus();}return;}
  allCLN(clTree).forEach(function(n){
    var it=(n.items||[]).find(function(i){return i.id===iid;});
    if(it){
      it.l=l;
      it.n=document.getElementById('ec-n')?.value||'';
      it.tag=document.getElementById('ec-tag')?.value||'';
      it.tc=document.getElementById('ec-tc')?.value||'gray';

function areaFolders(p){if(!p)return[];if(!p.areaFolders||typeof p.areaFolders!=='object')p.areaFolders={};return p.areaFolders;}

// Migration douce + modèle imbriqué.
// Dossiers : {id,name,parentId,archived,archivedAt,createdAt,sortOrder}. parentId=null -> racine.
function areaEnsure(p,area){
  if(!p)return null;const cfg=AREA_CFG[area];if(!cfg)return null;
  const af=areaFolders(p);
  if(area==='pv'&&Array.isArray(p.folders)&&p.folders.length&&!af.pv){af.pv=p.folders;} // reprise ancien champ PV
  // Fusion : récupère les anciens dossiers "factures" dans l'aire "contrats" (Contrats & Devis), une seule fois.
  if(area==='contrats'&&Array.isArray(af.factures)&&af.factures.length&&!p._facturesMerged){
    if(!Array.isArray(af.contrats))af.contrats=[];
    af.factures.forEach(function(f){
      if(f.id&&f.id.indexOf('fgen_')===0)return; // on ne reprend pas le "Général" des factures
      if(!af.contrats.some(function(x){return x.id===f.id;}))af.contrats.push(f);
    });
    p._facturesMerged=true;
  }
  if(!Array.isArray(af[area])||!af[area].length){
    af[area]=[];
    (AREA_DEFAULT_FOLDERS[area]||[]).forEach(function(nm,i){
      af[area].push({id:'fld_'+area+'_'+i,name:nm,parentId:null,createdAt:new Date().toISOString(),sortOrder:i,archived:false});
    });
    // "Général (non classés)" placé en dernier comme fourre-tout
    af[area].push({id:'fgen_'+area,name:'Général (non classés)',parentId:null,createdAt:new Date().toISOString(),sortOrder:af[area].length});
  }
  // Amélioration d'affichage non destructive : harmonise l'ancien libellé "Général".
  af[area].forEach(function(f){if(f.name==='Général'){f.name='Général (non classés)';}});
  // Normalise les anciens dossiers plats -> ajoute parentId/sortOrder manquants.
  af[area].forEach(function(f,i){if(typeof f.parentId==='undefined')f.parentId=null;if(typeof f.sortOrder!=='number')f.sortOrder=i;});
  cfg.ensureItems(p);
  const genF=af[area].find(function(f){return f.id==='fgen_'+area;})||af[area][0];const def=genF.id;
  const validIds={};af[area].forEach(function(f){validIds[f.id]=true;});
  // Rattache au "Général" tout item sans dossier OU pointant vers un dossier absent de cette aire
  // (cas des factures fusionnées dans "Contrats & Devis" : leur ancien folderId n'existe pas ici).
  cfg.items(p).forEach(function(it){if(!it.folderId||!validIds[it.folderId])it.folderId=def;if(typeof it.archived!=='boolean')it.archived=false;});
  if(area==='pv')p.folders=af.pv;
  return p;
}
function areaFolderById(p,area,id){const af=areaFolders(p)[area]||[];return af.find(function(f){return f.id===id;});}
function areaChildFolders(p,area,parentId){return (areaFolders(p)[area]||[]).filter(function(f){return (f.parentId||null)===(parentId||null);}).sort(function(a,b){return (a.sortOrder||0)-(b.sortOrder||0);});}
function areaDescendantIds(p,area,id){ // tous les sous-dossiers (récursif), id inclus
  const out=[id];const all=areaFolders(p)[area]||[];
  (function walk(pid){all.forEach(function(f){if((f.parentId||null)===pid){out.push(f.id);walk(f.id);}});})(id);
  return out;
}

// Sous-titre de l'aire à la racine : nombre de dossiers et d'éléments (au lieu de répéter le titre).

/* ── Vue en colonnes (type Finder) pour les aires génériques ── */
function renderAreaColumns(area){
  const cfg=AREA_CFG[area];
  // Colonnes successives selon areaPath (dossiers actifs uniquement).
  const cols=[];
  cols.push({parentId:null,level:0,selId:areaPath[0]||null});
  for(let i=0;i<areaPath.length;i++){
    const f=areaFolderById(PROJ,area,areaPath[i]);if(!f)break;
    cols.push({parentId:areaPath[i],level:i+1,selId:areaPath[i+1]||null});
  }
  const curId=areaPath.length?areaPath[areaPath.length-1]:null;
  const curName=curId?(areaFolderById(PROJ,area,curId)||{}).name:cfg.label;

  function colHTML(col){
    const folders=areaChildFolders(PROJ,area,col.parentId).filter(function(f){return !f.archived;});
    const docs=cfg.items(PROJ).filter(function(v){return (v.folderId||null)===(col.parentId||null)&&!v.archived;});
    let h='<div class="col"><div class="col-list">';
    h+='<div class="col-hd">Dossiers</div>';
    if(folders.length){
      h+=folders.map(function(f){
        const sel=col.selId===f.id;
        const hasKids=areaChildFolders(PROJ,area,f.id).some(function(c){return !c.archived;});
        const ref={kind:'area',area:area,type:'folder',id:f.id,archived:false};
        return '<div class="col-row '+(sel?'sel':'')+'" onclick="areaColSelect(\''+area+'\','+col.level+',\''+f.id+'\')"'+rowAttrs(ref)+dropAttrs({kind:'area',area:area,type:'folder',id:f.id})+'>'
          +'<svg class="ico ico-sm" style="color:'+cfg.color+';flex-shrink:0"><use href="#i-folder"/></svg>'
          +'<span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+e(f.name)+'</span>'
          +dotsBtn(ref)
          +(hasKids?'<svg class="ico" style="width:11px;height:11px;color:var(--text3)"><use href="#i-chevron-right"/></svg>':'')
        +'</div>';
      }).join('');
    }else{h+='<div style="font-size:11px;color:var(--text3);padding:4px 9px">Aucun dossier</div>';}
    h+='<div class="col-hd" style="margin-top:6px">Fichiers</div>';
    if(docs.length){
      h+=docs.map(function(v){
        const sel=areaColDoc===v.id;const ft=fileKind(v);
        const ref={kind:'area',area:area,type:'file',id:v.id,archived:false};
        return '<div class="col-row '+(sel?'sel':'')+'" onclick="areaColOpenDoc(\''+area+'\',\''+v.id+'\')"'+rowAttrs(ref)+'>'
          +'<svg class="ico ico-sm" style="color:'+cfg.color+';flex-shrink:0"><use href="#i-'+(ft==='img'?'photo':(ft==='pdf'?'pdf':'file'))+'"/></svg>'
          +'<span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+e(cfg.title(v)||'')+'</span>'
          +dotsBtn(ref)
          +'<span class="vpill" style="flex-shrink:0">'+e(fileTypeLabel(v))+'</span>'
        +'</div>';
      }).join('');
    }else{h+='<div style="font-size:11px;color:var(--text3);padding:4px 9px">Aucun fichier</div>';}
    h+='</div></div>';
    return h;
  }

  const pathLabel=areaPath.map(function(id){const f=areaFolderById(PROJ,area,id);return f?f.name:'';}).filter(Boolean).join(' › ')||cfg.label;
  // Une seule barre d'actions : bascule de vue + chemin + actions (un seul "Nouveau dossier").
  let actions='<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:8px 14px;border-bottom:1px solid var(--border);flex-shrink:0">'
    +areaViewToggleInline(area)
    +'<span style="font-size:11.5px;color:var(--text3);margin:0 auto 0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+e(pathLabel)+'</span>'
    +permBtn('folders','<svg class="ico ico-xs" style="margin-right:3px"><use href="#i-plus"/></svg>Nouveau dossier','newAreaFolder(\''+area+'\','+(curId?'\''+curId+'\'':'null')+')','btn-g btn-sm');
  if(curId){
    actions+=permBtn('folders','<svg class="ico ico-xs" style="margin-right:3px"><use href="#i-edit"/></svg>Renommer','renameAreaFolder(\''+area+'\',\''+curId+'\')','btn-g btn-sm');
    actions+=permBtn('items','<svg class="ico ico-xs" style="margin-right:3px"><use href="#i-plus"/></svg>Nouveau '+cfg.itemLabel,'newAreaItem(\''+area+'\')','btn-g btn-sm');
  }
  actions+='<button class="btn btn-g btn-sm" onclick="areaShowArch(\''+area+'\')"><svg class="ico ico-xs" style="margin-right:3px"><use href="#i-archive"/></svg>Archives</button>';
  actions+='</div>';

  // Sous-titre = chemin courant (et non répétition du titre).
  setTB(curId?'folder':cfg.ico,cfg.color,cfg.label,(curId?pathLabel:areaCountSub(area)),'','folder');
  setTabs(null);
  document.getElementById('content').innerHTML=
    '<div style="display:flex;flex-direction:column;height:100%;min-height:60vh">'
    +actions
    +'<div class="col-wrap" style="flex:1;min-height:0">'+cols.map(colHTML).join('')+'</div>'
    +'</div>';
}

/* ── actions dossiers (imbriqués) ── */
function newAreaFolder(area,parentId){
  if(!can('folders'))return denyMsg();
  areaEnsure(PROJ,area);
  const pid=(typeof parentId!=='undefined')?parentId:curFolderId();
  window.__nfParent=pid||null;
  showModal('<h3>Nouveau dossier</h3>'
    +'<div class="fi"><label>Nom du dossier</label><input id="nf-name" placeholder="Ex: 01 - Gros oeuvre, NBR, 03 - Situation…"></div>'
    +'<div class="mo-foot"><button class="btn" onclick="closeModal()">Annuler</button><button class="btn btn-p" onclick="saveNewAreaFolder(\''+area+'\')">Créer</button></div>');
}
function saveNewAreaFolder(area){
  if(!can('folders'))return denyMsg();
  const name=(document.getElementById('nf-name')?.value||'').trim();if(!name)return;
  const af=areaFolders(PROJ)[area];
  const pid=window.__nfParent||null;
  const sibs=af.filter(function(f){return (f.parentId||null)===pid;});
  af.push({id:'fld'+Date.now(),name:name,parentId:pid,createdAt:new Date().toISOString(),sortOrder:sibs.length,archived:false});
  if(area==='pv')PROJ.folders=areaFolders(PROJ).pv;
  savePROJS();closeModal();renderMain();toast('Dossier créé');
}
function renameAreaFolder(area,id){
  if(!can('folders'))return denyMsg();
  const f=areaFolderById(PROJ,area,id||curFolderId());if(!f)return;
  window.__rfId=f.id;
  showModal('<h3>Renommer le dossier</h3>'
    +'<div class="fi"><label>Nom</label><input id="rf-name" value="'+e(f.name)+'"></div>'
    +'<div class="mo-foot"><button class="btn" onclick="closeModal()">Annuler</button><button class="btn btn-p" onclick="saveRenameAreaFolder(\''+area+'\')">Enregistrer</button></div>');
}
function saveRenameAreaFolder(area){
  if(!can('folders'))return denyMsg();
  const f=areaFolderById(PROJ,area,window.__rfId);if(!f)return;
  const name=(document.getElementById('rf-name')?.value||'').trim();if(!name)return;
  f.name=name;savePROJS();closeModal();renderMain();toast('Dossier renommé');
}
function archiveAreaFolder(area,id){
  if(!can('folders'))return denyMsg();
  const cfg=AREA_CFG[area];const fid=id||curFolderId();const f=areaFolderById(PROJ,area,fid);if(!f)return;
  if((f.parentId||null)===null&&areaChildFolders(PROJ,area,null).filter(function(x){return !x.archived;}).length<=1){toast('Impossible d\'archiver le dernier dossier racine',{type:'warn'});return;}
  const ids=areaDescendantIds(PROJ,area,fid);const now=new Date().toLocaleDateString('fr-FR');
  // mémorise pour annulation : seuls les éléments réellement modifiés par cette action
  const changedFolders=[];const changedItems=[];
  (areaFolders(PROJ)[area]||[]).forEach(function(x){if(ids.indexOf(x.id)>=0&&!x.archived){x.archived=true;x.archivedAt=now;changedFolders.push(x);}});
  cfg.items(PROJ).forEach(function(v){if(ids.indexOf(v.folderId)>=0&&!v.archived){v.archived=true;v.archivedAt=now;changedItems.push(v);}});
  if(area==='pv')PROJ.folders=areaFolders(PROJ).pv;
  // remonte si on était dans le dossier archivé
  const pos=areaPath.indexOf(fid);if(pos>=0)areaPath=areaPath.slice(0,pos);
  areaArch=false;savePROJS();renderMain();
  toast('Dossier archivé',{undo:function(){
    changedFolders.forEach(function(x){x.archived=false;x.archivedAt='';});
    changedItems.forEach(function(v){v.archived=false;v.archivedAt='';});
    if(area==='pv')PROJ.folders=areaFolders(PROJ).pv;
    savePROJS();renderMain();toast('Dossier restauré');
  }});
}
function restoreAreaFolder(area,id){
  if(!can('folders'))return denyMsg();
  const f=areaFolderById(PROJ,area,id);if(!f)return;
  f.archived=false;f.archivedAt='';
  // réactive le parent s'il était archivé pour garder la cohérence du chemin
  let p=f.parentId;while(p){const pf=areaFolderById(PROJ,area,p);if(pf&&pf.archived){pf.archived=false;pf.archivedAt='';}p=pf?pf.parentId:null;}
  savePROJS();renderMain();toast('Dossier restauré');
}
