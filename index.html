      +'<td style="padding:6px 8px;border-top:2px solid var(--border);text-align:right;color:#c47a00"><span id="pc-stot">'+pcFmtSurf(st.tot)+'</span> m²</td>'
      +'<td style="border-top:2px solid var(--border)"></td>'
    +'</tr></tfoot>';
    body+='</table></div>';
  }
  return '<div style="border:1px solid var(--border);border-radius:var(--r2);background:var(--panel);margin-bottom:14px;overflow:hidden">'+head+body+'</div>';
}

/* ══ CCTP — Cahier des Clauses Techniques Particulières ═══════════════════════
   Deux onglets : « Rédaction » (architecte/admin : ajoute, modifie, supprime les
   articles) et « CCTP publié » (lecture seule, visible par tous, numéroté façon
   document). Données : PROJ.cctp = { sections:[ {id,titre, items:[ {id,titre,texte} ] } ] }.
   Stocké dans le projet → synchronisé en ligne et soumis aux droits (can('items')). */
var CCTP_TEMPLATE={"intro": "Le présent CCTP définit les prescriptions techniques des travaux. Les ouvrages seront exécutés conformément aux règles de l’art, aux DTU et normes en vigueur, aux plans et aux prescriptions des bureaux d’études.", "sections": [{"titre": "Généralités", "items": [{"titre": "Généralités", "texte": "Le présent Cahier des Clauses Techniques Particulières définit les principes généraux des travaux à réaliser dans le cadre de l’extension et de la rénovation de la maison existante.\n\nLe projet étant réalisé sur une construction existante, certains éléments ne pourront être confirmés définitivement qu’après démolition, sondages, ouvertures et reconnaissance sur site. Cela concerne notamment les dimensions réelles, les niveaux, les fondations existantes, les réseaux, les supports, les épaisseurs de murs, les évacuations, les pentes et l’état général des ouvrages conservés.\n\nToute entreprise intervenant sur le chantier devra vérifier sur place les dimensions, niveaux et contraintes avant exécution. Toute incohérence entre les plans, les études, les détails ou l’état réel du chantier devra être signalée à la maîtrise d’œuvre avant réalisation des travaux concernés.\n\nLes travaux devront être exécutés conformément aux règles de l’art, aux normes en vigueur, aux autorisations obtenues, aux plans architecte, aux détails d’exécution, aux prescriptions des bureaux d’études et aux indications du présent CCTP."}, {"titre": "Documents de référence", "texte": "Les documents de référence du projet sont notamment :\n\nPermis de construire / autorisation d’urbanisme : référence à compléter, si applicable ;\n\nPlans architecte phase PE : voir annexes — liste et références des plans à compléter ;\n\nPlans établis sur la base du relevé géomètre Dossier S25-BRA – Paolo Buso, Géomètre Topographe ;\n\nPlans géomètre reçus : plans intérieurs, élévations, plan de masse et plans de toiture ;\n\nÉtude thermique RE2020 – Rapport d’étude simplifié – Extension d’une maison individuelle – le maître d’ouvrage ;\n\nRSET / RSEE – Extension d’une maison individuelle – le maître d’ouvrage, document daté du 28/03/2026 ;\n\nÉtude géotechnique G2AVP / G5 – 3G Expertises – Dossier n° 26-03-21-15’094 X – Projet le maître d’ouvrage – Valbonne – 06/05/2026 ;\n\nÉtude hydrologique eaux pluviales – 3G Expertises – Dossier n° 26-03-21-15’094 U – Projet le maître d’ouvrage – Valbonne – 07/05/2026 ;\n\nRèglement du PLU de Valbonne – zone applicable au projet et dispositions générales ;\n\nPlans, notes et prescriptions du bureau d’étude structure : références à compléter dès réception ;\n\nPlans et prescriptions des entreprises spécialisées : références à compléter selon lots et avancement des études;\n\nAutorisations administratives obtenues : à compléter selon dossier validé.\n\nLes plans architecte et détails d’exécution seront annexés au présent CCTP ou transmis séparément aux entreprises dès finalisation.\n\nLa référence altimétrique du projet est fixée à : ± 0.00 = +204.74, sauf indication contraire sur les plans ou correction validée par la maîtrise d’œuvre.\n\nEn cas de contradiction entre les documents, l’entreprise devra demander une clarification à la maîtrise d’œuvre avant toute exécution."}, {"titre": "Cotes, dimensions et niveaux", "texte": "Les différences de dimensions, de cotes ou de plans devront être clarifiées avant exécution avec les architectes, par l’intermédiaire de la direction des travaux.\n\nAvant l’exécution des travaux, toutes les dimensions devront être vérifiées ou relevées précisément sur site.\n\nToutes les données concernant les réservations, percements, trémies et ouvertures devront être vérifiées par l’entreprise principale avec les concepteurs avant exécution.\n\nSauf indication contraire, toutes les dimensions se rapportent au gros œuvre, hors enduit, crépi ou revêtement.\n\nToutes les dimensions des linteaux de portes et des hauteurs d’allège se réfèrent au niveau du sol fini.\n\nRéférence altimétrique selon NHN2016 : ± 0.00 = +190.70 NHN, à confirmer selon le système altimétrique applicable au projet.\n\nLe présent dossier n’est valable qu’en combinaison avec les plans de l’ingénieur structure, les études techniques, les plans des entreprises spécialisées et les détails correspondants des architectes."}, {"titre": "Obligations administratives des entreprises", "texte": "Avant toute intervention, chaque entreprise devra fournir au maître d’ouvrage ou à la maîtrise d’œuvre :\n\nattestation d’assurance responsabilité civile professionnelle en cours de validité ;\n\nattestation d’assurance décennale couvrant les travaux réalisés, lorsque celle-ci est applicable ;\n\nattestation de vigilance URSSAF en cours de validité ;\n\nextrait Kbis ou justificatif d’immatriculation ;\n\ncoordonnées du responsable de chantier ;\n\nqualifications ou justificatifs techniques si nécessaires selon la nature des travaux.\n\nChaque entreprise devra employer du personnel déclaré et respecter ses obligations sociales, fiscales, administratives et d’assurance.\n\nAucune entreprise ne pourra intervenir sans avoir transmis les justificatifs nécessaires."}, {"titre": "Sous-traitance", "texte": "Toute sous-traitance devra être déclarée préalablement au maître d’ouvrage et à la maîtrise d’œuvre.\n\nL’entreprise titulaire restera responsable de ses sous-traitants, de la qualité de leurs travaux, de leur sécurité, de leur conformité réglementaire et du respect des délais.\n\nAucun sous-traitant ne pourra intervenir sur le chantier sans accord préalable et sans transmission des pièces administratives nécessaires, notamment assurances, attestation URSSAF et justificatif d’immatriculation.\n\nLes sous-traitants devront respecter les mêmes obligations techniques, administratives et de sécurité que l’entreprise principale."}]}, {"titre": "Structure", "items": [{"titre": "Démolitions et préparation", "texte": "Les démolitions et déposes nécessaires à la réalisation des extensions et adaptations intérieures seront exécutées avec précaution.\n\nLes ouvrages conservés devront être protégés pendant toute la durée des travaux.\n\nAvant toute démolition, les entreprises devront vérifier la présence de réseaux, canalisations, câbles, évacuations ou ouvrages enterrés.\n\nLes démolitions devront être réalisées de manière à ne pas déstabiliser les ouvrages existants conservés.\n\nTout élément découvert après démolition ou ouverture et non conforme aux plans ou aux hypothèses devra être signalé avant poursuite des travaux."}, {"titre": "Terrassements et fondations", "texte": "Les terrassements et fondations seront réalisés suivant les prescriptions de l’étude géotechnique et du bureau d’étude structure.\n\nLes fondations des extensions seront indépendantes de la construction existante. Un joint de rupture sera prévu entre les nouveaux ouvrages et l’existant.\n\nLes fondations seront réalisées sur semelles filantes ou longrines béton armé, suivant étude structure, encastrées dans le terrain sain.\n\nLes fondations ne devront pas être réalisées dans des remblais, argiles décompressées ou zones altérées.\n\nLes fonds de fouille devront être propres, plans, contrôlés et protégés par un béton de propreté réalisé rapidement après terrassement.\n\nLes profondeurs définitives d’ancrage seront adaptées à la nature réelle du sol rencontrée, aux sondages, à l’étude géotechnique et aux indications du bureau d’étude structure.\n\nEn cas de découverte de zones décompressées, remblais, venues d’eau, fondations existantes non prévues ou anomalie de terrain, les travaux concernés devront être suspendus et validés avant reprise.\n\nLes travaux de terrassement à proximité de l’existant devront être réalisés avec prudence et, si nécessaire, par phases."}, {"titre": "Protection contre l’eau / drainage / eaux pluviales", "texte": "La gestion des eaux est un point essentiel du projet. Les eaux de ruissellement, d’infiltration et les eaux pluviales devront être éloignées des fondations, des murs existants et des nouveaux ouvrages.\n\nLes eaux pluviales des extensions seront récupérées par gouttières et descentes EP, positionnées de préférence aux angles des toitures, suivant faisabilité technique et plans d’exécution.\n\nLes descentes seront raccordées au système de gestion des eaux pluviales prévu pour le projet.\n\nDevant les portes-fenêtres et le long des murs en contact avec une terrasse ou une surface imperméable, lorsqu’il n’y a pas de pleine terre en pied de façade, il sera prévu un caniveau ou une cunette de récupération des eaux sur toute la longueur concernée.\n\nUn drain périphérique sera prévu autour de l’extension Sud-Ouest, suivant les prescriptions géotechniques, avec évacuation gravitaire vers l’aval lorsque cela est techniquement possible.\n\nAu droit des murs existants, terrasses, parties semi-enterrées ou zones en contact avec le terrain, l’étanchéité devra être vérifiée après ouverture et traitée si nécessaire.\n\nLa position définitive des drains, caniveaux, regards, exutoires et ouvrages de rétention sera confirmée sur chantier selon les niveaux réels, les réseaux existants et les contraintes découvertes.\n\nLes eaux de drainage des fondations ne devront pas être mélangées aux eaux de rétention pluviale, sauf validation technique spécifique.\n\nLes ouvrages de rétention, d’infiltration et les regards devront rester accessibles pour entretien."}, {"titre": "Plancher bas", "texte": "Le plancher bas sera réalisé suivant étude structure, sur système poutrelles-hourdis isolant ou équivalent, conformément aux prescriptions thermiques.\n\nDes rupteurs de ponts thermiques seront prévus en périphérie selon l’étude thermique et les prescriptions du bureau d’étude.\n\nLa composition définitive du plancher bas devra être coordonnée avec les niveaux finis, les seuils, les réservations techniques, les revêtements de sol et les détails d’exécution."}, {"titre": "Murs porteurs", "texte": "Les murs porteurs extérieurs des extensions seront réalisés en agglomérés béton de 20 cm d’épaisseur, suivant étude structure.\n\nLes chaînages verticaux et horizontaux, linteaux, poteaux, raidisseurs et appuis seront réalisés conformément aux plans béton et aux prescriptions parasismiques applicables.\n\nLes agglomérés ne devront pas rester apparents."}, {"titre": "Plancher intermédiaire", "texte": "Le plancher intermédiaire sera réalisé en poutrelles-hourdis béton à plâtrer, épaisseur 20 cm, suivant étude structure.\n\nLes réservations, trémies, appuis, chaînages et percements devront être validés avant exécution.\n\nToute modification ou création d’ouverture dans un plancher ou un mur porteur devra être validée par le bureau d’étude structure."}, {"titre": "Toiture / charpente / couverture", "texte": "La toiture sera réalisée sur charpente bois, suivant étude structure.\n\nLa couverture sera composée de plaques support de tuiles type PST avec tuiles canal en finition, en cohérence avec l’aspect architectural de l’existant.\n\nL’isolation sous combles sera réalisée conformément à l’étude thermique, avec laine de verre 400 mm, R = 10,00 m².K/W, ou équivalent.\n\nLes raccords avec l’existant, sorties de toiture, ventilations, évacuations EP et points singuliers seront vérifiés et ajustés sur site."}]}, {"titre": "Menuiseries extérieures", "items": [{"titre": "Menuiseries extérieures", "texte": "Toutes les fenêtres existantes seront remplacées par des menuiseries bois avec double vitrage isolant, suivant les performances prévues à l’étude thermique.\n\nLes menuiseries seront en finition blanche, sauf indication contraire validée par le maître d’ouvrage.\n\nLes dimensions définitives des menuiseries seront relevées sur site après démolition, ouverture et vérification des tableaux existants.\n\nLes fenêtres issues des locaux de sommeil seront équipées de protections mobiles de type store ou volet, avec fermeture automatique si exigée par l’étude RE2020.\n\nSur les extensions, les volets roulants automatiques seront prévus lorsque requis par l’étude RE2020.\n\nLes volets extérieurs visibles seront de type persienne, couleur à définir par le maître d’ouvrage et à confirmer selon prescriptions architecturales.\n\nLa porte d’entrée existante sera conservée et sauvegardée dans la mesure du possible. Toute intervention devra préserver son aspect et son intégration avec la façade existante.\n\nLa porte de garage sera remplacée par une porte en bois motorisée, à deux vantaux, finition à confirmer par le maître d’ouvrage."}]}, {"titre": "Plomberie / climatisation / ventilation", "items": [{"titre": "Plomberie / assainissement", "texte": "Les réseaux de plomberie seront raccordés aux réseaux existants lorsque cela est techniquement possible et conforme.\n\nL’état, le tracé, la capacité et la conformité des réseaux existants devront être vérifiés avant raccordement.\n\nL’évacuation des eaux usées sera raccordée à la fosse existante, sous réserve de vérification préalable de son état, de sa capacité et de sa conformité.\n\nLes évacuations gravitaires seront privilégiées. En cas d’impossibilité technique, une solution adaptée devra être proposée et validée avant exécution.\n\nLes appareils sanitaires, robinetteries, meubles vasques, WC, douches, baignoires et accessoires sont à définir par le maître d’ouvrage.\n\nLes implantations seront réalisées suivant les plans d’exécution et les détails spécifiques des salles de bains.\n\nPour les précisions techniques relatives aux salles de bains, se référer au détail D800."}, {"titre": "Chauffage / climatisation", "texte": "Le chauffage et la climatisation seront réalisés par pompe à chaleur air-air de type gainable, suivant étude thermique, avec régulation de température par pièce.\n\nDans la partie existante, les combles seront utilisés pour le passage des gaines et l’intégration des équipements lorsque cela est techniquement possible.\n\nLe système complet devra être repris et adapté aux nouveaux volumes, aux contraintes de l’existant et aux possibilités de passage découvertes sur chantier.\n\nL’implantation des unités, gaines, bouches, reprises, évacuations de condensats et trappes d’accès sera à valider avant exécution.\n\nLes équipements devront rester accessibles pour entretien et maintenance."}, {"titre": "Ventilation", "texte": "La ventilation sera réalisée suivant l’étude thermique et les contraintes du projet.\n\nLa mise en place d’une VMC thermodynamique pourra être étudiée, notamment avec récupération de calories, sous réserve de faisabilité technique et validation du maître d’ouvrage.\n\nLa ventilation sera organisée avec reprise d’air dans les pièces humides et insufflation ou arrivée d’air dans les pièces sèches, suivant la solution technique retenue.\n\nL’ensemble des réseaux de ventilation sera coordonné avec la climatisation, les plafonds, les combles, les trappes d’accès et les contraintes de l’existant."}, {"titre": "Eau chaude sanitaire", "texte": "L’eau chaude sanitaire sera assurée par ballon thermodynamique ou équipement équivalent conforme à l’étude thermique.\n\nL’implantation définitive sera confirmée selon les possibilités de raccordement, d’accès, d’entretien et de passage des réseaux."}]}, {"titre": "Électricité", "items": [{"titre": "Électricité", "texte": "L’installation électrique sera réalisée avec un tableau électrique classique, sans système domotique prévu à ce stade.\n\nLe raccordement et l’organisation générale de l’installation reprendront l’existant lorsque cela est techniquement possible et conforme aux normes en vigueur.\n\nLes réseaux existants devront être vérifiés avant reprise.\n\nL’implantation des prises, interrupteurs, points lumineux, sorties de câbles et équipements électriques sera réalisée conformément aux plans d’exécution.\n\nLes appareillages seront de type standard, sauf indication contraire portée sur les plans ou dans le descriptif des pièces.\n\nLes éclairages dimmables sont à confirmer par le maître d’ouvrage avant commande et exécution.\n\nToute anomalie, incompatibilité ou impossibilité de reprise de l’existant devra être signalée avant exécution."}]}, {"titre": "Finitions intérieures et extérieures", "items": [{"titre": "Doublages / isolation intérieure", "texte": "Les murs extérieurs des extensions recevront une isolation intérieure conforme à l’étude thermique, avec complexe isolant type laine de verre GR32 de 120 mm, R = 3,75 m².K/W, ou équivalent.\n\nLe parement intérieur sera réalisé en placo BA13.\n\nDans les pièces humides, les plaques seront de type hydrofuge, adaptées à l’hygrométrie des locaux.\n\nLes jonctions entre isolants verticaux et horizontaux seront particulièrement soignées."}, {"titre": "Cloisons intérieures", "texte": "Les cloisons intérieures seront réalisées avec ossature métallique, isolation en laine de verre et double parement en plaques de plâtre BA13.\n\nL’épaisseur courante des cloisons sera de 10 cm, sauf indication contraire portée sur les plans ou détails techniques.\n\nDans les pièces humides, les parements seront hydrofuges."}, {"titre": "Plafonds / sous-faces", "texte": "Les plafonds et sous-faces seront réalisés en plaques de plâtre BA13, avec finition peinture, sauf indication contraire sur les plans.\n\nLes trappes d’accès techniques seront prévues aux emplacements nécessaires pour l’entretien des équipements.\n\nLes hauteurs et retombées de faux plafonds seront confirmées selon le passage des réseaux, gaines et équipements techniques."}, {"titre": "Revêtements de sols", "texte": "Les sols intérieurs seront réalisés en pierre de Bourgogne sur l’ensemble de la maison, sauf indication contraire dans le descriptif des pièces ou sur les plans de finition.\n\nLa composition précise des sols, chapes, supports, réservations et hauteurs finies sera réalisée suivant le détail D500.\n\nLes niveaux finis devront être coordonnés avec les seuils, portes, escaliers, sanitaires, évacuations et menuiseries."}, {"titre": "Pièces humides", "texte": "Dans les salles de bains et pièces humides, une étanchéité adaptée sera prévue sous revêtement, suivant règles de l’art et prescriptions techniques.\n\nLes revêtements muraux, hauteurs de faïence, receveurs, niches, meubles et équipements seront réalisés selon les plans et détails des pièces concernées.\n\nLes choix définitifs de sanitaires et finitions restent à confirmer par le maître d’ouvrage."}, {"titre": "Peinture / finitions intérieures", "texte": "Les finitions intérieures seront réalisées en peinture sur murs, cloisons et plafonds, sauf finition spécifique décrite sur les plans ou dans le descriptif des pièces.\n\nEn cas de finition différente selon les pièces, se référer aux détails et annotations indiqués dans le descriptif de chaque pièce.\n\nLes supports devront être préparés avant peinture : rebouchage, ponçage, nettoyage et impression adaptée selon support."}, {"titre": "Façades / enduits extérieurs", "texte": "L’ensemble des façades de la maison recevra une reprise d’enduit extérieur ton pierre, teinte à confirmer par le maître d’ouvrage et selon prescriptions éventuelles de la commune.\n\nL’enduit devra être adapté au support existant et aux nouvelles maçonneries, afin d’assurer une finition homogène entre les extensions et la construction existante.\n\nLes agglomérés, reprises de maçonnerie et supports techniques ne devront pas rester apparents.\n\nLes raccords d’enduit avec l’existant seront traités avec soin afin d’éviter les différences visibles et les fissurations."}]}, {"titre": "Sécurité / coordination chantier", "items": [{"titre": "Coordination générale", "texte": "Les travaux seront exécutés conformément aux plans architecte, aux plans d’exécution, aux détails techniques, ainsi qu’aux prescriptions des bureaux d’études structure, thermique, géotechnique et hydrologique.\n\nToute incohérence entre plans, détails, études ou état réel du chantier devra être signalée avant exécution.\n\nToute modification technique, dimensionnelle ou esthétique devra être validée par la maîtrise d’œuvre et, si nécessaire, par les bureaux d’études concernés avant réalisation.\n\nLes entreprises devront intégrer le caractère rénové du projet. Les solutions définitives pourront être adaptées après démolitions, sondages, ouvertures et vérification de l’existant."}, {"titre": "Organisation de chantier / accès", "texte": "L’organisation du chantier devra être adaptée à la configuration du site, aux accès existants et à la conservation des ouvrages maintenus.\n\nLe portail existant pourra être remplacé temporairement par un portail de chantier, suivant faisabilité et besoins d’accès.\n\nLe chemin pavé existant devra être protégé pendant les travaux. Si la protection n’est pas suffisante ou si l’accès chantier le nécessite, un accès provisoire alternatif pourra être étudié sur place.\n\nLa position de la grue, des zones de stockage, des circulations chantier et des accès engins sera à définir sur site avant démarrage des travaux.\n\nLes zones de stockage devront être limitées et positionnées de manière à ne pas surcharger les talus, murs de soutènement, restanques ou ouvrages existants.\n\nLe chantier devra rester propre, sécurisé et organisé pendant toute la durée des travaux."}, {"titre": "Protection de l’existant", "texte": "Toutes les précautions devront être prises pour ne pas déstabiliser les fondations existantes, les murs, les restanques, les terrasses, les cheminements et les réseaux existants.\n\nLes travaux proches de l’existant seront réalisés avec prudence et par phases si nécessaire.\n\nLes protections provisoires nécessaires seront prévues pour préserver les accès, façades, menuiseries conservées, ouvrages paysagers, murs existants, réseaux et revêtements conservés."}, {"titre": "Réseaux / sondages / découvertes", "texte": "Les réseaux existants devront être repérés avant terrassement ou démolition.\n\nEn cas de découverte d’un réseau non identifié, d’un ouvrage enterré, d’une fondation non prévue, d’une venue d’eau ou d’un désordre structurel, l’entreprise devra suspendre les travaux concernés et demander validation avant poursuite.\n\nLes adaptations nécessaires seront définies sur site avec la maîtrise d’œuvre et les bureaux d’études concernés."}, {"titre": "Sécurité incendie et sécurité chantier", "texte": "Les prescriptions relatives à la sécurité incendie devront être respectées pendant l’exécution des travaux et dans les ouvrages réalisés.\n\nLes entreprises devront respecter les règles de sécurité applicables au chantier, notamment en matière de protections collectives, équipements de protection individuelle, accès, stockage, manutention, échafaudages, travaux en hauteur, terrassements et réseaux.\n\nChaque entreprise est responsable de la sécurité de son personnel et de ses sous-traitants."}]}, {"titre": "Documents de fin de chantier / DOE", "items": [{"titre": "Documents de fin de chantier / DOE", "texte": "En fin de chantier, les entreprises devront remettre les documents nécessaires à la constitution du dossier des ouvrages exécutés, notamment :\n\nplans de recollement si nécessaires ;\n\nfiches techniques des matériaux et équipements mis en œuvre ;\n\nnotices d’utilisation et d’entretien ;\n\ngaranties fabricants ;\n\nattestations de conformité lorsque nécessaires ;\n\nprocès-verbaux ou rapports de mise en service des équipements techniques ;\n\ndocuments d’assurance et garanties applicables ;\n\ninformations utiles pour l’entretien futur des ouvrages.\n\nLa réception des travaux pourra être conditionnée à la remise des documents nécessaires au maître d’ouvrage."}]}]};

// Modèle type de CCTP (8 chapitres, 31 articles) — chargeable dans n'importe quel projet.
function cctpFromTemplate(){
  return {intro:CCTP_TEMPLATE.intro, sections:(CCTP_TEMPLATE.sections||[]).map(function(s){
    return {id:'cs'+(uid++),titre:s.titre,items:(s.items||[]).map(function(a){return {id:'ca'+(uid++),titre:a.titre,texte:a.texte};})};
  })};
}
function cctpLoadTemplate(){
  if(!can('items'))return denyMsg();
  cctpEnsure(PROJ);
  var proj=PROJ; // capturé : la confirmation peut être validée après navigation
  var has=PROJ.cctp.sections.length>0||(PROJ.cctp.intro||'').trim();
  var apply=function(){if(!proj)return;cctpEnsure(proj);var t=cctpFromTemplate();proj.cctp.intro=t.intro;proj.cctp.sections=t.sections;savePROJS();if(PROJ===proj){cctpTab='edit';renderCctp();}toast('Modèle de CCTP chargé');};
  if(has)confirmModal({title:'Charger le modèle type ?',danger:true,body:'Le contenu actuel du CCTP sera <strong>remplacé</strong> par le modèle type (8 chapitres, 31 articles). Pensez à exporter une sauvegarde si besoin.',confirmLabel:'Remplacer par le modèle',onConfirm:apply});
  else apply();
}
var cctpTab='apercu';
function cctpEnsure(p){
  if(!p)return;
  if(!p.cctp||typeof p.cctp!=='object')p.cctp={};
  if(typeof p.cctp.intro!=='string')p.cctp.intro='';
  if(!Array.isArray(p.cctp.sections))p.cctp.sections=[];
  p.cctp.sections.forEach(function(s){if(!Array.isArray(s.items))s.items=[];});
  if(!Array.isArray(p.cctp.additifs))p.cctp.additifs=[];
  p.cctp.additifs.forEach(function(a){if(typeof a.statut!=='string')a.statut='projet';});
}

function cctpPinPdf(ev){
  if(!can('items'))return denyMsg();
  var proj=PROJ; // capturé avant la lecture asynchrone (l'utilisateur peut naviguer entre-temps)
  var f=ev.target.files&&ev.target.files[0]; if(ev.target)ev.target.value='';
  if(!f)return;
  if(!(f.type==='application/pdf'||/\.pdf$/i.test(f.name))){toastErr('Veuillez sélectionner un fichier PDF.');return;}
  var rd=new FileReader();
  rd.onload=function(){
    if(!proj)return;
    var bid='cctppdf'+(uid++);
    setBlob(bid,rd.result).then(function(ok){
      if(!ok){toastErr('Fichier non stocké (stockage plein) — CCTP signé non attaché.');return;}
      cctpEnsure(proj);proj.cctp.pdf={blobId:bid,fileName:f.name};savePROJS();if(PROJ===proj)renderCctp();toast('CCTP signé attaché');
    }).catch(function(er){console.warn('[cctpPinPdf]',er);toastErr('Erreur lors de l\'enregistrement du fichier.');});
  };
  rd.onerror=function(){toastErr('Erreur de lecture du fichier.');};
  rd.readAsDataURL(f);
}

// Affiche une date ISO (yyyy-mm-dd, issue d'un <input type=date>) en jj/mm/aaaa.
function fmtDateFR(v){if(!v)return '';var m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(String(v));return m?(m[3]+'/'+m[2]+'/'+m[1]):String(v);}
// Publipostage contrat : remplace les champs «…» par les valeurs de la synthèse.
// Un champ non renseigné reste affiché (ex. «CLIENT») pour signaler ce qui manque.
function ctTokens(c){c=c||{};return {
  'CLIENT':c.client,'ADRESSE CLIENT':c.clientAdr,'ARCHITECTE':c.architecte,'N° ORDRE':c.ordre,
  'BUDGET':c.budget,'HONORAIRES':c.remu,'MÉTHODE':c.remuMode,'TAUX':c.tauxHoraire,
  'DATE SIGNATURE':fmtDateFR(c.dateSign),'DÉBUT':fmtDateFR(c.dateDebut)
};}
function ctFill(text,c){
  if(text==null)return '';
  var map=ctTokens(c);
  return String(text).replace(/«\s*([^«»]+?)\s*»/g,function(m,key){
    var v=map[key.trim().toUpperCase()];
    return (v&&String(v).trim())?String(v):m;
  });
}
function ctEnsure(p){
  if(!p)return;
  if(!p.contrat||typeof p.contrat!=='object')p.contrat={};
  var c=p.contrat;
  if(typeof c.type!=='string')c.type='mission_complete';
  ['client','clientAdr','architecte','ordre','budget','remu','remuMode','tauxHoraire','dateSign','dateDebut','intro'].forEach(function(k){if(typeof c[k]!=='string')c[k]='';});
  if(c.statut!=='signe')c.statut='brouillon';
  if(!Array.isArray(c.articles))c.articles=[];
  if(!Array.isArray(c.avenants))c.avenants=[];
  c.avenants.forEach(function(a){if(typeof a.statut!=='string')a.statut='projet';});
}

/* ══ CO-PILOTE — SANTÉ DU PROJET ══
   Phase 1 : moteur de règles 100 % local (gratuit, hors-ligne, aucune donnée ne sort).
   projHealth(p) renvoie {score, signals:[{level,icon,title,detail,view}]} — cette structure
   est aussi le contexte qui sera passé à un LLM en Phase 2 (toggle « Demander à l'IA »,
   via une Edge Function Supabase pour garder la clé API côté serveur). */
function ckParseDate(s){
  if(!s)return null;
  var m=/^(\d{2})\/(\d{2})\/(\d{4})$/.exec(s); if(m)return new Date(+m[3],+m[2]-1,+m[1]);
  var i=/^(\d{4})-(\d{2})-(\d{2})/.exec(s); if(i)return new Date(+i[1],+i[2]-1,+i[3]);
  var d=new Date(s); return isNaN(d.getTime())?null:d;
}
function projHealth(p){
  var sig=[];
  function add(level,icon,title,detail,view){sig.push({level:level,icon:icon,title:title,detail:detail,view:view});}
  if(!p)return {score:100,signals:sig};
  var today=new Date(); today.setHours(0,0,0,0);
  // ── Contrat ──
  var c=p.contrat||{};
  var hasContrat=(c.articles&&c.articles.length)||c.client||(c.pdf&&c.pdf.blobId);
  if(hasContrat&&c.statut!=='signe') add('warn','invoice','Contrat non signé','Le contrat d\'architecte est encore au statut « brouillon ».','contrat');
  var avProj=(c.avenants||[]).filter(function(a){return a.statut!=='signe';});
  if(avProj.length) add('warn','invoice',avProj.length+' avenant'+(avProj.length>1?'s':'')+' non signé'+(avProj.length>1?'s':''),'Des avenants au contrat sont au statut « projet ».','contrat');
  // ── Checklists : obligatoires non cochés ──
  try{
    var tree=(p.clTree&&p.clTree.length)?p.clTree:(typeof buildCL==='function'?buildCL(p):[]);
    var items=(typeof allCLN==='function')?allCLN(tree).reduce(function(acc,n){return acc.concat(n.items||[]);},[]):[];
    var oblig=items.filter(function(it){return it&&!it.arch&&!it.done&&(/oblig/i.test(it.tag||'')||it.tc==='red');});
    if(oblig.length) add(oblig.length>=3?'alert':'warn','hat',oblig.length+' point'+(oblig.length>1?'s':'')+' obligatoire'+(oblig.length>1?'s':'')+' à traiter','Éléments réglementaires de checkliste non cochés (ex. Cerfa, attestations, réception).','checklists');
    var st=(typeof clStatsForProj==='function')?clStatsForProj(p):{done:0,total:0};
    if(st.total>0&&st.done<st.total) add('info','check-list',(st.total-st.done)+' tâche'+((st.total-st.done)>1?'s':'')+' de checkliste restante'+((st.total-st.done)>1?'s':''),'Avancement checklistes : '+st.done+'/'+st.total+'.','checklists');
  }catch(e){console.warn('[projHealth] checklist',e);}
  // ── Budget / suivi ──
  try{
    var fImp=0,fImpTot=0,devisNS=0;
    (p.suivi||[]).forEach(function(g){(g.devis||[]).forEach(function(d){
      if(!d.signe&&suiviNum(d.prixHT)>0)devisNS++;
      (d.factures||[]).forEach(function(f){if(suiviNum(f.montant)>0&&!f.datePaiement){fImp++;fImpTot+=suiviNum(f.montant);}});
    });});
    if(fImp>0) add('warn','receipt',fImp+' facture'+(fImp>1?'s':'')+' impayée'+(fImp>1?'s':''),'Montant en attente de paiement : '+suiviEuro(fImpTot)+'.','suivi');
    if(devisNS>0) add('info','receipt',devisNS+' devis non signé'+(devisNS>1?'s':''),'Des devis chiffrés ne sont pas encore signés.','suivi');
    var fin=(typeof projFinance==='function')?projFinance(p):{has:false};
    if(fin.has&&fin.reste>0) add('info','receipt','Reste à facturer : '+suiviEuro(fin.reste),'Sur un total estimé de '+suiviEuro(fin.ttc)+'.','suivi');
  }catch(e){console.warn('[projHealth] suivi',e);}
  // ── Jalons dépassés ──
  try{
    var late=(p.milestones||[]).filter(function(m){var d=ckParseDate(m.date);return d&&d<today;});
    if(late.length) add('warn','helmet',late.length+' jalon'+(late.length>1?'s':'')+' de planning dépassé'+(late.length>1?'s':''),'Échéance(s) de planning chantier passée(s) : '+late.slice(0,3).map(function(m){return m.label||'jalon';}).join(', ')+(late.length>3?'…':'')+'.','timeline');
  }catch(e){console.warn('[projHealth] milestones',e);}
  // ── Paliers & modifications facturables ──
  try{
    if(typeof palStats==='function'){var ps=palStats(p);
      if(ps.unbilledN>0) add('warn','git-branch',ps.unbilledN+' modification'+(ps.unbilledN>1?'s':'')+' à facturer','Changements après signature non facturés : '+(ps.unbilledH||0)+' h · '+suiviEuro(ps.unbilledEur)+' — à passer en avenant.','paliers');
      if(ps.awaiting>0) add('info','git-branch',ps.awaiting+' palier'+(ps.awaiting>1?'s':'')+' en attente de validation','Le livrable en cours doit être signé pour passer au palier suivant.','paliers');
    }
  }catch(e){console.warn('[projHealth] paliers',e);}
  // ── Commandes directes du client (hors responsabilité) ──
  try{
    if(typeof hrStats==='function'){var hs=hrStats(p);
      if(hs.billN>0) add('warn','warning',hs.billN+' intervention'+(hs.billN>1?'s':'')+' (commande client) à facturer','Travail supplémentaire lié à des commandes/contacts directs du client : '+(hs.billH||0)+' h · '+suiviEuro(hs.billEur)+' — hors responsabilité, à passer en avenant.','horsresp');
    }
  }catch(e){console.warn('[projHealth] horsResp',e);}
  // ── CCTP non rédigé ──
  var cctp=p.cctp||{};
  if((!cctp.sections||!cctp.sections.length)&&!(cctp.pdf&&cctp.pdf.blobId)) add('info','check-list','CCTP non rédigé','Aucun cahier des clauses techniques n\'a encore été saisi.','cctp');
  // ── Score ──
  var pen=0; sig.forEach(function(s){pen+=(s.level==='alert'?16:(s.level==='warn'?9:0));});
  var score=Math.max(0,Math.min(100,100-pen));
  return {score:score,signals:sig};
}
function copiloteScoreLabel(s){return s>=85?{t:'Bon',c:'#1a7a4a'}:s>=60?{t:'À surveiller',c:'var(--amber-text)'}:{t:'Action requise',c:'#c0392b'};}
function copiloteBadge(){

  // Bandeau IA (Phase 2)

/* ══ PALIERS & VALIDATIONS ══
   Avancement par paliers : on ne passe au palier suivant qu'une fois le livrable
   (plans, dossier PC…) approuvé et signé. Après validation, toute modification du
   livrable signé est journalisée comme prestation facturable au temps passé
   (taux horaire défini au contrat, art. 4.1). */
var PAL_DEFAULTS=[
  {nom:'Esquisse (ESQ)',livrable:'Esquisse approuvée'},
  {nom:'Avant-projet (APS / APD)',livrable:'Plans d\'avant-projet signés'},
  {nom:'Permis de construire (PC)',livrable:'Dossier PC signé et déposé'},
  {nom:'Projet & consultation (PRO / DCE)',livrable:'Plans d\'exécution et DCE signés'},
  {nom:'Chantier (DET)',livrable:'Ordre de service / démarrage des travaux'},
  {nom:'Réception (AOR)',livrable:'PV de réception signé'}
];
function palEnsure(p){
  if(!p)return;
  if(!p.paliers||typeof p.paliers!=='object')p.paliers={};
  if(!Array.isArray(p.paliers.list)||!p.paliers.list.length){
    p.paliers.list=PAL_DEFAULTS.map(function(d,i){return {id:'plr'+(uid++),nom:d.nom,livrable:d.livrable,statut:i===0?'en_cours':'a_venir',dateValid:'',signe:false,note:'',mods:[]};});
  }
  p.paliers.list.forEach(function(pl){if(!Array.isArray(pl.mods))pl.mods=[];if(!Array.isArray(pl.annexes))pl.annexes=[];if(['a_venir','en_cours','valide'].indexOf(pl.statut)<0)pl.statut='a_venir';pl.mods.forEach(function(m){if(typeof m.statut!=='string')m.statut='a_facturer';});});
}
/* ── Annexes signées (PDF) attachées à un palier : plans / dossier signés qui le valident. ── */
function palAddAnnexe(palId,ev){
  if(!can('items'))return denyMsg();
  var proj=PROJ,plId=palId; var f=ev.target.files&&ev.target.files[0]; if(ev.target)ev.target.value='';
  if(!f)return;
  if(!(f.type==='application/pdf'||/\.pdf$/i.test(f.name))){toastErr('Veuillez sélectionner un fichier PDF.');return;}
  var rd=new FileReader();
  rd.onload=function(){if(!proj)return;var bid='plxpdf'+(uid++);setBlob(bid,rd.result).then(function(ok){if(!ok){toastErr('Fichier non stocké (stockage plein).');return;}var pl=(proj.paliers.list||[]).find(function(x){return x.id===plId;});if(pl){if(!Array.isArray(pl.annexes))pl.annexes=[];pl.annexes.push({id:'anx'+(uid++),blobId:bid,fileName:f.name});savePROJS();if(PROJ===proj)renderPaliers();toast('Annexe signée attachée');}else{try{delete BLOBS[bid];BlobDB.del(bid);}catch(e){}toastErr('Palier introuvable — fichier non attaché.');}}).catch(function(er){console.warn('[palAddAnnexe]',er);toastErr('Erreur lors de l\'enregistrement du fichier.');});};
  rd.onerror=function(){toastErr('Erreur de lecture du fichier.');};
  rd.readAsDataURL(f);
}
function palDelAnnexe(palId,annId){if(!can('items'))return denyMsg();var pl=palFind(palId);if(!pl||!Array.isArray(pl.annexes))return;var i=pl.annexes.findIndex(function(x){return x.id===annId;});if(i<0)return;pl.annexes.splice(i,1);savePROJS();renderPaliers();toast('Annexe retirée');}
function palViewAnnexe(palId,annId){var pl=palFind(palId);if(!pl)return;var a=(pl.annexes||[]).find(function(x){return x.id===annId;});if(a&&a.blobId)viewDoc({id:a.blobId,fileName:a.fileName,title:a.fileName||'Annexe signée',mimeType:'application/pdf',type:'pdf'});}
function palAnnexesHTML(pl){

    return '<span style="display:inline-flex;align-items:center;gap:2px;border:1px solid var(--border2);border-radius:7px;padding:2px 4px 2px 8px;background:var(--bg)">'
      +'<button class="btn-g" style="background:none;border:none;padding:2px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-family:inherit;font-size:11.5px;color:var(--text)" onclick="palViewAnnexe(\''+pl.id+'\',\''+a.id+'\')" title="'+e(a.fileName||'Annexe signée')+'"><svg class="ico ico-xs" style="color:#5c3d1e" aria-hidden="true"><use href="#i-pdf"/></svg>'+e((a.fileName||'Annexe').replace(/\.pdf$/i,'').slice(0,24))+'</button>'

  }).join('');

function palFind(id){return (PROJ&&PROJ.paliers)?PROJ.paliers.list.find(function(x){return x.id===id;}):null;}
function palTaux(){return suiviNum(PROJ&&PROJ.contrat&&PROJ.contrat.tauxHoraire);}
function modMontant(m){return suiviNum(m.heures)*suiviNum(m.taux);}
function palValidate(id){
  if(!can('items'))return denyMsg();palEnsure(PROJ);var L=PROJ.paliers.list,idx=L.findIndex(function(x){return x.id===id;});if(idx<0)return;var pl=L[idx];

  pl.statut='valide';pl.dateValid=new Date().toISOString().slice(0,10);

function palAddMod(id){if(!can('items'))return denyMsg();var pl=palFind(id);if(!pl)return;pl.mods.push({id:'mod'+(uid++),date:new Date().toISOString().slice(0,10),objet:'',heures:'',taux:String(palTaux()||''),statut:'a_facturer'});savePROJS();renderPaliers();}
function palDelMod(palId,modId){if(!can('items'))return denyMsg();var pl=palFind(palId);if(!pl)return;var i=pl.mods.findIndex(function(x){return x.id===modId;});if(i<0)return;var rm=pl.mods.splice(i,1)[0];savePROJS();renderPaliers();toast('Modification supprimée',{undo:function(){pl.mods.splice(i,0,rm);savePROJS();renderPaliers();}});}
function palUpdateMod(palId,modId,field,v){if(!can('items'))return;if(['date','objet','heures','taux'].indexOf(field)<0)return;var pl=palFind(palId);if(!pl)return;var m=pl.mods.find(function(x){return x.id===modId;});if(m){m[field]=v;saveLater();if(field==='heures'||field==='taux'){var el=document.getElementById('modtot-'+modId);if(el)el.textContent=suiviEuro(modMontant(m));}}}
function palSetModStatut(palId,modId,s){if(!can('items'))return denyMsg();var pl=palFind(palId);if(!pl)return;var m=pl.mods.find(function(x){return x.id===modId;});if(m){m.statut=(s==='facture'?'facture':'a_facturer');savePROJS();renderPaliers();}}
function palStats(p){
  if(!p||!p.paliers)return {validated:0,total:0,awaiting:0,unbilledN:0,unbilledH:0,unbilledEur:0};
  var L=p.paliers.list||[],validated=0,awaiting=0,uN=0,uH=0,uE=0;
  L.forEach(function(pl){
    if(pl.statut==='valide')validated++;

    (pl.mods||[]).forEach(function(m){if(m.statut!=='facture'){uN++;uH+=suiviNum(m.heures);uE+=modMontant(m);}});
  });
  return {validated:validated,total:L.length,awaiting:awaiting,unbilledN:uN,unbilledH:uH,unbilledEur:uE};
}

/* ══ DPGF — Décomposition du Prix Global et Forfaitaire ══
   Pendant chiffré du CCTP : lots → lignes (désignation, unité, quantité, PU HT).
   Deux onglets : Rédaction (architecte) + DPGF publié (lecture, entreprises).
   Reprise possible du pré-chiffrage. PDF signé joignable. */
/* ══ DPGF — Décomposition du Prix Global et Forfaitaire (arborescence multi-niveaux) ══
   Onglets : Rédaction (architecte) + DPGF publié (entreprises).
   Modèle : p.dpgf = {intro, tvaDefault, pdf, lots:[node]}
     node = {id, designation, children?:[node], unite,qte,qteEnt,pu,tva, intId,metier,entreprise}
     - section : possède un tableau children (total = somme des enfants)
     - ligne   : pas de children (chiffrée). Total archi = qte×pu ; Total entreprise = qteEnt×pu. */
var dpgfTab='apercu';
var dpgfIntFilter='';
var _dpgfDrag=null;
function dgIsSection(n){return !!(n&&Array.isArray(n.children));}
function dgName(n){return (n&&(n.designation||n.nom))||'';}
function dpgfEnsureNode(n,tvaDef){
  if(!n||typeof n!=='object')return;
  if(typeof n.designation!=='string')n.designation=(typeof n.nom==='string'?n.nom:'');
  if(Array.isArray(n.lignes)&&!Array.isArray(n.children))n.children=n.lignes;
  if(Array.isArray(n.lignes))delete n.lignes;
  if(Array.isArray(n.children)){n.children.forEach(function(c){dpgfEnsureNode(c,tvaDef);});}
  else{
    if(typeof n.unite!=='string')n.unite='';
    if(typeof n.qte==='undefined'||n.qte===null)n.qte='';
    if(typeof n.qteEnt==='undefined'||n.qteEnt===null)n.qteEnt='';
    if(typeof n.pu==='undefined'||n.pu===null)n.pu='';
    if(typeof n.tva==='undefined'||n.tva===null)n.tva=tvaDef;
  }
}
function dpgfEnsure(p){
  if(!p)return;
  if(!p.dpgf||typeof p.dpgf!=='object')p.dpgf={};
  var d=p.dpgf;
  if(typeof d.intro!=='string')d.intro='';
  if(typeof d.tvaDefault==='undefined'||d.tvaDefault===null)d.tvaDefault=10;
  if(!Array.isArray(d.lots))d.lots=[];
  d.lots.forEach(function(lot){
    if(!Array.isArray(lot.children)){lot.children=Array.isArray(lot.lignes)?lot.lignes:[];}
    if(Array.isArray(lot.lignes))delete lot.lignes;
    if(typeof lot.designation!=='string')lot.designation=(typeof lot.nom==='string'?lot.nom:'');
    if(typeof lot.intId!=='string')lot.intId='';
    if(typeof lot.metier!=='string')lot.metier='';
    if(typeof lot.entreprise!=='string')lot.entreprise='';
    dpgfEnsureNode(lot,d.tvaDefault);
  });
}
function dgLeaf(l){var pu=suiviNum(l.pu),tva=suiviNum(l.tva),qa=suiviNum(l.qte),qe=suiviNum(l.qteEnt),aht=pu*qa,eht=pu*qe;return{aht:aht,attc:aht*(1+tva/100),eht:eht,ettc:eht*(1+tva/100)};}
function dgTotals(n){if(dgIsSection(n)){var a=0,at=0,e=0,et=0;(n.children||[]).forEach(function(c){var t=dgTotals(c);a+=t.aht;at+=t.attc;e+=t.eht;et+=t.ettc;});return{aht:a,attc:at,eht:e,ettc:et};}return dgLeaf(n);}
function dpgfTotals(p){var a=0,at=0,e=0,et=0;((p&&p.dpgf&&p.dpgf.lots)||[]).forEach(function(lot){var t=dgTotals(lot);a+=t.aht;at+=t.attc;e+=t.eht;et+=t.ettc;});return{aht:a,attc:at,eht:e,ettc:et};}
function dpgfWalkLeaves(p,cb){function rec(n){if(dgIsSection(n))(n.children||[]).forEach(rec);else cb(n);}((p&&p.dpgf&&p.dpgf.lots)||[]).forEach(rec);}
function dpgfTvaBreakdown(p){var map={};dpgfWalkLeaves(p,function(l){var r=suiviNum(l.tva),ht=suiviNum(l.pu)*suiviNum(l.qte);map[r]=(map[r]||0)+ht;});return Object.keys(map).map(function(k){var rate=suiviNum(k);return{rate:rate,ht:map[k],tva:map[k]*rate/100};}).sort(function(a,b){return a.rate-b.rate;});}
function dpgfFind(id){var res=null;function rec(arr){for(var i=0;i<arr.length;i++){var n=arr[i];if(n.id===id){res={node:n,parent:arr,index:i};return true;}if(dgIsSection(n)&&rec(n.children))return true;}return false;}if(PROJ&&PROJ.dpgf)rec(PROJ.dpgf.lots||[]);return res;}
function dgNewLeaf(tva){return{id:'dgg'+(uid++),designation:'',unite:'u',qte:'',qteEnt:'',pu:'',tva:tva};}
function dgNewSection(){return{id:'dgs'+(uid++),designation:'',children:[]};}
function dpgfAddLot(){if(!can('items'))return denyMsg();dpgfEnsure(PROJ);PROJ.dpgf.lots.push({id:'dgl'+(uid++),designation:'',children:[],intId:'',metier:'',entreprise:''});savePROJS();renderDpgf();toast('Lot ajouté');}
function dpgfAddSection(parentId){if(!can('items'))return denyMsg();var r=dpgfFind(parentId);if(!r||!dgIsSection(r.node))return;r.node.children.push(dgNewSection());savePROJS();renderDpgf();}
function dpgfAddLigne(parentId){if(!can('items'))return denyMsg();var r=dpgfFind(parentId);if(!r||!dgIsSection(r.node))return;r.node.children.push(dgNewLeaf(PROJ.dpgf.tvaDefault));savePROJS();renderDpgf();}
function dpgfDelNode(id){if(!can('items'))return denyMsg();var r=dpgfFind(id);if(!r)return;var arr=r.parent,idx=r.index,rm=arr.splice(idx,1)[0];savePROJS();renderDpgf();toast('Supprimé',{undo:function(){arr.splice(idx,0,rm);savePROJS();renderDpgf();}});}
function dpgfUpdateNode(id,field,val){if(!can('items'))return;if(['designation','unite','qte','qteEnt','pu','tva'].indexOf(field)<0)return;var r=dpgfFind(id);if(r){r.node[field]=val;saveLater();if(field==='qte'||field==='qteEnt'||field==='pu'||field==='tva')dpgfRefreshTotals();}else console.warn('[dpgfUpdateNode] nœud introuvable',id);}
function dpgfSetLotTva(id,val){if(!can('items'))return denyMsg();var r=dpgfFind(id);if(!r)return;var rate=suiviNum(val);(function rec(n){if(dgIsSection(n))(n.children||[]).forEach(rec);else n.tva=rate;})(r.node);savePROJS();renderDpgf();}
function dpgfLotTva(n){var rates=[];(function rec(x){if(dgIsSection(x))(x.children||[]).forEach(rec);else rates.push(suiviNum(x.tva));})(n);if(!rates.length)return '';var f=rates[0];for(var i=1;i<rates.length;i++)if(rates[i]!==f)return '';return f;}
function dpgfMoveNode(id,dir){if(!can('items'))return denyMsg();var r=dpgfFind(id);if(!r)return;var j=r.index+dir;if(j<0||j>=r.parent.length)return;r.parent.splice(j,0,r.parent.splice(r.index,1)[0]);savePROJS();renderDpgf();}
function dpgfDragStart(ev,id){_dpgfDrag=id;try{ev.dataTransfer.effectAllowed='move';ev.dataTransfer.setData('text/plain',id);}catch(_){}if(ev.stopPropagation)ev.stopPropagation();}

function dpgfDragOver(ev,el){if(!_dpgfDrag||_dpgfDrag===el.getAttribute('data-id'))return;ev.preventDefault();try{ev.dataTransfer.dropEffect='move';}catch(_){}el.style.boxShadow='inset 0 2px 0 #5c3d1e';if(ev.stopPropagation)ev.stopPropagation();}
function dpgfDragLeave(el){if(el)el.style.boxShadow='';}
function dpgfDrop(ev,targetId){ev.preventDefault();if(ev.stopPropagation)ev.stopPropagation();var src=_dpgfDrag;_dpgfDrag=null;if(!src||src===targetId)return;if(!can('items'))return denyMsg();var rs=dpgfFind(src),rt=dpgfFind(targetId);if(!rs||!rt)return;if(rs.parent!==rt.parent){renderDpgf();return;}var moved=rs.parent.splice(rs.index,1)[0];var to=rt.parent.indexOf(rt.node);if(to<0)to=rt.parent.length;rt.parent.splice(to,0,moved);savePROJS();renderDpgf();}
function dpgfSetIntFilter(v){dpgfIntFilter=v;renderDpgf();}
function dpgfTradesPresent(){var set={};((PROJ&&PROJ.dpgf&&PROJ.dpgf.lots)||[]).forEach(function(lot){var m=(lot.metier||'').trim();if(m)set[m]=true;});return Object.keys(set).sort(function(a,b){return a.localeCompare(b,'fr');});}
function dpgfIntOptions(sel){var opts='<option value="">— Intervenant —</option>';getMembresForProj(PROJ).forEach(function(m){var label=(m.name||m.ent||'?')+(m.metier?(' — '+m.metier):(m.role?(' — '+roleLabel(m.role)):''));opts+='<option value="'+e(m.id)+'"'+(sel===m.id?' selected':'')+'>'+e(label)+'</option>';});return opts;}
function dpgfSetLotIntervenant(lotId,memberId){if(!can('items'))return denyMsg();var r=dpgfFind(lotId);if(!r)return;if(memberId){var m=getMembresForProj(PROJ).find(function(x){return x.id===memberId;});if(m){r.node.intId=m.id;r.node.metier=m.metier||roleLabel(m.role)||'';r.node.entreprise=m.ent||'';}else{toastErr('Intervenant introuvable.');return;}}else{r.node.intId='';r.node.metier='';r.node.entreprise='';}savePROJS();renderDpgf();}

function renderSuiviList(){
  var host=document.getElementById('suivi-list');if(!host||!PROJ)return;
  ensureSuivi(PROJ);
  var q=suiviQ.trim().toLowerCase();
  function devisMatch(g,d){
    var hay=[g.nom,d.article,d.entreprise,d.refDevis].concat((d.factures||[]).map(function(f){return f.refFacture;})).filter(Boolean).join(' ').toLowerCase();
    return hay.indexOf(q)>=0;
  }
  // totaux globaux (sur tout, indépendant de la recherche)
  var TH=0,TT=0,TF=0;PROJ.suivi.forEach(function(g){var c=groupCalc(g);TH+=c.ht;TT+=c.ttc;TF+=c.fac;});

  var html='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">'
    +scard('Total devis HT','sv-tht',suiviEuro(TH))
    +scard('Total TTC','sv-tttc',suiviEuro(TT))
    +scard('Total facturé','sv-tfac',suiviEuro(TF))
    +scard('Reste à facturer','sv-treste',suiviEuro(TT-TF))
  +'</div>';

  if(!PROJ.suivi.length){
    html+='<div style="color:var(--text3);font-size:13px;padding:24px;text-align:center;border:1px dashed var(--border);border-radius:var(--r2)">Aucun groupe. Cliquez sur « + Groupe » en haut à droite (ex. « Gros œuvre »), puis ajoutez des devis et leurs factures.</div>';
    host.innerHTML=html;return;
  }

  var any=false;
  PROJ.suivi.forEach(function(g){
    var gNameMatch=!q||(g.nom||'').toLowerCase().indexOf(q)>=0;
    var devisList=(g.devis||[]).filter(function(d){
      if(suiviIntFilter && (d.metier||'')!==suiviIntFilter) return false; // filtre par métier
      return gNameMatch||devisMatch(g,d);
    });
    if((q||suiviIntFilter)&&!devisList.length)return; // groupe sans correspondance
    any=true;
    var gc=groupCalc(g);
    html+='<div style="border:1px solid var(--border);border-radius:var(--r2);background:var(--panel);margin-bottom:14px;overflow:hidden">'
      // en-tête groupe
      +'<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--border);background:var(--bg2);flex-wrap:wrap">'
        +'<svg class="ico ico-sm" style="color:var(--text3)"><use href="#i-folder"/></svg>'
        +'<input value="'+e(g.nom||'')+'" placeholder="Nom du groupe (ex. Gros œuvre)" oninput="suiviUpdateGroup(\''+g.id+'\',\'nom\',this.value)" style="flex:1;min-width:160px;font-weight:600;font-size:13px;border:1px solid transparent;border-radius:6px;padding:4px 6px;background:transparent;color:var(--text)" onfocus="this.style.borderColor=\'var(--border)\';this.style.background=\'var(--panel)\'" onblur="this.style.borderColor=\'transparent\';this.style.background=\'transparent\'">'
        +'<span style="font-size:12px;color:var(--text2);white-space:nowrap">Devis <b id="gttc-'+g.id+'" style="color:var(--text)">'+suiviEuro(gc.ttc)+'</b> · Facturé <b id="gfac-'+g.id+'" style="color:var(--text)">'+suiviEuro(gc.fac)+'</b> · Reste <b id="greste-'+g.id+'" style="color:'+(gc.reste<0?'var(--red)':'var(--text)')+'">'+suiviEuro(gc.reste)+'</b></span>'
        +'<button class="btn btn-g btn-sm" style="padding:4px 8px" onclick="suiviAddDevis(\''+g.id+'\')"><svg class="ico ico-xs" style="margin-right:3px"><use href="#i-plus"/></svg>Devis</button>'
        +'<button class="btn btn-g btn-sm" style="padding:4px 6px;color:var(--red)" onclick="suiviDelGroup(\''+g.id+'\')" title="Supprimer le groupe"><svg class="ico ico-xs"><use href="#i-trash"/></svg></button>'
      +'</div>';

    if(!devisList.length){
      html+='<div style="padding:12px;color:var(--text3);font-size:12px">Aucun devis dans ce groupe. Utilisez « + Devis ».</div>';
    }
    devisList.forEach(function(d){
      var c=devisCalc(d);
      html+='<div style="border:1px solid var(--border);border-radius:10px;margin:10px;overflow:hidden">'
        // champs devis
        +'<div style="padding:10px 12px;background:var(--panel2)">'
          +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px">'
            +svField('Article',svInput('suiviUpdateDevis(\''+d.id+'\',\'article\',this.value)',d.article,'text','Désignation'))
            +svField('Intervenant / métier','<select onchange="suiviSetDevisIntervenant(\''+d.id+'\',this.value)" style="'+SVCSS+'">'+suiviIntOptions(d.intId)+'</select>'+(d.metier?'<span style="font-size:9.5px;color:var(--text3);margin-top:2px">Métier : '+e(d.metier)+'</span>':''))
            +svField('Entreprise',svInput('suiviUpdateDevis(\''+d.id+'\',\'entreprise\',this.value)',d.entreprise,'text','Entreprise'))
            +svField('N° devis',svInput('suiviUpdateDevis(\''+d.id+'\',\'refDevis\',this.value)',d.refDevis,'text','DV-001'))
            +svField('Date devis',svInput('suiviUpdateDevis(\''+d.id+'\',\'dateDevis\',this.value)',d.dateDevis,'date'))
            +svField('Date signature',svInput('suiviUpdateDevis(\''+d.id+'\',\'dateSignature\',this.value)',d.dateSignature,'date'))
            +'<label style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3);align-self:end;padding-bottom:5px"><input type="checkbox" '+(d.signe?'checked':'')+' onchange="suiviUpdateDevis(\''+d.id+'\',\'signe\',this.checked)" style="width:16px;height:16px;cursor:pointer">Signé</label>'
            +svField('Prix HT',svInput('suiviUpdateDevis(\''+d.id+'\',\'prixHT\',this.value,true)',d.prixHT,'number','0'))
            +svField('TVA %',svInput('suiviUpdateDevis(\''+d.id+'\',\'tva\',this.value,true)',d.tva,'number','20'))
          +'</div>'
          +'<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-top:10px;font-size:12px;color:var(--text2)">'
            +'<span>Total TTC <b id="ttc-'+d.id+'" style="color:var(--text)">'+suiviEuro(c.ttc)+'</b></span>'
            +'<span>Facturé <b id="fac-'+d.id+'" style="color:var(--text)">'+suiviEuro(c.fac)+'</b></span>'
            +'<span>Reste <b id="reste-'+d.id+'" style="color:'+(c.reste<0?'var(--red)':'var(--text)')+'">'+suiviEuro(c.reste)+'</b></span>'
            +'<span style="color:var(--text3)">(<span id="pct-'+d.id+'">'+(c.pct==null?'—':c.pct+'%')+'</span> facturé)</span>'
            +'<span style="margin-left:auto;display:flex;gap:8px;align-items:center"><span style="font-size:11px;color:var(--text3)">Devis PDF</span>'+suiviPdfBtn('devis',d.id,d.devisPdf)

          +'</div>'
        +'</div>'
        // factures
        +'<div style="padding:8px 12px">'
          +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">'
            +'<span style="font-size:11px;font-weight:600;color:var(--text3)">Factures'+((d.factures&&d.factures.length)?' ('+d.factures.length+')':'')+'</span>'
            +'<button class="btn btn-g btn-sm" style="padding:3px 8px" onclick="suiviAddFacture(\''+d.id+'\')"><svg class="ico ico-xs" style="margin-right:3px"><use href="#i-plus"/></svg>Facture</button>'
          +'</div>';
      if(!d.factures||!d.factures.length){
        html+='<div style="font-size:11.5px;color:var(--text3);padding:4px 0 6px">Aucune facture pour ce devis.</div>';
      }else{
        var th='style="padding:5px 6px;text-align:left;font-size:10px;font-weight:600;color:var(--text3);white-space:nowrap"';
        html+='<div style="overflow-x:auto"><table style="border-collapse:collapse;width:100%;min-width:760px">'
          +'<thead><tr><th '+th+'>N° facture</th><th '+th+'>Libellé</th><th '+th+' style="text-align:right">Montant</th><th '+th+'>Date facture</th><th '+th+'>Date paiement</th><th '+th+'>Validation client</th><th '+th+'>PDF</th><th '+th+'></th></tr></thead><tbody>';
        d.factures.forEach(function(f){
          var ftd='style="padding:4px 6px;border-top:1px solid var(--border)"';
          html+='<tr>'
            +'<td '+ftd+' style="padding:4px 6px;border-top:1px solid var(--border);min-width:110px">'+svInput('suiviUpdateFacture(\''+f.id+'\',\'refFacture\',this.value)',f.refFacture,'text','F-001')+'</td>'
            +'<td '+ftd+' style="padding:4px 6px;border-top:1px solid var(--border);min-width:140px">'+svInput('suiviUpdateFacture(\''+f.id+'\',\'libelle\',this.value)',f.libelle,'text','Acompte, tranche…')+'</td>'
            +'<td '+ftd+' style="padding:4px 6px;border-top:1px solid var(--border);min-width:90px">'+svInput('suiviUpdateFacture(\''+f.id+'\',\'montant\',this.value,true)',f.montant,'number','0')+'</td>'
            +'<td '+ftd+' style="padding:4px 6px;border-top:1px solid var(--border)">'+svInput('suiviUpdateFacture(\''+f.id+'\',\'dateFacture\',this.value)',f.dateFacture,'date')+'</td>'
            +'<td '+ftd+' style="padding:4px 6px;border-top:1px solid var(--border)">'+svInput('suiviUpdateFacture(\''+f.id+'\',\'datePaiement\',this.value)',f.datePaiement,'date')+'</td>'
            +'<td '+ftd+' style="padding:4px 6px;border-top:1px solid var(--border);min-width:160px">'+suiviClientCell(f)+'</td>'
            +'<td '+ftd+' style="padding:4px 6px;border-top:1px solid var(--border)">'+suiviPdfBtn('facture',f.id,f.facturePdf)+'</td>'
            +'<td '+ftd+' style="padding:4px 6px;border-top:1px solid var(--border);text-align:center"><button class="btn btn-g btn-sm" style="padding:3px 5px;color:var(--red)" onclick="suiviDelFacture(\''+f.id+'\')" title="Supprimer la facture"><svg class="ico ico-xs"><use href="#i-trash"/></svg></button></td>'
          +'</tr>';
        });
        html+='</tbody></table></div>';
      }
      html+='</div></div>';
    });
    html+='</div>';
  });

  if(q&&!any){
    html+='<div style="color:var(--text3);font-size:13px;padding:24px;text-align:center;border:1px dashed var(--border);border-radius:var(--r2)">Aucun résultat pour cette recherche.</div>';
  }
  host.innerHTML=html;
}

function scard(label,idc,val){return scardC(label,idc,val,'');}
// Carte de synthèse : liseré gauche couleur, libellé en capitales fines, valeur tabulaire.
function scardC(label,idc,val,col){
  return '<div style="flex:1;min-width:140px;position:relative;border:1px solid var(--border);border-left:3px solid '+(col||'#c47a00')+';border-radius:var(--r);background:var(--panel);padding:11px 14px;box-shadow:0 1px 2px rgba(0,0,0,.04)">'
    +'<div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">'+label+'</div>'
    +'<div id="'+idc+'" style="font-size:18px;font-weight:700;margin-top:3px;font-variant-numeric:tabular-nums;letter-spacing:-.01em'+(col?';color:'+col:'')+'">'+val+'</div></div>';
}

// Libellé/bouton d'import réel pour une aire (PV/Contrats/Photos/Admin).
function areaImportLabel(area,folderId,primary){
  const cfg=AREA_CFG[area];if(!cfg)return '';
  if(!can('items'))return permBtn('items','<svg class="ico ico-xs" style="margin-right:3px"><use href="#i-upload"/></svg>Importer','',(primary?'btn-p':'btn-g')+' btn-sm');

  const lbl=(area==='photos'?'Importer des photos':'Importer');
  return '<label class="btn '+(primary?'btn-p':'btn-g')+' btn-sm" style="cursor:pointer">'
    +'<svg class="ico ico-xs" style="margin-right:3px"><use href="#i-upload"/></svg>'+lbl

// Import réel de fichiers dans une aire : stocke les octets via setBlob, ne persiste que les métadonnées.
function importAreaItem(evt,area,folderId){
  if(!can('items')){evt.target.value='';return denyMsg();}
  const cfg=AREA_CFG[area];if(!cfg||!PROJ){evt.target.value='';return;}
  areaEnsure(PROJ,area);cfg.ensureItems(PROJ);
  const fid=folderId||curFolderId()||(areaFolders(PROJ)[area][0]&&areaFolders(PROJ)[area][0].id);
  const files=Array.from(evt.target.files||[]);
  if(!files.length){evt.target.value='';return;}
  const isPhotos=(area==='photos');
  const bad=files.some(function(f){
    if(isPhotos)return !(/^image\//.test(f.type)||/\.(jpe?g|png|webp|gif|heic|heif)$/i.test(f.name));
    return !(f.type==='application/pdf'||/\.pdf$/i.test(f.name));
  });
  if(bad){evt.target.value='';toast(isPhotos?'Veuillez sélectionner des images.':'Veuillez sélectionner des fichiers PDF.');return;}
  let pending=files.length;let added=0;
  files.forEach(function(file){
    prepareFileForStore(file).then(function(res){
      if(res.dataURL){
        const id=cfg.newItemFromFile(PROJ,fid,file);
        setBlob(id,res.dataURL);
        const it=findAreaItem(area,id);if(it)it.size=fmtFileSize(res.bytes);
        added++;
      } else { toast('Erreur de lecture du fichier'); }
      pending--;finish();
    });
  });
  function finish(){
    if(pending>0)return;
    if(area==='pv')PROJ.folders=areaFolders(PROJ).pv;
    if(added>0)logAudit(isPhotos?(added>1?'Photos importées':'Photo importée'):(added>1?'Documents importés':'Document importé'),cfg.label+(added>1?' ('+added+' fichiers)':''),isPhotos?'camera':'upload');
    savePROJS();renderSB();renderMain();
    toast(added>1?(added+' fichiers importés'):'Fichier importé');
    refreshStorageInfo();
  }
  evt.target.value='';
}
function isAreaView(v){return!!AREA_CFG[v];}
function areaFolders(p){if(!p)return[];if(!p.areaFolders||typeof p.areaFolders!=='object')p.areaFolders={};return p.areaFolders;}

// Migration douce + modèle imbriqué.
// Dossiers : {id,name,parentId,archived,archivedAt,createdAt,sortOrder}. parentId=null -> racine.
function areaEnsure(p,area){
  if(!p)return null;const cfg=AREA_CFG[area];if(!cfg)return null;
  const af=areaFolders(p);
  if(area==='pv'&&Array.isArray(p.folders)&&p.folders.length&&!af.pv){af.pv=p.folders;} // reprise ancien champ PV
  // Fusion : récupère les anciens dossiers "factures" dans l'aire "contrats" (Contrats & Devis), une seule fois.
  if(area==='contrats'&&Array.isArray(af.factures)&&af.factures.length&&!p._facturesMerged){
    if(!Array.isArray(af.contrats))af.contrats=[];
    af.factures.forEach(function(f){
      if(f.id&&f.id.indexOf('fgen_')===0)return; // on ne reprend pas le "Général" des factures
      if(!af.contrats.some(function(x){return x.id===f.id;}))af.contrats.push(f);
    });
    p._facturesMerged=true;
  }
  if(!Array.isArray(af[area])||!af[area].length){
    af[area]=[];
    (AREA_DEFAULT_FOLDERS[area]||[]).forEach(function(nm,i){
      af[area].push({id:'fld_'+area+'_'+i,name:nm,parentId:null,createdAt:new Date().toISOString(),sortOrder:i,archived:false});
    });
    // "Général (non classés)" placé en dernier comme fourre-tout
    af[area].push({id:'fgen_'+area,name:'Général (non classés)',parentId:null,createdAt:new Date().toISOString(),sortOrder:af[area].length});
  }
  // Amélioration d'affichage non destructive : harmonise l'ancien libellé "Général".
  af[area].forEach(function(f){if(f.name==='Général'){f.name='Général (non classés)';}});
  // Normalise les anciens dossiers plats -> ajoute parentId/sortOrder manquants.
  af[area].forEach(function(f,i){if(typeof f.parentId==='undefined')f.parentId=null;if(typeof f.sortOrder!=='number')f.sortOrder=i;});
  cfg.ensureItems(p);
  const genF=af[area].find(function(f){return f.id==='fgen_'+area;})||af[area][0];const def=genF.id;
  const validIds={};af[area].forEach(function(f){validIds[f.id]=true;});
  // Rattache au "Général" tout item sans dossier OU pointant vers un dossier absent de cette aire
  // (cas des factures fusionnées dans "Contrats & Devis" : leur ancien folderId n'existe pas ici).
  cfg.items(p).forEach(function(it){if(!it.folderId||!validIds[it.folderId])it.folderId=def;if(typeof it.archived!=='boolean')it.archived=false;});
  if(area==='pv')p.folders=af.pv;
  return p;
}
function areaFolderById(p,area,id){const af=areaFolders(p)[area]||[];return af.find(function(f){return f.id===id;});}
function areaChildFolders(p,area,parentId){return (areaFolders(p)[area]||[]).filter(function(f){return (f.parentId||null)===(parentId||null);}).sort(function(a,b){return (a.sortOrder||0)-(b.sortOrder||0);});}
function areaDescendantIds(p,area,id){ // tous les sous-dossiers (récursif), id inclus
  const out=[id];const all=areaFolders(p)[area]||[];
  (function walk(pid){all.forEach(function(f){if((f.parentId||null)===pid){out.push(f.id);walk(f.id);}});})(id);
  return out;
}

/* ══ SUPPRESSION DÉFINITIVE DEPUIS LES VUES ACTIVES (fichiers + dossiers) ══
   Distincte de l'archivage (réversible) et des suppressions limitées aux archives
   ci-dessus. Toute suppression passe par confirmModal (action explicite requise).
   Les octets sont libérés (BLOBS + BlobDB.del) pour ne laisser aucun blob orphelin. */

// Journalise une suppression dans le journal d'audit du projet courant.
function auditDelete(label,sub){logAudit(label,sub,'trash');}
// Ajoute une entrée au journal d'audit du projet courant (PROJ).
// action = libellé de l'action ; subject = sujet (document, dossier…) ; ic = icône.
function logAudit(action,subject,ic){
  try{
    if(!PROJ)return;
    if(!Array.isArray(PROJ.audit))PROJ.audit=[];
    PROJ.audit.push({ic:ic||'edit',label:action,sub:subject||'',time:Date.now(),user:userDisplayName()});
    savePROJS();
    if(VIEW==='audit')renderAudit();
  }catch(e){console.warn('[logAudit] échec',e);}
}
// Temps relatif en français à partir d'un timestamp (ms).
function auditRelTime(ts){
  if(typeof ts!=='number')return ts||'';
  var diff=Date.now()-ts;var d=new Date(ts);
  if(diff<60000)return "À l'instant";
  if(diff<3600000)return 'Il y a '+Math.floor(diff/60000)+' min';
  var today=new Date();today.setHours(0,0,0,0);
  var that=new Date(ts);that.setHours(0,0,0,0);
  var dDays=Math.round((today-that)/86400000);
  var hhmm=('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);
  if(dDays===0)return 'Aujourd\'hui '+hhmm;
  if(dDays===1)return 'Hier '+hhmm;
  return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear();
}
function userDisplayName(){try{var n=((USER&&USER.prenom)||'')+' '+((USER&&USER.nom)||'');n=n.trim();return n||'Utilisateur';}catch(e){return 'Utilisateur';}}

function freeDocBytes(id){try{if(id){delete BLOBS[id];BlobDB.del(id);}}catch(e){}}
// Ferme la visionneuse si elle pointe sur l'un des documents supprimés.
function closeViewerIfDocs(ids){
  try{
    if(_lastViewedDoc&&ids.indexOf(_lastViewedDoc.id)>=0){closeViewer();}
  }catch(e){}
}

}

/* ══ MENU D'ACTIONS DE LIGNE (« … » + clic droit), DÉPLACEMENT, GLISSER-DÉPOSER ══
   Système central réutilisé par les deux vues (Liste / Colonnes) et les deux familles
   (Plans / aires). Une seule définition de menu, deux déclencheurs (bouton + clic droit).
   Réutilise les handlers existants (view/archive/restore/delete/rename) et le modèle de
   permissions (can()/denyMsg()). Le déplacement ne change que le parent : aucun octet
   n'est dupliqué ni réimporté (l'id et l'entrée BLOBS/BlobDB restent inchangés). */

// Référence générique d'un élément de ligne.
// kind:'plan'|'area' ; type:'file'|'folder' ; area (pour 'area') ; id ; projId (pour 'plan') ; archived
function makeRef(o){return o;}

// Télécharge un document (octets en mémoire/IndexedDB) sans dépendre de la visionneuse.
function downloadDoc(it){
  if(!it){return;}
  try{logAudit('Document téléchargé',(it.fileName||it.title||it.titre||'Document')+' · sur cet appareil','download');}catch(e){}
  var go=function(url){
    if(!url){toast('Fichier non disponible pour le téléchargement',{type:'warn'});return;}
    var a=document.createElement('a');a.href=url;a.download=(it.fileName||it.title||it.titre||'document');
    document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a);},80);
  };
  var url=getBlob(it);
  if(!url&&it.id&&BlobDB.has&&BlobDB.has(it.id)){BlobDB.get(it.id).then(function(b){if(b)BLOBS[it.id]=b;go(getBlob(it));});return;}
  go(url);
}
function downloadPlanDoc(id){var d=(getDocsForProj(PROJ).plans||[]).find(function(x){return x.id===id;});if(d)downloadDoc(d);}
function downloadAreaItem(area,id){var cfg=AREA_CFG[area];if(!cfg)return;var v=cfg.items(PROJ).find(function(x){return x.id===id;});if(v)downloadDoc(v);}

/* ── Résolution d'objets et de noms à partir d'une référence ── */
function refItemObject(ref){
  if(ref.type!=='file')return null;
  if(ref.kind==='plan')return (getDocsForProj(PROJ).plans||[]).find(function(x){return x.id===ref.id;})||null;
  var cfg=AREA_CFG[ref.area];if(!cfg)return null;
  return cfg.items(PROJ).find(function(x){return x.id===ref.id;})||null;
}
function refFolderObject(ref){
  if(ref.type!=='folder')return null;
  if(ref.kind==='plan')return findPlanNode(getPlanFolders(ref.projId),ref.id);
  return areaFolderById(PROJ,ref.area,ref.id);
}
function refName(ref){
  if(ref.type==='file'){var it=refItemObject(ref);return it?(AREA_CFG[ref.area]?AREA_CFG[ref.area].title(it):(it.title||it.titre)):'';}
  var f=refFolderObject(ref);return f?f.name:'';
}

/* ── Parent d'un nœud Plans (renvoie {parentArray, parentId|null}) ── */
function findPlanParentArray(roots,id){
  // racine ?
  for(var i=0;i<roots.length;i++){if(roots[i].id===id)return {arr:roots,parentId:null};}
  var res=null;
  (function walk(node){
    (node.children||[]).forEach(function(c){
      if(c.id===id){res={arr:node.children,parentId:node.id};}
      else walk(c);
    });
  });
  // parcours depuis chaque racine
  for(var j=0;j<roots.length&&!res;j++)walk(roots[j]);
  return res;
}

/* ── Liste des dossiers de destination (arbre à plat, avec profondeur) pour le sélecteur ── */
function moveDestFolders(ref){
  var out=[];
  if(ref.kind==='plan'){
    var roots=getPlanFolders(ref.projId);
    (function walk(nodes,depth){
      nodes.forEach(function(n){
        if(n.archived)return;
        out.push({id:n.id,name:n.name,depth:depth});
        if(n.children&&n.children.length)walk(n.children,depth+1);
      });
    })(roots,0);
  }else{
    var af=areaFolders(PROJ)[ref.area]||[];
    (function walk(parentId,depth){
      areaChildFolders(PROJ,ref.area,parentId).forEach(function(f){
        if(f.archived)return;
        out.push({id:f.id,name:f.name,depth:depth});
        walk(f.id,depth+1);
      });
    })(null,0);
  }
  return out;
}

/* ── Ensemble des ids interdits comme destination (le dossier lui-même + ses descendants) ── */
function forbiddenMoveTargets(ref){
  if(ref.type!=='folder')return {};
  var set={};
  if(ref.kind==='plan'){planFolderDescIds(getPlanFolders(ref.projId),ref.id).forEach(function(id){set[id]=true;});}
  else{areaDescendantIds(PROJ,ref.area,ref.id).forEach(function(id){set[id]=true;});}
  return set;
}

/* ── Déplacement effectif (re-parentage uniquement) ── */
// destFolderId : id de dossier, ou null pour la racine de l'aire/Plans.
function performMove(ref,destFolderId){
  destFolderId=destFolderId||null;
  if(ref.type==='folder'){
    var forb=forbiddenMoveTargets(ref);
    if(destFolderId&&forb[destFolderId]){toast('Impossible de déplacer un dossier dans lui-même',{type:'warn'});return false;}
  }
  if(ref.kind==='plan'){
    if(ref.type==='file'){
      var d=(getDocsForProj(PROJ).plans||[]).find(function(x){return x.id===ref.id;});if(!d)return false;
      if((d.folder||null)===destFolderId){return false;}
      d.folder=destFolderId||undefined; // racine = non classé (champ vide)
      savePROJS();
    }else{
      var roots=getPlanFolders(ref.projId);
      var node=findPlanNode(roots,ref.id);if(!node)return false;
      var loc=findPlanParentArray(roots,ref.id);if(!loc)return false;
      if((loc.parentId||null)===destFolderId){return false;}
      // retire de l'emplacement actuel
      loc.arr.splice(loc.arr.indexOf(node),1);
      if(destFolderId){var dest=findPlanNode(roots,destFolderId);if(!dest){loc.arr.push(node);return false;}if(!dest.children)dest.children=[];dest.children.push(node);}
      else{roots.push(node);}
      savePlanFolders(ref.projId);
    }
  }else{
    var cfg=AREA_CFG[ref.area];if(!cfg)return false;
    if(ref.type==='file'){
      var v=cfg.items(PROJ).find(function(x){return x.id===ref.id;});if(!v)return false;
      if((v.folderId||null)===destFolderId){return false;}
      // racine : rattache au dossier "Général" s'il existe (les items doivent porter un folderId valide)
      var target=destFolderId;
      if(!target){var gen=(areaFolders(PROJ)[ref.area]||[]).find(function(f){return f.id==='fgen_'+ref.area;});target=gen?gen.id:((areaFolders(PROJ)[ref.area]||[])[0]||{}).id;}
      v.folderId=target;
      savePROJS();
    }else{
      var f=areaFolderById(PROJ,ref.area,ref.id);if(!f)return false;
      if((f.parentId||null)===destFolderId){return false;}
      f.parentId=destFolderId||null;
      if(ref.area==='pv')PROJ.folders=areaFolders(PROJ).pv;
      savePROJS();
    }
  }
  // Nom du dossier de destination pour le toast.
  var destName;
  if(!destFolderId){destName=ref.kind==='plan'?'Plans':(AREA_CFG[ref.area]?AREA_CFG[ref.area].label:'Racine');}
  else{var fo=ref.kind==='plan'?findPlanNode(getPlanFolders(ref.projId),destFolderId):areaFolderById(PROJ,ref.area,destFolderId);destName=fo?fo.name:'dossier';}
  rerenderRef(ref);
  toast('Déplacé dans « '+destName+' »');
  return true;
}

// Re-rendu selon la famille de la référence.
function rerenderRef(ref){
  if(ref.kind==='plan')renderPlansContent('pt-docs');
  else renderMain();
}

/* ── Sélecteur « Déplacer… » (modale arborescente) ── */
var _moveRef=null,_moveSel=null;
function openMovePicker(ref){
  var permOk=ref.type==='folder'?can('folders'):can('items');
  if(!permOk)return denyMsg();
  _moveRef=ref;_moveSel=null;
  var rootLabel=ref.kind==='plan'?'Plans (racine)':((AREA_CFG[ref.area]?AREA_CFG[ref.area].label:'Racine')+' (racine)');

    +'<p style="font-size:12px;color:var(--text3);margin-bottom:2px">Choisissez le dossier de destination.</p>'
    +'<div class="move-tree" id="move-tree"></div>'

  showModal(html);

}
function renderMoveTree(rootLabel){
  var ref=_moveRef;if(!ref)return;
  var forb=forbiddenMoveTargets(ref);
  var folders=moveDestFolders(ref);
  // emplacement actuel (pour le désactiver = pas de déplacement « sur place »)
  var curParent;
  if(ref.type==='file'){var it=refItemObject(ref);curParent=ref.kind==='plan'?(it&&it.folder||null):(it&&it.folderId||null);}
  else{if(ref.kind==='plan'){var loc=findPlanParentArray(getPlanFolders(ref.projId),ref.id);curParent=loc?loc.parentId:null;}else{var f=refFolderObject(ref);curParent=f?(f.parentId||null):null;}}
  var rows='';
  // racine
  var rootDisabled=(curParent===null);
  rows+='<div class="mt-row'+(rootDisabled?' disabled':'')+'" data-id="" onclick="'+(rootDisabled?'':'selectMoveDest(this,\'\')')+'">'
    +'<svg class="ico"><use href="#i-folder"/></svg>'+e(rootLabel)+(rootDisabled?' · emplacement actuel':'')+'</div>';
  folders.forEach(function(n){
    var disabled=!!forb[n.id]||(curParent===n.id);
    var reason=forb[n.id]?' · non autorisé':((curParent===n.id)?' · emplacement actuel':'');
    rows+='<div class="mt-row'+(disabled?' disabled':'')+'" data-id="'+n.id+'" style="padding-left:'+(8+n.depth*16)+'px" onclick="'+(disabled?'':'selectMoveDest(this,\''+n.id+'\')')+'">'
      +'<svg class="ico"><use href="#i-folder"/></svg>'+e(n.name)+reason+'</div>';
  });
  document.getElementById('move-tree').innerHTML=rows;

function selectMoveDest(el,id){

/* ── Menu contextuel de ligne ── */
var _rowMenuOpen=false;
function closeRowMenu(){
  var m=document.getElementById('row-menu');if(m)m.remove();
  var ov=document.getElementById('row-menu-overlay');if(ov)ov.remove();
  document.removeEventListener('keydown',_rowMenuKey,true);
  window.removeEventListener('scroll',closeRowMenu,true);
  _rowMenuOpen=false;
}
function _rowMenuKey(ev){
  var m=document.getElementById('row-menu');if(!m)return;
  if(ev.key==='Escape'){ev.preventDefault();closeRowMenu();return;}
  var items=Array.prototype.slice.call(m.querySelectorAll('button'));
  if(!items.length)return;
  var idx=items.indexOf(document.activeElement);
  if(ev.key==='ArrowDown'){ev.preventDefault();items[(idx+1+items.length)%items.length].focus();}
  else if(ev.key==='ArrowUp'){ev.preventDefault();items[(idx-1+items.length)%items.length].focus();}
}
// Construit la liste d'items du menu pour une référence donnée.
function rowMenuItems(ref){
  var items=[];
  var idArg=ref.kind==='plan'?("'"+ref.id+"'"):("'"+ref.area+"','"+ref.id+"'");
  var projArg=ref.kind==='plan'?("'"+ref.projId+"'"):null;

  if(ref.type==='file'){
    var openCall=ref.kind==='plan'?('viewPlanDoc('+idArg+')'):('viewFile('+idArg+')');
    var dlCall=ref.kind==='plan'?('downloadPlanDoc('+idArg+')'):('downloadAreaItem('+idArg+')');

      var archCall=ref.kind==='plan'?('archivePlanDoc('+idArg+')'):('archiveAreaItem('+idArg+')');
      add('Archiver','archive',archCall,{perm:'archive'});
      add('__divider__');
      var delCall=ref.kind==='plan'?('deletePlanDoc('+idArg+')'):('deleteAreaItemActive('+idArg+')');
      add('Supprimer','trash',delCall,{danger:true,perm:'items'});
    }
  }else{ // folder
    if(ref.archived){
      var rfCall=ref.kind==='plan'?('restorePlanFolder('+projArg+','+idArg+')'):('restoreAreaFolder('+idArg+')');
      var dfCall=ref.kind==='plan'?('deletePlanFolder('+projArg+','+idArg+')'):('deleteAreaFolder('+idArg+')');
      add('Restaurer','refresh',rfCall,{perm:'folders'});
      add('__divider__');

    }else{
      var newSub=ref.kind==='plan'?('addPlanSubfolder('+idArg+','+projArg+')'):('newAreaFolder(\''+ref.area+'\',\''+ref.id+'\')');
      var renCall=ref.kind==='plan'?('renamePlanFolder('+idArg+',\''+jsq(refName(ref))+'\','+projArg+')'):('renameAreaFolder('+idArg+')');
      var arCall=ref.kind==='plan'?('archivePlanFolder('+projArg+','+idArg+')'):('archiveAreaFolder('+idArg+')');
      var dCall=ref.kind==='plan'?('deletePlanFolder('+projArg+','+idArg+')'):('deleteAreaFolderActive('+idArg+')');

      if(ref.kind==='plan')add('Notifications e-mail…','bell','openFolderNotifyFromMenu()',{perm:'folders'});
      add('Déplacer…','move','openRowMenuMove()',{perm:'folders'});
      add('Archiver','archive',arCall,{perm:'archive'});
      add('__divider__');
      add('Supprimer','trash',dCall,{danger:true,perm:'folders'});
    }
  }
  return items;
}
// échappe une chaîne pour l'insérer dans un littéral JS entre apostrophes
function jsq(s){return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

/* ── Dossier ↔ intervenant/métier (filtrage des plans par corps de métier) ── */

// Ouvre le menu pour ref, ancré près de (x,y). Un seul menu à la fois.
function openRowMenu(ref,x,y){
  closeRowMenu();
  _rowMenuRef=ref;
  var ov=document.createElement('div');ov.className='row-menu-overlay';ov.id='row-menu-overlay';
  ov.addEventListener('mousedown',function(ev){if(ev.button===2)return;closeRowMenu();});
  ov.addEventListener('contextmenu',function(ev){ev.preventDefault();closeRowMenu();});
  document.body.appendChild(ov);
  var menu=document.createElement('div');menu.className='row-menu';menu.id='row-menu';menu.setAttribute('role','menu');
  var defs=rowMenuItems(ref);
  var html='';
  defs.forEach(function(d){
    if(d.label==='__divider__'){html+='<div class="rm-div"></div>';return;}
    var allowed=!d.perm||can(d.perm);
    if(!allowed)return; // un rôle en lecture seule ne voit ni édition ni suppression
    var oc=d.onclick;
    html+='<button role="menuitem" class="'+(d.danger?'danger':'')+'" onclick="closeRowMenu();'+oc+'">'
      +'<svg class="ico" aria-hidden="true"><use href="#i-'+d.ico+'"/></svg>'+e(d.label)+'</button>';
  });
  menu.innerHTML=html;
  document.body.appendChild(menu);
  // Positionnement : près du curseur/déclencheur, replié si trop bas/à droite.
  var mw=menu.offsetWidth,mh=menu.offsetHeight,vw=window.innerWidth,vh=window.innerHeight,margin=8;
  var left=x,top=y;
  if(left+mw>vw-margin)left=Math.max(margin,vw-margin-mw);
  if(top+mh>vh-margin)top=Math.max(margin,y-mh); // replie vers le haut près du bas
  if(top<margin)top=margin;
  menu.style.left=left+'px';menu.style.top=top+'px';
  _rowMenuOpen=true;
  document.addEventListener('keydown',_rowMenuKey,true);
  window.addEventListener('scroll',closeRowMenu,true);
  // focus premier item pour la navigation clavier
  var first=menu.querySelector('button');if(first)setTimeout(function(){first.focus();},20);
}
