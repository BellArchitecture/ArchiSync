/* ── suppression définitive (uniquement depuis les archives) ── */
// Retire physiquement un item de son tableau source (pv / docs_data.*), en gérant l'aire fusionnée Devis/Facture.
function removeItemPhysically(area,id){
  // Best-effort : libère aussi les octets persistés (IndexedDB) et la copie mémoire.
  try{if(id){delete BLOBS[id];BlobDB.del(id);}}catch(e){}
  if(area==='pv'){if(Array.isArray(PROJ.pv))PROJ.pv=PROJ.pv.filter(function(x){return x.id!==id;});return;}
  const d=getDocsForProj(PROJ);
  if(area==='contrats'){
    if(Array.isArray(d.contrats))d.contrats=d.contrats.filter(function(x){return x.id!==id;});
    if(Array.isArray(d.factures))d.factures=d.factures.filter(function(x){return x.id!==id;});
    return;
  }
  if(Array.isArray(d[area]))d[area]=d[area].filter(function(x){return x.id!==id;});
}
function deleteAreaItem(area,id){
  if(!can('archive'))return denyMsg();
  const cfg=AREA_CFG[area];const v=cfg.items(PROJ).find(function(x){return x.id===id;});if(!v)return;
  if(!v.archived){toast('Seuls les éléments archivés peuvent être supprimés',{type:'warn'});return;}
  showModal('<h3>Supprimer définitivement</h3>'
    +'<p style="font-size:12.5px;color:var(--text2);margin-bottom:4px">Supprimer définitivement cet élément ? Cette action est irréversible.</p>'
    +'<div class="mo-foot"><button class="btn" onclick="closeModal()">Annuler</button><button class="btn" style="background:var(--red);color:#fff;border-color:var(--red)" onclick="confirmDeleteAreaItem(\''+area+'\',\''+id+'\')">Supprimer définitivement</button></div>');
}
function confirmDeleteAreaItem(area,id){
  if(!can('archive'))return denyMsg();
  const cfg=AREA_CFG[area];const v=cfg.items(PROJ).find(function(x){return x.id===id;});if(!v||!v.archived){closeModal();return;}
  removeItemPhysically(area,id);
  savePROJS();closeModal();renderMain();toast('Élément supprimé définitivement');
}
function deleteAreaFolder(area,id){
  if(!can('folders'))return denyMsg();
  const f=areaFolderById(PROJ,area,id);if(!f)return;
  if(!f.archived){toast('Seuls les dossiers archivés peuvent être supprimés',{type:'warn'});return;}
  // Option sûre : bloquer si le dossier contient encore des sous-dossiers ou items (archivés ou non).
  const cfg=AREA_CFG[area];
  const hasChild=(areaFolders(PROJ)[area]||[]).some(function(x){return (x.parentId||null)===f.id;});
  const hasItems=cfg.items(PROJ).some(function(v){return v.folderId===f.id;});
  if(hasChild||hasItems){toast('Ce dossier contient encore des éléments archivés.',{type:'warn'});return;}
  showModal('<h3>Supprimer définitivement</h3>'
    +'<p style="font-size:12.5px;color:var(--text2);margin-bottom:4px">Supprimer définitivement ce dossier ? Cette action est irréversible.</p>'
    +'<div class="mo-foot"><button class="btn" onclick="closeModal()">Annuler</button><button class="btn" style="background:var(--red);color:#fff;border-color:var(--red)" onclick="confirmDeleteAreaFolder(\''+area+'\',\''+id+'\')">Supprimer définitivement</button></div>');
}
function confirmDeleteAreaFolder(area,id){
  if(!can('folders'))return denyMsg();
  const f=areaFolderById(PROJ,area,id);if(!f||!f.archived){closeModal();return;}
  const cfg=AREA_CFG[area];
  // Re-vérifie l'absence de contenu au moment de la confirmation (sécurité).
  const hasChild=(areaFolders(PROJ)[area]||[]).some(function(x){return (x.parentId||null)===f.id;});
  const hasItems=cfg.items(PROJ).some(function(v){return v.folderId===f.id;});
  if(hasChild||hasItems){closeModal();toast('Ce dossier contient encore des éléments archivés.',{type:'warn'});return;}
  areaFolders(PROJ)[area]=(areaFolders(PROJ)[area]||[]).filter(function(x){return x.id!==id;});
  if(area==='pv')PROJ.folders=areaFolders(PROJ).pv;
  savePROJS();closeModal();renderMain();toast('Dossier supprimé définitivement');
}

/* ══ SUPPRESSION DÉFINITIVE DEPUIS LES VUES ACTIVES (fichiers + dossiers) ══
   Distincte de l'archivage (réversible) et des suppressions limitées aux archives
   ci-dessus. Toute suppression passe par confirmModal (action explicite requise).
   Les octets sont libérés (BLOBS + BlobDB.del) pour ne laisser aucun blob orphelin. */

// Journalise une suppression dans le journal d'audit (en mémoire, même forme que l'existant).
function auditDelete(label,sub){
  try{AUD.unshift({ic:'trash',label:label,sub:(sub||'')+' · '+(userDisplayName()),time:"À l'instant"});}catch(e){}
}
function userDisplayName(){try{var n=((USER&&USER.prenom)||'')+' '+((USER&&USER.nom)||'');n=n.trim();return n||'Utilisateur';}catch(e){return 'Utilisateur';}}
// Libère les octets persistés d'un document (best-effort).
function freeDocBytes(id){try{if(id){delete BLOBS[id];BlobDB.del(id);}}catch(e){}}
// Ferme la visionneuse si elle pointe sur l'un des documents supprimés.
function closeViewerIfDocs(ids){
  try{
    if(_lastViewedDoc&&ids.indexOf(_lastViewedDoc.id)>=0){closeViewer();}
  }catch(e){}
}

/* ── Plans : fichier ── */
function deletePlanDoc(id){
  if(!can('items'))return denyMsg();
  const d=(getDocsForProj(PROJ).plans||[]).find(function(x){return x.id===id;});if(!d)return;
  const nm=d.title||d.fileName||'ce fichier';
  confirmModal({
    title:'Supprimer définitivement',
    body:'Supprimer « '+e(nm)+' » ? Cette action est définitive et ne peut pas être annulée.',
    confirmLabel:'Supprimer',
    danger:true,
    onConfirm:function(){confirmDeletePlanDoc(id);}
  });
}
function confirmDeletePlanDoc(id){
  if(!can('items'))return denyMsg();
  const docs=getDocsForProj(PROJ).plans||[];
  const d=docs.find(function(x){return x.id===id;});if(!d)return;
  const nm=d.title||d.fileName||'Fichier';
  freeDocBytes(id);
  if(!PROJ.docs_data)PROJ.docs_data={plans:[],contrats:[],factures:[],photos:[],admin:[]};
  PROJ.docs_data.plans=docs.filter(function(x){return x.id!==id;});
  closeViewerIfDocs([id]);
  if(planColDoc===id)planColDoc=null;
  auditDelete('Fichier supprimé',nm);
  savePROJS();renderPlansContent('pt-docs');toast('Fichier supprimé');
}
/* ── Plans : dossier (récursif) ── */
function planFolderContentCounts(projId,id){
  const roots=getPlanFolders(projId);
  const ids=planFolderDescIds(roots,id); // dossier + sous-dossiers (récursif), id inclus
  const subCount=ids.length-1; // exclut le dossier lui-même
  const docs=(getDocsForProj(PROJ).plans||[]).filter(function(d){return ids.indexOf(d.folder)>=0;});
  return {ids:ids,docIds:docs.map(function(d){return d.id;}),fileCount:docs.length,subCount:subCount};
}
function deletePlanFolder(projId,id){
  if(!can('folders'))return denyMsg();
  const roots=getPlanFolders(projId);const node=findPlanNode(roots,id);if(!node)return;
  const c=planFolderContentCounts(projId,id);
  let body;
  if(c.fileCount||c.subCount){
    body='Le dossier « '+e(node.name)+' » contient '+c.fileCount+' fichier(s) et '+c.subCount+' sous-dossier(s). Tout son contenu sera supprimé définitivement.';
  }else{
    body='Supprimer le dossier « '+e(node.name)+' » ?';
  }
  confirmModal({
    title:'Supprimer définitivement',
    body:body,
    confirmLabel:'Supprimer',
    danger:true,
    onConfirm:function(){confirmDeletePlanFolder(projId,id);}
  });
}
function confirmDeletePlanFolder(projId,id){
  if(!can('folders'))return denyMsg();
  const roots=getPlanFolders(projId);const node=findPlanNode(roots,id);if(!node)return;
  const c=planFolderContentCounts(projId,id);
  const nm=node.name||'Dossier';
  // Libère les octets de tous les fichiers contenus (récursif) puis retire-les.
  c.docIds.forEach(freeDocBytes);
  if(!PROJ.docs_data)PROJ.docs_data={plans:[],contrats:[],factures:[],photos:[],admin:[]};
  PROJ.docs_data.plans=(getDocsForProj(PROJ).plans||[]).filter(function(d){return c.ids.indexOf(d.folder)<0;});
  // Retire le nœud du dossier de l'arbre (au sommet ou parmi les enfants d'un parent).
  removePlanNode(roots,id);
  // Nettoie l'état de navigation pointant dans le dossier supprimé.
  if(planListPath.some(function(p){return c.ids.indexOf(p)>=0;}))planListPath=planListPath.filter(function(p){return c.ids.indexOf(p)<0;});
  if(planColPath.some(function(p){return c.ids.indexOf(p)>=0;}))planColPath=planColPath.filter(function(p){return c.ids.indexOf(p)<0;});
  if(activePlanFolder&&c.ids.indexOf(activePlanFolder.id)>=0)activePlanFolder=null;
  closeViewerIfDocs(c.docIds);
  auditDelete('Dossier supprimé',nm);
  savePlanFolders(projId);renderPlansContent('pt-docs');toast('Dossier supprimé');
}
// Retire un nœud (par id) de l'arbre des dossiers Plans, où qu'il soit.
function removePlanNode(nodes,id){
  for(var i=0;i<nodes.length;i++){
    if(nodes[i].id===id){nodes.splice(i,1);return true;}
    if(nodes[i].children&&removePlanNode(nodes[i].children,id))return true;
  }
  return false;
}

  const c=areaFolderContentCounts(area,id);
  const nm=f.name||'Dossier';
  // Libère les octets de tous les fichiers contenus puis retire-les des sources.
  c.itemIds.forEach(function(iid){removeItemPhysically(area,iid);});
  // Retire le dossier et tous ses sous-dossiers de l'arbre de l'aire.
  areaFolders(PROJ)[area]=(areaFolders(PROJ)[area]||[]).filter(function(x){return c.ids.indexOf(x.id)<0;});
  if(area==='pv')PROJ.folders=areaFolders(PROJ).pv;
  // Nettoie la navigation pointant dans le dossier supprimé.
  if(areaPath.some(function(p){return c.ids.indexOf(p)>=0;}))areaPath=areaPath.filter(function(p){return c.ids.indexOf(p)<0;});
  closeViewerIfDocs(c.itemIds);
  auditDelete('Dossier supprimé',nm);
  savePROJS();renderMain();toast('Dossier supprimé');
}

/* ══ MENU D'ACTIONS DE LIGNE (« … » + clic droit), DÉPLACEMENT, GLISSER-DÉPOSER ══
   Système central réutilisé par les deux vues (Liste / Colonnes) et les deux familles
   (Plans / aires). Une seule définition de menu, deux déclencheurs (bouton + clic droit).
   Réutilise les handlers existants (view/archive/restore/delete/rename) et le modèle de
   permissions (can()/denyMsg()). Le déplacement ne change que le parent : aucun octet
   n'est dupliqué ni réimporté (l'id et l'entrée BLOBS/BlobDB restent inchangés). */

// Référence générique d'un élément de ligne.
// kind:'plan'|'area' ; type:'file'|'folder' ; area (pour 'area') ; id ; projId (pour 'plan') ; archived
function makeRef(o){return o;}

// Télécharge un document (octets en mémoire/IndexedDB) sans dépendre de la visionneuse.
function downloadDoc(it){
  if(!it){return;}
  var go=function(url){
    if(!url){toast('Fichier non disponible pour le téléchargement',{type:'warn'});return;}
    var a=document.createElement('a');a.href=url;a.download=(it.fileName||it.title||it.titre||'document');
    document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a);},80);
  };
  var url=getBlob(it);
  if(!url&&it.id&&BlobDB.has&&BlobDB.has(it.id)){BlobDB.get(it.id).then(function(b){if(b)BLOBS[it.id]=b;go(getBlob(it));});return;}
  go(url);
}
function downloadPlanDoc(id){var d=(getDocsForProj(PROJ).plans||[]).find(function(x){return x.id===id;});if(d)downloadDoc(d);}
function downloadAreaItem(area,id){var cfg=AREA_CFG[area];if(!cfg)return;var v=cfg.items(PROJ).find(function(x){return x.id===id;});if(v)downloadDoc(v);}

/* ── Résolution d'objets et de noms à partir d'une référence ── */
function refItemObject(ref){
  if(ref.type!=='file')return null;
  if(ref.kind==='plan')return (getDocsForProj(PROJ).plans||[]).find(function(x){return x.id===ref.id;})||null;
  var cfg=AREA_CFG[ref.area];if(!cfg)return null;
  return cfg.items(PROJ).find(function(x){return x.id===ref.id;})||null;
}
function refFolderObject(ref){
  if(ref.type!=='folder')return null;
  if(ref.kind==='plan')return findPlanNode(getPlanFolders(ref.projId),ref.id);
  return areaFolderById(PROJ,ref.area,ref.id);
}
function refName(ref){
  if(ref.type==='file'){var it=refItemObject(ref);return it?(AREA_CFG[ref.area]?AREA_CFG[ref.area].title(it):(it.title||it.titre)):'';}
  var f=refFolderObject(ref);return f?f.name:'';
}

/* ── Parent d'un nœud Plans (renvoie {parentArray, parentId|null}) ── */
function findPlanParentArray(roots,id){
  // racine ?
  for(var i=0;i<roots.length;i++){if(roots[i].id===id)return {arr:roots,parentId:null};}
  var res=null;
  (function walk(node){
    (node.children||[]).forEach(function(c){
      if(c.id===id){res={arr:node.children,parentId:node.id};}
      else walk(c);
    });
  });
  // parcours depuis chaque racine
  for(var j=0;j<roots.length&&!res;j++)walk(roots[j]);
  return res;
}

/* ── Liste des dossiers de destination (arbre à plat, avec profondeur) pour le sélecteur ── */
function moveDestFolders(ref){
  var out=[];
  if(ref.kind==='plan'){
    var roots=getPlanFolders(ref.projId);
    (function walk(nodes,depth){
      nodes.forEach(function(n){
        if(n.archived)return;
        out.push({id:n.id,name:n.name,depth:depth});
        if(n.children&&n.children.length)walk(n.children,depth+1);
      });
    })(roots,0);
  }else{
    var af=areaFolders(PROJ)[ref.area]||[];
    (function walk(parentId,depth){
      areaChildFolders(PROJ,ref.area,parentId).forEach(function(f){
        if(f.archived)return;
        out.push({id:f.id,name:f.name,depth:depth});
        walk(f.id,depth+1);
      });
    })(null,0);
  }
  return out;
}

/* ── Ensemble des ids interdits comme destination (le dossier lui-même + ses descendants) ── */
function forbiddenMoveTargets(ref){
  if(ref.type!=='folder')return {};
  var set={};
  if(ref.kind==='plan'){planFolderDescIds(getPlanFolders(ref.projId),ref.id).forEach(function(id){set[id]=true;});}
  else{areaDescendantIds(PROJ,ref.area,ref.id).forEach(function(id){set[id]=true;});}
  return set;
}

/* ── Déplacement effectif (re-parentage uniquement) ── */
// destFolderId : id de dossier, ou null pour la racine de l'aire/Plans.
function performMove(ref,destFolderId){
  destFolderId=destFolderId||null;
  if(ref.type==='folder'){
    var forb=forbiddenMoveTargets(ref);
    if(destFolderId&&forb[destFolderId]){toast('Impossible de déplacer un dossier dans lui-même',{type:'warn'});return false;}
  }
  if(ref.kind==='plan'){
    if(ref.type==='file'){
      var d=(getDocsForProj(PROJ).plans||[]).find(function(x){return x.id===ref.id;});if(!d)return false;
      if((d.folder||null)===destFolderId){return false;}
      d.folder=destFolderId||undefined; // racine = non classé (champ vide)
      savePROJS();
    }else{
      var roots=getPlanFolders(ref.projId);
      var node=findPlanNode(roots,ref.id);if(!node)return false;
      var loc=findPlanParentArray(roots,ref.id);if(!loc)return false;
      if((loc.parentId||null)===destFolderId){return false;}
      // retire de l'emplacement actuel
      loc.arr.splice(loc.arr.indexOf(node),1);
      if(destFolderId){var dest=findPlanNode(roots,destFolderId);if(!dest){loc.arr.push(node);return false;}if(!dest.children)dest.children=[];dest.children.push(node);}
      else{roots.push(node);}
      savePlanFolders(ref.projId);
    }
  }else{
    var cfg=AREA_CFG[ref.area];if(!cfg)return false;
    if(ref.type==='file'){
      var v=cfg.items(PROJ).find(function(x){return x.id===ref.id;});if(!v)return false;
      if((v.folderId||null)===destFolderId){return false;}
      // racine : rattache au dossier "Général" s'il existe (les items doivent porter un folderId valide)
      var target=destFolderId;
      if(!target){var gen=(areaFolders(PROJ)[ref.area]||[]).find(function(f){return f.id==='fgen_'+ref.area;});target=gen?gen.id:((areaFolders(PROJ)[ref.area]||[])[0]||{}).id;}
      v.folderId=target;
      savePROJS();
    }else{
      var f=areaFolderById(PROJ,ref.area,ref.id);if(!f)return false;
      if((f.parentId||null)===destFolderId){return false;}
      f.parentId=destFolderId||null;
      if(ref.area==='pv')PROJ.folders=areaFolders(PROJ).pv;
      savePROJS();
    }
  }
  // Nom du dossier de destination pour le toast.
  var destName;
  if(!destFolderId){destName=ref.kind==='plan'?'Plans':(AREA_CFG[ref.area]?AREA_CFG[ref.area].label:'Racine');}
  else{var fo=ref.kind==='plan'?findPlanNode(getPlanFolders(ref.projId),destFolderId):areaFolderById(PROJ,ref.area,destFolderId);destName=fo?fo.name:'dossier';}
  rerenderRef(ref);
  toast('Déplacé dans « '+destName+' »');
  return true;
}

// Re-rendu selon la famille de la référence.
function rerenderRef(ref){
  if(ref.kind==='plan')renderPlansContent('pt-docs');
  else renderMain();
}

/* ── Sélecteur « Déplacer… » (modale arborescente) ── */
var _moveRef=null,_moveSel=null;
function openMovePicker(ref){
  var permOk=ref.type==='folder'?can('folders'):can('items');
  if(!permOk)return denyMsg();
  _moveRef=ref;_moveSel=null;
  var rootLabel=ref.kind==='plan'?'Plans (racine)':((AREA_CFG[ref.area]?AREA_CFG[ref.area].label:'Racine')+' (racine)');
  var html='<h3 style="display:flex;align-items:center;gap:8px"><svg class="ico ico-sm" style="color:var(--blue)"><use href="#i-move"/></svg>Déplacer « '+e(refName(ref))+' »</h3>'
    +'<p style="font-size:12px;color:var(--text3);margin-bottom:2px">Choisissez le dossier de destination.</p>'
    +'<div class="move-tree" id="move-tree"></div>'
    +'<div class="mo-foot"><button class="btn" onclick="closeModal()">Annuler</button>'
    +'<button class="btn btn-p" id="move-confirm-btn" onclick="confirmMovePicker()" disabled style="opacity:.5;cursor:not-allowed">Déplacer</button></div>';
  showModal(html);
  renderMoveTree(rootLabel);
}
function renderMoveTree(rootLabel){
  var ref=_moveRef;if(!ref)return;
  var forb=forbiddenMoveTargets(ref);
  var folders=moveDestFolders(ref);
  // emplacement actuel (pour le désactiver = pas de déplacement « sur place »)
  var curParent;
  if(ref.type==='file'){var it=refItemObject(ref);curParent=ref.kind==='plan'?(it&&it.folder||null):(it&&it.folderId||null);}
  else{if(ref.kind==='plan'){var loc=findPlanParentArray(getPlanFolders(ref.projId),ref.id);curParent=loc?loc.parentId:null;}else{var f=refFolderObject(ref);curParent=f?(f.parentId||null):null;}}
  var rows='';
  // racine
  var rootDisabled=(curParent===null);
  rows+='<div class="mt-row'+(rootDisabled?' disabled':'')+'" data-id="" onclick="'+(rootDisabled?'':'selectMoveDest(this,\'\')')+'">'
    +'<svg class="ico"><use href="#i-folder"/></svg>'+e(rootLabel)+(rootDisabled?' · emplacement actuel':'')+'</div>';
  folders.forEach(function(n){
    var disabled=!!forb[n.id]||(curParent===n.id);
    var reason=forb[n.id]?' · non autorisé':((curParent===n.id)?' · emplacement actuel':'');
    rows+='<div class="mt-row'+(disabled?' disabled':'')+'" data-id="'+n.id+'" style="padding-left:'+(8+n.depth*16)+'px" onclick="'+(disabled?'':'selectMoveDest(this,\''+n.id+'\')')+'">'
      +'<svg class="ico"><use href="#i-folder"/></svg>'+e(n.name)+reason+'</div>';
  });
  document.getElementById('move-tree').innerHTML=rows;
}
function selectMoveDest(el,id){
  _moveSel=id; // '' = racine
  var tree=document.getElementById('move-tree');if(tree){Array.prototype.forEach.call(tree.querySelectorAll('.mt-row'),function(r){r.classList.remove('sel');});}
  el.classList.add('sel');
  var btn=document.getElementById('move-confirm-btn');if(btn){btn.disabled=false;btn.style.opacity='';btn.style.cursor='';}
}
function confirmMovePicker(){
  if(_moveSel===null){return;}
  var ref=_moveRef;closeModal();
  performMove(ref,_moveSel||null);
  _moveRef=null;_moveSel=null;
}

/* ── Menu contextuel de ligne ── */
var _rowMenuOpen=false;
function closeRowMenu(){
  var m=document.getElementById('row-menu');if(m)m.remove();
  var ov=document.getElementById('row-menu-overlay');if(ov)ov.remove();
  document.removeEventListener('keydown',_rowMenuKey,true);
  window.removeEventListener('scroll',closeRowMenu,true);
  _rowMenuOpen=false;
}
function _rowMenuKey(ev){
  var m=document.getElementById('row-menu');if(!m)return;
  if(ev.key==='Escape'){ev.preventDefault();closeRowMenu();return;}
  var items=Array.prototype.slice.call(m.querySelectorAll('button'));
  if(!items.length)return;
  var idx=items.indexOf(document.activeElement);
  if(ev.key==='ArrowDown'){ev.preventDefault();items[(idx+1+items.length)%items.length].focus();}
  else if(ev.key==='ArrowUp'){ev.preventDefault();items[(idx-1+items.length)%items.length].focus();}
}
// Construit la liste d'items du menu pour une référence donnée.
function rowMenuItems(ref){
  var items=[];
  var idArg=ref.kind==='plan'?("'"+ref.id+"'"):("'"+ref.area+"','"+ref.id+"'");
  var projArg=ref.kind==='plan'?("'"+ref.projId+"'"):null;
  function add(label,ico,onclick,opt){opt=opt||{};items.push({label:label,ico:ico,onclick:onclick,danger:!!opt.danger,perm:opt.perm});}
  if(ref.type==='file'){
    var openCall=ref.kind==='plan'?('viewPlanDoc('+idArg+')'):('viewFile('+idArg+')');
    var dlCall=ref.kind==='plan'?('downloadPlanDoc('+idArg+')'):('downloadAreaItem('+idArg+')');
    add('Voir','eye',openCall);            // toujours autorisé (lecture)
    add('Télécharger','download',dlCall);  // toujours autorisé (lecture)
    if(ref.archived){
      var restoreCall=ref.kind==='plan'?('restorePlanDoc('+idArg+')'):('restoreAreaItem('+idArg+')');
      var delPermaCall=ref.kind==='plan'?('deletePlanDoc('+idArg+')'):('deleteAreaItem('+idArg+')');
      add('Restaurer','refresh',restoreCall,{perm:'archive'});
      add('__divider__');
      add('Supprimer définitivement','trash',delPermaCall,{danger:true,perm:ref.kind==='plan'?'items':'archive'});
    }else{
      add('Déplacer…','move','openRowMenuMove()',{perm:'items'});
      var archCall=ref.kind==='plan'?('archivePlanDoc('+idArg+')'):('archiveAreaItem('+idArg+')');
      add('Archiver','archive',archCall,{perm:'archive'});
      add('__divider__');
      var delCall=ref.kind==='plan'?('deletePlanDoc('+idArg+')'):('deleteAreaItemActive('+idArg+')');
      add('Supprimer','trash',delCall,{danger:true,perm:'items'});
    }
  }else{ // folder
    if(ref.archived){
      var rfCall=ref.kind==='plan'?('restorePlanFolder('+projArg+','+idArg+')'):('restoreAreaFolder('+idArg+')');
      var dfCall=ref.kind==='plan'?('deletePlanFolder('+projArg+','+idArg+')'):('deleteAreaFolder('+idArg+')');
      add('Restaurer','refresh',rfCall,{perm:'folders'});
      add('__divider__');
      add('Supprimer définitivement','trash',dfCall,{danger:true,perm:'folders'});
    }else{
      var newSub=ref.kind==='plan'?('addPlanSubfolder('+idArg+','+projArg+')'):('newAreaFolder(\''+ref.area+'\',\''+ref.id+'\')');
      var renCall=ref.kind==='plan'?('renamePlanFolder('+idArg+',\''+jsq(refName(ref))+'\','+projArg+')'):('renameAreaFolder('+idArg+')');
      var arCall=ref.kind==='plan'?('archivePlanFolder('+projArg+','+idArg+')'):('archiveAreaFolder('+idArg+')');
      var dCall=ref.kind==='plan'?('deletePlanFolder('+projArg+','+idArg+')'):('deleteAreaFolderActive('+idArg+')');
      add('Nouveau sous-dossier','plus',newSub,{perm:'folders'});
      add('Renommer','edit',renCall,{perm:'folders'});
      add('Déplacer…','move','openRowMenuMove()',{perm:'folders'});
      add('Archiver','archive',arCall,{perm:'archive'});
      add('__divider__');
      add('Supprimer','trash',dCall,{danger:true,perm:'folders'});
    }
  }
  return items;
}
// échappe une chaîne pour l'insérer dans un littéral JS entre apostrophes
function jsq(s){return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

var _rowMenuRef=null;
function openRowMenuMove(){var ref=_rowMenuRef;closeRowMenu();if(ref)openMovePicker(ref);}

// Ouvre le menu pour ref, ancré près de (x,y). Un seul menu à la fois.
function openRowMenu(ref,x,y){
  closeRowMenu();
  _rowMenuRef=ref;
  var ov=document.createElement('div');ov.className='row-menu-overlay';ov.id='row-menu-overlay';
  ov.addEventListener('mousedown',function(ev){if(ev.button===2)return;closeRowMenu();});
  ov.addEventListener('contextmenu',function(ev){ev.preventDefault();closeRowMenu();});
  document.body.appendChild(ov);
  var menu=document.createElement('div');menu.className='row-menu';menu.id='row-menu';menu.setAttribute('role','menu');
  var defs=rowMenuItems(ref);
  var html='';
  defs.forEach(function(d){
    if(d.label==='__divider__'){html+='<div class="rm-div"></div>';return;}
    var allowed=!d.perm||can(d.perm);
    if(!allowed)return; // un rôle en lecture seule ne voit ni édition ni suppression
    var oc=d.onclick;
    html+='<button role="menuitem" class="'+(d.danger?'danger':'')+'" onclick="closeRowMenu();'+oc+'">'
      +'<svg class="ico" aria-hidden="true"><use href="#i-'+d.ico+'"/></svg>'+e(d.label)+'</button>';
  });
  menu.innerHTML=html;
  document.body.appendChild(menu);
  // Positionnement : près du curseur/déclencheur, replié si trop bas/à droite.
  var mw=menu.offsetWidth,mh=menu.offsetHeight,vw=window.innerWidth,vh=window.innerHeight,margin=8;
  var left=x,top=y;
  if(left+mw>vw-margin)left=Math.max(margin,vw-margin-mw);
  if(top+mh>vh-margin)top=Math.max(margin,y-mh); // replie vers le haut près du bas
  if(top<margin)top=margin;
  menu.style.left=left+'px';menu.style.top=top+'px';
  _rowMenuOpen=true;
  document.addEventListener('keydown',_rowMenuKey,true);
  window.addEventListener('scroll',closeRowMenu,true);
  // focus premier item pour la navigation clavier
  var first=menu.querySelector('button');if(first)setTimeout(function(){first.focus();},20);
}
// Déclencheur depuis le bouton « … » : ancre sous le bouton.
function rowMenuFromButton(ev,refJson){
  ev.stopPropagation();ev.preventDefault();
  var ref=JSON.parse(decodeURIComponent(refJson));
  var btn=ev.currentTarget;var r=btn.getBoundingClientRect();
  openRowMenu(ref,r.left,r.bottom+4);
}
// Déclencheur clic droit : ancre au curseur.
function rowMenuFromContext(ev,refJson){
  ev.preventDefault();ev.stopPropagation();
  var ref=JSON.parse(decodeURIComponent(refJson));
  openRowMenu(ref,ev.clientX,ev.clientY);
}

/* ── Bouton « … » + attributs de ligne (menu, clic droit, glisser-déposer) ── */
// Renvoie le HTML du bouton « … » pour une référence.
function dotsBtn(ref){
  var j=encodeURIComponent(JSON.stringify(ref));
  return '<button class="row-dots" aria-haspopup="menu" aria-expanded="false" aria-label="Actions" '
    +'onclick="rowMenuFromButton(event,\''+j+'\')"><svg class="ico" aria-hidden="true"><use href="#i-dots"/></svg></button>';
}
// Attributs à coller sur l'élément de ligne : clic droit + glisser-déposer.
// canDrag : autorisé seulement si droits d'édition (items pour fichier, folders pour dossier) et non archivé.
function rowAttrs(ref){
  var j=encodeURIComponent(JSON.stringify(ref));
  var permOk=ref.type==='folder'?can('folders'):can('items');
  var canDrag=permOk&&!ref.archived;
  var a=' oncontextmenu="rowMenuFromContext(event,\''+j+'\')"';
  if(canDrag){
    a+=' draggable="true"'
      +' ondragstart="rowDragStart(event,\''+j+'\')"'
      +' ondragend="rowDragEnd(event)"';
  }
  return a;
}

/* ── Glisser-déposer ── */
var _dragRef=null;
function rowDragStart(ev,refJson){
  _dragRef=JSON.parse(decodeURIComponent(refJson));
  try{ev.dataTransfer.effectAllowed='move';ev.dataTransfer.setData('text/plain',_dragRef.id);}catch(e){}
  if(ev.currentTarget&&ev.currentTarget.classList)ev.currentTarget.classList.add('dragging-row');
  closeRowMenu();
}
function rowDragEnd(ev){
  if(ev.currentTarget&&ev.currentTarget.classList)ev.currentTarget.classList.remove('dragging-row');
  Array.prototype.forEach.call(document.querySelectorAll('.drop-target'),function(el){el.classList.remove('drop-target');});
  _dragRef=null;
}
// Validité d'un dépôt de _dragRef sur la cible destRef.
function dropAllowed(destRef){
  if(!_dragRef)return false;
  // même famille/aire seulement
  if(_dragRef.kind!==destRef.kind)return false;
  if(_dragRef.kind==='area'&&_dragRef.area!==destRef.area)return false;
  var destFolderId=destRef.type==='root'?null:destRef.id;
  if(_dragRef.type==='folder'){
    var forb=forbiddenMoveTargets(_dragRef);
    if(destFolderId&&forb[destFolderId])return false; // dans lui-même / descendant
  }
  return true;
}
function rowDragOver(ev,el){
  if(!_dragRef)return;
  var destRef=JSON.parse(decodeURIComponent(el.getAttribute('data-dropref')||'%7B%7D'));
  if(!dropAllowed(destRef))return;
  ev.preventDefault();try{ev.dataTransfer.dropEffect='move';}catch(e){}
  el.classList.add('drop-target');
}
function rowDragLeave(ev,el){el.classList.remove('drop-target');}
function rowDrop(ev,el,refJson){
  ev.preventDefault();ev.stopPropagation();
  el.classList.remove('drop-target');
  if(!_dragRef){return;}
  var destRef=JSON.parse(decodeURIComponent(refJson));
  if(!dropAllowed(destRef)){
    if(_dragRef&&_dragRef.type==='folder'){toast('Impossible de déplacer un dossier dans lui-même',{type:'warn'});}
    return;
  }
  var src=_dragRef;_dragRef=null;
  performMove(src,destRef.type==='root'?null:destRef.id);
}
// Attributs de cible de dépôt, avec data-dropref pour dragover.
function dropAttrs(destRef){
  var j=encodeURIComponent(JSON.stringify(destRef));
  return ' data-dropref="'+j+'" ondragover="rowDragOver(event,this)" ondragleave="rowDragLeave(event,this)" ondrop="rowDrop(event,this,\''+j+'\')"';
}

/* ══ VISIONNEUSE DE DOCUMENTS (PDF, images, fallback) ══ */
// Détermine le type d'aperçu à partir du mimeType, du fileName ou du champ legacy "type".
function fileKind(it){
  const mt=(it.mimeType||'').toLowerCase();
  const fn=(it.fileName||it.title||'').toLowerCase();
  if(mt.indexOf('pdf')>=0||/\.pdf$/.test(fn)||it.type==='pdf')return 'pdf';
  if(/^image\//.test(mt)||/\.(jpg|jpeg|png|webp|gif)$/.test(fn)||it.type==='img')return 'img';
  return 'other';
}
function fileTypeLabel(it){
  const k=fileKind(it);
  if(k==='pdf')return 'PDF';
  if(k==='img')return 'Image';
  if(it.mimeType)return it.mimeType;
  return 'Fichier';
}
function findAreaItem(area,id){const cfg=AREA_CFG[area];if(!cfg)return null;return cfg.items(PROJ).find(function(x){return x.id===id;});}

function viewFile(area,id){
  const it=findAreaItem(area,id);if(!it)return;
  viewDoc(it);
}
// Visionneuse générique : accepte n'importe quel objet document {fileName/title,fileUrl,mimeType,type}.
function viewDoc(it){
  if(!it)return;
  _lastViewedDoc=it;
  const name=it.fileName||it.title||'Document';
  const kind=fileKind(it);
  let url=getBlob(it);
  // Chargement paresseux : octets non présents en session mais persistés dans IndexedDB.
  if(!url&&it.id&&BlobDB.has(it.id)){
    renderViewerLoading(it,name,kind);
    BlobDB.get(it.id).then(function(bytes){
      if(bytes){BLOBS[it.id]=bytes;}
      // Ne ré-affiche que si la visionneuse est toujours ouverte sur ce document.
      if(_lastViewedDoc===it)renderViewerBody(it,name,kind);
    });
    return;
  }
  renderViewerBody(it,name,kind);
}

    :'';
  const html='<div class="vw-ov" onclick="if(event.target===this)closeViewer()">'
    +'<div class="vw-box" role="dialog" aria-modal="true" aria-label="'+e(name)+'" tabindex="-1" onclick="event.stopPropagation()">'

function closeViewer(){document.getElementById('viewer-root').innerHTML='';_lastViewedDoc=null;if(_viewerPrevFocus&&typeof _viewerPrevFocus.focus==='function'){try{_viewerPrevFocus.focus();}catch(e){}}_viewerPrevFocus=null;}
/* Gestion clavier globale : Échap ferme la couche du dessus ; Tab piège le focus dans la modale/visionneuse ouverte. */
document.addEventListener('keydown',function(ev){
  var viewerRoot=document.getElementById('viewer-root');
  var modalRoot=document.getElementById('modal-root');
  var viewerOpen=viewerRoot&&viewerRoot.innerHTML.trim();
  var modalOpen=modalRoot&&modalRoot.innerHTML.trim();
  if(ev.key==='Escape'){
    // la visionneuse est au-dessus des modales
    if(viewerOpen){closeViewer();ev.preventDefault();return;}
    if(modalOpen){closeModal();ev.preventDefault();return;}
    return;
  }
  if(ev.key==='Tab'&&(viewerOpen||modalOpen)){
    var container=viewerOpen?viewerRoot.querySelector('.vw-box'):modalRoot.querySelector('.mo-box');
    if(!container)return;
    var f=_focusables(container);
    if(!f.length){ev.preventDefault();container.focus();return;}
    var first=f[0],last=f[f.length-1];
    if(ev.shiftKey&&document.activeElement===first){ev.preventDefault();last.focus();}
    else if(!ev.shiftKey&&document.activeElement===last){ev.preventDefault();first.focus();}
    else if(!container.contains(document.activeElement)){ev.preventDefault();first.focus();}
  }
});

  if(!PROJ)return 0;

  (PROJ.membres||[]).forEach(function(m){if(m.role===key)n++;});
  return n;
}

      +'<input id="rl-'+key+'" value="'+e(label)+'" '+(locked?'':'')+' style="flex:1;padding:7px 9px;border:1px solid var(--border2);border-radius:7px;font-size:12.5px;background:var(--bg);color:var(--text);outline:none;font-family:inherit" aria-label="Nom du rôle">'

function addRole(){
  var inp=document.getElementById('rl-new');
  if(!inp)return;
  var label=(inp.value||'').trim();
  if(!label){toastErr('Saisissez un nom de rôle.');return;}
  // Refus des doublons de libellé (insensible à la casse).
  var exists=Object.values(RL).some(function(l){return l.toLowerCase()===label.toLowerCase();});
  if(exists){toastErr('Ce rôle existe déjà.');return;}
  var key=roleKeyFromLabel(label);
  RL[key]=label;
  saveRoles();
  openRolesManager(); // re-render le modal avec le nouveau rôle
  toast('Rôle ajouté');
}
function deleteRole(key){
  if(key==='project_admin')return; // garde-fou
  var used=roleUsageCount(key);
  var doDelete=function(){
    // Réaffecte les intervenants du PROJET COURANT vers « Lecteur » pour ne pas casser RL[m.role].
    if(used>0&&PROJ){(PROJ.membres||[]).forEach(function(m){if(m.role===key)m.role='viewer';});}
    delete RL[key];saveRoles();
    openRolesManager();
    if(PROJ&&(VIEW==='membres'||VIEW==='intervenants'))renderMain();
    toast('Rôle supprimé');
  };
  if(used>0){
    confirmModal({
      title:'Supprimer ce rôle',
      body:'<strong>'+e(RL[key])+'</strong> est attribué à <strong>'+used+' intervenant'+(used>1?'s':'')+'</strong>. '
          +'En le supprimant, ces intervenants passeront au rôle <strong>« Lecteur »</strong>. Continuer ?',
      confirmLabel:'Supprimer le rôle',
      danger:true,
      onConfirm:doDelete
    });
  }else{doDelete();}
}
function saveRolesManager(){
  // Applique les renommages saisis dans les champs.
  var changed=false;
  Object.keys(RL).slice().forEach(function(key){
    var inp=document.getElementById('rl-'+key);
    if(!inp)return;
    var v=(inp.value||'').trim();
    if(!v){return;} // on ignore un champ vidé (on ne supprime pas via vidage)
    if(v!==RL[key]){RL[key]=v;changed=true;}
  });
  saveRoles();
  closeModal();
  if(PROJ)renderMain();
  renderSB();
  toast(changed?'Rôles enregistrés':'Aucune modification');

// Ouvre l'écran fusionné en dépliant la fiche de l'intervenant ciblé.
function openMemberAccess(id){curMbr=id;curMbrPending=true;nav('membres');}

function toggleMbr(id){curMbr=curMbr===id?null:id;renderMain();}
function togglePerm(mid,k){var m=getMembresForProj(PROJ).find(function(x){return x.id===mid;});if(m){normalizeMbr(m);m.perms[k]=!m.perms[k];savePROJS();}renderMain();}
function toggleDoss(mid,f){var m=getMembresForProj(PROJ).find(function(x){return x.id===mid;});if(m){normalizeMbr(m);m.dossiers[f]=!m.dossiers[f];savePROJS();}renderMain();}

function saveMbr(mid){
  var m=getMembresForProj(PROJ).find(function(x){return x.id===mid;});
  if(!m)return;
  var g=function(id){var el=document.getElementById(id);return el?el.value:'';};
  m.name=g('mf-name-'+mid)||m.name;
  m.metier=g('mf-metier-'+mid)||m.metier;
  m.ent=g('mf-ent-'+mid);
  m.tel=g('mf-tel-'+mid);
  m.note=g('mf-note-'+mid);
  m.role=g('mf-role-'+mid)||m.role;
  m.email=g('mf-email-'+mid)||m.email;
  // Update initials from name
  var parts=m.name.trim().split(' ');
  m.ini=(parts[0]?parts[0][0]:'')+(parts[1]?parts[1][0]:'');
  m.ini=m.ini.toUpperCase();
  curMbr=null;
  savePROJS();
  renderMbrs();
  toast('Fiche mise à jour ✓');
}

function removeMbr(mid){
  var list=getMembresForProj(PROJ);
  var idx=list.findIndex(function(x){return x.id===mid;});
  if(idx<0)return;
  var m=list[idx];
  confirmModal({
    title:'Retirer cet intervenant',
    body:'Retirer <strong>'+e(m.name||'cet intervenant')+'</strong> du projet ? Vous pourrez annuler juste après.',
    confirmLabel:'Retirer',
    onConfirm:function(){
      var removed=list.splice(idx,1)[0];
      var pos=idx;
      curMbr=null;savePROJS();renderMain();
      toast('Intervenant retiré',{undo:function(){list.splice(pos,0,removed);savePROJS();renderMain();toast('Intervenant rétabli');}});
    }
  });
}

function inviteMbr(){
  var name=document.getElementById('inv-name')?.value?.trim();
  var email=document.getElementById('inv-e')?.value?.trim()||'';
  // Le nom est requis (l'email reste facultatif : aucun email n'est envoyé).
  if(!name){
    var el=document.getElementById('inv-name');
    if(el){el.classList.add('fi-error');el.focus();}
    toastErr('Le nom du participant est requis.');
    return;
  }
  var metier=document.getElementById('inv-metier')?.value||'Autre';
  var ent=document.getElementById('inv-ent')?.value?.trim()||'—';
  var role=document.getElementById('inv-r')?.value||'viewer';
  var parts=name.split(' ');
  var ini=((parts[0]?parts[0][0]:'')+(parts[1]?parts[1][0]:'')).toUpperCase()||name.slice(0,2).toUpperCase();
  var COLORS=['#2d4ef5','#1a7a4a','#c47a00','#6b3fa0','#c0392b','#0891b2'];
  var col=COLORS[getMembresForProj(PROJ).length%COLORS.length];
  getMembresForProj(PROJ).push({
    id:'m'+(uid++),ini,name,email,ent,role,metier,tel:'',note:'',color:col,
    perms:{voir:true,dl:role!=='client_viewer',import:false,publier:false,contrats:role==='client_viewer',admin:false},
    dossiers:{Plans:true,'Contrats & Devis':false,Factures:false,'Photos chantier':false,'Admin':false}
  });
  // Réinitialise le formulaire
  ['inv-e','inv-name','inv-ent','inv-metier'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
  savePROJS();
  toast('Participant ajouté : '+name);
  renderMbrs();
}

/* ══ DOSSIER « INTERVENANTS » (Documents du projet) ══ */
// Tous les documents du projet, toutes zones confondues (lecture seule ici).
function allProjectDocs(p){
  if(!p)return[];
  var dd=p.docs_data||{};
  var groups=[
    {area:'Plans',list:dd.plans},{area:'Contrats & Devis',list:dd.contrats},
    {area:'Factures',list:dd.factures},{area:'Photos chantier',list:dd.photos},
    {area:'Documents admin',list:dd.admin},{area:'PV',list:p.pv}
  ];
  var out=[];
  groups.forEach(function(g){(g.list||[]).forEach(function(d){if(!d.archived)out.push({area:g.area,d:d});});});
  return out;
}
// Documents liés à un intervenant : correspondance sur le champ « Entreprise / intervenant »
// (doc.ent) avec l'entreprise ou le nom du membre. Pas de nouveau modèle de données.
function docsForMember(p,m){
  var keys=[m.ent,m.name].filter(function(x){return x&&x!=='—';}).map(function(x){return x.trim().toLowerCase();});
  if(!keys.length)return[];
  return allProjectDocs(p).filter(function(row){
    var ent=(row.d.ent||'').trim().toLowerCase();
    return ent&&keys.indexOf(ent)>=0;
  });
}

function renderIntervenants(){

    html+='</div>';document.getElementById('content').innerHTML=html;return;

  // Carte d'index pour ouvrir un document sans sérialiser l'objet dans le HTML.

    if(m.tel)contact.push('<span style="display:inline-flex;align-items:center;gap:4px"><span style="color:var(--text3)">Tél :</span>'+e(m.tel)+'</span>');
    var roleBadge='<span class="badge" style="background:'+m.color+'18;color:'+m.color+'">'+roleLabel(m.role)+'</span>';

      +'<div style="display:flex;align-items:flex-start;gap:11px">'

        +'<div style="flex:1;min-width:0">'
          +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="font-weight:500;font-size:13px">'+e(m.name)+'</span>'+roleBadge+'</div>'
          +'<div style="font-size:11px;color:var(--text3);margin-top:2px">'+e(m.metier||RL[m.role]||'—')+(m.ent&&m.ent!=='—'?' · '+e(m.ent):'')+'</div>'

      +'</div>';

    h+='<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">'
      +'<div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Documents liés</div>';

          +'<svg class="ico ico-sm" style="color:'+(d.color||'var(--blue)')+'"><use href="#i-'+(d.type==='img'?'photo':'pdf')+'"/></svg>'

/* ══ PLU ══ */

// Noms des champs standard (clés uniquement — valeurs toujours saisies par l'utilisateur)
const PLU_STD_KEYS=['Zone PLU','Emprise au sol','Hauteur max','Recul façade','Retrait latéral','Biotope','Stationnement','Risques'];

// Initialise PROJ.plu si absent, avec champs vides (jamais les valeurs démo).
function pluEnsure(){
  if(!PROJ)return;
  if(!PROJ.plu){
    var fields={};
    PLU_STD_KEYS.forEach(function(k){fields[k]='';});
    PROJ.plu={fields:fields,notes:'',sources:[],updatedAt:''};
  }
  // Rétro-compat : garantit que les trois clés existent sur un plu partiel
  if(!PROJ.plu.fields)PROJ.plu.fields={};
  if(typeof PROJ.plu.notes!=='string')PROJ.plu.notes='';
  if(!Array.isArray(PROJ.plu.sources))PROJ.plu.sources=[];
}

function pluFilledCount(){
  if(!PROJ||!PROJ.plu)return 0;
  var f=PROJ.plu.fields;
  return Object.keys(f).filter(function(k){return (f[k]||'').trim()!=='';}).length;
}
function pluTotalFields(){
  if(!PROJ||!PROJ.plu)return PLU_STD_KEYS.length;
  return Object.keys(PROJ.plu.fields).length||PLU_STD_KEYS.length;
}

function savePLU(){
  if(!PROJ)return;
  pluEnsure();
  // Lire tous les champs réglementaires visibles
  var f=PROJ.plu.fields;
  Object.keys(f).forEach(function(k){
    var el=document.getElementById('plu-f-'+pluFieldId(k));
    if(el)f[k]=el.value;
  });
  // Notes
  var nt=document.getElementById('plu-notes');
  if(nt)PROJ.plu.notes=nt.value;
  PROJ.plu.updatedAt=new Date().toISOString();
  savePROJS();
  toast('Pré-étude enregistrée ✓');
  renderPLU(); // re-render pour mettre à jour la jauge de complétude
}

// Clé CSS-safe à partir du nom de champ
function pluFieldId(k){return k.replace(/[^a-zA-Z0-9]/g,'_');}

function renderPLU(){
  if(!PROJ)return;
  pluEnsure();
  setTB('arch','var(--blue)','Pré-étude PLU',PROJ.name,'Enregistrer','save');
  setTabs(null);

  var plu=PROJ.plu;
  var editable=can('items');
  var filled=pluFilledCount();
  var total=pluTotalFields();
  var pct=total?Math.round(filled/total*100):0;
  var hasAny=filled>0||plu.notes.trim()||plu.sources.length;

  var html='<div class="pad">';

  // Bandeau info
  html+='<div style="font-size:12.5px;color:var(--text2);margin-bottom:10px;line-height:1.5">Synthèse réglementaire indicative — à vérifier auprès du service urbanisme.</div>';

  // Disclaimer
  html+='<div style="background:var(--amber-bg);border:1px solid var(--amber);border-radius:var(--r);padding:9px 13px;margin-bottom:14px;font-size:12px;color:var(--amber);display:flex;align-items:center;gap:7px">'
    +'<svg class="ico ico-sm"><use href="#i-warning"/></svg> Aide à la décision — non opposable juridiquement'
    +'</div>';

  // Jauge de complétude (dérivée des champs réellement renseignés)

    var barColor=pct>=75?'var(--green)':pct>=40?'var(--amber)':'var(--red)';
    html+='<div style="background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;margin-bottom:14px;display:flex;align-items:center;gap:11px">'
      +'<div style="flex:1"><div style="font-size:12px;font-weight:500;margin-bottom:5px;color:var(--text2)">Complétude des champs renseignés</div>'
      +'<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%;background:'+barColor+'"></div></div>'
      +'<div style="font-size:10.5px;color:var(--text3);margin-top:4px">'+filled+' / '+total+' champs renseignés</div>'
      +'</div>'
      +'<span class="badge" style="background:'+(pct>=75?'var(--green-bg)':pct>=40?'var(--amber-bg)':'var(--red-bg)')+';color:'+barColor+'">'+pct+'%</span>'

    +'</div>';
  }

  // ── Section 1 : Champs réglementaires ────────────────────────────────────
  html+='<div style="background:var(--panel);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:14px;overflow:hidden">';
  html+='<div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">'
    +'<div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:6px"><svg class="ico ico-sm"><use href="#i-arch"/></svg> Champs réglementaires</div>'
    +(editable?permBtn('items','<svg class="ico ico-xs" style="margin-right:3px"><use href="#i-plus"/></svg>Ajouter un champ','addPluCustomField()','btn-g btn-sm'):'')
  +'</div>';

  html+='<div style="padding:14px 16px;display:grid;grid-template-columns:1fr 1fr;gap:10px">';
  Object.keys(plu.fields).forEach(function(k){
    var fid='plu-f-'+pluFieldId(k);
    var val=e(plu.fields[k]||'');
    if(editable){
      html+='<div class="fi" style="margin:0">'
        +'<label style="display:flex;align-items:center;justify-content:space-between">'
          +'<span>'+e(k)+'</span>'
          +(PLU_STD_KEYS.indexOf(k)<0
            ?'<button onclick="deletePluField(\''+e(k)+'\')" style="background:none;border:none;cursor:pointer;padding:0;color:var(--text3)" title="Supprimer ce champ"><svg class="ico ico-xs"><use href="#i-x"/></svg></button>'

      +'</div>';
    } else {
      html+='<div class="plu-f">'
        +'<div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">'+e(k)+'</div>'
        +'<div style="font-size:13px">'+(plu.fields[k]||'<span style="color:var(--text3);font-style:italic">Non renseigné</span>')+'</div>'
      +'</div>';
    }
  });
  html+='</div>';

  if(editable){
    html+='<div style="padding:8px 16px 14px;display:flex;justify-content:flex-end">'
      +'<button class="btn btn-p btn-sm" onclick="savePLU()"><svg class="ico ico-xs" style="margin-right:3px"><use href="#i-save"/></svg>Enregistrer les champs</button>'

  }
  html+='</div>';

  html+='<div style="background:var(--panel);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:14px;overflow:hidden">';
  html+='<div style="padding:12px 16px;border-bottom:1px solid var(--border);font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:6px"><svg class="ico ico-sm"><use href="#i-edit"/></svg> Mes notes / recherches</div>';

var _modalPrevFocus=null;
function _focusables(container){
  if(!container)return [];
  return Array.prototype.slice.call(container.querySelectorAll(
    'a[href],button:not([disabled]),input:not([disabled]),select:not([disabled]),textarea:not([disabled]),[tabindex]:not([tabindex="-1"])'
  )).filter(function(el){return el.offsetParent!==null||el===document.activeElement;});
}
function showModal(html){
  // mémorise le focus courant pour le restaurer à la fermeture
  _modalPrevFocus=document.activeElement;
  document.getElementById('modal-root').innerHTML=`<div class="mo-ov" onclick="if(event.target===this)closeModal()"><div class="mo-box" role="dialog" aria-modal="true" tabindex="-1" onclick="event.stopPropagation()">${html}</div></div>`;
  // place le focus dans la modale (premier champ ou la boîte)
  setTimeout(function(){
    var box=document.querySelector('#modal-root .mo-box');if(!box)return;
    var f=_focusables(box);
    (f[0]||box).focus();
  },30);
}
function closeModal(){
  document.getElementById('modal-root').innerHTML='';
  // restaure le focus sur l'élément déclencheur
  if(_modalPrevFocus&&typeof _modalPrevFocus.focus==='function'){try{_modalPrevFocus.focus();}catch(e){}}
  _modalPrevFocus=null;
}
// Remplace les prompt() natifs par une modale légère.
// callback(val) reçoit la valeur saisie (trimée), ou n'est pas appelé si annulé.
function promptModal(title,placeholder,defaultVal,callback){
  var cbKey='_pmcb'+(uid++);
  window[cbKey]=function(){
    var val=(document.getElementById('pm-inp').value||'').trim();
    if(!val){document.getElementById('pm-inp').classList.add('fi-error');document.getElementById('pm-inp').focus();return;}
    delete window[cbKey];closeModal();callback(val);
  };
  showModal(''
    +'<h3 style="display:flex;align-items:center;gap:7px"><svg class="ico ico-sm" style="color:var(--blue)"><use href="#i-folder"/></svg>'+e(title)+'</h3>'
    +'<div class="fi" style="margin-bottom:4px"><input id="pm-inp" value="'+e(defaultVal||'')+'" placeholder="'+e(placeholder||'')+'" onkeydown="if(event.key===\'Enter\')'+cbKey+'()"></div>'
    +'<div class="mo-foot"><button class="btn" onclick="closeModal()">Annuler</button><button class="btn btn-p" onclick="'+cbKey+'()">Valider</button></div>'
  );
  setTimeout(function(){var el=document.getElementById('pm-inp');if(el){el.focus();el.select();}},40);
}
/* Confirmation générique (remplace confirm()). 
   opts = {title, body, confirmLabel, danger:true, onConfirm:function} */
function confirmModal(opts){
  opts=opts||{};
  var cbKey='_cfcb'+(uid++);
  window[cbKey]=function(){delete window[cbKey];closeModal();if(typeof opts.onConfirm==='function')opts.onConfirm();};
  var danger=opts.danger!==false; // par défaut, action destructive (accent rouge)
  // Hiérarchie visuelle : « Annuler » neutre, action de confirmation mise en avant.
  // Destructif => accent rouge ; sinon => bouton primaire (btn-p).
  var confirmCls=danger?'btn':'btn btn-p';
  var confirmStyle=danger?'background:var(--red);color:#fff;border-color:var(--red)':'';
  showModal(''
    +'<h3 style="display:flex;align-items:center;gap:8px"><svg class="ico ico-sm" style="color:'+(danger?'var(--red)':'var(--amber)')+'"><use href="#i-warning"/></svg>'+e(opts.title||'Confirmer')+'</h3>'
    +'<p style="font-size:12.5px;color:var(--text2);line-height:1.5;margin-bottom:4px">'+(opts.body||'')+'</p>'
    +'<div class="mo-foot"><button class="btn" onclick="closeModal()">Annuler</button>'
    +'<button class="'+confirmCls+'" style="'+confirmStyle+'" onclick="'+cbKey+'()">'+e(opts.confirmLabel||'Confirmer')+'</button></div>'
  );
}

function openSearch(){
  showModal(''
    +'<h3 style="display:flex;align-items:center;gap:8px"><svg class="ico ico-sm" style="color:var(--blue)"><use href="#i-search"/></svg> Rechercher'+(PROJ?' dans '+e(PROJ.name):'')+'</h3>'

    +'<div id="srch-res" style="max-height:340px;overflow-y:auto;font-size:13px"></div>'
    +'<div class="mo-foot"><button class="btn btn-p" onclick="closeModal()">Fermer</button></div>'
  );

function doSearch(q){
  var out=document.getElementById('srch-res');if(!out)return;
  q=(q||'').trim().toLowerCase();
  if(q.length<2){out.innerHTML='<div style="color:var(--text3);padding:8px 0">Saisissez au moins 2 caractères.</div>';return;}
  var hits=[];

  if(PROJ){
    // Docs : plans, contrats+factures, photos, admin
    var d=getDocsForProj(PROJ);
    function scanDocs(arr,areaLabel,areaView){
      (arr||[]).forEach(function(it){
        var t=(it.title||it.fileName||'').toLowerCase();
        if(t.indexOf(q)>=0)hits.push({label:it.title||it.fileName,sub:areaLabel,view:areaView,ico:'pdf',fn:function(){closeModal();nav(areaView);}});
      });
    }
    scanDocs(d.plans,'Plans','plans');
    scanDocs((d.contrats||[]).concat(d.factures||[]),'Contrats & Devis','contrats');
    scanDocs(d.photos,'Photos chantier','photos');
    scanDocs(d.admin,'Documents admin','admin');
    // PV
    (PROJ.pv||[]).forEach(function(it){
      var t=(it.titre||it.fileName||'').toLowerCase();
      if(t.indexOf(q)>=0)hits.push({label:it.titre||it.fileName,sub:'PV / Réception',ico:'check-list',fn:function(){closeModal();nav('pv');}});
    });
    // Membres
    getMembresForProj(PROJ).forEach(function(m){
      var t=(m.name+' '+m.email+' '+m.ent+' '+(m.metier||'')).toLowerCase();
      if(t.indexOf(q)>=0)hits.push({label:m.name,sub:(m.metier||RL[m.role]||'Intervenant')+' — '+m.ent,ico:'users',fn:function(){closeModal();nav('membres');}});
    });
  } else {
    // Vue projets : chercher parmi les projets
    PROJS.filter(function(p){return !p.archived;}).forEach(function(p){
      var t=(p.name+' '+(p.client||'')+' '+(p.address||'')).toLowerCase();
      if(t.indexOf(q)>=0)hits.push({label:p.name,sub:p.client||p.address||'',ico:'building',fn:function(){closeModal();openProj(p.id);}});
    });
  }

  if(!hits.length){out.innerHTML='<div style="color:var(--text3);padding:8px 0">Aucun résultat pour <strong>'+e(q)+'</strong>.</div>';return;}
  out.innerHTML=hits.slice(0,40).map(function(h,i){
    return '<div onclick="SEARCH_HITS['+i+'].fn()" style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r);cursor:pointer;margin-bottom:2px" onmouseenter="this.style.background=\'var(--bg2)\'" onmouseleave="this.style.background=\'\'">'
      +'<svg class="ico ico-sm" style="color:var(--blue);flex-shrink:0"><use href="#i-'+h.ico+'"/></svg>'
      +'<div style="min-width:0"><div style="font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+e(h.label)+'</div>'
      +'<div style="font-size:11px;color:var(--text3)">'+e(h.sub)+'</div></div>'
    +'</div>';
  }).join('');
  window.SEARCH_HITS=hits;
}
/* toast(message) — succès par défaut.
   toast(message, opts) où opts = {type:'success'|'error'|'warn'|'info', undo:function, duration:ms}
   Les erreurs/avertissements sont visuellement distincts (rouge/ambre). */
var _toastTimer=null;
function toast(msg,opts){
  opts=opts||{};
  const t=document.getElementById('toast');if(!t)return;
  if(_toastTimer){clearTimeout(_toastTimer);_toastTimer=null;}
  t.className='toast';
  const type=opts.type||'success';
  if(type==='error')t.classList.add('t-err');
  else if(type==='warn')t.classList.add('t-warn');
  else if(type==='info')t.classList.add('t-info');
  let inner=(type==='error'?'<svg class="ico ico-sm" aria-hidden="true"><use href="#i-warning"/></svg>'
            :type==='warn'?'<svg class="ico ico-sm" aria-hidden="true"><use href="#i-warning"/></svg>'
            :type==='success'?'<svg class="ico ico-sm" aria-hidden="true"><use href="#i-check"/></svg>':'')
            +'<span>'+e(msg)+'</span>';
  let dur=opts.duration||(type==='error'?3600:type==='warn'?3000:2200);
  if(typeof opts.undo==='function'){
    var ukey='_undo'+(uid++);
    window[ukey]=function(){delete window[ukey];t.style.opacity='0';if(_toastTimer){clearTimeout(_toastTimer);_toastTimer=null;}opts.undo();};
    inner+='<button class="toast-undo" onclick="'+ukey+'()">Annuler</button>';
    dur=Math.max(dur,5000);
  }
  t.innerHTML=inner;
  t.style.opacity='1';
  _toastTimer=setTimeout(function(){t.style.opacity='0';_toastTimer=null;},dur);
}
function toastErr(msg,opts){opts=opts||{};opts.type='error';return toast(msg,opts);}

/* ══ INFO PROJET ══ */
// Affiche, sous chaque métier prévu (coché), les intervenants réels qui ont ce métier.
// Le rattachement se fait sur le champ « Métier / Fonction » de l'intervenant.
// Les intervenants dont le métier ne correspond à aucun métier coché sont listés
// dans « Autres intervenants ». Relié à « Accès & permissions » via le bouton Gérer.
function renderInfoPeople(p){
  var members=getMembresForProj(p)||[];
  // Normalise un libellé de métier pour comparaison souple.
  var norm=function(s){return (s||'').trim().toLowerCase();};
  var chips=(p.ints||[]); // métiers cochés
  if(!members.length){
    return '<div style="font-size:12px;color:var(--text3);padding:6px 0">Aucun intervenant pour l\'instant. Cliquez sur « Gérer » pour en ajouter.</div>';
  }
  var personRow=function(m){
    var roleLbl=roleLabel(m.role);
    return '<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;border:1px solid var(--border);border-radius:7px;background:var(--bg)">'
      +'<div class="av" style="width:24px;height:24px;font-size:9px;background:'+m.color+'18;color:'+m.color+';flex-shrink:0">'+e(m.ini||'?')+'</div>'
      +'<div style="flex:1;min-width:0">'
        +'<span style="font-size:12px;font-weight:500">'+e(m.name||'—')+'</span>'
        +(m.ent&&m.ent!=='—'?'<span style="font-size:10.5px;color:var(--text3)"> · '+e(m.ent)+'</span>':'')
      +'</div>'
      +'<span style="font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:20px;background:'+m.color+'18;color:'+m.color+';flex-shrink:0">'+e(roleLbl)+'</span>'
    +'</div>';
  };
  var used={}; // ids déjà rattachés à un métier
  var blocks='';
  chips.forEach(function(metier){
    var people=members.filter(function(m){return norm(m.metier)===norm(metier);});
    people.forEach(function(m){used[m.id]=true;});
    blocks+='<div style="margin-bottom:10px">'
      +'<div style="display:flex;align-items:center;gap:7px;margin-bottom:5px">'
        +'<span style="font-size:11.5px;font-weight:600;color:var(--text2)">'+e(metier)+'</span>'
        +'<span style="font-size:10px;color:var(--text3)">'+(people.length?people.length+' intervenant'+(people.length>1?'s':''):'aucun intervenant')+'</span>'
      +'</div>';
    if(people.length){
      blocks+='<div style="display:flex;flex-direction:column;gap:5px">'+people.map(personRow).join('')+'</div>';
    }else{
      blocks+='<div style="font-size:11px;color:var(--text3);padding:2px 0 0 2px">Aucun intervenant rattaché — invitez-en un depuis « Gérer ».</div>';
    }
    blocks+='</div>';
  });
  // Intervenants restants (métier non listé dans les chips, ou MOA/client/etc.)
  var others=members.filter(function(m){return !used[m.id];});
  if(others.length){
    blocks+='<div style="margin-bottom:4px;border-top:1px solid var(--border);padding-top:10px">'
      +'<div style="font-size:11.5px;font-weight:600;color:var(--text2);margin-bottom:5px">Autres intervenants <span style="font-size:10px;color:var(--text3);font-weight:400">('+others.length+')</span></div>'
      +'<div style="display:flex;flex-direction:column;gap:5px">'+others.map(personRow).join('')+'</div>'
    +'</div>';
  }
  if(!chips.length&&!others.length){
    return '<div style="font-size:12px;color:var(--text3);padding:6px 0">Cochez un métier ci-dessus, puis ajoutez des intervenants depuis « Gérer ».</div>';
  }
  return blocks||'<div style="font-size:12px;color:var(--text3);padding:6px 0">Aucun métier coché.</div>';
}

let infoType=null;
function selInfoType(id,el){

// Toggle d'un métier dans Informations projet : met à jour la pastille et
// rafraîchit en direct la liste des intervenants rattachés (aperçu non enregistré
// tant que « Enregistrer » n'est pas cliqué).
function toggleInfoMetier(el,val){
  el.classList.toggle('on');
  if(!PROJ)return;
  // Construit un aperçu des métiers cochés d'après le DOM (sans toucher PROJ.ints).
  var chips=[];
  document.querySelectorAll('#inf-ints .chip.on').forEach(function(c){if(c.dataset.int)chips.push(c.dataset.int);});
  var box=document.getElementById('inf-people');
  if(box)box.innerHTML=renderInfoPeople(Object.assign({},PROJ,{ints:chips}));
}

function saveInfo(){
  if(!PROJ)return;
  const p=PROJ;
  const name=document.getElementById('inf-name')?.value?.trim();
  if(!name){toast('Le nom est requis');return;}
  const addr=(document.getElementById('inf-addr')?.value?.trim()||'');
  const city=(document.getElementById('inf-city')?.value?.trim()||'');
  p.name=name;
  p.address=[addr,city].filter(Boolean).join(', ');
  p.client=document.getElementById('inf-client')?.value?.trim()||p.client;
  p.clientEmail=document.getElementById('inf-cemail')?.value?.trim()||'';
  p.clientTel=document.getElementById('inf-ctel')?.value?.trim()||'';
  p.ref=document.getElementById('inf-ref')?.value?.trim()||'';
  p.phase=document.getElementById('inf-phase')?.value||p.phase;
  // Avancement : champ manuel facultatif. Vide => calcul automatique (override effacé).
  const progRaw=(document.getElementById('inf-prog')?.value||'').trim();
  if(progRaw===''){
    p.progressManual='';
  }else{
    const prog=parseInt(progRaw,10);
    p.progressManual=isNaN(prog)?'':Math.min(100,Math.max(0,prog));
  }
  const surf=document.getElementById('inf-surf')?.value?.trim();
  p.surface=surf?surf+' m²':p.surface;
  p.budget=document.getElementById('inf-budget')?.value?.trim()||p.budget;
  const sv=document.getElementById('inf-start')?.value;if(sv!=null)p.start=sv.trim();
  const lv=document.getElementById('inf-livr')?.value;if(lv!=null)p.livraison=lv.trim();
  if(infoType)p.type=infoType;
  const ints=[];
  document.querySelectorAll('#inf-ints .chip.on').forEach(c=>{if(c.dataset.int)ints.push(c.dataset.int);});
  if(ints.length)p.ints=ints;
  ['zone_sismique','zone_inondable','monument_historique'].forEach(k=>{const el=document.getElementById('inf-'+k);if(el)p.opts[k]=el.checked;});
  // Rebuild CL tree if type/intervenants changed
  clTree=buildCL(p);
  infoType=null;
  renderSB();renderInfo();
  toast('Modifications enregistrées ✓');
}

function archiveProj(){
  if(!PROJ)return;
  var p=PROJ;
  confirmModal({
    danger:false,
    title:p.archived?'Désarchiver le projet':'Archiver le projet',
    body:p.archived
      ?'Rendre « <strong>'+e(p.name)+'</strong> » de nouveau actif ?'
      :'Archiver « <strong>'+e(p.name)+'</strong> » ? Le projet sera grisé mais restera accessible.',
    confirmLabel:p.archived?'Désarchiver':'Archiver',
    onConfirm:function(){
      if(p.archived){p.archived=false;savePROJS();renderSB();renderInfo();toast('Projet désarchivé');return;}
      p.archived=true;savePROJS();renderSB();renderInfo();
      toast('Projet archivé',{undo:function(){p.archived=false;savePROJS();renderSB();renderInfo();toast('Projet désarchivé');}});
    }
  });
}
function unarchiveProj(id){
  const p=PROJS.find(x=>x.id===id);if(!p)return;
  p.archived=false;
  savePROJS();
  if(PROJ?.id===id){renderSB();renderInfo();}
  else{renderSB();renderMain();}
  toast('Projet désarchivé');
}
function deleteProj(id){
  const p=PROJS.find(x=>x.id===id);if(!p)return;
  confirmModal({
    title:'Supprimer définitivement',
    body:'Supprimer définitivement « <strong>'+e(p.name)+'</strong> » ? Cette action est irréversible.',
    confirmLabel:'Supprimer définitivement',
    onConfirm:function(){
      const idx=PROJS.findIndex(x=>x.id===id);
      if(idx===-1)return;
      PROJS.splice(idx,1);
      savePROJS();
      PROJ=null;VIEW='projets';
      renderSB();renderMain();
      toast('Projet supprimé');
    }
  });
}

function createProj(){

  const BGS=['#f5ede6','#e8f5ee','#fef3d8','#f0ebfa','#fdecea','#e0f2fe'];
  const ci=PROJS.length%COLORS.length;

  const today=new Date();
  const startDate=`${String(today.getDate()).padStart(2,'0')}/${String(today.getMonth()+1).padStart(2,'0')}/${today.getFullYear()}`;

  const newP={

    phase:'Études',
    color:COLORS[ci],bg:BGS[ci],
    docs:0,progress:0,
    budget,surface:surf?surf+' m²':'—',
    start:startDate,livraison,
    avs:['SM'],
  };
  newP.docs_data={plans:[],contrats:[],factures:[],photos:[],admin:[]};
  newP.membres=[];

/* ══ BANDEAU DONNÉES LOCALES ══ */
// Stockage local : pastille compacte dans la barre + popover. N'occupe plus d'espace
// vertical permanent. Le popover s'ouvre une fois au premier lancement, puis reste
// accessible via la pastille (avec rappel d'export).
function localitySeen(){try{return Store.get('plansync_banner_seen')==='1'||Store.get('plansync_banner_dismissed')==='1';}catch(e){return false;}}
function markLocalitySeen(){try{Store.set('plansync_banner_seen','1');}catch(e){}}
function localityPopHTML(){
  return '<div id="locality-pop" role="dialog" aria-label="Stockage local">'
    +'<div class="lp-title"><svg class="ico ico-sm" style="color:var(--blue)" aria-hidden="true"><use href="#i-lock"/></svg>Données stockées localement</div>'
    +'<div>Vos données sont enregistrées <strong>uniquement dans ce navigateur</strong>. Pensez à exporter une sauvegarde régulièrement.</div>'
    +'<div class="lp-actions">'
      +'<button class="btn btn-sm btn-p" onclick="exportData()"><svg class="ico ico-xs" style="margin-right:3px" aria-hidden="true"><use href="#i-download"/></svg>Exporter une sauvegarde</button>'
      +'<button class="btn btn-sm btn-g" style="margin-left:auto" onclick="closeLocalityInfo()">Compris</button>'
    +'</div>'
  +'</div>';
}
function visibleChipWrap(){
  var wraps=document.querySelectorAll('.locality-chip-wrap');
  for(var i=0;i<wraps.length;i++){var r=wraps[i].getBoundingClientRect();if(r.width>0&&r.height>0)return wraps[i];}
  return wraps[0]||null;
}
function setChipExpanded(state){
  var chips=document.querySelectorAll('.locality-chip');
  for(var i=0;i<chips.length;i++)chips[i].setAttribute('aria-expanded',state?'true':'false');
}
function openLocalityInfo(){
  var wrap=visibleChipWrap();if(!wrap)return;
  if(document.getElementById('locality-pop'))return; // déjà ouvert
  var ov=document.createElement('div');ov.className='locality-overlay';ov.id='locality-overlay';ov.onclick=closeLocalityInfo;
  document.body.appendChild(ov);
  wrap.insertAdjacentHTML('beforeend',localityPopHTML());
  setChipExpanded(true);
  markLocalitySeen();
  clearLocalityCue(); // l'utilisateur a vu le rappel : on retire l'indice passif
  // Repositionne le popover pour qu'il ne déborde jamais de l'écran (mobile notamment).
  positionLocalityPop(wrap);
}
// Ajuste le décalage horizontal du popover et de sa flèche pour rester dans la fenêtre.
function positionLocalityPop(wrap){
  var pop=document.getElementById('locality-pop');if(!pop||!wrap)return;
  // Par défaut le popover est aligné à droite de la pastille (right:0).
  var margin=8;
  var wr=wrap.getBoundingClientRect();
  var pr=pop.getBoundingClientRect();
  // Bord gauche du popover s'il reste aligné à droite de la pastille :
  var leftIfRightAligned=wr.right-pr.width;
  if(leftIfRightAligned<margin){
    // Débordement à gauche : on bascule sur un alignement à gauche borné à la marge.
    var newLeft=Math.max(margin, wr.left); // suit la pastille mais sans sortir
    // S'assure aussi de ne pas déborder à droite.
    if(newLeft+pr.width>window.innerWidth-margin)newLeft=Math.max(margin,window.innerWidth-margin-pr.width);
    pop.style.right='auto';
    pop.style.left=(newLeft-wr.left)+'px'; // relatif au wrap (position:relative)
    // Replace la flèche au-dessus du centre de la pastille.
    var arrowLeft=(wr.left+wr.width/2)-newLeft-5;
    pop.style.setProperty('--arrow-left',Math.max(8,arrowLeft)+'px');
    pop.classList.add('lp-left');
  }
}
function closeLocalityInfo(){
  var pop=document.getElementById('locality-pop');if(pop)pop.remove();
  var ov=document.getElementById('locality-overlay');if(ov)ov.remove();
  setChipExpanded(false);
}
function toggleLocalityInfo(ev){
  if(ev){ev.stopPropagation();}
  if(document.getElementById('locality-pop'))closeLocalityInfo();else openLocalityInfo();
}
// Indice passif sur la pastille « Local » au premier passage : pas d'ouverture
// automatique, pas d'overlay, donc aucun clic intercepté. L'utilisateur découvre
// le rappel en cliquant la pastille quand il le souhaite.
function applyLocalityCue(){try{document.body.classList.add('locality-unseen');}catch(e){}}
function clearLocalityCue(){try{document.body.classList.remove('locality-unseen');}catch(e){}}
// Conservé pour compatibilité (anciens appels d'init).
function renderBanner(){
  if(localitySeen()){clearLocalityCue();return;}
  // N'affiche l'indice qu'une fois l'onboarding terminé (sinon il est masqué dessous).
  var onb=document.getElementById('onb-root');
  if(onb&&onb.innerHTML.trim())return;
  applyLocalityCue();
  // Retire l'indice après un court délai même sans clic, pour qu'il ne se répète pas
  // indéfiniment et reste discret ; le rappel reste accessible via la pastille.
  setTimeout(function(){clearLocalityCue();try{markLocalitySeen();}catch(e){}},12000);
}

/* ══ EXPORT / IMPORT JSON ══ */
// Exporte profil + projets (et octets de fichiers en mémoire) dans un fichier JSON téléchargeable.
function exportData(){
  // Avec le chargement paresseux, BLOBS ne contient pas forcément tous les octets en session.
  // On récupère donc l'ensemble des octets persistés depuis IndexedDB avant de construire l'export.
  var build=function(allBlobs){
    try{
      var merged={};
      if(allBlobs&&typeof allBlobs==='object')Object.keys(allBlobs).forEach(function(k){if(allBlobs[k])merged[k]=allBlobs[k];});
      Object.keys(BLOBS).forEach(function(k){if(BLOBS[k])merged[k]=BLOBS[k];}); // la session prime
      var payload={
        _format:'plansync-cr',
        _version:1,
        exportedAt:new Date().toISOString(),
        user:USER,
        projs:PROJS,
        blobs:merged
      };
      var json=JSON.stringify(payload,null,2);
      var blob=new Blob([json],{type:'application/json'});
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');
      var stamp=new Date().toISOString().slice(0,10);
      a.href=url;a.download='plansync-sauvegarde-'+stamp+'.json';
      document.body.appendChild(a);a.click();
      setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},100);
      toast('Sauvegarde exportée');
    }catch(err){toastErr('Échec de l\'export.');}
  };
  try{
    if(BlobDB.available()){BlobDB.getAllAsObject().then(build).catch(function(){build(null);});}
    else build(null);
  }catch(e){build(null);}
}
// Ouvre le sélecteur de fichier puis demande confirmation avant de remplacer les données.
function openImport(){
  var inp=document.createElement('input');
  inp.type='file';inp.accept='application/json,.json';
  inp.onchange=function(ev){
    var file=ev.target.files&&ev.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(){
      var data;
      try{data=JSON.parse(reader.result);}
      catch(e){toastErr('Fichier illisible — JSON invalide.');return;}
      if(!data||data._format!=='plansync-cr'||!Array.isArray(data.projs)){
        toastErr('Ce fichier n\'est pas une sauvegarde PlanSync.');return;
      }
      var nProj=data.projs.length;
      confirmModal({
        title:'Importer une sauvegarde',
        body:'Importer <strong>'+nProj+' projet'+(nProj>1?'s':'')+'</strong> ? Cela <strong>remplacera</strong> les données actuelles de ce navigateur. Exportez d\'abord une sauvegarde si besoin.',
        confirmLabel:'Remplacer et importer',
        onConfirm:function(){applyImport(data);}
      });
    };
    reader.onerror=function(){toastErr('Échec de la lecture du fichier.');};
    reader.readAsText(file);
  };
  inp.click();
}
function applyImport(data){
  try{
    if(data.user&&typeof data.user==='object'){Object.assign(USER,data.user);saveUSER();}
    PROJS=data.projs;
    PROJS.forEach(function(p){(p.membres||[]).forEach(normalizeMbr);if(p.planFolders)PROJ_PLAN_FOLDERS[p.id]=p.planFolders;});
    // Restaure les octets de fichiers fournis dans la sauvegarde (sinon aperçu indisponible).
    // On les repersiste dans IndexedDB (best-effort) pour qu'ils survivent à un rechargement.
    if(data.blobs&&typeof data.blobs==='object'){
      Object.keys(data.blobs).forEach(function(k){
        if(data.blobs[k]){BLOBS[k]=data.blobs[k];try{BlobDB.put(k,data.blobs[k]);}catch(e){}}
      });
    }
    savePROJS();
    PROJ=null;VIEW='projets';
    closeModal();
    renderBanner();renderSB();renderMain();renderUserFooter();
    toast('Sauvegarde importée');
  }catch(err){toastErr('Échec de l\'import.');}
}

/* ══ ONBOARDING PREMIÈRE UTILISATION ══ */
// "Vraies données" = au moins un projet non-démo, OU un nom d'utilisateur renseigné.
function hasRealData(){
  if(USER&&(USER.prenom||USER.nom||USER.firm))return true;
  return PROJS.some(function(p){return p&&p.id&&p.id.indexOf('demo')!==0;});
}
function onboardingSeen(){try{return Store.get('plansync_onboarded')==='1';}catch(e){return false;}}
function maybeOnboard(){
  if(onboardingSeen()||hasRealData())return;
  showOnboarding();
}
function skipOnboarding(){Store.set('plansync_onboarded','1');document.getElementById('onb-root').innerHTML='';renderBanner();}
function showOnboarding(){
  var root=document.getElementById('onb-root');if(!root)return;
  root.innerHTML='<div class="onb-ov"><div class="onb-box" role="dialog" aria-modal="true" aria-label="Bienvenue" tabindex="-1">'
    +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">'
      +'<div class="logo-mark" style="width:30px;height:30px">PS</div>'
      +'<div style="font-size:17px;font-weight:600">Bienvenue sur PlanSync CR</div>'
    +'</div>'
    +'<p style="font-size:12.5px;color:var(--text2);line-height:1.55;margin-bottom:16px">Présentez-vous pour personnaliser l\'application. Un projet de <strong>démonstration</strong> est déjà chargé pour explorer les outils — vous pourrez le supprimer à tout moment.</p>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'
      +'<div class="fi" style="margin:0"><label>Prénom</label><input id="onb-prenom" value="'+e(USER.prenom||'')+'" placeholder="Prénom"></div>'
      +'<div class="fi" style="margin:0"><label>Nom</label><input id="onb-nom" value="'+e(USER.nom||'')+'" placeholder="Nom"></div>'
      +'<div class="fi" style="grid-column:1/-1;margin:0"><label>Cabinet / entreprise</label><input id="onb-firm" value="'+e(USER.firm||'')+'" placeholder="Nom du cabinet"></div>'
    +'</div>'
    +'<div style="display:flex;flex-direction:column;gap:8px;margin-top:18px">'
      +'<button class="btn btn-p" onclick="finishOnboarding(true)"><svg class="ico ico-sm" style="margin-right:4px" aria-hidden="true"><use href="#i-plus"/></svg>Créer mon premier projet</button>'
      +'<button class="btn" onclick="finishOnboarding(false)">Explorer la démo d\'abord</button>'
    +'</div>'
  +'</div></div>';
  setTimeout(function(){var el=document.getElementById('onb-prenom');if(el)el.focus();},40);
}
function finishOnboarding(createProject){
  var g=function(id){var el=document.getElementById(id);return el?el.value.trim():'';};
  USER.prenom=g('onb-prenom');USER.nom=g('onb-nom');USER.firm=g('onb-firm');
  saveUSER();
  Store.set('plansync_onboarded','1');
  document.getElementById('onb-root').innerHTML='';
  renderUserFooter();renderSB();
  if(createProject){openNewProj();}
  else{renderBanner();} // affiche le rappel « stockage local » une fois l'onboarding terminé
}

/* ══ INIT ══ */
loadRoles();
loadUSER();
loadPROJS();
renderBanner();
renderSB();renderMain();
renderUserFooter();
maybeOnboard();
// Charge uniquement l'index des clés persistées (léger, ne bloque pas le premier paint).
// Les octets de chaque document sont chargés paresseusement à la première consultation
// (voir viewDoc → BlobDB.get), ce qui évite de tout charger en mémoire au démarrage.
try{
  BlobDB.loadKeys().then(function(){
    // Si la visionneuse affiche un document désormais chargeable, on la rafraîchit.
    try{
      var vr=document.getElementById('viewer-root');
      if(vr&&vr.innerHTML.trim()&&typeof _lastViewedDoc!=='undefined'&&_lastViewedDoc&&!getBlob(_lastViewedDoc)&&BlobDB.has(_lastViewedDoc.id)){
        viewDoc(_lastViewedDoc);
      }
    }catch(e){}
  });
}catch(e){}
</script>
