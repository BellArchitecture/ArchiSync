// Formate une taille de fichier (octets) : Ko en dessous de 1 Mo, sinon Mo.
// Évite l'affichage trompeur « 0.00 Mo » pour les petits fichiers.
function fmtFileSize(bytes){
  if(!bytes||bytes<0)return '0 Ko';
  if(bytes<1048576){
    var ko=bytes/1024;
    return (ko<10?ko.toFixed(1):Math.round(ko))+' Ko';
  }
  return (bytes/1048576).toFixed(2)+' Mo';
}
// Estime la taille en octets d'un dataURL base64.
function dataURLBytes(durl){
  if(!durl)return 0;var i=durl.indexOf(',');if(i<0)return 0;
  var b64=durl.slice(i+1);var pad=b64.endsWith('==')?2:(b64.endsWith('=')?1:0);
  return Math.max(0,Math.floor(b64.length*3/4)-pad);
}
function isImageFile(file){return !!file&&(/^image\//.test(file.type)||/\.(jpe?g|png|webp|gif|heic|heif)$/i.test(file.name||''));}
// Réduit/compresse une image via canvas hors écran (asynchrone, non bloquant).
// Renvoie un dataURL ; conserve l'original si la compression ne réduit pas la taille.
function compressImage(file,maxEdge,quality){
  maxEdge=maxEdge||2000;quality=quality||0.8;
  return new Promise(function(resolve){
    var reader=new FileReader();
    reader.onload=function(){
      var orig=reader.result;
      var img=new Image();
      img.onload=function(){
        try{
          var w=img.naturalWidth||img.width,h=img.naturalHeight||img.height;
          if(!w||!h){resolve(orig);return;}
          var longest=Math.max(w,h);
          var scale=longest>maxEdge?(maxEdge/longest):1;
          var nw=Math.round(w*scale),nh=Math.round(h*scale);
          var c=document.createElement('canvas');c.width=nw;c.height=nh;
          var ctx=c.getContext('2d');
          ctx.fillStyle='#fff';ctx.fillRect(0,0,nw,nh); // fond blanc pour PNG transparents -> JPEG
          ctx.drawImage(img,0,0,nw,nh);
          var out=c.toDataURL('image/jpeg',quality);
          resolve((out&&out.length<orig.length)?out:orig);
        }catch(e){resolve(orig);}
      };
      img.onerror=function(){resolve(orig);}; // format non décodable (ex: HEIC) -> on garde l'original
      img.src=orig;
    };
    reader.onerror=function(){resolve('');};
    reader.readAsDataURL(file);
  });
}
// Prépare un fichier pour stockage : compresse si image, sinon lit tel quel. -> {dataURL,bytes}
function prepareFileForStore(file){
  if(isImageFile(file)){
    return compressImage(file).then(function(durl){return{dataURL:durl,bytes:dataURLBytes(durl)};});
  }
  return new Promise(function(resolve){
    var r=new FileReader();
    r.onload=function(){resolve({dataURL:r.result,bytes:file.size||dataURLBytes(r.result)});};
    r.onerror=function(){resolve({dataURL:'',bytes:0});};
    r.readAsDataURL(file);
  });
}
function addDocToFolder(evt,folderId,projId){
  if(!can('items')){evt.target.value='';return denyMsg();}
  const files=evt.target.files;
  if(!files||!files.length)return;
  const p=PROJS.find(x=>x.id===projId)||PROJ;
  if(!p){evt.target.value='';return;}
  if(!p.docs_data)p.docs_data={plans:[],contrats:[],factures:[],photos:[],admin:[]};
  // Validation : uniquement des PDF.
  const arr=Array.from(files);
  const nonPdf=arr.some(function(f){return !(f.type==='application/pdf'||/\.pdf$/i.test(f.name));});
  if(nonPdf){evt.target.value='';toast('Veuillez sélectionner un fichier PDF.');return;}
  let pending=arr.length,failed=0;
  arr.forEach(function(file){
    const reader=new FileReader();
    reader.onload=function(){
      var docId='d'+(uid++);
      p.docs_data.plans.push({
        id:docId,title:file.name.replace(/\.[^.]+$/,''),folder:folderId,v:1,
        size:fmtFileSize(file.size),date:new Date().toLocaleDateString('fr-FR'),
        status:'draft',color:'#5c3d1e',type:'pdf',rem:'',tags:'',sigD:'',sigB:'',variante:'',
        fileName:file.name,mimeType:file.type||'application/pdf',createdAt:new Date().toISOString(),
        projectId:projId,area:'plans',folderId:folderId,archived:false,distPublishedAt:Date.now()
      });
      // N'annonce le succès qu'après confirmation de l'écriture IndexedDB.
      setBlob(docId,reader.result).then(function(ok){if(!ok)failed++;}).catch(function(){failed++;}).then(function(){
        pending--;if(pending<=0)finishAddDoc();
      });
    };
    reader.onerror=function(){failed++;pending--;toast('Erreur de lecture du fichier');if(pending<=0)finishAddDoc();};
    reader.readAsDataURL(file);
  });
  function finishAddDoc(){
    savePROJS();
    if(VIEW==='plans')renderPlansContent('pt-docs');
    try{if(typeof refreshStorageInfo==='function')refreshStorageInfo();}catch(e){}
    if(failed>0){
      toast(failed>=arr.length
        ?'Import non enregistré : stockage saturé. Le fichier reste disponible cette session uniquement — exportez une sauvegarde.'
        :(failed+' fichier(s) non enregistré(s) : stockage saturé, disponibles cette session uniquement.'),{type:'warn'});
    } else {
      toast(arr.length>1?(arr.length+' PDF importés'):'PDF importé');
    }
    // Si le dossier cible a une liste de notification, propose de prévenir les entreprises.
    if(failed<arr.length&&folderId){
      try{
        var node=findPlanNode(getPlanFolders(p.id),folderId);
        if(node&&folderNotifyWithEmail(node).length){
          prepareFolderNotifyEmail(folderId,arr.map(function(f){return f.name;}));
        }
      }catch(e){}
    }
  }
  evt.target.value='';
}

function folderNotifyMembers(node){var ids=folderNotifyIds(node);return getMembresForProj(PROJ).filter(function(m){return ids.indexOf(m.id)>=0;});}
function folderNotifyWithEmail(node){return folderNotifyMembers(node).filter(function(m){return m.email&&String(m.email).trim();});}
function setFolderNotify(folderId,ids){var node=findPlanNode(getPlanFolders(PROJ.id),folderId);if(!node)return;node.notify=ids.slice();savePROJS();}

function openFolderNotify(folderId,projId){

// Construit et propose l'e-mail de notification (mailto). Rien n'est envoyé sans action explicite.
var _folderNotify=null;
function prepareFolderNotifyEmail(folderId,fileNames){
  var node=findPlanNode(getPlanFolders(PROJ.id),folderId);if(!node)return;
  var recips=folderNotifyWithEmail(node);if(!recips.length)return;
  fileNames=fileNames||[];
  var proj=PROJ.name||'Projet';
  var to=recips.map(function(m){return String(m.email).trim();}).join(',');
  var subj='['+proj+'] Nouveaux plans — '+node.name;
  var lines=fileNames.map(function(n){return '- '+n;}).join('\n');
  var firm=(USER&&USER.firm)?USER.firm:(((USER&&USER.prenom)||'')+' '+((USER&&USER.nom)||'')).trim();
  var body='Bonjour,\n\nDe nouveaux plans ont été déposés dans le dossier « '+node.name+' » du projet '+proj+' :\n\n'+lines+'\n\nMerci d\'en prendre connaissance et d\'en accuser réception.\n\nCordialement,\n'+(firm||'');
  _folderNotify={folder:node.name,recips:recips,to:to,subj:subj,body:body,n:fileNames.length};
  showModal('<h3 style="display:flex;align-items:center;gap:8px"><svg class="ico ico-sm" style="color:var(--green)" aria-hidden="true"><use href="#i-bell"/></svg>Prévenir les entreprises</h3>'
    +'<div style="font-size:12.5px;color:var(--text2);line-height:1.55;margin-bottom:10px"><strong>'+fileNames.length+'</strong> nouveau(x) plan(s) dans « <strong>'+e(node.name)+'</strong> ». Préparer un e-mail pour :</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">'+recips.map(function(m){return '<span class="badge bgray" style="font-weight:500" title="'+e(m.email)+'">'+e(m.name||m.ent)+'</span>';}).join('')+'</div>'
    +'<div style="font-size:11px;color:var(--text3);margin-bottom:12px">Votre messagerie s\'ouvre, pré-remplie avec les destinataires et la liste des fichiers. <strong>Rien n\'est envoyé automatiquement</strong> — vous gardez la main.</div>'
    +'<div class="mo-foot"><button class="btn" onclick="closeModal()">Plus tard</button><button class="btn btn-p" onclick="openFolderNotifyMail()"><svg class="ico ico-xs" style="margin-right:4px" aria-hidden="true"><use href="#i-message"/></svg>Préparer l\'e-mail</button></div>');
}
function openFolderNotifyMail(){
  var n=_folderNotify;if(!n){closeModal();return;}
  var href='mailto:'+n.to+'?subject='+encodeURIComponent(n.subj)+'&body='+encodeURIComponent(n.body);
  try{logAudit('Notification plans préparée',n.folder+' · '+n.recips.length+' destinataire(s) · '+n.n+' plan(s)','file-check');}catch(e){}
  closeModal();
  try{var a=document.createElement('a');a.href=href;document.body.appendChild(a);a.click();document.body.removeChild(a);}catch(e){try{window.location.href=href;}catch(_){}}
  toast('E-mail préparé dans votre messagerie');
}

// Télécharge la version courante du document ouvert dans le panneau de détail.
function dpDownloadCurrent(){
  if(!detDoc||!detFolder)return;
  const d=(getDocsForProj(PROJ)[detFolder]||[]).find(x=>x.id===detDoc);if(!d)return;
  downloadDoc(d);
}
// Télécharge une version archivée à partir de son blob (mémoire ou IndexedDB).
function dpDownloadVersion(blobId,name){
  function go(url){
    if(!url){toast('Fichier indisponible pour cette version.');return;}
    var a=document.createElement('a');a.href=url;a.download=name||'version';a.target='_blank';a.rel='noopener';
    document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a);},100);
  }
  if(BLOBS[blobId])return go(BLOBS[blobId]);
  if(BlobDB.has(blobId)){BlobDB.get(blobId).then(function(b){if(b)BLOBS[blobId]=b;go(b);});return;}
  go('');
}
// Importe un nouveau fichier comme version courante ; conserve l'ancienne en archive.
function dpNewVersion(evt){
  if(!can('items')){evt.target.value='';return denyMsg();}
  if(!detDoc||!detFolder){evt.target.value='';return;}
  const d=(getDocsForProj(PROJ)[detFolder]||[]).find(x=>x.id===detDoc);if(!d){evt.target.value='';return;}
  const file=evt.target.files&&evt.target.files[0];if(!file){evt.target.value='';return;}
  const isPhoto=detFolder==='photos';
  const okType=isPhoto?(/^image\//.test(file.type)||/\.(jpe?g|png|webp|gif|heic|heif)$/i.test(file.name)):(file.type==='application/pdf'||/\.pdf$/i.test(file.name));
  if(!okType){evt.target.value='';toast(isPhoto?'Veuillez sélectionner une image.':'Veuillez sélectionner un fichier PDF.');return;}
  prepareFileForStore(file).then(function(res){
    if(!res.dataURL){toast('Erreur de lecture du fichier');return;}
    // Archive la version courante si un fichier existe.
    const oldUrl=getBlob(d);
    if(oldUrl){
      const archId=d.id+'_v'+d.v+'_'+(uid++);
      setBlob(archId,oldUrl);
      if(!Array.isArray(d.versions))d.versions=[];
      d.versions.push({v:d.v,blobId:archId,fileName:d.fileName||(d.title+'.pdf'),mimeType:d.mimeType||'',size:d.size||'',date:d.date||''});
    }
    d.v=(d.v||1)+1;
    d.fileName=file.name;d.mimeType=isPhoto?'image/jpeg':(file.type||'application/pdf');d.size=fmtFileSize(res.bytes);
    if(detFolder==='plans')d.distPublishedAt=Date.now(); // nouvelle version => ré-accusé requis
    setBlob(d.id,res.dataURL);
    savePROJS();
    logAudit('Nouvelle version publiée',(d.title||d.fileName||'Document')+' (v'+d.v+')','file-check');
    toast('Nouvelle version importée (v'+d.v+')');
    openDP(detFolder,detDoc);
    refreshStorageInfo();
  });
  evt.target.value='';
}
// Supprime une version ARCHIVÉE (jamais la version courante) : libère son blob et son entrée.
function dpDeleteVersion(v){
  if(!can('items'))return denyMsg();
  if(!detDoc||!detFolder)return;
  const d=(getDocsForProj(PROJ)[detFolder]||[]).find(x=>x.id===detDoc);if(!d||!Array.isArray(d.versions))return;
  if(v===d.v){toast('La version courante ne peut pas être supprimée ici.');return;}
  const idx=d.versions.findIndex(function(x){return x.v===v;});if(idx<0)return;
  confirmModal({
    title:'Supprimer cette version',
    body:'Supprimer définitivement la version <strong>v'+v+'</strong> et son fichier ? Cette action est irréversible.',
    confirmLabel:'Supprimer',
    onConfirm:function(){
      const ver=d.versions[idx];
      try{if(ver&&ver.blobId){delete BLOBS[ver.blobId];BlobDB.del(ver.blobId);}}catch(e){}
      d.versions.splice(idx,1);
      savePROJS();
      toast('Version supprimée');
      openDP(detFolder,detDoc);
      refreshStorageInfo();
    }
  });
}

function fi(label,type,id,val,ph=''){return`<div class="fi"><label for="${id}">${label}</label><input type="${type}" id="${id}" value="${e(val)}" placeholder="${ph}"></div>`;}
function fiS(label,id,opts,val,labels={}){return`<div class="fi"><label for="${id}">${label}</label><select id="${id}">${opts.map(o=>`<option value="${o}" ${o===val?'selected':''}>${labels[o]||o||'—'}</option>`).join('')}</select></div>`;}
function fiTA(label,id,val,ph=''){return`<div class="fi"><label for="${id}">${label}</label><textarea id="${id}" placeholder="${ph}">${e(val)}</textarea></div>`;}
function toISO(fr){if(!fr||fr.includes('-'))return fr;const p=fr.split('/');return p.length===3?`${p[2]}-${p[1]}-${p[0]}`:fr;}
// Validation légère du champ date : accepte jj/mm/aaaa ou mm/aaaa (vide autorisé).
function validateDateField(el){
  if(!el)return;const v=(el.value||'').trim();
  if(!v){el.style.borderColor='';return;}
  const ok=/^(\d{2}\/\d{2}\/\d{4}|\d{2}\/\d{4})$/.test(v);
  if(ok){el.style.borderColor='';}
  else{el.style.borderColor='var(--red)';toast('Format attendu : jj/mm/aaaa');}
}
function fromISO(iso){if(!iso||iso.includes('/'))return iso;const p=iso.split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:iso;}
/* ── Affichage de date sans ambiguïté (locale FR) à côté des champs <input type="date"> ──
   Les champs natifs s'affichent dans la locale du navigateur (parfois mm/jj/aaaa).
   On ajoute un libellé en clair, sans toucher à la valeur stockée. */
// Format français unique jj/mm/aaaa, partagé par les indices de saisie, le suivi et
// les textes générés (e-mail facture, etc.). Évite toute ambiguïté mm/jj des champs natifs.
function frNumDate(iso){
  if(!iso)return '';
  // Tolère une chaîne ISO complète (YYYY-MM-DDTHH:mm:ss…) en ne gardant que la date.
  var s=String(iso).slice(0,10);
  var p=s.indexOf('-')>=0?s.split('-'):null; // attend YYYY-MM-DD
  if(!p||p.length!==3)return '';
  var y=p[0],m=p[1],d=p[2];if(!+y||!+m||!+d)return '';
  return String(d).padStart(2,'0')+'/'+String(m).padStart(2,'0')+'/'+y;
}
function frLongDate(iso){return frNumDate(iso);} // conservé pour compatibilité d'appel
function dateHintSpan(inputId,iso){
  var t=frNumDate(iso);
  return '<span class="date-fr-hint" id="'+inputId+'-hint" style="display:block;font-size:11px;color:var(--text3);margin-top:3px;min-height:14px">'+(t?'jj/mm/aaaa : '+e(t):'')+'</span>';
}
function updateDateHint(el){
  if(!el)return;var s=document.getElementById(el.id+'-hint');if(!s)return;
  var t=frNumDate(el.value);s.textContent=t?('jj/mm/aaaa : '+t):'';
}
/* ── Mise en forme du budget (au blur uniquement) ──
   Reformate un montant saisi en chiffres ("320000") en euros FR ("320 000 €"),
   en réutilisant la même logique que le module dépenses (suiviEuro). On laisse
   intacts les budgets en texte libre déjà enregistrés ("—", "1,5 M€", etc.) pour
   garder la rétro-compatibilité. La valeur stockée reste une chaîne. */
function formatBudgetField(el){
  if(!el)return;
  var raw=(el.value||'').trim();
  if(!raw||/[a-zA-Z]/.test(raw))return; // vide ou texte libre : inchangé
  var digits=raw.replace(/[^\d]/g,'');
  if(!digits)return; // ex. "—" : inchangé
  var n=parseInt(digits,10);
  if(isNaN(n))return;
  el.value=suiviEuro(n);
}
function e(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function clGH(node,addRow){

/* ══ AUDIT ══ */
// ── Chronologie : événements datés dérivés des données existantes (lecture seule) ──
/* ══ DIFFUSION & ACCUSÉS DE RÉCEPTION DES PLANS (Tier A — déclaratif, local) ══
   Modèle local et account-less : l'app ne peut PAS observer ce que font les autres
   sur leurs propres appareils. Les statuts ci-dessous sont donc DÉCLARATIFS : c'est
   l'architecte qui consigne, par destinataire et par version, où en est la diffusion.
   Chaque plan porte d.dist = [{memberId, v, sentAt, seenAt, ackAt}] (timestamps ms)
   et d.distPublishedAt = date de publication de la version courante. */
function projStaleDays(p){var n=p&&parseInt(p.staleDays,10);return (n&&n>0)?n:14;}
function planRecipients(p){
  // Destinataires concernés = intervenants ayant accès au dossier « Plans ».
  return getMembresForProj(p).filter(function(m){normalizeMbr(m);return m.dossiers&&m.dossiers['Plans']!==false;});
}
function planPublishedTs(d){
  if(d&&d.distPublishedAt)return d.distPublishedAt;
  var dt=parseAnyDate(d&&d.date);if(dt)return dt.getTime();
  if(d&&d.createdAt){var t=Date.parse(d.createdAt);if(!isNaN(t))return t;}
  return null;
}
function distEntry(d,mid,create){
  if(!Array.isArray(d.dist))d.dist=[];
  var en=d.dist.find(function(x){return x.memberId===mid;});
  if(!en&&create){en={memberId:mid,v:0,sentAt:null,seenAt:null,ackAt:null};d.dist.push(en);}
  return en||null;
}
// Statut d'un destinataire pour la version courante v (les évènements d'une version
// antérieure n'attestent pas de la version actuelle -> retour à « à diffuser »).
function distStatus(en,v){
  if(!en||en.v!==v)return 'a_diffuser';
  if(en.ackAt)return 'accuse';
  if(en.seenAt)return 'vu';
  if(en.sentAt)return 'diffuse';
  return 'a_diffuser';
}
var DIST_LABELS={a_diffuser:'À diffuser',diffuse:'Diffusé',vu:'Vu',accuse:'Accusé'};
var DIST_COL={a_diffuser:'var(--text3)',diffuse:'var(--amber)',vu:'var(--blue)',accuse:'var(--green)'};
function distLastDate(en,st){
  if(!en)return '';
  var ts=st==='accuse'?en.ackAt:(st==='vu'?en.seenAt:(st==='diffuse'?en.sentAt:null));
  return ts?auditRelTime(ts):'';
}
// Avance le statut déclaratif (cycle), horodate et journalise.
function cycleDist(planId,memberId){
  if(!can('items'))return denyMsg();
  var d=(getDocsForProj(PROJ).plans||[]).find(function(x){return x.id===planId;});if(!d)return;
  var v=d.v||1;var en=distEntry(d,memberId,true);
  var st=distStatus(en,v);
  var order=['a_diffuser','diffuse','vu','accuse'];
  var next=order[(order.indexOf(st)+1)%order.length];
  setDist(planId,memberId,next);
}
// Fixe un statut déclaratif précis pour un destinataire sur la version courante.
function setDist(planId,memberId,status){
  if(!can('items'))return denyMsg();
  var d=(getDocsForProj(PROJ).plans||[]).find(function(x){return x.id===planId;});if(!d)return;
  var v=d.v||1;var now=Date.now();
  var en=distEntry(d,memberId,true);
  if(en.v!==v){en.v=v;en.sentAt=null;en.seenAt=null;en.ackAt=null;}
  if(status==='a_diffuser'){en.sentAt=null;en.seenAt=null;en.ackAt=null;}
  else if(status==='diffuse'){en.sentAt=en.sentAt||now;en.seenAt=null;en.ackAt=null;}
  else if(status==='vu'){en.sentAt=en.sentAt||now;en.seenAt=now;en.ackAt=null;}
  else if(status==='accuse'){en.sentAt=en.sentAt||now;en.seenAt=en.seenAt||now;en.ackAt=now;}
  var m=getMembresForProj(PROJ).find(function(x){return x.id===memberId;});
  var mn=m?(m.name||'Intervenant'):'Intervenant';
  var pt=(d.title||d.fileName||'plan')+' (v'+v+', déclaratif)';
  if(status==='diffuse')logAudit('Plan diffusé à '+mn,pt,'file-check');
  else if(status==='vu')logAudit('Plan vu par '+mn,pt,'eye');
  else if(status==='accuse')logAudit('Accusé de réception — '+mn,pt,'check');
  savePROJS();
  if(VIEW==='diffusion')renderDiffusion();
}
// Diffuse la version courante à tous les destinataires concernés (déclaratif).
function distSendAll(planId){
  if(!can('items'))return denyMsg();
  var d=(getDocsForProj(PROJ).plans||[]).find(function(x){return x.id===planId;});if(!d)return;
  var v=d.v||1,now=Date.now();
  planRecipients(PROJ).forEach(function(m){
    var en=distEntry(d,m.id,true);
    if(en.v!==v){en.v=v;en.sentAt=null;en.seenAt=null;en.ackAt=null;}
    if(!en.sentAt){en.sentAt=now;}
  });
  logAudit('Plan diffusé à tous',(d.title||d.fileName||'plan')+' (v'+v+', déclaratif)','file-check');
  savePROJS();if(VIEW==='diffusion')renderDiffusion();
}
// Destinataires en retard pour un plan (diffusé/publié mais non accusé au-delà du seuil).
function planStaleRecipients(p,d,now){
  var N=projStaleDays(p),v=d.v||1,out=[];
  planRecipients(p).forEach(function(m){
    var en=distEntry(d,m.id,false);
    var st=distStatus(en,v);
    if(st==='accuse')return;
    var refTs=(en&&en.v===v&&en.sentAt)?en.sentAt:planPublishedTs(d);
    if(!refTs)return;
    var age=Math.floor((now.getTime()-refTs)/86400000);
    if(age>N)out.push({m:m,status:st,ageDays:age});
  });
  return out;
}
// Résumé des retards de diffusion pour un intervenant donné (pour sa fiche).
function memberStalePlans(p,mid,now){
  now=now||new Date();var res=[];
  (getDocsForProj(p).plans||[]).forEach(function(d){
    if(d.archived)return;
    planStaleRecipients(p,d,now).forEach(function(s){if(s.m.id===mid)res.push({plan:d,ageDays:s.ageDays,status:s.status});});
  });
  return res;
}

/* ══ PLANNING CHANTIER (Gantt par phases sur axe mois / semaines ISO) ══
   PROJ.chantier = [{id,label,group,color,lot,memberId,start,end,dependsOnPlans:[{planId,versionId}],status}]
   Migration douce : une tâche sans `group` apparaît sous « Autres ». */
var _chantierView='gantt';
function setChantierView(v){_chantierView=v;renderChantier();}
var GANTT_MONTHS=['janv.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
var GANTT_PALETTE=['#5c3d1e','#1a7a4a','#c47a00','#6b3fa0','#0891b2','#2d4ef5','#b45309','#0f766e'];
var GANTT_WEEK_W=38;
// Lundi (00:00) de la semaine contenant `date`.
function ganttMonday(date){var d=new Date(date.getFullYear(),date.getMonth(),date.getDate());var day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);d.setHours(0,0,0,0);return d;}
// Numéro de semaine ISO (1..53), basé sur le jeudi de la semaine.
function ganttISOWeek(date){var d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));var dn=(d.getUTCDay()+6)%7;d.setUTCDate(d.getUTCDate()-dn+3);var ft=d.getTime();d.setUTCMonth(0,1);if(d.getUTCDay()!==4){d.setUTCMonth(0,1+((4-d.getUTCDay())+7)%7);}return 1+Math.round((ft-d.getTime())/604800000);}
function chantierEnsure(p){if(p&&!Array.isArray(p.chantier))p.chantier=[];}
// Une tâche est « bloquée » si un plan dont elle dépend n'a pas été accusé par
// l'intervenant responsable (réutilise le registre de diffusion ci-dessus).
function chantierTaskBlocked(p,task){
  var blockers=[];
  (task.dependsOnPlans||[]).forEach(function(ref){
    var d=(getDocsForProj(p).plans||[]).find(function(x){return x.id===ref.planId;});
    if(!d)return;
    var en=distEntry(d,task.memberId,false);
    var st=distStatus(en,d.v||1);
    if(st!=='accuse')blockers.push((d.title||d.fileName||'plan'));
  });
  return blockers;
}

// Vue liste (conservée, utile sur très petit écran).

  tasks.slice().sort(function(a,b){var da=parseAnyDate(a.start),db=parseAnyDate(b.start);return (da?da.getTime():0)-(db?db.getTime():0);}).forEach(function(t){
    var m=getMembresForProj(p).find(function(x){return x.id===t.memberId;});
    var blockers=chantierTaskBlocked(p,t);
    var when=[t.start,t.end].filter(Boolean).join(' → ');
    var g=(t.group||'').trim();
    html+='<div class="aud-card" style="display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border:1px solid '+(blockers.length?'#fca5a5':'var(--border)')+';border-radius:var(--r);cursor:pointer;'+(blockers.length?'background:#fff5f5':'')+'" onclick="openChantierTask(\''+t.id+'\')">'
      +'<svg class="ico ico-sm" style="color:'+(blockers.length?'var(--red)':'var(--text3)')+';flex-shrink:0;margin-top:1px"><use href="#i-'+(blockers.length?'warning':'helmet')+'"/></svg>'
      +'<div style="flex:1;min-width:0">'
        +'<div style="font-size:13px;font-weight:500">'+e(t.label||'Tâche')+(g?' <span class="badge bgray" style="font-size:9px">'+e(g)+'</span>':'')+(t.lot?' <span class="badge bgray" style="font-size:9px">'+e(t.lot)+'</span>':'')+'</div>'
        +'<div style="font-size:11px;color:var(--text3);margin-top:2px">'+(when?e(when)+' · ':'')+(m?e(m.name):'Sans responsable')+'</div>'
        +(blockers.length?'<div style="font-size:11px;color:var(--red);margin-top:3px">Bloqué : plan'+(blockers.length>1?'s':'')+' non confirmé'+(blockers.length>1?'s':'')+' par le responsable — '+e(blockers.join(', '))+'</div>':'')
      +'</div>'
      +permBtn('items','<svg class="ico ico-xs"><use href="#i-trash"/></svg>','event.stopPropagation();deleteChantierTask(\''+t.id+'\')','btn-g btn-sm','padding:2px 7px;color:var(--red)')
    +'</div>';
  });
  return html+'</div>';
}
// Vue Gantt : barres colorées par phase sur un axe mois + semaines ISO.
function renderChantierGantt(p,tasks){
  function dOf(s){return parseAnyDate(s);}
  var today=new Date();today.setHours(0,0,0,0);
  var all=[today];
  tasks.forEach(function(t){var a=dOf(t.start),b=dOf(t.end);if(a)all.push(a);if(b)all.push(b);});
  var ps=dOf(p.start),pl=dOf(p.livraison);if(ps)all.push(ps);if(pl)all.push(pl);
  var times=all.map(function(d){return d.getTime();});
  var minD=new Date(Math.min.apply(null,times)),maxD=new Date(Math.max.apply(null,times));
  var startMon=ganttMonday(minD);startMon.setDate(startMon.getDate()-7);
  var endMon=ganttMonday(maxD);endMon.setDate(endMon.getDate()+7);
  var weeks=[],cur=new Date(startMon),guard=0;
  while(cur<=endMon&&guard<520){weeks.push(new Date(cur));cur.setDate(cur.getDate()+7);guard++;}
  var W=GANTT_WEEK_W,trackW=weeks.length*W;
  function wkIdx(d){if(!d)return null;var i=Math.round((ganttMonday(d)-startMon)/604800000);return Math.max(0,Math.min(weeks.length-1,i));}
  var todayIdx=wkIdx(today);
  var todayLeft=(todayIdx*W+W/2-1);
  function todayLine(){return '<div class="g-today" style="left:'+todayLeft+'px"></div>';}
  // Bandeaux mois (row 1)
  var bands=[],prevY=null;
  weeks.forEach(function(wk,i){var y=wk.getFullYear(),mo=wk.getMonth();var last=bands[bands.length-1];if(last&&last.y===y&&last.mo===mo)last.count++;else bands.push({y:y,mo:mo,count:1});});
  var monthCells='';bands.forEach(function(bd){var lab=GANTT_MONTHS[bd.mo]+(bd.y!==prevY?' '+bd.y:'');prevY=bd.y;monthCells+='<div class="g-month" style="width:'+(bd.count*W)+'px">'+lab+'</div>';});
  // Semaines ISO (row 2)
  var weekCells='';weeks.forEach(function(wk,i){var we=new Date(wk);we.setDate(we.getDate()+6);var tt='Sem. '+ganttISOWeek(wk)+' · '+wk.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})+' – '+we.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});weekCells+='<div class="g-week'+(i===todayIdx?' g-wk-now':'')+'" style="width:'+W+'px" title="'+e(tt)+'">'+ganttISOWeek(wk)+'</div>';});
  var header='<div class="g-row g-months"><div class="g-label g-corner"></div><div class="g-track" style="width:'+trackW+'px">'+monthCells+'</div></div>'
    +'<div class="g-row g-weeks"><div class="g-label g-corner">Tâche · sem.</div><div class="g-track" style="width:'+trackW+'px">'+weekCells+'</div></div>';
  // Regroupement par phase (ordre d'apparition)
  var order=[],map={};
  tasks.forEach(function(t){var g=(t.group||'').trim()||'Autres';if(!map[g]){map[g]=[];order.push(g);}map[g].push(t);});
  var gColor={};order.forEach(function(g,i){gColor[g]=GANTT_PALETTE[i%GANTT_PALETTE.length];});
  var rows='';
  order.forEach(function(g){
    var children=map[g],sMin=null,sMax=null;
    children.forEach(function(t){var a=wkIdx(dOf(t.start)||dOf(t.end)),b=wkIdx(dOf(t.end)||dOf(t.start));if(a!=null){sMin=(sMin==null?a:Math.min(sMin,a));}if(b!=null){sMax=(sMax==null?b:Math.max(sMax,b));}});
    var gbar='';if(sMin!=null&&sMax!=null){gbar='<div class="g-bar g-summary" style="left:'+(sMin*W)+'px;width:'+((sMax-sMin+1)*W)+'px;background:'+gColor[g]+'"></div>';}
    rows+='<div class="g-row g-group"><div class="g-label" title="'+e(g)+'">'+e(g)+'</div><div class="g-track" style="width:'+trackW+'px">'+todayLine()+gbar+'</div></div>';
    children.forEach(function(t){
      var a=dOf(t.start),b=dOf(t.end),ai=wkIdx(a||b),bi=wkIdx(b||a);
      var m=getMembresForProj(p).find(function(x){return x.id===t.memberId;});
      var blockers=chantierTaskBlocked(p,t);
      var col=t.color||gColor[g];
      var bar='';
      if(ai!=null&&bi!=null){
        var left=ai*W,w=Math.max(W-2,(bi-ai+1)*W-2);
        var tip=[t.label||'Tâche',t.lot?('Lot : '+t.lot):'',m?('Responsable : '+m.name):'Sans responsable',(t.start||'?')+' → '+(t.end||'?'),blockers.length?('Bloqué : '+blockers.join(', ')):''].filter(Boolean).join('\n');
        bar='<div class="g-bar'+(blockers.length?' g-blocked':'')+'" style="left:'+left+'px;width:'+w+'px;'+(blockers.length?'':'background:'+col)+'" title="'+e(tip)+'">'+e(t.label||'')+'</div>';
      }
      var lbl=(blockers.length?'<svg class="ico ico-xs" style="color:var(--red);flex-shrink:0"><use href="#i-warning"/></svg>':'')+'<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+e(t.label||'Tâche')+'</span>';
      rows+='<div class="g-row g-task" onclick="openChantierTask(\''+t.id+'\')"><div class="g-label" title="'+e(t.label||'')+(blockers.length?' — bloqué (plan non confirmé)':'')+'">'+lbl+'</div><div class="g-track" style="width:'+trackW+'px">'+todayLine()+bar+'</div></div>';
    });
  });
  return '<div class="gantt-wrap"><div class="gantt-grid">'+header+rows+'</div></div>'
    +'<div class="g-scroll-hint"><svg class="ico ico-xs" style="flex-shrink:0;margin-top:1px"><use href="#i-arrow-right"/></svg>'
    +'<span>Faites défiler horizontalement pour voir toute la durée. La ligne rouge marque la semaine en cours ; une barre rayée rouge signale un plan dont dépend la tâche non encore confirmé par le responsable. Cliquez une barre pour modifier la tâche.</span></div>';
}
function openChantierTask(editId){
  if(!can('items'))return denyMsg();chantierEnsure(PROJ);
  var members=getMembresForProj(PROJ);
  var plans=(getDocsForProj(PROJ).plans||[]).filter(function(d){return !d.archived;});
  var task=editId?(PROJ.chantier||[]).find(function(x){return x.id===editId;}):null;
  var groups=[];(PROJ.chantier||[]).forEach(function(t){var g=(t.group||'').trim();if(g&&groups.indexOf(g)<0)groups.push(g);});
  var dep0=(task&&task.dependsOnPlans&&task.dependsOnPlans[0])?task.dependsOnPlans[0].planId:'';
  var colSel=function(c){return (task&&(task.color||'')===c)?' selected':'';};
  var delBtn=task?('<button class="btn btn-g" style="color:var(--red);margin-right:auto" onclick="closeModal();deleteChantierTask(\''+task.id+'\')">Supprimer</button>'):'';
  showModal('<h3 style="display:flex;align-items:center;gap:8px"><svg class="ico ico-sm" style="color:var(--blue)"><use href="#i-helmet"/></svg> '+(task?'Modifier la tâche':'Ajouter une tâche')+'</h3>'
    +'<div class="fi"><label>Intitulé</label><input id="ct-label" placeholder="Ex: Coulage dalle" value="'+e(task?task.label:'')+'"></div>'
    +'<div class="fi"><label>Phase / zone</label><input id="ct-group" list="ct-group-list" placeholder="Ex: Fondations, Villa zone bas…" value="'+e(task?task.group:'')+'"><datalist id="ct-group-list">'+groups.map(function(g){return '<option value="'+e(g)+'">';}).join('')+'</datalist></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fi"><label>Lot</label><input id="ct-lot" placeholder="Ex: Gros œuvre" value="'+e(task?task.lot:'')+'"></div>'
    +'<div class="fi"><label>Responsable</label><select id="ct-m"><option value="">—</option>'+members.map(function(m){return '<option value="'+m.id+'"'+(task&&task.memberId===m.id?' selected':'')+'>'+e(m.name||'Intervenant')+'</option>';}).join('')+'</select></div></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fi"><label>Début</label><input type="date" id="ct-start" value="'+e(task?toISO(task.start):'')+'" oninput="updateDateHint(this)">'+dateHintSpan('ct-start',task?toISO(task.start):'')+'</div>'
    +'<div class="fi"><label>Fin</label><input type="date" id="ct-end" value="'+e(task?toISO(task.end):'')+'" oninput="updateDateHint(this)">'+dateHintSpan('ct-end',task?toISO(task.end):'')+'</div></div>'
    +'<div class="fi"><label>Couleur de la barre</label><select id="ct-color"><option value=""'+(task&&!task.color?' selected':'')+'>Auto (couleur de la phase)</option>'+GANTT_PALETTE.map(function(c){return '<option value="'+c+'"'+colSel(c)+'>'+c+'</option>';}).join('')+'</select></div>'
    +(plans.length?'<div class="fi"><label>Plan dont dépend la tâche (optionnel)</label><select id="ct-plan"><option value="">Aucun</option>'+plans.map(function(d){return '<option value="'+d.id+'"'+(dep0===d.id?' selected':'')+'>'+e(d.title||d.fileName||'Plan')+' (v'+(d.v||1)+')</option>';}).join('')+'</select></div>':'')
    +'<div class="mo-foot">'+delBtn+'<button class="btn" onclick="closeModal()">Annuler</button><button class="btn btn-p" onclick="saveChantierTask('+(task?'\''+task.id+'\'':'')+')">'+(task?'Enregistrer':'Ajouter')+'</button></div>');
}
function saveChantierTask(editId){
  if(!can('items'))return denyMsg();chantierEnsure(PROJ);
  var label=(document.getElementById('ct-label')?.value||'').trim();if(!label){toast('Indiquez un intitulé.');return;}
  var startRaw=(document.getElementById('ct-start')?.value||'').trim();
  var endRaw=(document.getElementById('ct-end')?.value||'').trim();
  if(startRaw&&endRaw&&endRaw<startRaw){toast('La fin ne peut pas précéder le début.',{type:'warn'});return;}
  var planId=document.getElementById('ct-plan')?.value||'';
  var dep=[];if(planId){var d=(getDocsForProj(PROJ).plans||[]).find(function(x){return x.id===planId;});if(d)dep.push({planId:d.id,versionId:d.v||1});}
  var base={label:label,group:(document.getElementById('ct-group')?.value||'').trim(),color:document.getElementById('ct-color')?.value||'',
    lot:(document.getElementById('ct-lot')?.value||'').trim(),memberId:document.getElementById('ct-m')?.value||'',
    start:startRaw?fromISO(startRaw):'',end:endRaw?fromISO(endRaw):'',dependsOnPlans:dep};
  if(editId){var t=(PROJ.chantier||[]).find(function(x){return x.id===editId;});if(t)Object.assign(t,base);}
  else{PROJ.chantier.push(Object.assign({id:'ct'+(uid++),status:'a_faire'},base));}
  savePROJS();closeModal();renderChantier();toast(editId?'Tâche modifiée':'Tâche ajoutée');
}
function deleteChantierTask(id){
  if(!can('items'))return denyMsg();chantierEnsure(PROJ);
  var i=PROJ.chantier.findIndex(function(x){return x.id===id;});if(i<0)return;
  var rm=PROJ.chantier[i];PROJ.chantier.splice(i,1);savePROJS();renderChantier();
  toast('Tâche supprimée',{undo:function(){PROJ.chantier.splice(i,0,rm);savePROJS();renderChantier();toast('Tâche rétablie');}});
}

function renderTimeline(){
  if(!PROJ)return;const p=PROJ;
  setTB('check-list',p.color,'Chronologie',p.name,'','');
  setTabs(null);
  var now=new Date();now.setHours(0,0,0,0);
  var ev=[],skipped=0;
  function add(dateStr,label,sub,col){var d=parseAnyDate(dateStr);if(!d){if(dateStr)skipped++;return;}ev.push({d:d,label:label,sub:sub||'',col:col||'var(--blue)'});}
  add(p.start,'Début du projet','','var(--blue)');
  (p.suivi||[]).forEach(function(g){(g.devis||[]).forEach(function(dv){
    if(dv.signe&&dv.dateSignature)add(dv.dateSignature,'Devis signé'+(dv.article?' — '+dv.article:''),(dv.entreprise||'')+(dv.prixHT?' · '+suiviEuro(suiviNum(dv.prixHT)*(1+suiviNum(dv.tva)/100))+' TTC':''),'var(--green)');
    (dv.factures||[]).forEach(function(f){
      if(f.dateFacture)add(f.dateFacture,'Facture émise'+(f.refFacture?' n° '+f.refFacture:''),(f.montant?suiviEuro(suiviNum(f.montant)):'')+(f.datePaiement?' · payée':' · en attente'),f.datePaiement?'var(--green)':'var(--amber)');
      if(f.envoiClient)add(f.envoiClient,'Facture envoyée au client'+(f.refFacture?' n° '+f.refFacture:''),f.montant?suiviEuro(suiviNum(f.montant)):'','var(--amber)');
      if(f.valideClient)add(f.valideClient,'Facture validée par le client'+(f.refFacture?' n° '+f.refFacture:''),f.montant?suiviEuro(suiviNum(f.montant)):'','var(--green)');
      if(f.datePaiement)add(f.datePaiement,'Paiement reçu'+(f.refFacture?' (n° '+f.refFacture+')':''),f.montant?suiviEuro(suiviNum(f.montant)):'','var(--green)');
    });
  });});
  (p.pv||[]).forEach(function(v){if(!v.archived)add(v.date,'PV — '+(v.titre||'document'),'','var(--purple)');});
  add(p.livraison,(parseAnyDate(p.livraison)&&parseAnyDate(p.livraison)<now)?'Livraison':'Livraison prévue','','var(--amber)');
  // Jalons manuels (couleur distincte) — éditables/supprimables.
  (Array.isArray(p.milestones)?p.milestones:[]).forEach(function(m){
    var d=parseAnyDate(m.date);if(!d){return;}
    ev.push({d:d,label:m.label||'Jalon',sub:m.note||'',col:'#0891b2',ms:true,id:m.id});
  });
  // Diffusion des plans (déclaratif) : diffusions, consultations, accusés — et relances dues.
  var _N=projStaleDays(p);
  (getDocsForProj(p).plans||[]).forEach(function(d){
    if(d.archived)return;
    var pt=(d.title||d.fileName||'plan');
    (d.dist||[]).forEach(function(en){
      var m=getMembresForProj(p).find(function(x){return x.id===en.memberId;});
      var mn=m?(m.name||'Intervenant'):'Intervenant';
      if(en.sentAt)ev.push({d:new Date(en.sentAt),label:'Plan diffusé — '+pt,sub:'à '+mn+' · déclaratif',col:'var(--amber)'});
      if(en.seenAt)ev.push({d:new Date(en.seenAt),label:'Plan consulté — '+pt,sub:mn+' · déclaratif',col:'var(--blue)'});
      if(en.ackAt)ev.push({d:new Date(en.ackAt),label:'Accusé de réception — '+pt,sub:mn+' · déclaratif',col:'var(--green)'});
    });
    // Relance suggérée : destinataire n'ayant pas confirmé au-delà du seuil (qui n'a PAS vu/accusé).
    planStaleRecipients(p,d,now).forEach(function(s){
      var en=distEntry(d,s.m.id,false);
      var refTs=(en&&en.v===(d.v||1)&&en.sentAt)?en.sentAt:planPublishedTs(d);
      if(!refTs)return;
      var dueTs=refTs+_N*86400000;
      ev.push({d:new Date(dueTs),label:'Relance suggérée — '+pt,sub:(s.m.name||'Intervenant')+' · non confirmé depuis '+s.ageDays+' j',col:'var(--red)'});
    });
  });
  // Planning chantier : début / fin des tâches alimentent la même chronologie.
  (Array.isArray(p.chantier)?p.chantier:[]).forEach(function(t){
    var ds=parseAnyDate(t.start);if(ds)ev.push({d:ds,label:'Chantier — début : '+(t.label||'tâche'),sub:t.lot||'',col:'#0891b2'});
    var de=parseAnyDate(t.end);if(de)ev.push({d:de,label:'Chantier — fin : '+(t.label||'tâche'),sub:t.lot||'',col:'#0891b2'});
  });
  ev.sort(function(a,b){return a.d-b.d;});

  var addBtn=permBtn('items','<svg class="ico ico-xs" style="margin-right:4px"><use href="#i-plus"/></svg>Ajouter un jalon','openMilestone()','btn-g btn-sm');
  var body;
  if(!ev.length){
    body='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;color:var(--text3)">'
      +'<svg class="ico" style="width:32px;height:32px;color:var(--border2);margin-bottom:10px"><use href="#i-check-list"/></svg>'
      +'<div style="font-size:14px;font-weight:500;color:var(--text2);margin-bottom:4px">Aucun événement daté</div>'
      +'<div style="font-size:12px;max-width:320px;line-height:1.5">Renseignez la date de début, la livraison, des devis et factures datés, ou ajoutez un jalon manuel pour voir la progression ici.</div>'
    +'</div>';
  } else {
    body='<div style="position:relative;padding-left:26px">'
      +'<div style="position:absolute;left:9px;top:6px;bottom:6px;width:2px;background:var(--border)"></div>'
      +ev.map(function(it){
        var fr=it.d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});
        var future=it.d>now;
        return '<div style="position:relative;margin-bottom:16px">'
          +'<span style="position:absolute;left:-22px;top:2px;width:12px;height:12px;border-radius:50%;background:'+(future?'var(--panel)':it.col)+';border:2px solid '+it.col+'"></span>'
          +'<div style="font-size:11px;color:var(--text3);margin-bottom:2px">'+e(fr)+(future?' · à venir':'')+(it.ms?' · jalon':'')+'</div>'
          +'<div style="display:flex;align-items:center;gap:6px"><div style="flex:1;font-size:13px;font-weight:500;color:var(--text)">'+e(it.label)+'</div>'
          +(it.ms?permBtn('items','<svg class="ico ico-xs"><use href="#i-edit"/></svg>','openMilestone(\''+it.id+'\')','btn-g btn-sm','padding:2px 6px')+permBtn('items','<svg class="ico ico-xs"><use href="#i-trash"/></svg>','deleteMilestone(\''+it.id+'\')','btn-g btn-sm','padding:2px 6px;color:var(--red)'):'')
          +'</div>'
          +(it.sub?'<div style="font-size:11.5px;color:var(--text3);margin-top:1px">'+e(it.sub)+'</div>':'')
        +'</div>';
      }).join('')
    +'</div>'
    +(skipped?'<div style="font-size:11px;color:var(--text3);margin-top:6px">'+skipped+' événement(s) sans date exploitable non affiché(s).</div>':'');
  }
  document.getElementById('content').innerHTML='<div class="pad">'
    +'<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:14px"><div style="flex:1;font-size:12px;color:var(--text3)">Événements datés du projet, du début à la livraison. Calculé automatiquement, plus vos jalons manuels.</div>'+addBtn+'</div>'
    +body+'</div>';
}
function msEnsure(){if(!PROJ)return;if(!Array.isArray(PROJ.milestones))PROJ.milestones=[];}
function openMilestone(editId){
  if(!can('items'))return denyMsg();
  msEnsure();
  var m=editId?PROJ.milestones.find(function(x){return x.id===editId;}):null;
  showModal('<h3 style="display:flex;align-items:center;gap:8px"><svg class="ico ico-sm" style="color:var(--blue)"><use href="#i-check-list"/></svg>'+(editId?'Modifier le jalon':'Ajouter un jalon')+'</h3>'
    +'<div class="fi"><label>Date</label><input type="date" id="ms-date" value="'+e(m?toISO(m.date):'')+'" oninput="updateDateHint(this)">'+dateHintSpan('ms-date',m?toISO(m.date):'')+'</div>'
    +'<div class="fi"><label>Libellé</label><input type="text" id="ms-label" value="'+e(m?m.label:'')+'" placeholder="Ex: Démarrage gros œuvre"></div>'
    +'<div class="fi"><label>Note (optionnel)</label><input type="text" id="ms-note" value="'+e(m?(m.note||''):'')+'" placeholder="Précision…"></div>'
    +'<div class="mo-foot"><button class="btn" onclick="closeModal()">Annuler</button><button class="btn btn-p" onclick="saveMilestone('+(editId?'\''+editId+'\'':'null')+')">Enregistrer</button></div>');
  setTimeout(function(){var el=document.getElementById('ms-date');if(el)el.focus();},40);
}
function saveMilestone(editId){
  if(!can('items'))return denyMsg();
  msEnsure();
  var iso=(document.getElementById('ms-date')?.value||'').trim();
  var label=(document.getElementById('ms-label')?.value||'').trim();
  var note=(document.getElementById('ms-note')?.value||'').trim();
  if(!iso){toast('Indiquez une date.');return;}
  if(!label){toast('Indiquez un libellé.');return;}
  var date=fromISO(iso);
  if(editId){var m=PROJ.milestones.find(function(x){return x.id===editId;});if(m){m.date=date;m.label=label;m.note=note;}}
  else{PROJ.milestones.push({id:'ms'+(uid++),date:date,label:label,note:note});}

/* ══ SUIVI DES DÉPENSES (hiérarchique) ══
   Modèle : PROJ.suivi = [ groupe ]
     groupe : {id, nom, devis:[ devis ]}
     devis  : {id, article, entreprise, refDevis, tva, prixHT, dateDevis, dateSignature, signe, devisPdf, factures:[ facture ]}
     facture: {id, refFacture, libelle, montant, dateFacture, datePaiement, facturePdf}
   Migration douce depuis l'ancien format plat (rétro-compatible, sans perte).
   PDF épinglés réutilisent setBlob / viewDoc. */
var suiviQ='';
// Sous-vue active du module dépenses : 'reel' (suivi devis/factures) | 'prechiffrage' (estimatif).
var suiviTab='reel';
var SVCSS='width:100%;min-width:0;border:1px solid var(--border);border-radius:6px;padding:4px 6px;font-family:inherit;font-size:12px;background:var(--panel);color:var(--text)';

function ensureSuivi(p){
  if(!p)return;
  if(!Array.isArray(p.suivi)){p.suivi=[];return;}
  if(!p.suivi.length)return;
  // Déjà hiérarchique ?
  var isHier=p.suivi.every(function(g){return g&&Array.isArray(g.devis);});
  if(isHier){
    // garantit les sous-tableaux
    p.suivi.forEach(function(g){if(!Array.isArray(g.devis))g.devis=[];g.devis.forEach(function(d){if(!Array.isArray(d.factures))d.factures=[];});});
    return;
  }
  // Ancien format plat -> arborescence (une ligne = un devis ; sa facture devient un enfant).
  var groups={},order=[];
  p.suivi.forEach(function(en){
    var gname=en.groupe||'Sans groupe';
    if(!groups[gname]){groups[gname]={id:'sg'+(uid++),nom:gname,devis:[]};order.push(gname);}
    var dv={id:en.id||('sd'+(uid++)),article:en.article||'',entreprise:en.entreprise||'',refDevis:en.refDevis||'',
      tva:en.tva==null?20:en.tva,prixHT:en.prixHT||'',dateDevis:en.dateDevis||'',dateSignature:en.dateSignature||'',
      signe:!!en.signe,devisPdf:en.devisPdf||null,factures:[]};
    if(en.refFacture||en.montantFacture||en.dateFacture||en.facturePdf){
      dv.factures.push({id:'sf'+(uid++),refFacture:en.refFacture||'',libelle:'',montant:en.montantFacture||'',dateFacture:en.dateFacture||'',datePaiement:'',facturePdf:en.facturePdf||null});
    }
    groups[gname].devis.push(dv);
  });
  p.suivi=order.map(function(n){return groups[n];});
}

// Recherche dans l'arbre
function suiviFindGroup(id){return PROJ&&PROJ.suivi?PROJ.suivi.find(function(g){return g.id===id;}):null;}
function suiviFindDevis(id){if(!PROJ||!PROJ.suivi)return null;for(var i=0;i<PROJ.suivi.length;i++){var d=(PROJ.suivi[i].devis||[]).find(function(x){return x.id===id;});if(d)return{g:PROJ.suivi[i],d:d};}return null;}
function suiviFindFacture(id){if(!PROJ||!PROJ.suivi)return null;for(var i=0;i<PROJ.suivi.length;i++){var ds=PROJ.suivi[i].devis||[];for(var j=0;j<ds.length;j++){var f=(ds[j].factures||[]).find(function(x){return x.id===id;});if(f)return{g:PROJ.suivi[i],d:ds[j],f:f};}}return null;}

function suiviNum(v){if(v==null)return 0;var n=parseFloat(String(v).replace(/\s/g,'').replace(',','.'));return isNaN(n)?0:n;}
function suiviEuro(n){return (n||0).toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0});}
function devisCalc(d){var ht=suiviNum(d.prixHT),tva=suiviNum(d.tva),ttc=ht*(1+tva/100);var fac=(d.factures||[]).reduce(function(s,f){return s+suiviNum(f.montant);},0);return{ht:ht,ttc:ttc,fac:fac,reste:ttc-fac,pct:ttc>0?Math.round(fac/ttc*100):null};}
function groupCalc(g){var ht=0,ttc=0,fac=0;(g.devis||[]).forEach(function(d){var c=devisCalc(d);ht+=c.ht;ttc+=c.ttc;fac+=c.fac;});return{ht:ht,ttc:ttc,fac:fac,reste:ttc-fac};}
// Totaux financiers consolidés d'un projet (source unique : PROJ.suivi).
function projFinance(p){
  var ttc=0,fac=0,has=false;
  (p&&p.suivi?p.suivi:[]).forEach(function(g){(g.devis||[]).forEach(function(d){var c=devisCalc(d);ttc+=c.ttc;fac+=c.fac;has=true;});});
  return{has:has,ttc:ttc,fac:fac,reste:Math.max(0,ttc-fac)};
}

/* ── Validation client d'une facture ──────────────────────────────────────
   Champs facture : envoiClient (date d'envoi au client) + valideClient (date
   d'accord du client). App locale : « envoyer » prépare un e-mail / message
   que VOUS envoyez (rien n'est transmis automatiquement). */
function suiviFmtDate(iso){ if(!iso)return ''; var p=String(iso).split('-'); return p.length===3?(p[2]+'/'+p[1]+'/'+p[0]):iso; }
// Cellule « Validation client » d'une ligne facture.
function suiviClientCell(f){
  var sent=f.envoiClient, val=f.valideClient;
  var status = val
    ? '<span class="bgreen" style="display:inline-block;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:600">✓ Validée le '+e(suiviFmtDate(val))+'</span>'
    : (sent
        ? '<span style="display:inline-block;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:600;background:var(--amber-bg);color:var(--amber)">Envoyée le '+e(suiviFmtDate(sent))+'</span>'
        : '<span style="font-size:10px;color:var(--text3)">Non envoyée</span>');
  var btn='<button class="btn btn-g btn-sm" style="padding:3px 7px;white-space:nowrap;font-size:11px" onclick="suiviFactureSendClient(\''+f.id+'\')" title="Préparer un e-mail de validation au client">✉ '+(sent?'Renvoyer':'Envoyer au client')+'</button>';
  // Date d'accord du client : éditable dès que la facture a été envoyée.
  var valField= sent
    ? '<label style="display:flex;align-items:center;gap:4px;font-size:9.5px;color:var(--text3)">Accord client'+svInput('suiviUpdateFacture(\''+f.id+'\',\'valideClient\',this.value,true)',val||'','date')+'</label>'
    : '';
  return '<div style="display:flex;flex-direction:column;gap:4px;align-items:flex-start">'+status+btn+valField+'</div>';
}
// Prépare le message de validation à envoyer au client (e-mail / copie). Aucun
// envoi automatique : l'utilisateur ouvre sa messagerie ou copie le texte.
function suiviFactureSendClient(id){
  var r=suiviFindFacture(id); if(!r){toast('Facture introuvable','error');return;}
  var f=r.f, p=PROJ||{};
  var ref=f.refFacture||'(sans n°)';
  var montant=f.montant?(' d\'un montant de '+suiviEuro(suiviNum(f.montant))):'';
  var lib=f.libelle?(' ('+f.libelle+')'):'';
  var dateF=f.dateFacture?(' datée du '+suiviFmtDate(f.dateFacture)):'';
  var client=p.client||'le client';
  var email=p.clientEmail||'';
  var firm=(USER&&USER.firm)||'';
  var subject='Facture '+ref+' — '+(p.name||'projet')+' : votre validation';
  var body='Bonjour'+(p.client?(' '+p.client):'')+',\n\n'
    +'Dans le cadre du projet « '+(p.name||'')+' »'+(p.address?(', '+p.address):'')+', '
    +'nous vous transmettons la facture '+ref+lib+montant+dateF+'.\n\n'
    +'Merci de bien vouloir nous confirmer votre accord (bon pour accord) en réponse à ce message.\n\n'
    +'Cordialement,\n'+(firm||'');
  showModal(''
    +'<h3 style="margin-bottom:4px">Envoyer la facture '+e(ref)+' au client</h3>'
    +'<div style="font-size:12px;color:var(--text3);margin-bottom:12px">Destinataire : <strong>'+e(client)+(email?(' &lt;'+e(email)+'&gt;'):' (aucun e-mail dans « Informations projet »)')+'</strong></div>'
    +'<label style="font-size:11px;color:var(--text3)">Message</label>'
    +'<textarea id="fc-msg" data-email="'+e(email)+'" data-subject="'+e(subject)+'" style="width:100%;min-height:170px;margin-top:4px;padding:8px 10px;border:1px solid var(--border2);border-radius:8px;font-size:12px;font-family:inherit;background:var(--bg);color:var(--text);resize:vertical">'+e(body)+'</textarea>'
    +'<div style="font-size:10.5px;color:var(--text3);margin-top:8px">Rien n\'est envoyé automatiquement : ouvrez votre messagerie ou copiez le message, puis marquez la facture comme envoyée.</div>'
    +'<div class="mo-foot" style="flex-wrap:wrap;gap:6px">'
      +'<button class="btn btn-sm" onclick="(function(){navigator.clipboard&&navigator.clipboard.writeText(document.getElementById(\'fc-msg\').value);toast(\'Message copié\');})()">⧉ Copier le message</button>'
      +'<button class="btn btn-sm" onclick="suiviOpenFactureMail()">✉ Ouvrir l\'e-mail</button>'
      +'<button class="btn btn-p btn-sm" onclick="suiviMarkFactureSent(\''+f.id+'\')">Marquer comme envoyée</button>'
    +'</div>');
}
// Ouvre l'e-mail avec le message ÉDITÉ (lit le textarea en direct). encodeURIComponent
// neutralise toute injection de paramètres (?bcc=…) dans l'adresse.
function suiviOpenFactureMail(){
  var ta=document.getElementById('fc-msg'); if(!ta)return;
  var ml='mailto:'+encodeURIComponent(ta.getAttribute('data-email')||'')
    +'?subject='+encodeURIComponent(ta.getAttribute('data-subject')||'')
    +'&body='+encodeURIComponent(ta.value||'');
  try{window.location.href=ml;}catch(e){}
  setTimeout(closeModal,200);
}
// Marque la facture comme envoyée (date du jour) et ferme la fenêtre.
function suiviMarkFactureSent(id){
  if(!can('items'))return denyMsg();
  var r=suiviFindFacture(id); if(!r)return;
  if(!r.f.envoiClient){ r.f.envoiClient=new Date().toISOString().slice(0,10); savePROJS(); }
  closeModal(); renderSuiviList(); toast('Facture marquée comme envoyée au client');
}

function suiviRefreshTotals(){
  if(!PROJ||!Array.isArray(PROJ.suivi))return;
  var TH=0,TT=0,TF=0;
  var set=function(idc,v,col){var el=document.getElementById(idc);if(el){el.textContent=v;if(col!==undefined)el.style.color=col;}};
  PROJ.suivi.forEach(function(g){
    var gc=groupCalc(g);TH+=gc.ht;TT+=gc.ttc;TF+=gc.fac;
    set('gttc-'+g.id,suiviEuro(gc.ttc));set('gfac-'+g.id,suiviEuro(gc.fac));set('greste-'+g.id,suiviEuro(gc.reste),gc.reste<0?'var(--red)':'');
    (g.devis||[]).forEach(function(d){
      var c=devisCalc(d);
      set('ttc-'+d.id,suiviEuro(c.ttc));set('fac-'+d.id,suiviEuro(c.fac));set('reste-'+d.id,suiviEuro(c.reste),c.reste<0?'var(--red)':'');
      set('pct-'+d.id,c.pct==null?'—':c.pct+'%');
    });
  });
  set('sv-tht',suiviEuro(TH));set('sv-tttc',suiviEuro(TT));set('sv-tfac',suiviEuro(TF));set('sv-treste',suiviEuro(TT-TF));
}

/* ── PDF ── */
function suiviPinPDF(kind,id,evt){
  if(!can('items')){if(evt&&evt.target)evt.target.value='';return denyMsg();}
  var f=evt.target.files&&evt.target.files[0];evt.target.value='';
  if(!f)return;
  if(!(f.type==='application/pdf'||/\.pdf$/i.test(f.name))){toastErr('Veuillez sélectionner un fichier PDF.');return;}
  var rd=new FileReader();
  rd.onload=function(){
    var bid='svpdf'+(uid++);setBlob(bid,rd.result).then(function(ok){
      if(!ok){toastErr('Fichier non stocké (stockage plein) — PDF non épinglé.');return;}
      if(kind==='devis'){var r=suiviFindDevis(id);if(r)r.d.devisPdf={blobId:bid,fileName:f.name};}
      else{var rf=suiviFindFacture(id);if(rf)rf.f.facturePdf={blobId:bid,fileName:f.name};}
      savePROJS();renderSuiviList();toast('PDF épinglé');
    }).catch(function(er){console.warn('[suiviPinPDF]',er);toastErr('Erreur lors de l\'enregistrement du fichier.');});
  };
  rd.onerror=function(){toastErr('Erreur de lecture du fichier');};
  rd.readAsDataURL(f);
}
function suiviUnpin(kind,id){
  if(!can('items'))return denyMsg();
  if(kind==='devis'){var r=suiviFindDevis(id);if(r)r.d.devisPdf=null;}
  else{var rf=suiviFindFacture(id);if(rf)rf.f.facturePdf=null;}
  savePROJS();renderSuiviList();toast('PDF retiré');
}
function suiviViewPDF(kind,id){
  var pdf=null;
  if(kind==='devis'){var r=suiviFindDevis(id);if(r)pdf=r.d.devisPdf;}
  else{var rf=suiviFindFacture(id);if(rf)pdf=rf.f.facturePdf;}
  if(!pdf||!pdf.blobId)return;
  viewDoc({id:pdf.blobId,fileName:pdf.fileName,title:pdf.fileName,mimeType:'application/pdf',type:'pdf'});
}
function suiviPdfBtn(kind,id,pdf){
  if(pdf&&pdf.blobId){
    return '<span style="display:inline-flex;align-items:center;gap:4px;white-space:nowrap">'
      +'<button class="btn btn-g btn-sm" style="padding:3px 6px" onclick="suiviViewPDF(\''+kind+'\',\''+id+'\')" title="'+e(pdf.fileName||'PDF')+'"><svg class="ico ico-xs" style="margin-right:2px"><use href="#i-pdf"/></svg>Voir</button>'
      +'<button class="btn btn-g btn-sm" style="padding:3px 5px;color:var(--text3)" onclick="suiviUnpin(\''+kind+'\',\''+id+'\')" title="Retirer le PDF"><svg class="ico ico-xs"><use href="#i-x"/></svg></button></span>';
  }
  return '<label class="btn btn-g btn-sm" style="cursor:pointer;padding:3px 8px;white-space:nowrap"><svg class="ico ico-xs" style="margin-right:2px"><use href="#i-upload"/></svg>PDF'
    +'<input type="file" accept=".pdf,application/pdf" style="display:none" onchange="suiviPinPDF(\''+kind+'\',\''+id+'\',event)"></label>';
}

function svInput(call,val,type,ph){
  return '<input type="'+(type||'text')+'" value="'+e(val==null?'':String(val))+'" '+(ph?'placeholder="'+e(ph)+'" ':'')+'oninput="'+call+'" style="'+SVCSS+'">';

/* ══ PRÉ-CHIFFRAGE (estimatif) ════════════════════════════════════════════════
   Estimation préalable par lot / corps d'état, façon « Kosten Voranschlag ».
   Modèle : PROJ.prechiffrage = {
     titre, tvaDefault,
     surfaces:[ {id,nom,reno,ext} ],                          // tableau de surfaces (optionnel)
     lots:[ {id,nom, lignes:[ {id,designation,unite,pu,qte,tva} ] } ]
   }
   Chiffre purement local, additif et rétro-compatible (back-fill à la volée).
   Convertible en groupes de suivi réel une fois les devis reçus. */
var PC_UNITS=['m²','u','ml','m³','forfait','ens.','h','j'];

function ensurePrechiffrage(p){
  if(!p)return;
  if(!p.prechiffrage||typeof p.prechiffrage!=='object')p.prechiffrage={};
  var pc=p.prechiffrage;
  if(typeof pc.tvaDefault==='undefined'||pc.tvaDefault===null)pc.tvaDefault=10;
  if(typeof pc.titre!=='string')pc.titre='';
  if(!Array.isArray(pc.surfaces))pc.surfaces=[];
  if(!Array.isArray(pc.lots))pc.lots=[];
  pc.lots.forEach(function(l){if(!Array.isArray(l.lignes))l.lignes=[];});
}

function pcCalcLigne(l){var pu=suiviNum(l.pu),qte=suiviNum(l.qte),tva=suiviNum(l.tva),ht=pu*qte;return{ht:ht,ttc:ht*(1+tva/100)};}
function pcCalcLot(lot){var ht=0,ttc=0;(lot.lignes||[]).forEach(function(l){var c=pcCalcLigne(l);ht+=c.ht;ttc+=c.ttc;});return{ht:ht,ttc:ttc,n:(lot.lignes||[]).length};}
function pcTotals(p){var ht=0,ttc=0;((p&&p.prechiffrage&&p.prechiffrage.lots)||[]).forEach(function(lot){var c=pcCalcLot(lot);ht+=c.ht;ttc+=c.ttc;});return{ht:ht,ttc:ttc};}
function pcSurfaceTotals(p){var reno=0,ext=0;((p&&p.prechiffrage&&p.prechiffrage.surfaces)||[]).forEach(function(s){reno+=suiviNum(s.reno);ext+=suiviNum(s.ext);});return{reno:reno,ext:ext,tot:reno+ext};}

function pcFindLot(id){if(!PROJ||!PROJ.prechiffrage)return null;return(PROJ.prechiffrage.lots||[]).find(function(l){return l.id===id;})||null;}
function pcFindLigne(id){if(!PROJ||!PROJ.prechiffrage)return null;var lots=PROJ.prechiffrage.lots||[];for(var i=0;i<lots.length;i++){var l=(lots[i].lignes||[]).find(function(x){return x.id===id;});if(l)return{lot:lots[i],ligne:l};}return null;}

function pcAddLot(){if(!can('items'))return denyMsg();if(!PROJ)return;ensurePrechiffrage(PROJ);PROJ.prechiffrage.lots.push({id:'pcl'+(uid++),nom:'',lignes:[{id:'pcg'+(uid++),designation:'',unite:'m²',pu:'',qte:'',tva:PROJ.prechiffrage.tvaDefault}]});savePROJS();renderPrechiffrage();toast('Lot ajouté');}
function pcDelLot(id){if(!can('items'))return denyMsg();var lots=PROJ.prechiffrage.lots,i=lots.findIndex(function(x){return x.id===id;});if(i<0)return;var rm=lots.splice(i,1)[0];savePROJS();renderPrechiffrage();toast('Lot supprimé',{undo:function(){lots.splice(i,0,rm);savePROJS();renderPrechiffrage();toast('Lot rétabli');}});}
function pcUpdateLot(id,field,val){if(!can('items'))return;var l=pcFindLot(id);if(!l)return;l[field]=val;saveLater();}
function pcAddLigne(lotId){if(!can('items'))return denyMsg();var l=pcFindLot(lotId);if(!l)return;l.lignes.push({id:'pcg'+(uid++),designation:'',unite:'m²',pu:'',qte:'',tva:PROJ.prechiffrage.tvaDefault});savePROJS();renderPrechiffrage();}
function pcDelLigne(id){if(!can('items'))return denyMsg();var r=pcFindLigne(id);if(!r)return;var i=r.lot.lignes.indexOf(r.ligne);r.lot.lignes.splice(i,1);savePROJS();renderPrechiffrage();toast('Ligne supprimée',{undo:function(){r.lot.lignes.splice(i,0,r.ligne);savePROJS();renderPrechiffrage();}});}
function pcUpdateLigne(id,field,val,rc){if(!can('items'))return;var r=pcFindLigne(id);if(!r)return;r.ligne[field]=val;saveLater();if(rc)pcRefreshTotals();}
function pcAddSurface(){if(!can('items'))return denyMsg();if(!PROJ)return;ensurePrechiffrage(PROJ);PROJ.prechiffrage.surfaces.push({id:'pcs'+(uid++),nom:'',reno:'',ext:''});savePROJS();renderPrechiffrage();}
function pcDelSurface(id){if(!can('items'))return denyMsg();var s=PROJ.prechiffrage.surfaces,i=s.findIndex(function(x){return x.id===id;});if(i<0)return;s.splice(i,1);savePROJS();renderPrechiffrage();}
function pcUpdateSurface(id,field,val,rc){if(!can('items'))return;var s=(PROJ.prechiffrage.surfaces||[]).find(function(x){return x.id===id;});if(!s)return;s[field]=val;saveLater();if(rc)pcRefreshTotals();}
function pcSetTvaDefault(v){if(!can('items'))return;ensurePrechiffrage(PROJ);PROJ.prechiffrage.tvaDefault=suiviNum(v);saveLater();}
function pcSetTitre(v){if(!can('items'))return;ensurePrechiffrage(PROJ);PROJ.prechiffrage.titre=v;saveLater();}

function pcRefreshTotals(){
  if(!PROJ||!PROJ.prechiffrage)return;
  var set=function(idc,v,col){var el=document.getElementById(idc);if(el){el.textContent=v;if(col!==undefined)el.style.color=col;}};
  (PROJ.prechiffrage.lots||[]).forEach(function(lot){
    var c=pcCalcLot(lot);
    set('pc-loht-'+lot.id,suiviEuro(c.ht));set('pc-lottc-'+lot.id,suiviEuro(c.ttc));
    (lot.lignes||[]).forEach(function(l){var lc=pcCalcLigne(l);set('pc-lht-'+l.id,suiviEuro(lc.ht));set('pc-lttc-'+l.id,suiviEuro(lc.ttc));});
  });
  var t=pcTotals(PROJ),fin=projFinance(PROJ),ecart=fin.ttc-t.ttc;
  set('pc-tht',suiviEuro(t.ht));set('pc-tttc',suiviEuro(t.ttc));
  set('pc-tht2',suiviEuro(t.ht));set('pc-tttc2',suiviEuro(t.ttc));
  set('pc-real',suiviEuro(fin.ttc));
  set('pc-ecart',(ecart>0?'+':'')+suiviEuro(ecart),ecart>0?'var(--red)':(ecart<0?'var(--green)':''));
  var st=pcSurfaceTotals(PROJ);set('pc-sreno',pcFmtSurf(st.reno));set('pc-sext',pcFmtSurf(st.ext));set('pc-stot',pcFmtSurf(st.tot));
  (PROJ.prechiffrage.surfaces||[]).forEach(function(s){set('pc-srow-'+s.id,pcFmtSurf(suiviNum(s.reno)+suiviNum(s.ext)));});
}
function pcFmtSurf(n){return (n||0).toLocaleString('fr-FR',{maximumFractionDigits:2});}

function pcConvertLotToSuivi(lotId){
  var lot=pcFindLot(lotId);if(!lot)return;
  if(!(lot.lignes||[]).length){toast('Ce lot n\'a aucune ligne à convertir','error');return;}
  confirmModal({title:'Convertir en suivi réel ?',danger:false,body:'Un groupe « '+e(lot.nom||'Lot')+' » sera créé dans le suivi réel, avec un devis estimatif par ligne. Vous pourrez ensuite y rattacher les vrais devis et factures.',onConfirm:function(){
    ensureSuivi(PROJ);
    var grp={id:'sg'+(uid++),nom:lot.nom||'Lot estimé',devis:(lot.lignes||[]).map(function(l){var c=pcCalcLigne(l);return{id:'sd'+(uid++),article:(l.designation||'')+(l.unite?(' ('+l.qte+' '+l.unite+')'):''),entreprise:'',refDevis:'',tva:suiviNum(l.tva),prixHT:String(c.ht||''),dateDevis:'',dateSignature:'',signe:false,devisPdf:null,factures:[]};})};
    PROJ.suivi.push(grp);savePROJS();
    suiviTab='reel';renderSuivi();toast('Lot converti en suivi réel');
  }});
}

function suiviSetTab(t){suiviTab=t;renderSuivi();}
function suiviTabBar(){
  function tab(id,ico,label){
    var on=suiviTab===id;
    return '<button role="tab" aria-selected="'+(on?'true':'false')+'" onclick="suiviSetTab(\''+id+'\')" style="display:inline-flex;align-items:center;gap:6px;padding:7px 15px;border:none;border-radius:8px;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .12s;'
      +(on?'background:var(--panel);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.14)':'background:transparent;color:var(--text3)')+'">'
      +'<svg class="ico ico-sm" aria-hidden="true"><use href="#i-'+ico+'"/></svg>'+label+'</button>';
  }
  return '<div role="tablist" aria-label="Vue des dépenses" style="display:inline-flex;gap:3px;padding:3px;background:var(--bg2);border:1px solid var(--border);border-radius:11px;margin-bottom:16px">'
    +tab('reel','receipt','Suivi réel')
    +tab('prechiffrage','invoice','Pré-chiffrage')+'</div>';
}

function renderPrechiffrage(){
  var host=document.getElementById('pc-body');if(!host||!PROJ)return;
  ensurePrechiffrage(PROJ);
  var pc=PROJ.prechiffrage;
  var t=pcTotals(PROJ),fin=projFinance(PROJ),ecart=fin.ttc-t.ttc,st=pcSurfaceTotals(PROJ);

  // Cartes de synthèse (HT / TTC estimés + comparaison au réel)
  var html='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">'
    +scard('Total estimé HT','pc-tht',suiviEuro(t.ht))
    +scard('Total estimé TTC','pc-tttc',suiviEuro(t.ttc))
    +scard('Engagé réel (TTC)','pc-real',suiviEuro(fin.ttc))
    +scardC('Écart réel − estimé','pc-ecart',(ecart>0?'+':'')+suiviEuro(ecart),ecart>0?'var(--red)':(ecart<0?'var(--green)':''))
  +'</div>';

  // Bandeau réglages : titre libre + TVA par défaut
  html+='<div style="display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r2);background:var(--panel)">'
    +'<label style="display:flex;flex-direction:column;gap:3px;font-size:10px;color:var(--text3);flex:1;min-width:200px">Intitulé du chiffrage'
      +'<input value="'+e(pc.titre||'')+'" placeholder="ex. Estimatif travaux — juin 2026" oninput="pcSetTitre(this.value)" style="'+SVCSS+'"></label>'
    +'<label style="display:flex;flex-direction:column;gap:3px;font-size:10px;color:var(--text3);width:120px">TVA par défaut (%)'
      +'<input type="number" value="'+e(pc.tvaDefault==null?'':String(pc.tvaDefault))+'" oninput="pcSetTvaDefault(this.value)" style="'+SVCSS+'"></label>'
    +'<span style="font-size:11px;color:var(--text3);align-self:center">La TVA par défaut s\'applique aux nouvelles lignes.</span>'
  +'</div>';

  // Tableau des surfaces (optionnel)
  html+=pcSurfacesPanel(pc,st);

  // Lots
  if(!pc.lots.length){
    html+='<div style="color:var(--text3);font-size:13px;padding:24px;text-align:center;border:1px dashed var(--border);border-radius:var(--r2)">Aucun lot estimé. Cliquez sur « + Lot » en haut à droite (ex. « Gros œuvre »), puis ajoutez des lignes (désignation, unité, prix unitaire, quantité).</div>';
  }
  pc.lots.forEach(function(lot){
    var c=pcCalcLot(lot);
    html+='<div style="border:1px solid var(--border);border-radius:var(--r2);background:var(--panel);margin-bottom:14px;overflow:hidden">'
      +'<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--border);background:var(--bg2);flex-wrap:wrap">'
        +'<svg class="ico ico-sm" style="color:#c47a00"><use href="#i-folder"/></svg>'
        +'<input value="'+e(lot.nom||'')+'" placeholder="Nom du lot (ex. Maçonnerie, Électricité)" oninput="pcUpdateLot(\''+lot.id+'\',\'nom\',this.value)" style="flex:1;min-width:160px;font-weight:600;font-size:13px;border:1px solid transparent;border-radius:6px;padding:4px 6px;background:transparent;color:var(--text)" onfocus="this.style.borderColor=\'var(--border)\';this.style.background=\'var(--panel)\'" onblur="this.style.borderColor=\'transparent\';this.style.background=\'transparent\'">'
        +'<span style="font-size:12px;color:var(--text2);white-space:nowrap">HT <b id="pc-loht-'+lot.id+'" style="color:var(--text)">'+suiviEuro(c.ht)+'</b> · TTC <b id="pc-lottc-'+lot.id+'" style="color:var(--text)">'+suiviEuro(c.ttc)+'</b></span>'
        +'<button class="btn btn-g btn-sm" style="padding:4px 8px" onclick="pcAddLigne(\''+lot.id+'\')"><svg class="ico ico-xs" style="margin-right:3px"><use href="#i-plus"/></svg>Ligne</button>'
        +'<button class="btn btn-g btn-sm" style="padding:4px 8px" onclick="pcConvertLotToSuivi(\''+lot.id+'\')" title="Créer un groupe de suivi réel à partir de ce lot"><svg class="ico ico-xs" style="margin-right:3px"><use href="#i-arrow-right"/></svg>Suivi</button>'
        +'<button class="btn btn-g btn-sm" style="padding:4px 6px;color:var(--red)" onclick="pcDelLot(\''+lot.id+'\')" title="Supprimer le lot"><svg class="ico ico-xs"><use href="#i-trash"/></svg></button>'
      +'</div>';
    // Lignes (tableau)
    var th='scope="col" style="padding:6px;text-align:left;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap"';
    html+='<div style="overflow-x:auto;padding:6px 4px 4px"><table class="pc-table" style="border-collapse:collapse;width:100%;min-width:720px">'
      +'<thead><tr>'
        +'<th '+th+'>Désignation</th>'
        +'<th '+th+' style="width:90px">Unité</th>'
        +'<th '+th+' style="text-align:right;width:110px">P.U. HT</th>'
        +'<th '+th+' style="text-align:right;width:80px">Qté</th>'
        +'<th '+th+' style="text-align:right;width:120px">Total HT</th>'
        +'<th '+th+' style="text-align:right;width:70px">TVA %</th>'
        +'<th '+th+' style="text-align:right;width:120px">Total TTC</th>'
        +'<th '+th+' style="width:34px"></th>'
      +'</tr></thead><tbody>';
    if(!lot.lignes.length){

    }
    lot.lignes.forEach(function(l){
      var lc=pcCalcLigne(l);
      var td='style="padding:4px 6px;border-top:1px solid var(--border)"';
      var tdr='style="padding:4px 6px;border-top:1px solid var(--border);text-align:right"';
      html+='<tr>'
        +'<td '+td+' style="padding:4px 6px;border-top:1px solid var(--border);min-width:200px">'+svInput('pcUpdateLigne(\''+l.id+'\',\'designation\',this.value)',l.designation,'text','Désignation des travaux')+'</td>'
        +'<td '+td+'><select onchange="pcUpdateLigne(\''+l.id+'\',\'unite\',this.value)" style="'+SVCSS+'">'+PC_UNITS.map(function(u){return '<option value="'+e(u)+'"'+((l.unite||'m²')===u?' selected':'')+'>'+e(u)+'</option>';}).join('')+'</select></td>'
        +'<td '+tdr+'>'+svInput('pcUpdateLigne(\''+l.id+'\',\'pu\',this.value,true)',l.pu,'number','0')+'</td>'
        +'<td '+tdr+'>'+svInput('pcUpdateLigne(\''+l.id+'\',\'qte\',this.value,true)',l.qte,'number','0')+'</td>'
        +'<td '+tdr+'><b id="pc-lht-'+l.id+'" style="font-size:12px">'+suiviEuro(lc.ht)+'</b></td>'
        +'<td '+tdr+'>'+svInput('pcUpdateLigne(\''+l.id+'\',\'tva\',this.value,true)',l.tva,'number','10')+'</td>'
        +'<td '+tdr+'><b id="pc-lttc-'+l.id+'" style="font-size:12px;color:#c47a00">'+suiviEuro(lc.ttc)+'</b></td>'
        +'<td '+td+' style="padding:4px 6px;border-top:1px solid var(--border);text-align:center"><button class="btn btn-g btn-sm" style="padding:3px 5px;color:var(--red)" onclick="pcDelLigne(\''+l.id+'\')" title="Supprimer la ligne"><svg class="ico ico-xs"><use href="#i-trash"/></svg></button></td>'
      +'</tr>';
    });
    html+='</tbody></table></div></div>';
  });

  // Pied de total général (façon « Total Price » de la feuille)
  html+='<div style="display:flex;align-items:center;justify-content:flex-end;gap:24px;flex-wrap:wrap;padding:12px 16px;border:1px solid var(--border);border-radius:var(--r2);background:var(--bg2);font-size:13px">'
    +'<span style="font-weight:600;color:var(--text2);margin-right:auto">Total du chiffrage</span>'
    +'<span style="color:var(--text3)">HT <b id="pc-tht2" style="color:var(--text);font-size:15px;font-variant-numeric:tabular-nums">'+suiviEuro(t.ht)+'</b></span>'
    +'<span style="color:var(--text3)">TTC <b id="pc-tttc2" style="color:#c47a00;font-size:16px;font-variant-numeric:tabular-nums">'+suiviEuro(t.ttc)+'</b></span>'
  +'</div>';

  host.innerHTML=html;
}

    rows.forEach(function(s){
      var td='style="padding:4px 8px;border-top:1px solid var(--border)"',tdr='style="padding:4px 8px;border-top:1px solid var(--border);text-align:right"';
